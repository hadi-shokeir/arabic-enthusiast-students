<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Arabic Enthusiast — Learn Arabic with Passion & Precision</title>
<meta name="description" content="Professional Arabic language courses — Classical, Levantine, and Quranic. Learn with passion and precision." />
<meta name="theme-color" content="#f6f1e8" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="Arabic Enthusiast" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/logo.jpeg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,600&family=Public+Sans:wght@300;400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
(function(){
  try {
    document.documentElement.dataset.siteTheme = localStorage.getItem('ae_site_theme') || 'light';
  } catch {
    document.documentElement.dataset.siteTheme = 'light';
  }
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design tokens — light (default) ── */
:root {
  --paper:      #f6f1e8;
  --surface:    #fffdf8;
  --surface-2:  #fbf5eb;
  --surface-3:  #f3ebdc;
  --ink:        #241c12;
  --ink-2:      #4c4234;
  --muted:      #8a7f6c;
  --faint:      #b6ab96;
  --line:       #e7dcc8;
  --line-2:     #f0e7d7;
  --accent:     #2f4a7a;
  --on-accent:  #fff8f1;
  --good:       #1c8a5b;
  --warn:       #b3720f;
  --bad:        #cf4744;
  --shadow:     16px 30px 70px -40px rgba(60,42,18,0.45);
  --shadow-sm:  0 2px 10px -4px rgba(60,42,18,0.22);
  --ease:       cubic-bezier(.16,1,.3,1);
  --r:    18px; --r-sm: 12px; --r-lg: 26px;
  --u:    1;    --fs:    1;
  --f-head:  'Newsreader', Georgia, serif;
  --f-body:  'Public Sans', system-ui, sans-serif;
  --f-ar:    'Amiri', serif;
  --f-ar-ui: 'Noto Naskh Arabic', serif;
  /* Legacy aliases used by page components */
  --gold:   var(--accent);
  --gold2:  color-mix(in oklab, var(--accent) 70%, white);
  --cream:  var(--paper);
  --border: var(--line);
}

/* ── Dark mode ── */
html[data-site-theme="dark"] {
  --paper:     #141009;
  --surface:   #1e1810;
  --surface-2: #261f15;
  --surface-3: #2f2718;
  --ink:       #f5efe2;
  --ink-2:     #d2c8b4;
  --muted:     #9a8f7a;
  --faint:     #6f6452;
  --line:      #322a1c;
  --line-2:    #2a2317;
  --shadow:    20px 40px 80px -44px rgba(0,0,0,0.7);
  --shadow-sm: 0 2px 12px -4px rgba(0,0,0,0.5);
}

html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
  transition: background .35s ease, color .35s ease;
}
h1, h2, h3 { font-family: var(--f-head); text-wrap: balance; }
p { text-wrap: pretty; }

::selection { background: color-mix(in oklab, var(--accent) 26%, transparent); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface-2); }
::-webkit-scrollbar-thumb { background: color-mix(in oklab, var(--accent) 40%, var(--line)); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: color-mix(in oklab, var(--accent) 60%, var(--line)); }

@keyframes spin       { to { transform: rotate(360deg); } }
@keyframes float      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes floaty     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes letterFade { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
@keyframes fadeInUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes pageIn     { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn     { from{opacity:0} to{opacity:1} }
.page-enter { animation: pageIn 0.45s var(--ease) forwards; }

/* Arabic helpers */
.ar    { font-family: var(--f-ar);    direction: rtl; unicode-bidi: plaintext; }
.ar-ui { font-family: var(--f-ar-ui); direction: rtl; unicode-bidi: plaintext; }
[dir="rtl"], .arabic { direction: rtl; unicode-bidi: plaintext; font-family: var(--f-ar-ui); }

/* Inputs */
input, textarea { color-scheme: light; font-size: 16px; }
html[data-site-theme="dark"] input, html[data-site-theme="dark"] textarea { color-scheme: dark; }
input::placeholder, textarea::placeholder { color: var(--faint); }
button, a, input, select, textarea { touch-action: manipulation; }

/* Subtle grain */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.025; mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}
html[data-site-theme="dark"] body::before { opacity: 0.03; mix-blend-mode: screen; }
#root { position: relative; z-index: 1; }

/* Nav helpers */
.nav-mobile  { display: none; }
.nav-desktop { display: flex; }

/* Theme toggle */
.site-theme-toggle {
  position: fixed; right: 18px; bottom: 18px; z-index: 250;
  min-width: 88px; min-height: 44px;
  border: 1px solid var(--line); border-radius: 999px;
  background: color-mix(in oklab, var(--surface) 88%, transparent);
  color: var(--ink-2);
  box-shadow: var(--shadow-sm);
  font-family: var(--f-body); font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; backdrop-filter: blur(14px);
  transition: all .2s var(--ease);
}
.site-theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

/* Responsive */
@media (max-width: 860px) {
  .nav-mobile  { display: flex !important; }
  .nav-desktop { display: none !important; }
}
@media (max-width: 980px) {
  .hero-grid { grid-template-columns: 1fr !important; }
  main section div[style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
    gap: 32px !important;
  }
  main section div[style*="grid-template-columns: repeat(4"],
  main section div[style*="grid-template-columns: repeat(3"] {
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
  }
}
@media (max-width: 560px) {
  body { font-size: 15px; }
  .hero-actions {
    width: 100%; flex-direction: column; align-items: stretch !important;
  }
  .hero-actions > button { width: 100%; min-height: 44px; }
  main section div[style*="grid-template-columns: repeat(4"],
  main section div[style*="grid-template-columns: repeat(3"],
  main section div[style*="grid-template-columns: repeat(7"] {
    grid-template-columns: 1fr !important;
  }
}
@media (pointer: coarse) {
  button { min-height: 44px; }
}
</style>
</head>
<body>
<div id="root"></div>
<button id="siteThemeToggle" class="site-theme-toggle" type="button" aria-label="Toggle dark theme">Dark</button>

<script src="/site-content.js"></script>
<script src="/data.js"></script>
<script type="text/babel" src="/components.jsx"></script>
<script type="text/babel" src="/pages/Home.jsx"></script>
<script type="text/babel" src="/pages/Courses.jsx"></script>
<script type="text/babel" src="/pages/Pricing.jsx"></script>
<script type="text/babel" src="/pages/About.jsx"></script>
<script type="text/babel" src="/pages/Success.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [page, setPage] = useState('home');
  const [lesson, setLesson] = useState('arabic-foundations');
  const [key, setKey] = useState(0);
  const [siteKey, setSiteKey] = useState(0);

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const urlPage = params.get('page');
    const saved = sessionStorage.getItem('ae_page');
    const savedLesson = sessionStorage.getItem('ae_lesson');
    // URL param takes priority (handles Stripe redirects like /?page=success&session_id=...)
    if (urlPage && urlPage !== 'dashboard') {
      setPage(urlPage);
    } else if (saved && saved !== 'dashboard') {
      setPage(saved);
    }
    if (savedLesson) setLesson(savedLesson);
  }, []);

  useEffect(() => {
    let alive = true;
    const params = new URLSearchParams(window.location.search);
    if (params.get('preview') === 'draft') {
      try {
        const draft = JSON.parse(localStorage.getItem('ae_site_preview') || 'null');
        if (draft && window.AE?.mergeSiteContent) {
          window.AE.DATA = window.AE.mergeSiteContent(window.AE.DATA, draft);
          if (params.get('page')) setPage(params.get('page'));
          if (alive) setSiteKey(k => k + 1);
          return () => { alive = false; };
        }
      } catch {}
    }
    fetch('/api/site')
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (d?.content && window.AE?.mergeSiteContent) {
          window.AE.DATA = window.AE.mergeSiteContent(window.AE.DATA, d.content);
          if (alive) setSiteKey(k => k + 1);
        }
      })
      .catch(() => {});
    return () => { alive = false; };
  }, []);

  function navigateTo(newPage) {
    // 'dashboard' clicks → go to the real student portal
    if (newPage === 'dashboard') { window.location.href = '/portal'; return; }
    setPage(newPage);
    setKey(k => k + 1);
    sessionStorage.setItem('ae_page', newPage);
    window.scrollTo(0, 0);
  }

  function navigateLesson(courseId) {
    setLesson(courseId);
    sessionStorage.setItem('ae_lesson', courseId);
  }

  return (
    <div>
      <Nav page={page} setPage={navigateTo} />
      <main key={`${key}-${siteKey}`} className="page-enter">
        {page === 'home'    && <HomePage    setPage={navigateTo} />}
        {page === 'courses' && <CoursesPage setPage={navigateTo} setLesson={navigateLesson} />}
        {page === 'lesson'  && <LessonPage  courseId={lesson}    setPage={navigateTo} />}
        {page === 'pricing' && <PricingPage setPage={navigateTo} />}
        {page === 'about'   && <AboutPage   setPage={navigateTo} />}
        {page === 'success' && <SuccessPage setPage={navigateTo} />}
      </main>
      {page !== 'lesson' && <Footer setPage={navigateTo} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
(function(){
  const key = 'ae_site_theme';
  const btn = document.getElementById('siteThemeToggle');
  const meta = document.querySelector('meta[name="theme-color"]');
  function apply(theme) {
    document.documentElement.dataset.siteTheme = theme;
    if (meta) meta.setAttribute('content', theme === 'dark' ? '#0a0805' : '#f4f1e9');
    if (btn) {
      btn.textContent = theme === 'dark' ? 'Light' : 'Dark';
      btn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
    }
  }
  let theme = 'light';
  try { theme = localStorage.getItem(key) || 'light'; } catch {}
  apply(theme);
  btn?.addEventListener('click', () => {
    const next = document.documentElement.dataset.siteTheme === 'dark' ? 'light' : 'dark';
    try { localStorage.setItem(key, next); } catch {}
    apply(next);
  });
})();
</script>
</body>
</html>
