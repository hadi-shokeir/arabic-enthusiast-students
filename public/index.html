        <button onClick=${saveCurrent} style=${{
          display:'flex',alignItems:'center',gap:6,padding:'7px 15px',
          border:'1.5px solid '+(saveFlagged?'#4caf50':'#e0ddd6'),
          borderRadius:20,background:saveFlagged?'#f0fff4':'transparent',
          cursor:saveFlagged?'default':'pointer',fontSize:13,fontWeight:500,
          color:saveFlagged?'#2e7d32':'#777',fontFamily:'inherit',transition:'all 0.2s'
        }}>${saveFlagged?'✓ Saved':'🔖 Save'}</button>
      </div>
    </div>`}

    <!-- Saved panel -->
    ${saved.length>0&&h`<div style=${{...cardStyle,padding:0,overflow:'hidden'}}>
      <div onClick=${()=>setSavedOpen(!savedOpen)} style=${{
        display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'14px 18px',cursor:'pointer'
      }}>
        <div style=${{display:'flex',alignItems:'center',gap:8,fontSize:14,fontWeight:600,color:'#333'}}>
          🔖 Saved
          <span style=${{background:accent,color:'#fff',borderRadius:20,padding:'2px 9px',fontSize:11,fontWeight:700}}>${saved.length}</span>
        </div>
        <div style=${{display:'flex',alignItems:'center',gap:10}}>
          <button onClick=${e=>{e.stopPropagation();exportSentenceLabPDF(saved,s.name);}} style=${{fontSize:12,color:'#1976d2',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:'4px 8px',borderRadius:6}}>📥 PDF</button>
          <button onClick=${e=>{e.stopPropagation();if(confirm('Clear all saved sentences?'))setSaved([]);}} style=${{fontSize:12,color:'#e53935',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:'4px 8px',borderRadius:6}}>Clear All</button>
          <span style=${{fontSize:11,color:'#ccc',transition:'transform 0.3s',display:'inline-block',transform:savedOpen?'rotate(180deg)':'rotate(0deg)'}}>▼</span>
        </div>
      </div>
      ${savedOpen&&h`<div>
        ${saved.map((item,i)=>h`<div key=${item.id} style=${{borderTop:'1px solid #f5f3ee',padding:'14px 18px'}}>
          <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <span style=${{fontSize:11,color:accent,fontWeight:700}}>${item.modeLabel}</span>
            <div style=${{display:'flex',gap:7}}>
              <button onClick=${()=>navigator.clipboard?.writeText(item.sentence)} style=${{fontSize:12,padding:'4px 11px',borderRadius:7,cursor:'pointer',background:'#f0ece3',border:'1px solid #e0ddd6',color:'#555',fontFamily:'inherit'}}>Copy Arabic</button>
              <button onClick=${()=>setSaved(prev=>prev.filter(x=>x.id!==item.id))} style=${{fontSize:12,padding:'4px 11px',borderRadius:7,cursor:'pointer',background:'#fff5f5',border:'1px solid #ffd0d0',color:'#e53935',fontFamily:'inherit'}}>Remove</button>
            </div>
          </div>
          <div style=${{fontFamily:"'Noto Naskh Arabic',serif",fontSize:'1.15rem',lineHeight:1.95,direction:'rtl',textAlign:'right',color:'#1a1a1a',marginBottom:4}}>${item.sentence}</div>
          <div style=${{fontSize:13,color:'#999'}}>${item.translation}</div>
        </div>`)}
      </div>`}
    </div>`}
  </div>`;
}

function StudentProfile({data, setData, profileId, auth}) {
  const s = data.students.find(x=>x.id===profileId);
  const [tab, setTab] = useState("overview");
  const [aiResult, setAiResult] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [showHwForm, setShowHwForm] = useState(false);
  const [hwForm, setHwForm] = useState(null);
  const [savedCard, setSavedCard] = useState("");
  const [showLogModal, setShowLogModal] = useState(false);
  const [logForm, setLogForm] = useState(null);
  const [logLoading, setLogLoading] = useState(false);
  const [logSaved, setLogSaved] = useState(false);
  const S = data.settings;

  if (!s) return h`<div style=${{padding:40,textAlign:"center",color:"var(--g400)"}}>Student not found.</div>`;

  const upd = (k,v) => setData({...data, students:data.students.map(x=>x.id===s.id?{...x,[k]:v}:x)});
  const updMany = (pairs) => setData({...data, students:data.students.map(x=>x.id===s.id?{...x,...pairs}:x)});
  // Draft state for text fields — typing only updates local state, setData is called on blur
  const [draft, setDraft] = useState({
    goals:s.goals||"", nextSteps:s.nextSteps||"",
    nickname:s.nickname||"", nicknameEmoji:s.nicknameEmoji||"",
    teacherStrengths:s.teacherStrengths||"", teacherImprove:s.teacherImprove||"",
    teacherSummary:s.teacherSummary||"", teacherPrivateNotes:s.teacherPrivateNotes||"",
    homeworkNotes:s.homeworkNotes||""
  });
  const dset = (k,v) => setDraft(d=>({...d,[k]:v}));
  const dsave = k => upd(k, draft[k]);

  const saveCard = async (cardName) => {
    setSavedCard(cardName);
    // Immediately push to cloud so data is never lost
    if (auth?.token) {
      try { await apiPost("/api/data", {token: auth.token, action:"backup", data}); } catch {}
    }
    setTimeout(() => setSavedCard(prev => prev===cardName ? "" : prev), 2000);
  };
  const sLessons = data.lessons.filter(l=>l.studentId===s.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sHomework = (data.homework||[]).filter(hw=>hw.studentId===s.id).sort((a,b)=>new Date(b.assignedDate)-new Date(a.assignedDate));
  const sLessonLogs = (data.lessonLogs||[]).filter(l=>l.studentId===s.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const att = attendanceStats(s.id, data.lessons);

  const runAI = async () => {
    setAiLoading(true); setAiResult("");
    try {
      const res = await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:auth?.token,type:"student_analysis",context:{name:s.name,level:s.level,type:s.type,lessonsTaken:s.lessonsTaken,attendance:att.rate,skillReading:s.skillReading||3,skillWriting:s.skillWriting||3,skillListening:s.skillListening||3,skillSpeaking:s.skillSpeaking||3,goals:s.goals||"",nextSteps:s.nextSteps||"",teacherNotes:s.teacherPrivateNotes||"",homeworkNotes:s.homeworkNotes||""}})});
      const d = await res.json();
      setAiResult(d.result||d.error||"No response from AI.");
    } catch(e) { setAiResult("Error: "+e.message); }
    setAiLoading(false);
  };

  const saveLog = async (withAI) => {
    if (!logForm || !logForm.coveredTopics.trim()) return alert("Please fill in what was covered.");
    setLogLoading(true);
    let finalLog = {...logForm};
    if (withAI) {
      try {
        const res = await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"lesson_feedback",context:{
          name:s.name,level:s.level,type:s.type,lessonsTaken:s.lessonsTaken,
          goals:s.goals||"",currentNextSteps:s.nextSteps||"",
          skillReading:s.skillReading||3,skillWriting:s.skillWriting||3,skillListening:s.skillListening||3,skillSpeaking:s.skillSpeaking||3,
          date:logForm.date,coveredTopics:logForm.coveredTopics,performance:logForm.performance,teacherNotes:logForm.teacherNotes
        }})});
        const d = await res.json();
        if (d.result) {
          try {
            const parsed = JSON.parse(d.result);
            finalLog = {...finalLog, aiNextSteps:parsed.nextSteps||"", aiWeeklyTasks:parsed.weeklyTasks||[], aiStudentSummary:parsed.studentSummary||"", aiTeacherSummary:parsed.teacherSummary||""};
            // Auto-update student nextSteps and weeklyTasks
            const newTasks = (parsed.weeklyTasks||[]).map(t=>({id:uid(),text:t,doneAt:null,addedAt:today()}));
            updMany({nextSteps:parsed.nextSteps||s.nextSteps, teacherSummary:parsed.teacherSummary||s.teacherSummary, weeklyTasks:[...(s.weeklyTasks||[]),...newTasks]});
          } catch {}
        }
      } catch(e) { alert("AI error: "+e.message); }
    }
    const isNew = !(data.lessonLogs||[]).find(x=>x.id===finalLog.id);
    const nLogs = isNew ? [...(data.lessonLogs||[]),finalLog] : (data.lessonLogs||[]).map(x=>x.id===finalLog.id?finalLog:x);
    setData({...data, lessonLogs:nLogs});
    setLogLoading(false); setShowLogModal(false); setLogForm(null);
    setLogSaved(true); setTimeout(()=>setLogSaved(false),3000);
    if (auth?.token) { try { await apiPost("/api/data",{token:auth.token,action:"backup",data:{...data,lessonLogs:nLogs}}); } catch {} }
    // Notify student
    if (s.email && auth?.token) { try { await apiPost("/api/push",{token:auth.token,email:s.email,title:"📝 Lesson feedback from Hadi",body:"Check your home screen for your updated learning plan.",tag:"lesson-log"}); } catch {} }
  };

  const deleteLog = id => { if(confirm("Delete this lesson log?")) setData({...data,lessonLogs:(data.lessonLogs||[]).filter(x=>x.id!==id)}); };

  const saveHw = async () => {
    if (!hwForm||!hwForm.title.trim()) return;
    const isNew = !(data.homework||[]).find(x=>x.id===hwForm.id);
    const nHw = isNew?[...(data.homework||[]),{...hwForm,studentId:s.id}]:data.homework.map(x=>x.id===hwForm.id?{...hwForm}:x);
    setData({...data,homework:nHw}); setShowHwForm(false); setHwForm(null);
    // Push notification to student when new homework is assigned
    if (isNew && s.email && auth?.token) {
      try {
        await apiPost("/api/push", {token: auth.token, email: s.email, title:"📝 New Homework from Hadi", body: hwForm.title+(hwForm.dueDate?" — due "+fmt(hwForm.dueDate):""), tag:"homework"});
      } catch {}
    }
  };

  const deleteHw = id => { if(confirm("Delete this homework?")) setData({...data,homework:(data.homework||[]).filter(x=>x.id!==id)}); };

  const sendHwReminder = hw => {
    if(!s.whatsapp) return alert("No WhatsApp number set for this student.");
    waMsg(s.whatsapp,`Hi ${s.name.split(" ")[0]}! 📝 Reminder: You have homework due ${fmt(hw.dueDate)}.\n\nTask: ${hw.title}${hw.description?"\n\n"+hw.description:""}`);
  };

  const draftAiFeedback = async hw => {
    if (!hw.submissionText) return alert("No submission to give feedback on.");
    const btn = document.activeElement; if(btn) btn.textContent="Loading...";
    try {
      const res = await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:auth?.token,type:"homework_feedback",context:{title:hw.title,description:hw.description,submission:hw.submissionText}})});
      const d = await res.json();
      const comment = d.result||d.error||"";
      setData({...data,homework:data.homework.map(x=>x.id===hw.id?{...x,teacherComment:comment}:x)});
    } catch(e) { alert("Error: "+e.message); }
    if(btn) btn.textContent="AI Draft";
  };

  const markReviewed = hw => setData({...data,homework:data.homework.map(x=>x.id===hw.id?{...x,status:"reviewed",reviewedAt:today()}:x)});

  const tabs = [["overview","Overview"],["logs","Lesson Logs"+(sLessonLogs.length?" ("+sLessonLogs.length+")":" ")],["homework","Homework ("+sHomework.length+")"],["ai","AI Analysis"]];

  return h`<div>
    <div class="prof-hd" style=${{marginBottom:20}}>
      ${s.avatar ? h`<img src=${s.avatar} style=${{width:64,height:64,borderRadius:12,objectFit:"cover",border:"2px solid var(--g200)",flexShrink:0}}/>` : h`<div class="prof-av">${s.name.charAt(0).toUpperCase()}</div>`}
      <div class="prof-info">
        <h2>${s.name}</h2>
        <div class="prof-meta"><span class="tg">${s.type}</span><span class="tg" style=${{background:"transparent",color:"var(--bk)",border:"1.5px solid var(--g300)"}}>${s.level}</span><span class=${"bg "+(s.active?"bg-ok":"bg-n")}>${s.active?"Active":"Off"}</span></div>
        ${s.email&&h`<div style=${{fontSize:12,color:"var(--g500)",marginTop:4}}>${s.email}${s.phone?" · "+s.phone:""}</div>`}
      </div>
      <div style=${{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
        <button class="btn btn-p btn-sm" onClick=${()=>{setLogForm(mkLessonLog(s.id));setShowLogModal(true);setTab("logs");}}>📝 Log Lesson</button>
        <button class="btn btn-sm" onClick=${()=>exportProfilePDF(s,data,false)}>${ic('pdf')} PDF</button>
        ${s.whatsapp&&h`<button class="btn btn-sm btn-share" onClick=${()=>exportProfilePDF(s,data,true)}>${ic('wa')} Share</button>`}
      </div>
    </div>

    <div class="stats" style=${{gridTemplateColumns:"repeat(4,1fr)",marginBottom:20}}>
      <div class="stat"><div class="lb">Lessons Done</div><div class="vl">${s.lessonsTaken}</div></div>
      <div class="stat"><div class="lb">Lessons Left</div><div class=${"vl ll "+((s.lessonsTotal-s.lessonsTaken)<=0?"low":(s.lessonsTotal-s.lessonsTaken)<=2?"ok":"good")}>${s.lessonsTotal-s.lessonsTaken}</div></div>
      <div class="stat"><div class="lb">Attendance</div><div class="vl" style=${{color:att.rate>=80?"var(--ok)":att.rate>=60?"var(--wn)":"var(--bd)"}}>${att.rate}%</div></div>
      <div class="stat"><div class="lb">HW Pending</div><div class="vl" style=${{color:sHomework.filter(x=>x.status==="assigned").length>0?"var(--wn)":"var(--ok)"}}>${sHomework.filter(x=>x.status==="assigned").length}</div></div>
    </div>

    <div class="auth-tabs" style=${{marginBottom:20}}>
      ${tabs.map(([k,l])=>h`<div key=${k} class=${"auth-tab "+(tab===k?"on":"")} onClick=${()=>setTab(k)}>${l}</div>`)}
    </div>

    ${tab==="overview" && h`<div>
      ${s.studentNote&&h`<div class="assess-card" style=${{borderLeftColor:"#7b1fa2",background:"#fdf4ff",marginBottom:14}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style=${{flex:1}}>
            <h4 style=${{color:"#7b1fa2",marginBottom:6}}>📬 Note from Student</h4>
            <p style=${{fontSize:13,lineHeight:1.7,color:"var(--g700)",whiteSpace:"pre-wrap",margin:0}}>${s.studentNote}</p>
          </div>
          <button class="btn btn-sm" style=${{fontSize:11,flexShrink:0}} onClick=${()=>setData({...data,students:data.students.map(x=>x.id===s.id?{...x,studentNote:""}:x)})}>✓ Clear</button>
        </div>
      </div>`}
      <!-- Study Type Toggles -->
      <div class="assess-card">
        <h4>📚 What This Student Is Studying</h4>
        <div style=${{fontSize:11,color:"var(--g500)",marginBottom:14}}>Toggle which subjects are active for this student. Only active subjects show their skills below.</div>
        <div style=${{display:"flex",gap:10,flexWrap:"wrap"}}>
          ${[
            ["classical","📜 Classical Arabic (فصحى)","#2196f3"],
            ["dialect","🗣 Dialect (عامية)","#9c27b0"],
            ["quran","🕌 Qur'an (قرآن)","#4caf50"]
          ].map(([id,label,col])=>{
            const active = (s.studyTypes||["classical","dialect","quran"]).includes(id);
            const toggle = () => {
              const cur = s.studyTypes||["classical","dialect","quran"];
              upd("studyTypes", active ? cur.filter(x=>x!==id) : [...cur,id]);
            };
            return h`<button key=${id} onClick=${toggle} style=${{
              padding:"10px 18px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13,
              border:"2px solid "+(active?col:"#ddd"),
              background:active?col+"18":"#f8f8f8",
              color:active?col:"#aaa",
              display:"flex",alignItems:"center",gap:8,transition:"all 0.15s"
            }}>
              <span style=${{width:16,height:16,borderRadius:4,background:active?col:"#ddd",display:"inline-block",flexShrink:0,transition:"background 0.15s"}}></span>
              ${label}
            </button>`;
          })}
        </div>
      </div>

      <!-- Classical Arabic Skills — spider chart with toggleable axes -->
      ${(s.studyTypes||["classical","dialect","quran"]).includes("classical")&&h`<${SkillCategoryCard} type="classical" title="Classical Arabic — فصحى" icon="📜" color="#2196f3" s=${s} upd=${upd} recordSnap=${recordSkillSnapshot}/>`}

      <!-- Conversational / Dialect Skills -->
      ${(s.studyTypes||["classical","dialect","quran"]).includes("dialect")&&h`<${SkillCategoryCard} type="dialect" title="Conversational Arabic — عامية" icon="🗣" color="#9c27b0" s=${s} upd=${upd}/>`}

      <!-- Qur'an Skills -->
      ${(s.studyTypes||["classical","dialect","quran"]).includes("quran")&&h`<${SkillCategoryCard} type="quran" title="Quranic Arabic — قرآن" icon="🕌" color="#4caf50" s=${s} upd=${upd}/>`}

      <div class="assess-card">
        <h4>🎯 Goals & Next Steps</h4>
        <div class="fg"><label>Student Goals</label><textarea value=${draft.goals} onInput=${e=>dset("goals",e.target.value)} onBlur=${()=>dsave("goals")} placeholder="What does this student want to achieve?"/></div>
        <div class="fg"><label>Next Steps</label><textarea value=${draft.nextSteps} onInput=${e=>dset("nextSteps",e.target.value)} onBlur=${()=>dsave("nextSteps")} placeholder="What are we working on next?"/></div>
        <div style=${{display:"flex",alignItems:"center",gap:10,marginTop:8}}>
          <button class="btn btn-p btn-sm" onClick=${()=>saveCard("goals")} style=${{background:savedCard==="goals"?"var(--ok)":"",borderColor:savedCard==="goals"?"var(--ok)":""}}>${savedCard==="goals"?"✓ Saved!":"Save Goals"}</button>
        </div>
      </div>

      <div class="assess-card">
        <h4>✨ Identity & Nickname</h4>
        <div class="fg"><label>Gender</label>
          <div style=${{display:"flex",gap:16,marginTop:4}}>
            ${[["female","👩 Female"],["male","👨 Male"],["","— Not set"]].map(([v,l])=>h`<label key=${v} style=${{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,fontWeight:(s.gender||"")===v?700:400}}>
              <input type="radio" name=${"gender-"+s.id} value=${v} checked=${(s.gender||"")===v} onChange=${()=>upd("gender",v)} style=${{accentColor:"#111"}}/>
              ${l}
            </label>`)}
          </div>
        </div>
        <div class="fr">
          <div class="fg"><label>Nickname (Arabic word / title for the student)</label><input value=${draft.nickname} onInput=${e=>dset("nickname",e.target.value)} onBlur=${()=>dsave("nickname")} placeholder="e.g. Ustura أسطورة, Faris, Amira..."/></div>
          <div class="fg" style=${{maxWidth:100}}><label>Emoji</label><input value=${draft.nicknameEmoji} onInput=${e=>dset("nicknameEmoji",e.target.value)} onBlur=${()=>dsave("nicknameEmoji")} placeholder="e.g. ⭐"/></div>
        </div>
        ${(s.nickname)&&h`<div style=${{fontSize:12,color:"var(--g500)",marginTop:-4}}>Preview: <b>${s.name.split(" ")[0]} ${s.nicknameEmoji||""} ${s.nickname}</b></div>`}
      </div>

      <div class="assess-card">
        <h4>📝 Teacher Notes (visible to student in PDF)</h4>
        <div class="fg"><label>Strengths</label><textarea value=${draft.teacherStrengths} onInput=${e=>dset("teacherStrengths",e.target.value)} onBlur=${()=>dsave("teacherStrengths")} placeholder="What is this student good at?"/></div>
        <div class="fg"><label>Areas to Improve</label><textarea value=${draft.teacherImprove} onInput=${e=>dset("teacherImprove",e.target.value)} onBlur=${()=>dsave("teacherImprove")} placeholder="What needs more work?"/></div>
        <div class="fg"><label>General Summary</label><textarea value=${draft.teacherSummary} onInput=${e=>dset("teacherSummary",e.target.value)} onBlur=${()=>dsave("teacherSummary")} placeholder="Overall assessment..."/></div>
        <div style=${{display:"flex",alignItems:"center",gap:10,marginTop:8}}>
          <button class="btn btn-p btn-sm" onClick=${()=>saveCard("teacherNotes")} style=${{background:savedCard==="teacherNotes"?"var(--ok)":"",borderColor:savedCard==="teacherNotes"?"var(--ok)":""}}>${savedCard==="teacherNotes"?"✓ Saved!":"Save Notes"}</button>
        </div>
      </div>

      <div class="assess-card private">
        <h4>🔒 Private Notes (never shared)</h4>
        <textarea value=${draft.teacherPrivateNotes} onInput=${e=>dset("teacherPrivateNotes",e.target.value)} onBlur=${()=>dsave("teacherPrivateNotes")} placeholder="These notes are NOT visible to the student..."/>
        <div style=${{display:"flex",alignItems:"center",gap:10,marginTop:8}}>
          <button class="btn btn-p btn-sm" onClick=${()=>saveCard("privateNotes")} style=${{background:savedCard==="privateNotes"?"var(--ok)":"",borderColor:savedCard==="privateNotes"?"var(--ok)":""}}>${savedCard==="privateNotes"?"✓ Saved!":"Save Private Notes"}</button>
        </div>
      </div>

      <div class="assess-card">
        <h4>📚 Homework Observations</h4>
        <textarea value=${draft.homeworkNotes} onInput=${e=>dset("homeworkNotes",e.target.value)} onBlur=${()=>dsave("homeworkNotes")} placeholder="General homework notes..."/>
        <div style=${{display:"flex",alignItems:"center",gap:10,marginTop:8}}>
          <button class="btn btn-p btn-sm" onClick=${()=>saveCard("hwNotes")} style=${{background:savedCard==="hwNotes"?"var(--ok)":"",borderColor:savedCard==="hwNotes"?"var(--ok)":""}}>${savedCard==="hwNotes"?"✓ Saved!":"Save Observations"}</button>
        </div>
      </div>

      <${TeacherWeeklyTasks} student=${s} upd=${upd} data=${data} auth=${auth}/>

      <${Chips} items=${s.focusItems||[]} onUpdate=${v=>upd("focusItems",v)} label="Focus Items"/>

      <div class="card" style=${{marginTop:20}}>
        <h3>LESSON HISTORY</h3>
        ${sLessons.length===0?h`<p style=${{color:"var(--g400)",fontSize:13}}>No lessons yet.</p>`:h`<table><thead><tr><th>Date</th><th>Time</th><th>Type</th><th>Status</th><th>Notes</th></tr></thead><tbody>
          ${sLessons.slice(0,15).map(l=>h`<tr key=${l.id}><td>${fmt(l.date)}</td><td>${l.time}</td><td><span class="tg">${l.type}</span></td><td><span class=${"bg "+(l.status==="Completed"?"bg-ok":"bg-n")}>${l.status}</span></td><td style=${{fontSize:12,color:"var(--g500)",maxWidth:200}}>${l.notes||"—"}</td></tr>`)}
        </tbody></table>`}
      </div>
    </div>`}

    ${tab==="logs" && h`<div>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style=${{fontFamily:"var(--fh)",fontSize:18,letterSpacing:1}}>LESSON LOGS</div>
          <div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>Post-lesson notes + AI-updated plan</div>
        </div>
        <button class="btn btn-p" onClick=${()=>{setLogForm(mkLessonLog(s.id));setShowLogModal(true);}}>
          ${ic('plus')} Log a Lesson
        </button>
      </div>
      ${logSaved&&h`<div style=${{padding:"10px 14px",background:"#f0fff4",border:"1px solid var(--ok)",borderRadius:8,marginBottom:14,fontSize:13,color:"var(--ok)",fontWeight:700}}>✓ Lesson logged & plan updated!</div>`}
      ${sLessonLogs.length===0 ? h`<div class="empty"><h3>NO LOGS YET</h3><p>Log your first lesson to start tracking ${s.name}'s progress and let AI update their plan.</p></div>` :
      h`<div>${sLessonLogs.map(log=>h`<div key=${log.id} style=${{background:"#fff",border:"2px solid var(--bk)",borderLeft:"5px solid #2196f3",padding:"18px 20px",marginBottom:14,borderRadius:4,position:"relative"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:12}}>
          <div>
            <div style=${{fontFamily:"var(--fh)",fontSize:16,letterSpacing:1}}>${fmt(log.date)}</div>
            <div style=${{fontSize:11,color:"var(--g500)",marginTop:2}}>Logged ${fmt(log.createdAt)}</div>
          </div>
          <button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>deleteLog(log.id)}>${ic('del')}</button>
        </div>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div>
            <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#1976d2",marginBottom:4}}>Topics Covered</div>
            <div style=${{fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>${log.coveredTopics}</div>
          </div>
          ${log.performance&&h`<div>
            <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#7b1fa2",marginBottom:4}}>Student Performance</div>
            <div style=${{fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>${log.performance}</div>
          </div>`}
        </div>
        ${log.teacherNotes&&h`<div style=${{padding:"10px 12px",background:"#fffde7",border:"1px solid #ffd54f",borderRadius:8,marginBottom:12}}>
          <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"#f57f17",marginBottom:4}}>🔒 Private Notes</div>
          <div style=${{fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>${log.teacherNotes}</div>
        </div>`}

          Fill in what happened in the lesson. Hit <b>"Save & Update Plan with AI"</b> and Claude will rewrite ${s.name}'s next steps and add new weekly tasks automatically.
        </div>
        <div class="fg"><label>Lesson Date</label><input type="date" value=${logForm?.date||today()} onInput=${e=>setLogForm({...logForm,date:e.target.value})}/></div>
        <div class="fg"><label>Topics Covered *</label><textarea value=${logForm?.coveredTopics||""} onInput=${e=>setLogForm({...logForm,coveredTopics:e.target.value})} placeholder="What did you teach? e.g. Past tense verbs, vocab around family, pronunciation of ع and غ..." style=${{minHeight:90}}/></div>
        <div class="fg"><label>Student Performance</label><textarea value=${logForm?.performance||""} onInput=${e=>setLogForm({...logForm,performance:e.target.value})} placeholder="How did they do? Strengths, struggles, effort, energy..."/></div>

    ${tab==="homework" && h`<div>

            <button class="bi" onClick=${()=>{setHwForm({...hw});setShowHwForm(true);}}>${ic('edt')}</button>

          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>

          <button class="btn btn-p btn-sm" style=${{marginTop:6}} onClick=${()=>markReviewed(hw)}>${ic('chk')} Mark as Reviewed</button>
        </div>`}
        ${hw.status==="reviewed"&&hw.teacherComment&&h`<div style=${{marginTop:10,padding:"10px 12px",background:"#f0fff4",border:"1px solid var(--ok)"}}>

      ${showHwForm&&h`<${Modal} title=${hwForm?.id&&(data.homework||[]).find(x=>x.id===hwForm.id)?"EDIT HOMEWORK":"ASSIGN HOMEWORK"} onClose=${()=>setShowHwForm(false)} footer=${h`<button class="btn" onClick=${()=>setShowHwForm(false)}>Cancel</button><button class="btn btn-p" onClick=${saveHw}>Save</button>`}>

        <div class="fg"><label>Description / Instructions</label><textarea value=${hwForm?.description||""} onInput=${e=>setHwForm({...hwForm,description:e.target.value})} placeholder="Detailed instructions for the student..."/></div>

// ════════════════════════════════════════
// DASHBOARD (fixed #2: only paid revenue)
// ════════════════════════════════════════
function Dashboard({data, setData, auth}) {
  const {students, lessons, payments, settings: S} = data;
  const CUR = S.currency || "$";
  const active = students.filter(s => s.active);
  const now = new Date();
  const mPay = payments.filter(p => { const d = new Date(p.date); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); });
  const mRev = mPay.filter(p=>p.status==="Paid").reduce((a,p) => a+(p.amount||0), 0);
  const wk = lessons.filter(l => new Date(l.date) >= weekStart(S.weekStartDay) && l.status !== "Cancelled");
  const noL = active.filter(s => !hadLesson(s.id, lessons, S.weekStartDay));
  const up = lessons.filter(l => l.status==="Scheduled" && new Date(l.date)>=new Date(today())).sort((a,b) => new Date(a.date)-new Date(b.date)).slice(0,5);

  // 10-day attendance alert
  const inactive10 = active.filter(s => {
    const last = lessons.filter(l=>l.studentId===s.id && l.status==="Completed").sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    if (!last) return s.lessonsTaken > 0;
    return (now - new Date(last.date)) > 10 * 86400000;
  });

  // Pending lesson requests
  const pendingReqs = (data.lessonRequests||[]).filter(r=>r.status==="pending");

  // AI scheduling
  const [scheduleInput, setScheduleInput] = useState("");
  const [scheduleLoading, setScheduleLoading] = useState(false);
  const [scheduleResult, setScheduleResult] = useState(null);
  const [scheduleErr, setScheduleErr] = useState("");

  const runSchedule = async () => {
    if (!scheduleInput.trim()) return;
    setScheduleLoading(true); setScheduleErr(""); setScheduleResult(null);
    const d = await apiPost("/api/ai", {type:"schedule_lesson", context:{message:scheduleInput}});
    setScheduleLoading(false);
    if (d.error) return setScheduleErr(d.error);
    try {
      const parsed = JSON.parse(d.result);
      setScheduleResult(parsed);
    } catch { setScheduleErr("Couldn't parse AI response. Try again."); }
  };

  const confirmSchedule = () => {
    if (!scheduleResult) return;
    const st = students.find(s => s.name.toLowerCase().includes((scheduleResult.studentName||"").toLowerCase()));
    const newLesson = {
      id: uid(),
      studentId: st?.id || "",
      groupId: "",
      date: scheduleResult.date || today(),
      time: scheduleResult.time || "10:00",
      duration: scheduleResult.duration || 60,
      type: st?.type || (S.types||[])[0] || "Levantine",
      status: "Scheduled",
      notes: scheduleResult.notes || ""
    };
    setData({...data, lessons:[...lessons, newLesson]});
    setScheduleInput(""); setScheduleResult(null);
    alert("Lesson scheduled for " + (st?.name || scheduleResult.studentName) + " on " + scheduleResult.date + " at " + scheduleResult.time);
  };

  // Confirm a lesson request
  const confirmRequest = async (req) => {
    const st = students.find(s=>s.id===req.studentId);
    const newLesson = {id:uid(),studentId:req.studentId,groupId:"",date:req.preferredDate||today(),time:req.preferredTime||"10:00",duration:60,type:st?.type||(S.types||[])[0]||"Levantine",status:"Scheduled",notes:"Requested by student"};
    const updated = (data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"confirmed"}:r);
    setData({...data, lessons:[...lessons,newLesson], lessonRequests:updated});
    if (st?.whatsapp) {
      const msg = "Hi " + st.name + "! Your lesson request has been confirmed for " + (req.preferredDate||"TBD") + " at " + (req.preferredTime||"TBD") + ". See you then! 🎓";
      waMsg(st.whatsapp, msg);
    }
    if (st?.email && auth?.token) {
      notifyStudent(auth.token, st.email, '✅ Lesson Confirmed!', `Your lesson on ${req.preferredDate||"TBD"} at ${req.preferredTime||"TBD"} is confirmed. See you then! 🎓`, 'lesson-confirmed');
    }
  };
  const declineRequest = (req) => {
    const updated = (data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"declined"}:r);
    setData({...data, lessonRequests:updated});
  };

  const dayOfYearAdmin = (()=>{ const n=new Date(); return Math.floor((n - new Date(n.getFullYear(),0,0)) / 86400000); })();
  const todayQuoteAdmin = ISLAMIC_QUOTES[dayOfYearAdmin % ISLAMIC_QUOTES.length];

  return h`<div>

    <!-- ── Daily Reminder (top priority) ───────────────────────────────────── -->
    <div style=${{
      background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%)",
      borderRadius:16,padding:"20px 22px",marginBottom:20,
      boxShadow:"0 4px 20px rgba(0,0,0,0.25)",
      border:"1px solid rgba(255,255,255,0.08)",
      position:"relative",overflow:"hidden"
    }}>
      <!-- subtle decorative crescent -->
      <div style=${{position:"absolute",top:-18,right:-18,fontSize:80,opacity:0.06,lineHeight:1,userSelect:"none"}}>☪️</div>
      <!-- label -->
      <div style=${{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#c9922a",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
        <span>✦</span><span>Today's Reminder — تذكرة اليوم</span>
      </div>
      <!-- Arabic -->
      <div style=${{
        fontFamily:"'Amiri','Noto Naskh Arabic',serif",
        fontSize:22,lineHeight:2,textAlign:"right",direction:"rtl",
        color:"#f5e6c8",fontWeight:700,marginBottom:14,
        borderBottom:"1px solid rgba(255,255,255,0.1)",paddingBottom:12
      }}>${todayQuoteAdmin.ar}</div>
      <!-- English -->
      <div style=${{fontSize:14,lineHeight:1.75,color:"#e8dcc8",fontStyle:"italic",marginBottom:10,fontWeight:400}}>
        "${todayQuoteAdmin.en}"
      </div>
      <!-- source -->
      <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom: todayQuoteAdmin.note ? 12 : 0}}>
        <span style=${{fontSize:11,fontWeight:700,color:"#1a1a2e",background:"#c9922a",padding:"3px 12px",borderRadius:20}}>
          ${todayQuoteAdmin.source}
        </span>
        <span style=${{fontFamily:"'Amiri','Noto Naskh Arabic',serif",fontSize:12,color:"#a09070",direction:"rtl"}}>
          ${todayQuoteAdmin.sourceAr}
        </span>
      </div>
      ${todayQuoteAdmin.note ? h`<div style=${{fontSize:12,lineHeight:1.7,color:"#9a8c78",borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:10}}>
        📖 ${todayQuoteAdmin.note}
      </div>` : null}
    </div>

    <div class="stats">
      <div class="stat"><div class="lb">Active Students</div><div class="vl">${active.length}</div></div>
      <div class="stat"><div class="lb">This Month (Paid)</div><div class="vl">${fm(mRev, CUR)}</div><div class="su">${mPay.filter(p=>p.status==="Paid").length} payments</div></div>
      <div class="stat"><div class="lb">Lessons This Week</div><div class="vl">${wk.length}</div></div>
      <div class="stat"><div class="lb">No Lesson This Week</div><div class="vl" style=${{color:noL.length?"var(--bd)":"var(--ok)"}}>${noL.length}</div></div>
      <div class="stat"><div class="lb">Avg Attendance</div><div class="vl" style=${{color:(() => { const rates=active.map(s=>attendanceStats(s.id,lessons).rate); const avg=rates.length?Math.round(rates.reduce((a,b)=>a+b,0)/rates.length):0; return avg>=80?"var(--ok)":avg>=60?"var(--wn)":"var(--bd)"; })()}}>${(() => { const rates=active.map(s=>attendanceStats(s.id,lessons).rate); return rates.length?Math.round(rates.reduce((a,b)=>a+b,0)/rates.length):0; })()}%</div><div class="su">across all students</div></div>
    </div>

    ${(()=>{
      if (!active.length) return null;
      const engRows = active.map(s => {
        // Last completed lesson
        const done = lessons.filter(l=>l.studentId===s.id&&l.status==="Completed").sort((a,b)=>new Date(b.date)-new Date(a.date));
        const lastL = done[0];
        const daysSince = lastL ? Math.floor((now - new Date(lastL.date)) / 86400000) : null;
        // Quiz avg
        const scored = (s.quizHistory||[]).filter(q=>q.attempts&&q.attempts[0]);
        const quizAvg = scored.length ? Math.round(scored.reduce((a,q)=>{
          const qs = q.questions?.length||5;
          return a + (q.attempts[0].score/qs*100);
        },0)/scored.length) : null;
        // Homework
        const myHw = (data.homework||[]).filter(hw=>hw.studentId===s.id);
        const hwDone = myHw.filter(hw=>hw.status==="graded"||hw.status==="completed").length;
        // Status
        let status, statusColor;
        if (daysSince===null || daysSince > 14) { status="Inactive"; statusColor="#d32f2f"; }
        else if (daysSince > 7) { status="At Risk"; statusColor="#f57c00"; }
        else { status="Active"; statusColor="#388e3c"; }
        return {s, lastL, daysSince, quizAvg, hwDone, hwTotal:myHw.length, status, statusColor};
      }).sort((a,b) => (a.daysSince===null?9999:a.daysSince)-(b.daysSince===null?9999:b.daysSince));

      return h`<div class="card" style=${{marginBottom:14}}>
        <h3 style=${{marginBottom:10}}>📊 STUDENT ENGAGEMENT</h3>
        <div style=${{overflowX:"auto"}}>
          <table style=${{width:"100%",fontSize:12}}>
            <thead><tr>
              <th style=${{textAlign:"left",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Student</th>
              <th style=${{textAlign:"center",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Last Lesson</th>
              <th style=${{textAlign:"center",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Days Since</th>
              <th style=${{textAlign:"center",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Quiz Avg</th>
              <th style=${{textAlign:"center",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Homework</th>
              <th style=${{textAlign:"center",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Status</th>
            </tr></thead>
            <tbody>
              ${engRows.map(({s,lastL,daysSince,quizAvg,hwDone,hwTotal,status,statusColor})=>h`
                <tr key=${s.id} style=${{borderBottom:"1px solid var(--g100)"}}>
                  <td style=${{padding:"7px 8px",fontWeight:600}}>${s.name}</td>
                  <td style=${{padding:"7px 8px",textAlign:"center",color:"var(--g600)"}}>${lastL ? fmt(lastL.date) : "—"}</td>
                  <td style=${{padding:"7px 8px",textAlign:"center",fontWeight:daysSince!==null&&daysSince>7?700:400,color:daysSince===null||daysSince>14?"var(--bd)":daysSince>7?"var(--wn)":"var(--g700)"}}>
                    ${daysSince===null ? "Never" : daysSince===0 ? "Today" : daysSince+"d"}
                  </td>
                  <td style=${{padding:"7px 8px",textAlign:"center",color:quizAvg===null?"var(--g400)":quizAvg>=70?"var(--ok)":quizAvg>=50?"var(--wn)":"var(--bd)",fontWeight:quizAvg!==null?600:400}}>
                    ${quizAvg===null ? "—" : quizAvg+"%"}
                  </td>
                  <td style=${{padding:"7px 8px",textAlign:"center",color:"var(--g600)"}}>
                    ${hwTotal===0 ? "—" : hwDone+"/"+hwTotal}
                  </td>
                  <td style=${{padding:"7px 8px",textAlign:"center"}}>
                    <span style=${{background:statusColor+"18",color:statusColor,fontWeight:700,fontSize:11,padding:"3px 9px",borderRadius:20,display:"inline-block"}}>${status}</span>
                  </td>
                </tr>
              `)}
            </tbody>
          </table>
        </div>
      </div>`;
    })()}

    ${pendingReqs.length>0&&h`<div class="card" style=${{borderColor:"#1976d2",marginBottom:14}}>
      <h3 style=${{color:"#1976d2"}}>📅 LESSON REQUESTS (${pendingReqs.length})</h3>
      ${pendingReqs.map(req=>{const st=students.find(s=>s.id===req.studentId);return h`<div key=${req.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--g100)",gap:10}}>
        <div>
          <div style=${{fontWeight:700}}>${st?.name||"Unknown"}</div>
          <div style=${{fontSize:12,color:"var(--g500)"}}>${req.preferredDate||"No date"} at ${req.preferredTime||"No time"}${req.message?" · "+req.message:""}</div>
        </div>
        <div style=${{display:"flex",gap:6,flexShrink:0}}>
          <button class="btn btn-p btn-sm" onClick=${()=>confirmRequest(req)}>✓ Confirm</button>
          <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>declineRequest(req)}>✗ Decline</button>
        </div>
      </div>`;})}
    </div>`}

    ${(()=>{
      const studentNotes = students.filter(s=>s.studentNote&&s.studentNote.trim());
      const submittedHw = (data.homework||[]).filter(hw=>hw.status==="submitted");
      const total = studentNotes.length + submittedHw.length;
      if (total===0) return null;
      return h`<div class="card" style=${{borderColor:"#7b1fa2",marginBottom:14}}>
        <h3 style=${{color:"#7b1fa2"}}>📬 INBOX (${total})</h3>
        ${studentNotes.map(s=>h`<div key=${s.id} style=${{padding:"10px 0",borderBottom:"1px solid var(--g100)"}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div>
              <div style=${{fontWeight:700,fontSize:13,marginBottom:3}}>✉️ ${s.name} <span style=${{fontWeight:400,color:"var(--g500)",fontSize:11}}>sent you a note</span></div>
              <div style=${{fontSize:13,color:"var(--g700)",lineHeight:1.6,whiteSpace:"pre-wrap",background:"#f9f0ff",padding:"8px 10px",borderRadius:6,borderLeft:"3px solid #7b1fa2"}}>${s.studentNote}</div>
            </div>
            <button class="btn btn-sm" style=${{flexShrink:0,fontSize:11}} onClick=${()=>setData({...data,students:data.students.map(x=>x.id===s.id?{...x,studentNote:""}:x)})}>✓ Clear</button>
          </div>

        ${submittedHw.map(hw=>{const st=students.find(s=>s.id===hw.studentId);return h`<div key=${hw.id} style=${{padding:"10px 0",borderBottom:"1px solid var(--g100)"}}>

function Students({data, setData, onProfile}) {
  const [search, setSearch] = useState("");

  const [form, setForm] = useState(mkStudent(data.settings));
  const [viewMode, setViewMode] = useState("cards");
  const S = data.settings;
  const CUR = S.currency || "$";

  const sorted = [...data.students].sort((a,b) => { if(a.active!==b.active) return a.active?-1:1; return (a.studentNumber||0)-(b.studentNumber||0); });
  const list = sorted.filter(s => s.name.toLowerCase().includes(search.toLowerCase()));

  const [payStatus, setPayStatus] = useState("Pending");
  const doSave = () => {
    if (!form.name.trim()) return;
    const ex = data.students.find(s=>s.id===form.id);
    if (ex) {
      // If lessons increased, auto-create a payment for the difference
      const lessonDiff = form.lessonsTotal - (ex.lessonsTotal||0);
      let newPayments = data.payments;
      if (lessonDiff > 0 && form.lessonRate > 0) {
        const amount = lessonDiff * form.lessonRate;
        const note = lessonDiff === form.lessonsTotal
          ? "Initial enrollment — "+form.lessonsTotal+" lessons"
          : "Top-up — "+lessonDiff+" lesson"+(lessonDiff>1?"s":"")+" added";
        newPayments = [...data.payments, {id:uid(),studentId:form.id,amount,date:today(),method:"Cash",notes:note,lessonsAdded:lessonDiff,status:payStatus}];
      }
      const saved = {...form, enrollmentStatus: form.enrollmentStatus==="pending" ? "active" : form.enrollmentStatus};
      setData({...data, students: data.students.map(s=>s.id===form.id?saved:s), payments: newPayments});
    } else {
      const amount = form.lessonsTotal * form.lessonRate;
      const newPayment = {id:uid(),studentId:form.id,amount,date:today(),method:"Cash",notes:"Initial enrollment — "+form.lessonsTotal+" lessons",lessonsAdded:form.lessonsTotal,status:payStatus};
      setData({...data, students:[...data.students,{...form, studentNumber: nextStudentNumber(data.students)}], payments: amount>0 ? [...data.payments,newPayment] : data.payments});
    }
    setShow(false); setForm(mkStudent(S)); setPayStatus("Pending");

  const doDelete = id => { if(confirm("Delete student and all their records?")) setData({...data,students:data.students.filter(s=>s.id!==id),lessons:data.lessons.filter(l=>l.studentId!==id),payments:data.payments.filter(p=>p.studentId!==id)}); };

  const adjTaken = (sid, delta) => { setData({...data, students: data.students.map(s => s.id===sid ? {...s, lessonsTaken: Math.max(0, s.lessonsTaken+delta)} : s)}); };
  const adjTotal = (sid, delta) => { setData({...data, students: data.students.map(s => s.id===sid ? {...s, lessonsTotal: Math.max(0, s.lessonsTotal+delta)} : s)}); };
  const adjFreeTaken = (sid, delta) => { setData({...data, students: data.students.map(s => { if(s.id!==sid) return s; const fe=freeExpiry(s); if(fe.expired && delta>0) return s; const nv=Math.max(0, Math.min((s.freeTotal||0), (s.freeTaken||0)+delta)); return {...s, freeTaken:nv}; })}); };

  // FIX #4: Quick complete creates a lesson record if none exists
  const completeLesson = (sid) => {
    const todayL = data.lessons.find(l => l.studentId===sid && l.date===today() && l.status==="Scheduled");

        lessons: data.lessons.map(l => l.id===todayL.id ? {...l,status:"Completed"} : l),

      });
    } else {
      // Create a new completed lesson record + increment counter
      const st = data.students.find(s=>s.id===sid);

        lessons: [...data.lessons, newLesson],

          </div>
        </div>`;
      })}
    </div>` :

    h`<div class="card" style=${{padding:0,overflow:"hidden"}}><div style=${{overflowX:"auto"}}><table><thead><tr><th>#</th><th>Name</th><th>Type</th><th>Taken</th><th>Left</th><th>Attend.</th><th>Paid</th><th>Status</th><th></th></tr></thead><tbody>
      ${list.map((s,i) => {
        const left = s.lessonsTotal - s.lessonsTaken;

        return h`<tr key=${s.id} class=${"ck"+(s.active?"":" ri")} onClick=${()=>onProfile(s.id)}>

          <option value="Africa/Cairo">🇪🇬 Egypt (EET)</option>
          <option value="Africa/Johannesburg">🇿🇦 South Africa (SAST)</option>
          <option value="Africa/Lagos">🇳🇬 Nigeria (WAT)</option>
        </optgroup>
        <optgroup label="🌏 Asia">
          <option value="Asia/Kolkata">🇮🇳 India (IST)</option>
          <option value="Asia/Karachi">🇵🇰 Pakistan (PKT)</option>
          <option value="Asia/Bangkok">🇹🇭 Bangkok (ICT)</option>
          <option value="Asia/Singapore">🇸🇬 Singapore (SGT)</option>
          <option value="Asia/Hong_Kong">🇭🇰 Hong Kong (HKT)</option>
          <option value="Asia/Shanghai">🇨🇳 China (CST)</option>
          <option value="Asia/Tokyo">🇯🇵 Tokyo (JST)</option>
          <option value="Asia/Seoul">🇰🇷 Seoul (KST)</option>
        </optgroup>
        <optgroup label="🌏 Australia & Pacific">
          <option value="Australia/Sydney">🇦🇺 Sydney / Melbourne (AEST)</option>
          <option value="Australia/Brisbane">🇦🇺 Brisbane (AEST, no DST)</option>
          <option value="Australia/Adelaide">🇦🇺 Adelaide (ACST)</option>
          <option value="Australia/Perth">🇦🇺 Perth (AWST)</option>
          <option value="Pacific/Auckland">🇳🇿 New Zealand (NZST)</option>
        </optgroup>
      </select></div>
      <div class="fr3"><div class="fg"><label>Type</label><select value=${form.type} onChange=${e=>setForm({...form,type:e.target.value})}>${S.types.map(t=>h`<option key=${t}>${t}</option>`)}</select></div><div class="fg"><label>Level</label><select value=${form.level} onChange=${e=>setForm({...form,level:e.target.value})}>${S.levels.map(l=>h`<option key=${l}>${l}</option>`)}</select></div><div class="fg"><label>Payment Plan</label><select value=${form.paymentPlan} onChange=${e=>setForm({...form,paymentPlan:e.target.value})}>${S.payPlans.map(p=>h`<option key=${p}>${p}</option>`)}</select></div></div>
      <div class="fr3"><div class="fg"><label>Rate (${CUR})</label><input type="number" value=${form.lessonRate} onInput=${e=>setForm({...form,lessonRate:+e.target.value})}/></div><div class="fg"><label>Lessons Purchased</label><input type="number" value=${form.lessonsTotal} onInput=${e=>setForm({...form,lessonsTotal:+e.target.value})}/></div><div class="fg"><label>Lessons Taken</label><input type="number" value=${form.lessonsTaken} onInput=${e=>setForm({...form,lessonsTaken:+e.target.value})}/></div></div>
      ${(()=>{
        const ex = data.students.find(s=>s.id===form.id);
        const lessonDiff = ex ? form.lessonsTotal-(ex.lessonsTotal||0) : form.lessonsTotal;
        const billable = lessonDiff > 0 && form.lessonRate > 0;
        if (!billable) return null;
        const amount = lessonDiff * form.lessonRate;
        const label = ex ? "Top-up — "+lessonDiff+" lesson"+(lessonDiff>1?"s":"") : "Initial enrollment — "+lessonDiff+" lessons";
        return h`<div style=${{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:8,background:payStatus==="Paid"?"#e8f5e9":"#fff8e1",border:"1.5px solid "+(payStatus==="Paid"?"#4caf50":"#ffc107"),marginBottom:8}}>
          <div style=${{fontSize:12,fontWeight:700,flex:1}}>💳 ${label} — ${CUR}${amount.toLocaleString()}</div>
          <button type="button" style=${{padding:"5px 14px",borderRadius:6,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,background:payStatus==="Paid"?"#4caf50":"#ff9800",color:"#fff"}} onClick=${()=>setPayStatus(p=>p==="Paid"?"Pending":"Paid")}>${payStatus==="Paid"?"✓ Paid":"⏳ Pending"}</button>
        </div>`;
      })()}
      <div class="fr" style=${{borderLeft:"3px solid var(--ok)",paddingLeft:12}}><div class="fg"><label style=${{color:"var(--ok)"}}>Free Lessons Given</label><input type="number" value=${form.freeTotal||0} onInput=${e=>setForm({...form,freeTotal:Math.max(0,+e.target.value)})}/></div><div class="fg"><label style=${{color:"var(--ok)"}}>Free Lessons Taken</label><input type="number" value=${form.freeTaken||0} onInput=${e=>setForm({...form,freeTaken:Math.max(0,Math.min(form.freeTotal||0,+e.target.value))})}/></div></div>
      <div class="fr"><div class="fg"><label>Start Date</label><input type="date" value=${form.startDate} onInput=${e=>setForm({...form,startDate:e.target.value})}/></div><div class="fg"><label>Status</label><select value=${form.active?"active":"inactive"} onChange=${e=>setForm({...form,active:e.target.value==="active"})}><option value="active">Active</option><option value="inactive">Inactive</option></select></div></div>
    <//>`}
  </div>`;
}

// ════════════════════════════════════════
// SCHEDULING — Admin slot management
// ════════════════════════════════════════
function Scheduling({data, setData, auth}) {
  const [tab, setTab] = useState("availability");
  const [slots, setSlots] = useState(null);
  const [deductions, setDeductions] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState("");

  // Add slot form
  const [showAdd, setShowAdd] = useState(false);
  const [addForm, setAddForm] = useState({date:"", time:"10:00", duration:60});
  const [addErr, setAddErr] = useState("");

  // Copy day form
  const [showCopy, setShowCopy] = useState(false);
  const [copyFrom, setCopyFrom] = useState("");
  const [copyTo, setCopyTo] = useState("");

  // Filter
  const [filter, setFilter] = useState("upcoming"); // upcoming | all | open | booked | completed

  // Credit adjust
  const [creditModal, setCreditModal] = useState(null); // {studentId, name, current}
  const [creditDelta, setCreditDelta] = useState(0);
  const [creditNote, setCreditNote] = useState("");

  const flash = (m, isErr) => {
    if (isErr) setErr(m); else setMsg(m);
    setTimeout(() => { setErr(""); setMsg(""); }, 3500);
  };

  const loadSlots = async () => {
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"getSlots"});
      if (r.error) { flash(r.error, true); } else { setSlots(r.slots || []); }
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  const loadDeductions = async () => {
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"getDeductions"});
      if (!r.error) setDeductions(r.deductions || []);
    } catch {}
  };

  useEffect(() => { loadSlots(); }, []);
  useEffect(() => { if (tab === "log" && !deductions) loadDeductions(); }, [tab]);

  // ── Add slot ──────────────────────────────────────────────────────────────
  const doAddSlot = async () => {
    setAddErr("");
    if (!addForm.date || !addForm.time) { setAddErr("Date and time are required."); return; }
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"addSlot", date:addForm.date, time:addForm.time, duration:+addForm.duration});
      if (r.error) { setAddErr(r.message || r.error); }
      else { setSlots([...(slots||[]), r.slot]); setShowAdd(false); setAddForm({date:"",time:"10:00",duration:60}); flash("Slot added!"); }
    } catch(e) { setAddErr(e.message); }
    setBusy(false);
  };

  // ── Copy day ──────────────────────────────────────────────────────────────
  const doCopyDay = async () => {
    if (!copyFrom || !copyTo) { flash("Select both dates.", true); return; }
    const src = (slots||[]).filter(s => s.date === copyFrom && s.status !== "cancelled");
    if (src.length === 0) { flash("No active slots on that date.", true); return; }
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"bulkAddSlots", slots: src.map(s => ({date:copyTo, time:s.time, duration:s.duration}))});
      await loadSlots();
      setShowCopy(false);
      flash(`Copied ${r.added} slot(s)${r.skipped?" ("+r.skipped+" skipped — conflicts)":""}!`);
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  // ── Delete slot ───────────────────────────────────────────────────────────
  const doDelete = async (slotId) => {
    if (!confirm("Delete this slot?")) return;
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"deleteSlot", slotId});
      if (r.error) flash(r.error, true);
      else { setSlots((slots||[]).filter(s => s.id !== slotId)); flash("Slot deleted."); }
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  // ── Cancel slot ───────────────────────────────────────────────────────────
  const doCancel = async (slotId) => {
    if (!confirm("Cancel this booking? The slot will reopen.")) return;
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"cancelSlot", slotId});
      if (r.error) flash(r.error, true);
      else { setSlots((slots||[]).map(s => s.id===slotId ? {...s, status:"cancelled"} : s)); flash("Slot cancelled."); }
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  // ── Complete slot ─────────────────────────────────────────────────────────
  const doComplete = async (slotId) => {
    if (!confirm("Mark class as done? This deducts 1 credit from the student.")) return;
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"completeSlot", slotId});
      if (r.error) flash(r.error, true);
      else {
        setSlots((slots||[]).map(s => s.id===slotId ? {...s, status:"completed"} : s));
        // Also update local data so Credits tab reflects change
        await loadCreditsFromCloud();
        flash("Marked complete — 1 class deducted.");
      }
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  const loadCreditsFromCloud = async () => {
    try {
      const r = await apiPost("/api/data", {token: auth.token, action:"restore"});
      if (r.data) setData(r.data);
    } catch {}
  };

  // ── Adjust credits ────────────────────────────────────────────────────────
  const doAdjustCredits = async () => {
    if (!creditModal || creditDelta === 0) { setCreditModal(null); return; }
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"adjustCredits", studentId:creditModal.studentId, delta:+creditDelta, note:creditNote});
      if (r.error) flash(r.error, true);
      else {
        setData({...data, students: data.students.map(s => s.id===creditModal.studentId ? {...s, remainingClasses:r.remaining} : s)});
        flash(`Credits updated — ${creditModal.name} now has ${r.remaining} class${r.remaining===1?"":"es"}.`);
        setCreditModal(null); setCreditDelta(0); setCreditNote("");
      }
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  // ── Slot display helpers ──────────────────────────────────────────────────
  const fmtSlotTime = (date, time, dur) => {
    try {
      const dt = new Date(date+"T"+time+":00");
      const dayName = dt.toLocaleDateString("en-GB",{weekday:"short",timeZone:"Asia/Beirut"});
      const dateStr = dt.toLocaleDateString("en-GB",{day:"numeric",month:"short",timeZone:"Asia/Beirut"});
      const timeStr = dt.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Beirut"});
      return {dayName, dateStr, timeStr};
    } catch { return {dayName:"",dateStr:date,timeStr:time}; }
  };

  const statusBadge = (status) => {
    const cfg = {open:{bg:"#e8f5e9",color:"#2e7d32",label:"Open"},booked:{bg:"#e3f2fd",color:"#1565c0",label:"Booked"},completed:{bg:"#f5f5f5",color:"#555",label:"Done"},cancelled:{bg:"#ffebee",color:"#c62828",label:"Cancelled"}};
    const c = cfg[status] || cfg.open;
    return h`<span style=${{background:c.bg,color:c.color,borderRadius:6,padding:"2px 9px",fontSize:10,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>${c.label}</span>`;
  };

  // ── Filter slots ──────────────────────────────────────────────────────────
  const today2 = new Date().toISOString().split("T")[0];
  const filteredSlots = (slots||[]).filter(s => {
    if (filter === "upcoming") return s.status !== "cancelled" && s.date >= today2;
    if (filter === "open")      return s.status === "open";
    if (filter === "booked")    return s.status === "booked";
    if (filter === "completed") return s.status === "completed";
    return true; // "all"
  }).sort((a,b) => (a.date+a.time) < (b.date+b.time) ? -1 : 1);

  // Group slots by date
  const grouped = {};
  filteredSlots.forEach(s => { if (!grouped[s.date]) grouped[s.date] = []; grouped[s.date].push(s); });
  const groupedDays = Object.keys(grouped).sort();

  // Active students with credits
  const activeStudents = (data.students||[]).filter(s => s.active);

  return h`<div>
    <!-- Flash messages -->
    ${err && h`<div style=${{background:"#ffebee",border:"1px solid var(--bd)",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"var(--bd)",fontSize:13,fontWeight:600}}>${err}</div>`}
    ${msg && h`<div style=${{background:"#e8f5e9",border:"1px solid var(--ok)",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"var(--ok)",fontSize:13,fontWeight:600}}>${msg}</div>`}

    <!-- Tabs -->
    <div class="tabs" style=${{marginBottom:20}}>
      ${[["availability","Availability"],["slots","Bookings"],["credits","Credits"],["log","Deduction Log"]].map(([id,label]) =>
        h`<div key=${id} class=${"tab"+(tab===id?" on":"")} onClick=${()=>setTab(id)}>${label}</div>`
      )}
    </div>

    <!-- ─── AVAILABILITY TAB ──────────────────────────────────────────────── -->
    ${tab==="availability" && (()=>{
      const S = data.settings;
      const avail = S.availability || {};
      const dur = S.lessonDuration || 60;
      const blocked = S.blockedDates || [];
      const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const DAY_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

      const uAvail = (newAvail) => setData({...data, settings:{...S, availability:newAvail}});
      const setDay = (i, patch) => { const cur=avail[i]||{enabled:false,ranges:[]}; uAvail({...avail,[i]:{...cur,...patch}}); };
      const addRange = (i) => { const cur=avail[i]||{enabled:true,ranges:[]}; uAvail({...avail,[i]:{...cur,ranges:[...(cur.ranges||[]),{start:"09:00",end:"17:00"}]}}); };
      const rmRange = (i,ri) => { const cur=avail[i]; uAvail({...avail,[i]:{...cur,ranges:cur.ranges.filter((_,x)=>x!==ri)}}); };
      const updRange = (i,ri,k,v) => { const cur=avail[i]; uAvail({...avail,[i]:{...cur,ranges:cur.ranges.map((r,x)=>x===ri?{...r,[k]:v}:r)}}); };
      const toggleBlocked = (dateStr) => {
        const next = blocked.includes(dateStr) ? blocked.filter(d=>d!==dateStr) : [...blocked, dateStr];
        setData({...data, settings:{...S, blockedDates:next}});
      };

      // Build upcoming available dates for next 6 weeks
      const today = new Date(); today.setHours(0,0,0,0);
      const upcoming = [];
      for (let d=0; d<42; d++) {
        const dt = new Date(today); dt.setDate(today.getDate()+d);
        const dow = dt.getDay();
        const dateStr = dt.toISOString().split("T")[0];
        if ((avail[dow]||{}).enabled) upcoming.push({dt, dateStr, dow});
      }

      const fmtTime = t => { try { const [h,m]=t.split(":"); const hr=+h; return (hr%12||12)+":"+(m||"00")+(hr<12?"am":"pm"); } catch { return t; } };

      return h`<div>
        <!-- Lesson duration -->
        <div class="card" style=${{marginBottom:16}}>
          <div style=${{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <span style=${{fontWeight:700,fontSize:13}}>⏱ Lesson duration</span>
            <select value=${dur} onChange=${e=>setData({...data,settings:{...S,lessonDuration:+e.target.value}})} style=${{border:"2px solid var(--g200)",padding:"7px 12px",fontFamily:"var(--fb)",fontSize:13,borderRadius:7,fontWeight:700}}>
              <option value=${30}>30 min</option>
              <option value=${45}>45 min</option>
              <option value=${60}>60 min (1 hour)</option>
              <option value=${90}>90 min</option>
              <option value=${120}>2 hours</option>
            </select>
          </div>
        </div>

        <!-- 7-day weekly schedule -->
        <div class="card" style=${{marginBottom:16}}>
          <h3 style=${{marginBottom:4}}>📅 WEEKLY SCHEDULE</h3>
          <p style=${{fontSize:12,color:"var(--g500)",marginBottom:16}}>Toggle each day and set your available hours. Students book from these recurring windows.</p>

          <!-- Day toggle bar -->
          <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:18}}>
            ${[0,1,2,3,4,5,6].map(i => {
              const day = avail[i]||{enabled:false,ranges:[]};
              return h`<button key=${i} onClick=${()=>setDay(i,{enabled:!day.enabled})} style=${{
                padding:"10px 4px",borderRadius:8,fontWeight:800,fontSize:11,cursor:"pointer",textAlign:"center",lineHeight:1.4,transition:"all .15s",
                border:day.enabled?"2px solid #111":"2px solid var(--g200)",
                background:day.enabled?"#111":"#fff",
                color:day.enabled?"#fff":"var(--g400)"
              }}>${DAY_SHORT[i]}<br/><span style=${{fontSize:8,opacity:.7}}>${day.enabled?"ON":"OFF"}</span></button>`;
            })}
          </div>

          <!-- Per-day time range editors -->
          ${[1,2,3,4,5,6,0].map(i => {
            const day = avail[i]||{enabled:false,ranges:[]};
            if (!day.enabled) return null;
            return h`<div key=${i} style=${{marginBottom:12,padding:"14px 16px",border:"2px solid #111",borderRadius:10,background:"#fff"}}>
              <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style=${{fontWeight:800,fontSize:14}}>${DAY_NAMES[i]}</div>
                <button class="btn btn-sm" onClick=${()=>addRange(i)}>+ Add Time Range</button>
              </div>
              ${(day.ranges||[]).length===0 && h`<div style=${{fontSize:12,color:"var(--g400)",fontStyle:"italic"}}>No hours set — click "Add Time Range".</div>`}
              ${(day.ranges||[]).map((r,ri)=>h`<div key=${ri} style=${{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"10px 12px",background:"#f9f9f9",borderRadius:8,border:"1.5px solid var(--g200)",flexWrap:"wrap"}}>
                <span style=${{fontSize:11,fontWeight:800,color:"var(--g500)",minWidth:28}}>From</span>
                <input type="time" value=${r.start} step="1800" onInput=${e=>updRange(i,ri,"start",e.target.value)} style=${{border:"2px solid var(--g200)",padding:"7px 10px",fontFamily:"var(--fb)",fontSize:14,borderRadius:7,fontWeight:700,minWidth:110}}/>
                <span style=${{fontSize:11,fontWeight:800,color:"var(--g500)"}}>to</span>
                <input type="time" value=${r.end} step="1800" onInput=${e=>updRange(i,ri,"end",e.target.value)} style=${{border:"2px solid var(--g200)",padding:"7px 10px",fontFamily:"var(--fb)",fontSize:14,borderRadius:7,fontWeight:700,minWidth:110}}/>
                <span style=${{fontSize:11,color:"var(--g400)",flex:1}}>${fmtTime(r.start)} – ${fmtTime(r.end)}</span>
                <button onClick=${()=>rmRange(i,ri)} style=${{background:"#fff0f0",border:"1.5px solid #f44336",color:"#c62828",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontWeight:800,fontSize:12}}>✕</button>
              </div>`)}
            </div>`;
          })}

          ${[0,1,2,3,4,5,6].filter(i=>(avail[i]||{}).enabled).length===0 && h`<div style=${{textAlign:"center",padding:"20px",color:"var(--g400)",fontSize:13,fontStyle:"italic"}}>No days enabled yet — toggle days above to set your schedule.</div>`}
        </div>

        <!-- Blocked dates -->
        <div class="card">
          <h3 style=${{marginBottom:4}}>🚫 BLOCK SPECIFIC DATES</h3>
          <p style=${{fontSize:12,color:"var(--g500)",marginBottom:16}}>These are upcoming dates that would normally be available based on your weekly schedule. Block any date you can't teach.</p>
          ${upcoming.length===0
            ? h`<div style=${{fontSize:13,color:"var(--g400)",textAlign:"center",padding:"20px",fontStyle:"italic"}}>Enable at least one day in your weekly schedule to see upcoming dates here.</div>`
            : h`<div style=${{display:"flex",flexDirection:"column",gap:6}}>
                ${upcoming.map(({dt,dateStr,dow})=>{
                  const isBlocked = blocked.includes(dateStr);
                  const label = dt.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
                  return h`<div key=${dateStr} style=${{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,border:"1.5px solid "+(isBlocked?"#f44336":"var(--g200)"),background:isBlocked?"#fff8f8":"#fff",transition:"all .15s"}}>
                    <div style=${{flex:1}}>
                      <span style=${{fontWeight:700,fontSize:13,color:isBlocked?"#c62828":"#111"}}>${label}</span>
                      ${isBlocked && h`<span style=${{marginLeft:8,fontSize:10,fontWeight:700,background:"#f44336",color:"#fff",borderRadius:4,padding:"2px 6px"}}>BLOCKED</span>`}
                    </div>
                    <button onClick=${()=>toggleBlocked(dateStr)} style=${{
                      padding:"6px 14px",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"var(--fb)",transition:"all .15s",
                      border:isBlocked?"2px solid #4caf50":"2px solid #f44336",
                      background:isBlocked?"#e8f5e9":"#fff0f0",
                      color:isBlocked?"#2e7d32":"#c62828"
                    }}>${isBlocked?"✓ Unblock":"✕ Block"}</button>
                  </div>`;
                })}
              </div>`
          }
        </div>
      </div>`;
    })()}

    <!-- ─── SLOTS TAB ──────────────────────────────────────────────────── -->
    ${tab==="slots" && h`<div>
      <!-- Top bar -->
      <div style=${{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
        <button class="btn btn-p" onClick=${()=>{setShowAdd(!showAdd);setAddErr("");}}>+ Add Slot</button>
        <button class="btn" onClick=${()=>setShowCopy(!showCopy)}>⎘ Copy Day</button>
        <button class="btn btn-sm" onClick=${loadSlots} disabled=${busy}>${busy?"…":"↻ Refresh"}</button>
        <div style=${{marginLeft:"auto",display:"flex",gap:4,flexWrap:"wrap"}}>
          ${[["upcoming","Upcoming"],["all","All"],["open","Open"],["booked","Booked"],["completed","Done"]].map(([v,l]) =>
            h`<button key=${v} class=${"btn btn-sm"+(filter===v?" btn-p":"")} onClick=${()=>setFilter(v)}>${l}</button>`
          )}
        </div>
      </div>

      <!-- Add slot form -->
      ${showAdd && h`<div class="card" style=${{marginBottom:16,background:"#f9f9f9"}}>
        <h3 style=${{marginBottom:12}}>New Slot</h3>
        ${addErr && h`<div style=${{color:"var(--bd)",fontSize:12,marginBottom:8,fontWeight:600}}>${addErr}</div>`}
        <div class="fr3">
          <div class="fg"><label>Date</label><input type="date" value=${addForm.date} min=${today2} onInput=${e=>setAddForm({...addForm,date:e.target.value})}/></div>
          <div class="fg"><label>Time (Lebanon)</label><input type="time" step="1800" value=${addForm.time} onInput=${e=>setAddForm({...addForm,time:e.target.value})}/></div>
          <div class="fg"><label>Duration (min)</label><select value=${addForm.duration} onChange=${e=>setAddForm({...addForm,duration:+e.target.value})}>
            ${[30,45,60,75,90,120].map(d => h`<option key=${d} value=${d}>${d} min</option>`)}
          </select></div>
        </div>
        <div style=${{display:"flex",gap:8,marginTop:4}}>
          <button class="btn btn-p btn-sm" onClick=${doAddSlot} disabled=${busy}>Save Slot</button>
          <button class="btn btn-sm" onClick=${()=>{setShowAdd(false);setAddErr("");}}>Cancel</button>
        </div>
      </div>`}

      <!-- Copy day form -->
      ${showCopy && h`<div class="card" style=${{marginBottom:16,background:"#f9f9f9"}}>
        <h3 style=${{marginBottom:12}}>Copy Availability</h3>
        <p style=${{fontSize:12,color:"var(--g500)",marginBottom:12}}>Copy all slots from one date to another. Conflicts are skipped automatically.</p>
        <div class="fr">
          <div class="fg"><label>Copy FROM</label><input type="date" value=${copyFrom} onInput=${e=>setCopyFrom(e.target.value)}/></div>
          <div class="fg"><label>Copy TO</label><input type="date" value=${copyTo} min=${today2} onInput=${e=>setCopyTo(e.target.value)}/></div>
        </div>
        <div style=${{display:"flex",gap:8,marginTop:4}}>
          <button class="btn btn-p btn-sm" onClick=${doCopyDay} disabled=${busy}>Copy</button>
          <button class="btn btn-sm" onClick=${()=>setShowCopy(false)}>Cancel</button>
        </div>
      </div>`}

      <!-- Slot list -->
      ${slots === null
        ? h`<div class="sc-empty">Loading slots…</div>`
        : groupedDays.length === 0
          ? h`<div class="sc-empty">No slots found. Add your first slot above!</div>`
          : groupedDays.map(day => {
              const {dayName, dateStr} = fmtSlotTime(day, "00:00", 0);
              const isPast = day < today2;
              return h`<div key=${day}>
                <div class="sc-day-hd" style=${{opacity:isPast?.6:1}}>${dayName}, ${dateStr}${isPast?" — Past":""}</div>
                ${grouped[day].map(slot => {
                  const {timeStr} = fmtSlotTime(slot.date, slot.time, slot.duration);
                  return h`<div key=${slot.id} class=${"sc-slot sc-slot-"+slot.status}>
                    <div style=${{minWidth:70}}><b style=${{fontSize:15}}>${timeStr}</b><div style=${{fontSize:11,color:"var(--g500)"}}>${slot.duration} min</div></div>
                    ${statusBadge(slot.status)}
                    ${slot.studentName && h`<div style=${{fontSize:13,fontWeight:600,color:"#1565c0",flex:1}}>${slot.studentName}</div>`}
                    ${!slot.studentName && slot.status==="open" && h`<div style=${{flex:1,fontSize:12,color:"var(--g400)"}}>Available</div>`}
                    <div style=${{display:"flex",gap:6,marginLeft:"auto",flexWrap:"wrap"}}>
                      ${slot.status==="booked" && h`<button class="btn btn-sm" style=${{background:"var(--ok)",color:"#fff",border:"none"}} onClick=${()=>doComplete(slot.id)}>✓ Done</button>`}
                      ${(slot.status==="open"||slot.status==="booked") && h`<button class="btn btn-sm btn-d" onClick=${()=>doCancel(slot.id)}>Cancel</button>`}
                      ${slot.status==="open" && h`<button class="btn btn-sm" style=${{borderColor:"var(--bd)",color:"var(--bd)"}} onClick=${()=>doDelete(slot.id)}>🗑</button>`}
                    </div>
                  </div>`;
                })}
              </div>`;
            })
      }
    </div>`}

    <!-- ─── CREDITS TAB ───────────────────────────────────────────────── -->
    ${tab==="credits" && h`<div>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <p style=${{fontSize:13,color:"var(--g500)"}}>Set how many classes each student has remaining. These are automatically deducted after each completed session.</p>
        <button class="btn btn-sm" onClick=${loadCreditsFromCloud}>↻ Refresh</button>
      </div>
      ${activeStudents.length === 0
        ? h`<div class="sc-empty">No active students yet.</div>`
        : activeStudents.map(s => {
            const credits = typeof s.remainingClasses === "number" ? s.remainingClasses : Math.max(0, (s.lessonsTotal||0) - (s.lessonsTaken||0));
            const cls = credits <= 0 ? "cred-low" : credits <= 2 ? "cred-warn" : "cred-ok";
            return h`<div key=${s.id} class="cred-row">
              <div class=${"cred-num "+cls}>${credits}</div>
              <div style=${{flex:1}}>
                <div style=${{fontWeight:700,fontSize:14}}>${s.name}</div>
                <div style=${{fontSize:11,color:"var(--g500)"}}>${credits===0?"No classes left":credits===1?"1 class left":credits+" classes left"}</div>
              </div>
              <button class="btn btn-sm" onClick=${()=>{setCreditModal({studentId:s.id,name:s.name,current:credits});setCreditDelta(0);setCreditNote("");}}>Adjust</button>
            </div>`;
          })
      }
    </div>`}

    <!-- ─── LOG TAB ──────────────────────────────────────────────────── -->
    ${tab==="log" && h`<div>
      ${deductions === null
        ? h`<div class="sc-empty">Loading log…</div>`
        : deductions.length === 0
          ? h`<div class="sc-empty">No deductions recorded yet.</div>`
          : h`<div style=${{overflowX:"auto"}}>
              <table>
                <thead><tr>
                  <th>Date</th><th>Student</th><th>Type</th><th>Before</th><th>After</th><th>Note</th>
                </tr></thead>
                <tbody>
                  ${deductions.map((d,i) => h`<tr key=${d.id||i}>
                    <td style=${{whiteSpace:"nowrap"}}>${fmt(d.deductedAt)} ${d.time||""}</td>
                    <td style=${{fontWeight:600}}>${d.studentName}</td>
                    <td><span style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,padding:"2px 7px",borderRadius:4,background:d.type==="auto"?"#e3f2fd":d.type==="top_up"?"#e8f5e9":"#fff3e0",color:d.type==="auto"?"#1565c0":d.type==="top_up"?"#2e7d32":"#e65100"}}>${d.type==="top_up"?"Top-up":d.type==="auto"?"Auto":d.type==="manual"?"Manual":"Adj"}</span></td>
                    <td>${d.classesBefore ?? "—"}</td>
                    <td style=${{fontWeight:700,color:d.classesAfter===0?"var(--bd)":d.classesAfter<=(d.classesBefore||0)?"inherit":"var(--ok)"}}>${d.classesAfter ?? "—"}</td>
                    <td style=${{fontSize:11,color:"var(--g500)"}}>${d.note||""}</td>
                  </tr>`)}
                </tbody>
              </table>
            </div>`
      }
    </div>`}

    <!-- ─── CREDIT ADJUST MODAL ───────────────────────────────────────── -->
    ${creditModal && h`<${Modal} title=${"Adjust Credits — "+creditModal.name} onClose=${()=>setCreditModal(null)} footer=${h`
      <button class="btn" onClick=${()=>setCreditModal(null)}>Cancel</button>
      <button class="btn btn-p" onClick=${doAdjustCredits} disabled=${busy||creditDelta===0}>Save</button>
    `}>
      <div style=${{textAlign:"center",marginBottom:18}}>
        <div style=${{fontSize:11,textTransform:"uppercase",letterSpacing:1,color:"var(--g500)",marginBottom:4}}>Current balance</div>
        <div class=${"cred-num "+(creditModal.current<=0?"cred-low":creditModal.current<=2?"cred-warn":"cred-ok")} style=${{fontSize:48,fontFamily:"var(--fh)",display:"block",margin:"0 auto"}}>${creditModal.current}</div>
      </div>
      <div class="fg"><label>Change (+ to add, − to remove)</label>
        <input type="number" value=${creditDelta} min=${-creditModal.current} onInput=${e=>setCreditDelta(+e.target.value)} placeholder="e.g. 5 or -1" style=${{textAlign:"center",fontSize:20,fontFamily:"var(--fh)"}}/>
      </div>
      ${creditDelta !== 0 && h`<div style=${{textAlign:"center",fontSize:13,color:"var(--g500)",marginBottom:8}}>New balance: <b style=${{color:Math.max(0,creditModal.current+creditDelta)<=0?"var(--bd)":"var(--ok)"}}>${Math.max(0,creditModal.current+creditDelta)}</b></div>`}
      <div class="fg"><label>Note (optional)</label><input type="text" value=${creditNote} onInput=${e=>setCreditNote(e.target.value)} placeholder="e.g. Paid for 5 classes"/></div>
    <//>`}
  </div>`;
}
