// PAYMENTS — FIX #7 & #8
// ════════════════════════════════════════
function Payments({data, setData}) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkPayment());
  const [search, setSearch] = useState("");
  const S = data.settings;
  const CUR = S.currency || "$";
  const sorted = [...data.payments].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filtered = search ? sorted.filter(p=>{const st=data.students.find(s=>s.id===p.studentId); return st?.name?.toLowerCase().includes(search.toLowerCase());}) : sorted;
  const now = new Date();
  const mPay = data.payments.filter(p=>{const d=new Date(p.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const mRev = mPay.filter(p=>p.status==="Paid").reduce((a,p)=>a+(p.amount||0),0);
  const tRev = data.payments.filter(p=>p.status==="Paid").reduce((a,p)=>a+(p.amount||0),0);
  const pending = data.payments.filter(p=>p.status!=="Paid");
  const pendingTotal = pending.reduce((a,p)=>a+(p.amount||0),0);

  // FIX #8: Track original lessonsAdded to adjust on edit
  const doSave = () => {
    if(!form.studentId||!form.amount) return;
    const ex=data.payments.find(p=>p.id===form.id);
    let nP, nS=data.students;
    if(ex) {
      nP=data.payments.map(p=>p.id===form.id?{...form}:p);
      // Adjust lessons if lessonsAdded changed
      const diff = (form.lessonsAdded||0) - (ex.lessonsAdded||0);
      if(diff !== 0) {
        nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTotal:Math.max(0,s.lessonsTotal+diff)}:s);
      }
    } else {
      nP=[...data.payments,{...form}];
      if(form.lessonsAdded>0) nS=nS.map(s=>s.id===form.studentId?{...s,lessonsTotal:s.lessonsTotal+form.lessonsAdded,totalPaid:s.totalPaid+form.amount}:s);
    }
    setData({...data,payments:nP,students:nS}); setShow(false); setForm(mkPayment());
  };
  const toggleStatus = pid => { setData({...data, payments: data.payments.map(p => p.id===pid ? {...p, status: p.status==="Paid"?"Pending":"Paid"} : p)}); };

  return h`<div>
    <div class="stats" style=${{gridTemplateColumns:"repeat(4,1fr)"}}>
      <div class="stat"><div class="lb">This Month (Paid)</div><div class="vl">${fm(mRev,CUR)}</div></div>
      <div class="stat"><div class="lb">Total Collected</div><div class="vl">${fm(tRev,CUR)}</div></div>
      <div class="stat"><div class="lb">Pending</div><div class="vl" style=${{color:pendingTotal>0?"var(--wn)":"var(--ok)"}}>${fm(pendingTotal,CUR)}</div><div class="su">${pending.length} unpaid</div></div>
      <div class="stat"><div class="lb">Avg Payment</div><div class="vl">${fm(data.payments.length?data.payments.reduce((a,p)=>a+(p.amount||0),0)/data.payments.length:0,CUR)}</div></div>
    </div>
    <div class="card" style=${{padding:0}}>
      <div style=${{padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"2px solid var(--bk)",gap:10,flexWrap:"wrap"}}>
        <h3 style=${{fontFamily:"var(--fh)",fontSize:20,letterSpacing:1.5,margin:0}}>PAYMENTS</h3>
        <div style=${{display:"flex",gap:8,alignItems:"center"}}>
          <div class="sb-x" style=${{border:"1.5px solid var(--g200)"}}>${ic('srch')}<input placeholder="Filter by student..." value=${search} onInput=${e=>setSearch(e.target.value)} style=${{width:140}}/></div>
          <button class="btn btn-p btn-sm" onClick=${()=>{setForm(mkPayment());setShow(true);}}>${ic('plus')} Add</button>
        </div>
      </div>
    <div style=${{overflowX:"auto"}}><table><thead><tr><th>Date</th><th>Student</th><th>Amount</th><th>Status</th><th>Method</th><th>Lessons+</th><th>Notes</th><th></th></tr></thead><tbody>
      ${filtered.map(p=>{const st=data.students.find(s=>s.id===p.studentId); return h`<tr key=${p.id} style=${{background:p.status!=="Paid"?"#fff8f0":"transparent"}}>
        <td style=${{fontWeight:600}}>${fmt(p.date)}</td>
        <td>${st?.name||"?"}</td>
        <td style=${{fontFamily:"var(--fh)",fontSize:18}}>${fm(p.amount,CUR)}</td>
        <td><button class=${"btn btn-xs "+(p.status==="Paid"?"btn-done":"btn-d")} onClick=${()=>toggleStatus(p.id)} style=${{minWidth:70,justifyContent:"center"}}>${p.status==="Paid"?"✓ Paid":"Pending"}</button></td>
        <td>${p.method}</td>
        <td>${p.lessonsAdded||"—"}</td>
        <td style=${{fontSize:12,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis"}}>${p.notes||"—"}</td>
        <td style=${{whiteSpace:"nowrap"}}><button class="bi" onClick=${()=>{setForm({...p});setShow(true);}}>${ic('edt')}</button><button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>{
          // FIX #7: Confirm before deleting payment
          if(confirm("Delete this payment record?")) setData({...data,payments:data.payments.filter(x=>x.id!==p.id)});
        }}>${ic('del')}</button></td>
      </tr>`;})}
      ${filtered.length===0&&h`<tr><td colspan="8" style=${{textAlign:"center",color:"var(--g400)",padding:30}}>No payments</td></tr>`}
    </tbody></table></div></div>
    ${show && h`<${Modal} title=${data.payments.find(p=>p.id===form.id)?"EDIT PAYMENT":"ADD PAYMENT"} onClose=${()=>setShow(false)} footer=${h`<button class="btn" onClick=${()=>setShow(false)}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>`}>
      <div class="fr"><div class="fg"><label>Student</label><select value=${form.studentId} onChange=${e=>setForm({...form,studentId:e.target.value})}><option value="">— Select —</option>${data.students.map(s=>h`<option key=${s.id} value=${s.id}>${s.name}</option>`)}</select></div><div class="fg"><label>Date</label><input type="date" value=${form.date} onInput=${e=>setForm({...form,date:e.target.value})}/></div></div>
      <div class="fr3"><div class="fg"><label>Amount (${CUR})</label><input type="number" value=${form.amount} onInput=${e=>setForm({...form,amount:+e.target.value})}/></div><div class="fg"><label>Method</label><select value=${form.method} onChange=${e=>setForm({...form,method:e.target.value})}>${S.payMethods.map(m=>h`<option key=${m}>${m}</option>`)}</select></div><div class="fg"><label>Lessons Added</label><input type="number" value=${form.lessonsAdded} onInput=${e=>setForm({...form,lessonsAdded:+e.target.value})}/></div></div>
      <div class="fr"><div class="fg"><label>Status</label><select value=${form.status||"Pending"} onChange=${e=>setForm({...form,status:e.target.value})}><option value="Pending">Pending</option><option value="Paid">Paid</option></select></div><div class="fg"><label>Notes</label><input value=${form.notes} onInput=${e=>setForm({...form,notes:e.target.value})}/></div></div>
    <//>`}
  </div>`;
}

// ─── CURRICULUM (simplified, same logic) ───
function Curriculum({data, setData}) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkCurriculum(data.settings));
  const [filter, setFilter] = useState("All");
  const fileRef = useRef(null);
  const S = data.settings;
  const cur = data.curriculum || [];
  const list = filter==="All" ? cur : cur.filter(c=>c.category===filter);
  const doSave = () => { if(!form.title.trim()) return; const ex=cur.find(c=>c.id===form.id); setData({...data,curriculum:ex?cur.map(c=>c.id===form.id?{...form}:c):[...cur,{...form}]}); setShow(false); setForm(mkCurriculum(S)); };
  const handleFile = e => { const f=e.target.files[0]; if(!f) return; if(f.size>4e6){alert("Max 4MB");return;} const r=new FileReader(); r.onload=()=>setForm({...form,fileName:f.name,fileData:r.result}); r.readAsDataURL(f); };
  return h`<div>
    <div style=${{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
      <div style=${{display:"flex",gap:3}}>${["All",...S.types].map(t=>h`<button key=${t} class=${"btn btn-sm "+(filter===t?"btn-p":"")} onClick=${()=>setFilter(t)}>${t}</button>`)}</div>
      <button class="btn btn-p" onClick=${()=>{setForm(mkCurriculum(S));setShow(true);}}>${ic('plus')} Add</button>
    </div>
    ${list.length===0 ? h`<div class="empty"><h3>NO ITEMS</h3><p>Build your library</p></div>` : h`
    <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
      ${list.map(c=>h`<div key=${c.id} class="card" style=${{marginBottom:0}}>
        <div style=${{display:"flex",justifyContent:"space-between"}}><h4 style=${{fontFamily:"var(--fh)",fontSize:18,letterSpacing:1}}>${c.title}</h4><div><button class="bi" onClick=${()=>{setForm({...c});setShow(true);}}>${ic('edt')}</button><button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>{if(confirm("Delete?"))setData({...data,curriculum:cur.filter(x=>x.id!==c.id)});}}>${ic('del')}</button></div></div>
        <div style=${{marginTop:6}}><span class="tg">${c.category}</span> <span class="tg" style=${{background:"transparent",color:"var(--bk)",border:"1.5px solid var(--bk)"}}>${c.level}</span></div>
        ${c.description&&h`<p style=${{fontSize:12,color:"var(--g500)",marginTop:6,lineHeight:1.5}}>${c.description}</p>`}
        ${c.fileName&&h`<div style=${{marginTop:8,padding:6,background:"var(--g50)",border:"1px solid var(--g200)",cursor:"pointer",fontSize:12}} onClick=${()=>{const a=document.createElement("a");a.href=c.fileData;a.download=c.fileName;a.click();}}>${ic('fi')} ${c.fileName}</div>`}
      </div>`)}
    </div>`}
    ${show && h`<${Modal} title=${cur.find(c=>c.id===form.id)?"EDIT":"ADD ITEM"} onClose=${()=>setShow(false)} footer=${h`<button class="btn" onClick=${()=>setShow(false)}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>`}>
      <div class="fg"><label>Title</label><input value=${form.title} onInput=${e=>setForm({...form,title:e.target.value})}/></div>
      <div class="fr"><div class="fg"><label>Category</label><select value=${form.category} onChange=${e=>setForm({...form,category:e.target.value})}>${S.types.map(t=>h`<option key=${t}>${t}</option>`)}</select></div><div class="fg"><label>Level</label><select value=${form.level} onChange=${e=>setForm({...form,level:e.target.value})}>${S.levels.map(l=>h`<option key=${l}>${l}</option>`)}</select></div></div>
      <div class="fg"><label>Description</label><textarea value=${form.description} onInput=${e=>setForm({...form,description:e.target.value})}/></div>
      <div class="fg"><label>File (max 4MB)</label><div class="fu" onClick=${()=>fileRef.current?.click()}><input ref=${fileRef} type="file" onChange=${handleFile} accept=".pdf,.doc,.docx,.ppt,.pptx,.jpg,.png"/>${form.fileName?h`<span>${ic('fi')} ${form.fileName}</span>`:h`<p style=${{fontWeight:600}}>Click to upload</p>`}</div></div>
    <//>`}
  </div>`;
}

// ─── GROUPS ───
function Groups({data, setData}) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkGroup(data.settings));
  const S = data.settings;
  const groups = data.groups || [];
  const doSave = () => { if(!form.name.trim()) return; const ex=groups.find(g=>g.id===form.id); setData({...data,groups:ex?groups.map(g=>g.id===form.id?{...form}:g):[...groups,{...form}]}); setShow(false); setForm(mkGroup(S)); };
  const toggle = sid => { const ids=form.studentIds||[]; setForm({...form,studentIds:ids.includes(sid)?ids.filter(i=>i!==sid):[...ids,sid]}); };
  return h`<div>
    <div style=${{display:"flex",justifyContent:"flex-end",marginBottom:18}}><button class="btn btn-p" onClick=${()=>{setForm(mkGroup(S));setShow(true);}}>${ic('plus')} Add Group</button></div>
    ${groups.length===0 ? h`<div class="empty"><h3>NO GROUPS</h3></div>` : h`
    <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
      ${groups.map(g=>h`<div key=${g.id} class="card" style=${{marginBottom:0}}>
        <div style=${{display:"flex",justifyContent:"space-between"}}><h3 style=${{fontFamily:"var(--fh)",fontSize:20,margin:0}}>${g.name}</h3><div><button class="bi" onClick=${()=>{setForm({...g});setShow(true);}}>${ic('edt')}</button><button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>{if(confirm("Delete group?"))setData({...data,groups:groups.filter(x=>x.id!==g.id)});}}>${ic('del')}</button></div></div>
        <div style=${{marginTop:6}}><span class="tg">${g.type}</span>${g.schedule&&h`<span style=${{marginLeft:8,fontSize:12,color:"var(--g500)"}}>${g.schedule}</span>`}</div>
        <div style=${{marginTop:10,fontSize:11,color:"var(--g500)"}}>${(g.studentIds||[]).length} students</div>
      </div>`)}
    </div>`}
    ${show && h`<${Modal} title=${groups.find(g=>g.id===form.id)?"EDIT":"ADD GROUP"} onClose=${()=>setShow(false)} footer=${h`<button class="btn" onClick=${()=>setShow(false)}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>`}>
      <div class="fg"><label>Name</label><input value=${form.name} onInput=${e=>setForm({...form,name:e.target.value})}/></div>
      <div class="fr"><div class="fg"><label>Type</label><select value=${form.type} onChange=${e=>setForm({...form,type:e.target.value})}>${S.types.map(t=>h`<option key=${t}>${t}</option>`)}</select></div><div class="fg"><label>Schedule</label><input value=${form.schedule} onInput=${e=>setForm({...form,schedule:e.target.value})} placeholder="Mon & Wed 6PM"/></div></div>
      <div class="fg"><label>Students</label><div style=${{border:"2px solid var(--g200)",maxHeight:180,overflowY:"auto"}}>${data.students.filter(s=>s.active).map(s=>{const sel=(form.studentIds||[]).includes(s.id);return h`<div key=${s.id} style=${{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",cursor:"pointer",background:sel?"var(--g100)":"transparent",borderBottom:"1px solid var(--g100)"}} onClick=${()=>toggle(s.id)}><div class=${"cb "+(sel?"on":"")} style=${{width:16,height:16}}>${sel&&ic('chk')}</div><span style=${{fontWeight:500,fontSize:13}}>${s.name}</span></div>`;})}</div></div>
    <//>`}
  </div>`;
}

// ════════════════════════════════════════
// HOMEWORK — teacher overview of all HW
// ════════════════════════════════════════
function HomeworkView({data, onProfile}) {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const all = (data.homework||[]);
  const counts = {all:all.length,assigned:all.filter(x=>x.status==="assigned").length,submitted:all.filter(x=>x.status==="submitted").length,reviewed:all.filter(x=>x.status==="reviewed").length};
  const filtered = all
    .filter(hw=>filter==="all"||hw.status===filter)
    .filter(hw=>{
      if(!search) return true;
      const s=data.students.find(x=>x.id===hw.studentId);
      return s?.name?.toLowerCase().includes(search.toLowerCase())||hw.title.toLowerCase().includes(search.toLowerCase());
    })
    .sort((a,b)=>new Date(b.assignedDate)-new Date(a.assignedDate));
  return h`<div>
    <div style=${{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
      ${[["all","All"],["assigned","Pending"],["submitted","Submitted"],["reviewed","Reviewed"]].map(([k,l])=>h`<button key=${k} class=${"btn btn-sm "+(filter===k?"btn-p":"")} onClick=${()=>setFilter(k)}>${l}${counts[k]>0?" ("+counts[k]+")":""}</button>`)}
      <div class="sb-x" style=${{marginLeft:"auto"}}>${ic('srch')}<input placeholder="Search student or task..." value=${search} onInput=${e=>setSearch(e.target.value)}/></div>
    </div>
    ${filtered.length===0?h`<div class="empty"><h3>NO HOMEWORK</h3><p>Assign homework from a student profile page</p></div>`:
    h`<div class="card" style=${{padding:0}}>
      <div style=${{overflowX:"auto"}}><table><thead><tr><th>Student</th><th>Task</th><th>Due</th><th>Status</th><th>Submitted</th><th></th></tr></thead><tbody>
        ${filtered.map(hw=>{
          const s=data.students.find(x=>x.id===hw.studentId);
          return h`<tr key=${hw.id}>
            <td style=${{fontWeight:600,cursor:"pointer",textDecoration:"underline"}} onClick=${()=>onProfile(hw.studentId)}>${s?.name||"?"}</td>
            <td>${hw.title}</td>
            <td style=${{whiteSpace:"nowrap"}}>${fmt(hw.dueDate)}</td>
            <td><span class=${"bg "+(hw.status==="reviewed"?"bg-ok":hw.status==="submitted"?"bg-wn":"bg-n")}>${hw.status}</span></td>
            <td style=${{fontSize:12,color:"var(--g500)"}}>${hw.submittedAt?fmt(hw.submittedAt):"—"}</td>
            <td><button class="btn btn-xs" onClick=${()=>onProfile(hw.studentId)}>Profile →</button></td>
          </tr>`;
        })}
      </tbody></table></div>
    </div>`}
  </div>`;
}

// ════════════════════════════════════════
// SETTINGS — with currency & week start
// ════════════════════════════════════════
function Settings({data, setData}) {
  const S = data.settings;
  const u = (k,v) => setData({...data, settings:{...S,[k]:v}});
  const [storage, setStorage] = useState(null);
  useEffect(() => { getStorageEstimate().then(est => setStorage(est)); }, [data]);
  const dataSizeMB = (new Blob([JSON.stringify(data)]).size / 1024 / 1024).toFixed(2);

  return h`<div>
    <div class="card"><h3>STORAGE</h3>
      <div style=${{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
        <div><div style=${{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:600,color:"var(--g500)"}}>Your Data</div><div style=${{fontFamily:"var(--fh)",fontSize:32}}>${dataSizeMB} MB</div></div>
        ${storage && storage.quota > 0 && h`<div><div style=${{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:600,color:"var(--g500)"}}>Browser Quota</div><div style=${{fontFamily:"var(--fh)",fontSize:32}}>${(storage.quota/1024/1024).toFixed(0)} MB</div></div>`}
      </div>
    </div>
    <div class="card"><h3>BRANDING</h3><div class="fr"><div class="fg"><label>App Title</label><input value=${S.brand} onInput=${e=>u("brand",e.target.value)}/></div><div class="fg"><label>Subtitle</label><input value=${S.sub} onInput=${e=>u("sub",e.target.value)}/></div></div></div>
    <div class="card"><h3>REGIONAL</h3>
      <div class="fr">
        <div class="fg"><label>Currency Symbol</label><input value=${S.currency||"$"} onInput=${e=>u("currency",e.target.value)} placeholder="$" style=${{maxWidth:80}}/></div>
        <div class="fg"><label>Week Starts On</label><select value=${S.weekStartDay||1} onChange=${e=>u("weekStartDay",+e.target.value)}><option value="0">Sunday</option><option value="1">Monday</option><option value="6">Saturday</option></select></div>
      </div>
    </div>
    <div class="card"><h3>CATEGORIES</h3><p style=${{fontSize:12,color:"var(--g500)",marginBottom:14}}>Custom options for all dropdowns.</p>
      <${Chips} items=${S.types} onUpdate=${v=>u("types",v)} label="Arabic Types"/>
      <${Chips} items=${S.levels} onUpdate=${v=>u("levels",v)} label="Student Levels"/>
      <${Chips} items=${S.payPlans} onUpdate=${v=>u("payPlans",v)} label="Payment Plans"/>
      <${Chips} items=${S.payMethods} onUpdate=${v=>u("payMethods",v)} label="Payment Methods"/>
    </div>
    <div class="card"><h3>WHATSAPP TEMPLATES</h3><p style=${{fontSize:12,color:"var(--g500)",marginBottom:14}}>Use {name}, {date}, {time}, {type} as placeholders.</p>
      <div class="fg"><label>Day-Before</label><textarea value=${S.msgDay} onInput=${e=>u("msgDay",e.target.value)} style=${{minHeight:60}}/></div>
      <div class="fg"><label>Hour-Before</label><textarea value=${S.msgHour} onInput=${e=>u("msgHour",e.target.value)} style=${{minHeight:60}}/></div>
      <div class="fg"><label>General</label><textarea value=${S.msgGen} onInput=${e=>u("msgGen",e.target.value)} style=${{minHeight:60}}/></div>
    </div>
    <div class="card"><h3>DATA BACKUP</h3>
      <div style=${{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button class="btn btn-p" onClick=${()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="arabic-tutor-backup-"+today()+".json";a.click();URL.revokeObjectURL(url);}}>Export Backup</button>
        <button class="btn" onClick=${()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.students&&d.settings){if(confirm("Replace ALL data?")){setData(migrateData(d));}}else{alert("Invalid backup.");}}catch{alert("Could not read file.");}};r.readAsText(f);};inp.click();}}>Import Backup</button>
      </div>
    </div>
    <div class="card" style=${{borderColor:"var(--bd)"}}><h3 style=${{color:"var(--bd)"}}>DANGER ZONE</h3><button class="btn btn-d" onClick=${()=>{if(confirm("Delete ALL data? Cannot be undone.")){indexedDB.deleteDatabase(DB_NAME);localStorage.removeItem(SK);location.reload();}}}>Reset All Data</button></div>
  </div>`;
}

// ════════════════════════════════════════
// MAIN APP with Auth
// ════════════════════════════════════════
function App() {
  const [data, setData] = useState(null);
  const [view, setView] = useState("dashboard");
  const [profileId, setProfileId] = useState(null);
  const [auth, setAuth] = useState(null); // {user, role}
  const [checkingAuth, setCheckingAuth] = useState(true);

  // Check existing session
  useEffect(() => {
    (async () => {
      if (supabase) {
        const {data: {session}} = await supabase.auth.getSession();
        if (session?.user) {
          setAuth({user: session.user, role: session.user.user_metadata?.role || "student"});
        }
      }
      setCheckingAuth(false);
    })();
  }, []);

  // Load data
  useEffect(() => { if (auth) loadData().then(d => setData(d)); }, [auth]);
  // Save on change
  useEffect(() => { if (data) save(data); }, [data]);

  const update = useCallback(d => setData(d), []);
  const openProfile = id => { setProfileId(id); setView("profile"); };
  const handleLogout = async () => {
    if (supabase) await supabase.auth.signOut();
    setAuth(null); setData(null);
  };

  if (checkingAuth) return h`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"var(--fh)",fontSize:28,letterSpacing:3}}>LOADING...</div>`;
  if (!auth) return h`<${AuthScreen} onAuth=${setAuth}/>`;
  if (!data) return h`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"var(--fh)",fontSize:28,letterSpacing:3}}>LOADING...</div>`;

  // Student role → student portal
  if (auth.role === "student") return h`<${StudentPortal} data=${data} setData=${update} user=${auth.user} onLogout=${handleLogout}/>`;

  const S = data.settings;
  const nav = [["dashboard","Dashboard","dash"],["students","Students","stu"],["calendar","Calendar","cal"],["payments","Payments","pay"],["curriculum","Curriculum","cur"],["groups","Groups","grp"],["homework","Homework","hw"],["settings","Settings","set"]];
  const activeNav = view === "profile" ? "students" : view;

  return h`<div class="app">
    <div class="sb">
      <div class="sb-hd"><h1>${S.brand}</h1><small>${S.sub}</small></div>
      <div class="sb-nav">${nav.map(([k,l,i]) => h`<div key=${k} class=${"sb-it"+(activeNav===k?" on":"")} onClick=${()=>{setView(k);setProfileId(null);}}>${ic(i)}<span>${l}</span></div>`)}</div>
      <div class="sb-ft">
        <div>${data.students.filter(s=>s.active).length} active students</div>
        <div style=${{marginTop:8,cursor:"pointer",color:"var(--g400)"}} onClick=${handleLogout}>${ic('logout')} Log out</div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">${view==="profile"&&h`<button class="bi" onClick=${()=>setView("students")}>${icb('back')}</button>`}<h2>${view==="profile"?"STUDENT PROFILE":(nav.find(([k])=>k===activeNav)?.[1]||"").toUpperCase()}</h2></div>
      <div class="page">
        ${view==="dashboard" && h`<${Dashboard} data=${data}/>`}
        ${view==="students" && h`<${Students} data=${data} setData=${update} onProfile=${openProfile}/>`}
        ${view==="profile" && h`<${StudentProfile} data=${data} setData=${update} profileId=${profileId}/>`}
        ${view==="calendar" && h`<${Calendar} data=${data} setData=${update}/>`}
        ${view==="payments" && h`<${Payments} data=${data} setData=${update}/>`}
        ${view==="curriculum" && h`<${Curriculum} data=${data} setData=${update}/>`}
        ${view==="groups" && h`<${Groups} data=${data} setData=${update}/>`}
        ${view==="homework" && h`<${HomeworkView} data=${data} onProfile=${openProfile}/>`}
        ${view==="settings" && h`<${Settings} data=${data} setData=${update}/>`}
      </div>
    </div>
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(h`<${App}/>`);
</script>
</body>
</html>
