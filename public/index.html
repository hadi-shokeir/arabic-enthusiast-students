<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Tutor Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/htm/3.1.1/htm.module.js" type="module"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- Supabase Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bk:#000;--wh:#fff;--g50:#fafafa;--g100:#f0f0f0;--g200:#e0e0e0;--g300:#c0c0c0;--g400:#888;--g500:#666;--g600:#444;--g700:#333;--g800:#1a1a1a;--ok:#00aa55;--wn:#ff8800;--bd:#dd2222;--fh:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;--fa:'Noto Kufi Arabic',sans-serif}
html,body,#root{height:100%;overflow:hidden}
/* RTL support for Arabic content */
[dir="rtl"]{font-family:var(--fa),var(--fb)}
.ar-text{font-family:var(--fa),var(--fb);direction:rtl;text-align:right}
textarea,input[type="text"],input:not([type]){font-family:var(--fa),var(--fb);direction:auto;unicode-bidi:plaintext}
.app{display:flex;height:100vh;font-family:var(--fb);background:var(--wh);color:var(--bk);overflow:hidden}
/* Sidebar */
.sb{width:220px;min-width:220px;background:var(--bk);color:var(--wh);display:flex;flex-direction:column}
.sb-hd{padding:24px 20px;border-bottom:1px solid var(--g700)}
.sb-hd h1{font-family:var(--fh);font-size:24px;letter-spacing:3px}
.sb-hd small{font-size:11px;color:var(--g400);display:block;margin-top:4px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-it{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;border-left:3px solid transparent;color:var(--g300);font-size:13px;font-weight:500;transition:background .1s}
.sb-it:hover{background:var(--g800);color:var(--wh)}
.sb-it.on{background:var(--wh);color:var(--bk);border-left-color:var(--wh);font-weight:700}
.sb-ft{padding:14px 20px;border-top:1px solid var(--g700);font-size:11px;color:var(--g500)}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:18px 28px;border-bottom:2px solid var(--bk);background:var(--wh);display:flex;align-items:center;gap:12px}
.topbar h2{font-family:var(--fh);font-size:28px;letter-spacing:2px}
.page{flex:1;overflow-y:auto;padding:24px 28px;background:var(--g50)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;font-family:var(--fb);font-size:12px;font-weight:600;border:2px solid var(--bk);cursor:pointer;text-transform:uppercase;letter-spacing:.8px;background:var(--wh);color:var(--bk);transition:all .1s}
.btn:hover{background:var(--g100)}.btn-p{background:var(--bk);color:var(--wh)}.btn-p:hover{background:var(--g700)}
.btn-d{border-color:var(--bd);color:var(--bd)}.btn-d:hover{background:var(--bd);color:#fff}
.btn-wa{background:#25D366;color:#fff;border-color:#25D366}.btn-wa:hover{background:#1ebe5d}
.btn-sm{padding:5px 10px;font-size:10px}.btn-xs{padding:3px 8px;font-size:10px}
.bi{padding:6px;border:none;background:none;cursor:pointer;color:var(--g500);display:inline-flex}.bi:hover{color:var(--bk)}
/* Cards */
.card{background:var(--wh);border:2px solid var(--bk);padding:18px;margin-bottom:14px}
.card h3{font-family:var(--fh);font-size:20px;letter-spacing:1.5px;margin-bottom:12px}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--wh);border:2px solid var(--bk);padding:16px}
.stat .lb{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--g500);font-weight:600}
.stat .vl{font-family:var(--fh);font-size:36px;margin-top:2px}
.stat .su{font-size:11px;color:var(--g500);margin-top:1px}
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;border-bottom:2px solid var(--bk);color:var(--g600);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--g200)}
tr.ck{cursor:pointer}tr.ck:hover td{background:var(--g100)}
/* Tags & badges */
.tg{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;background:var(--bk);color:var(--wh);letter-spacing:.5px;text-transform:uppercase}
.bg{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border:1.5px solid}
.bg-ok{border-color:var(--ok);color:var(--ok)}.bg-bd{border-color:var(--bd);color:var(--bd)}.bg-n{border-color:var(--g300);color:var(--g500)}.bg-wn{border-color:var(--wn);color:var(--wn)}
/* Forms */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:5px;color:var(--g600)}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:2px solid var(--g200);font-family:var(--fa),var(--fb);font-size:13px;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--bk)}
.fg textarea{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
/* Modal */
.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100}
.mo{background:var(--wh);border:2px solid var(--bk);width:92%;max-width:580px;max-height:82vh;overflow-y:auto}
.mo-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:2px solid var(--bk)}
.mo-hd h3{font-family:var(--fh);font-size:22px;letter-spacing:1.5px}
.mo-bd{padding:22px}
.mo-ft{padding:14px 22px;border-top:2px solid var(--g200);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
/* Tabs */
.tabs{display:flex;border-bottom:2px solid var(--bk);margin-bottom:18px;background:var(--wh);overflow-x:auto}
.tab{padding:10px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--g400);white-space:nowrap}
.tab:hover{color:var(--bk)}.tab.on{color:var(--bk);border-bottom-color:var(--bk)}
/* Profile */
.prof-hd{display:flex;gap:20px;align-items:flex-start;padding:20px;background:var(--wh);border:2px solid var(--bk);margin-bottom:20px}
.prof-av{width:70px;height:70px;background:var(--bk);color:var(--wh);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:28px;flex-shrink:0}
.prof-info{flex:1}.prof-info h2{font-family:var(--fh);font-size:26px;letter-spacing:1.5px}
.prof-meta{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;align-items:center}
/* Calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--g200);border:2px solid var(--bk)}
.cal-h{background:var(--bk);color:var(--wh);padding:7px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.cal-c{background:var(--wh);min-height:80px;padding:5px}
.cal-c.om{background:var(--g50);color:var(--g300)}.cal-c.today{box-shadow:inset 0 0 0 2px var(--bk)}
.cal-d{font-size:11px;font-weight:700;margin-bottom:3px}
.cal-e{font-size:9px;padding:2px 3px;margin-bottom:1px;background:var(--bk);color:var(--wh);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.cal-e.completed{background:var(--g300)}.cal-e.cancelled{background:var(--wh);border:1px solid var(--g300);color:var(--g400);text-decoration:line-through}
/* Misc */
.ll{font-family:var(--fh);font-size:20px}.ll.low{color:var(--bd)}.ll.ok{color:var(--wn)}.ll.good{color:var(--ok)}
.rd{width:9px;height:9px;border-radius:50%;background:var(--bd);display:inline-block;margin-left:5px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ri td{opacity:.45}
.nc{width:32px;text-align:center;font-family:var(--fh);font-size:16px;color:var(--g400)}
.ni{padding:10px 14px;border:1px solid var(--g200);margin-bottom:6px;background:var(--wh)}
.ni .nd{font-size:10px;color:var(--g400);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.ni .nt{margin-top:3px;font-size:13px;line-height:1.5}
.ci{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1.5px solid var(--g200);margin-bottom:5px;background:var(--wh);cursor:pointer}
.cb{width:20px;height:20px;border:2px solid var(--bk);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb.on{background:var(--bk);color:var(--wh)}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;font-size:10px;font-weight:600;border:1.5px solid var(--g300);margin:2px;background:var(--wh)}
.chip-x{cursor:pointer;font-weight:700;color:var(--g400);margin-left:3px}.chip-x:hover{color:var(--bd)}
.chip-add{cursor:pointer;border-style:dashed;color:var(--g400)}.chip-add:hover{border-color:var(--bk);color:var(--bk)}
.fu{border:2px dashed var(--g300);padding:16px;text-align:center;cursor:pointer}.fu:hover{border-color:var(--bk)}.fu input{display:none}
.empty{text-align:center;padding:50px 20px;color:var(--g400)}.empty h3{font-family:var(--fh);font-size:22px;color:var(--g300)}.empty p{font-size:13px;margin:6px 0 16px}
.sb-x{display:flex;align-items:center;gap:8px;border:2px solid var(--g200);padding:7px 12px;background:var(--wh)}
.sb-x input{border:none;outline:none;font-size:13px;font-family:var(--fb);width:180px}
/* +/- stepper */
.stepper{display:inline-flex;align-items:center;gap:0;border:2px solid var(--bk)}
.stepper .st-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bk);color:var(--wh);font-size:16px;font-weight:700;border:none;font-family:var(--fb);transition:background .1s}
.stepper .st-btn:hover{background:var(--g700)}
.stepper .st-btn.minus{background:var(--g800)}
.stepper .st-val{min-width:38px;text-align:center;font-family:var(--fh);font-size:20px;padding:0 4px;background:var(--wh)}
/* Progress bar */
.prog{height:6px;background:var(--g200);width:100%;margin-top:4px;overflow:hidden}
.prog-fill{height:100%;transition:width .3s}
.prog-fill.good{background:var(--ok)}.prog-fill.ok{background:var(--wn)}.prog-fill.low{background:var(--bd)}
/* Student card grid */
.stu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.stu-card{background:var(--wh);border:2px solid var(--bk);padding:16px;transition:border-color .15s;cursor:pointer;position:relative}
.stu-card:hover{border-color:var(--g400)}
.stu-card.alert{border-left:4px solid var(--bd)}
.stu-card.inactive{opacity:.5;border-style:dashed}
.stu-card .sc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.stu-card .sc-name{font-weight:700;font-size:15px}
.stu-card .sc-num{font-family:var(--fh);font-size:14px;color:var(--g400);margin-right:6px}
.stu-card .sc-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.stu-card .sc-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.stu-card .sc-stat{padding:6px 8px;background:var(--g50);border:1px solid var(--g200)}
.stu-card .sc-stat .sc-sl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--g500);font-weight:600}
.stu-card .sc-stat .sc-sv{font-family:var(--fh);font-size:22px;margin-top:1px}
.sc-actions{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
/* Quick complete btn */
.btn-done{background:var(--ok);color:#fff;border-color:var(--ok);font-size:10px;padding:4px 10px}.btn-done:hover{background:#008844}
/* Skill bar */
.skill-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.skill-label{width:80px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g600)}
.skill-dots{display:flex;gap:4px}
.skill-dot{width:28px;height:28px;border:2px solid var(--bk);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .15s}
.skill-dot.on{background:var(--bk);color:var(--wh)}
.skill-dot:hover{background:var(--g200)}
.skill-dot.on:hover{background:var(--g700)}
.skill-level{font-size:10px;color:var(--g500);margin-left:6px;min-width:70px}
/* Assessment card */
.assess-card{background:var(--wh);border:2px solid var(--g200);padding:16px;margin-bottom:14px;border-left:4px solid var(--g300)}
.assess-card.private{border-left-color:var(--bd);background:#fffafa}
.assess-card h4{font-family:var(--fh);font-size:16px;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.assess-card textarea{width:100%;padding:9px 11px;border:2px solid var(--g200);font-family:var(--fa),var(--fb);font-size:13px;resize:vertical;min-height:70px;outline:none;line-height:1.6;direction:auto;unicode-bidi:plaintext}
.assess-card textarea:focus{border-color:var(--bk)}
/* Share button */
.btn-share{background:#128C7E;color:#fff;border-color:#128C7E}.btn-share:hover{background:#075E54}
.free-left-stepper{display:inline-flex;align-items:center;gap:0;border:2px solid var(--ok);margin-top:4px}
.free-left-stepper .st-btn{background:var(--ok)}.free-left-stepper .st-btn:hover{background:#008844}
/* Auth screens */
.auth-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bk);font-family:var(--fb)}
.auth-box{background:var(--wh);border:2px solid var(--bk);padding:40px;width:92%;max-width:420px}
.auth-box h1{font-family:var(--fh);font-size:36px;letter-spacing:4px;margin-bottom:4px}
.auth-box .sub{font-size:12px;color:var(--g500);margin-bottom:28px}
.auth-box .fg input{padding:12px 14px;font-size:14px}
.auth-box .error{color:var(--bd);font-size:12px;margin-top:8px;font-weight:600}
.auth-box .success{color:var(--ok);font-size:12px;margin-top:8px;font-weight:600}
.auth-tabs{display:flex;border-bottom:2px solid var(--bk);margin-bottom:20px}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--g400)}
.auth-tab.on{color:var(--bk);border-bottom-color:var(--bk)}
.auth-role-sel{display:flex;gap:10px;margin-bottom:20px}
.auth-role{flex:1;padding:14px;border:2px solid var(--g200);text-align:center;cursor:pointer;transition:all .1s}
.auth-role.on{border-color:var(--bk);background:var(--bk);color:var(--wh)}
.auth-role h4{font-family:var(--fh);font-size:18px;letter-spacing:1px}
.auth-role p{font-size:10px;margin-top:3px;opacity:.7}
/* Student portal */
.stu-portal-hd{padding:20px 28px;background:var(--bk);color:var(--wh);display:flex;align-items:center;justify-content:space-between}
.stu-portal-hd h1{font-family:var(--fh);font-size:22px;letter-spacing:3px}
.portal-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.ai-panel{background:var(--wh);border:2px solid var(--bk);position:sticky;top:20px}
.ai-panel-hd{padding:12px 16px;background:var(--bk);color:var(--wh)}
.ai-task{font-size:12px;line-height:1.7;padding:7px 10px;border-left:3px solid var(--ok);background:var(--g50);margin-bottom:6px}
.ai-chat-msgs{height:200px;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.ai-msg-user{padding:6px 9px;font-size:12px;line-height:1.6;background:var(--g100);align-self:flex-end;max-width:90%}
.ai-msg-ai{padding:6px 9px;font-size:12px;line-height:1.6;background:#f0fff4;align-self:flex-start;max-width:90%;white-space:pre-wrap}
@media(max-width:900px){.portal-grid{grid-template-columns:1fr}}
/* Responsive */
@media(max-width:768px){.app{flex-direction:column}.sb{width:100%;min-width:100%;flex-direction:row;overflow-x:auto;border-bottom:2px solid var(--bk)}.sb-hd{display:none}.sb-nav{display:flex;padding:0;-webkit-overflow-scrolling:touch}.sb-it{padding:10px 14px;border-left:none;border-bottom:3px solid transparent;white-space:nowrap;font-size:11px;gap:6px}.sb-it.on{border-bottom-color:var(--wh);border-left-color:transparent}.sb-it span{display:none}.sb-ft{display:none}.page{padding:14px}.fr,.fr3{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.prof-hd{flex-direction:column;align-items:center;text-align:center}.stu-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import htm from 'https://cdnjs.cloudflare.com/ajax/libs/htm/3.1.1/htm.module.js';
const h = htm.bind(React.createElement);
const {useState, useEffect, useCallback, useRef} = React;

// ═══════════════════════════════════════════════════
// CONFIGURATION — Replace with your Supabase project
// ═══════════════════════════════════════════════════
const SUPABASE_URL = window.__SUPABASE_URL__ || "https://aojfgnpzfqkkvfdtaegd.supabase.co";
const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || "sb_publishable_5DZe9ePFxlV0IkhogzBynw_Weow3Iv0";

// Initialize Supabase client (gracefully degrade if not configured)
let supabase = null;
const supabaseReady = SUPABASE_URL !== "YOUR_SUPABASE_URL" && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";
if (supabaseReady && window.supabase) {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// ─── Helpers ───
const SK = "tutor-v5";
const DATA_VERSION = 3;
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const fmt = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";
const today = () => new Date().toISOString().split("T")[0];

// FIX #10: Configurable currency
const fm = (n, currency) => (currency || "$") + (n||0).toFixed(2);

// FIX #11: Configurable week start (0=Sun, 1=Mon, 6=Sat)
const weekStart = (startDay) => {
  const d = new Date();
  d.setHours(0,0,0,0);
  const day = d.getDay();
  const sd = startDay || 1; // Default Monday
  const diff = (day - sd + 7) % 7;
  d.setDate(d.getDate() - diff);
  return d;
};

// FIX #3: hadLesson only counts COMPLETED lessons
const hadLesson = (sid, lessons, weekStartDay) => lessons.some(l =>
  l.studentId===sid && l.status==="Completed" && new Date(l.date)>=weekStart(weekStartDay)
);

const DEFS = {
  types:["Lebanese","Classical","Quranic","Mixed Dialects"],
  levels:["Beginner","Intermediate","Advanced"],
  payPlans:["Per Lesson","Monthly","Bundle"],
  payMethods:["Cash","Bank Transfer","Online","Other"],
  statuses:["Scheduled","Completed","Cancelled","Missed"],
  brand:"ARABIC TUTOR",
  sub:"Student Management",
  currency:"$",
  weekStartDay:1, // 0=Sun,1=Mon,6=Sat
  msgDay:"Hi {name}, reminder: Arabic lesson tomorrow ({date}) at {time}.",
  msgHour:"Hi {name}, your Arabic lesson starts in 1 hour at {time}.",
  msgGen:"Hi {name}, hope you're well! When would you like your next Arabic lesson?"
};
const DD = {students:[],lessons:[],payments:[],curriculum:[],groups:[],homework:[],settings:{...DEFS},_version:DATA_VERSION};

// ─── IndexedDB Storage ───
const DB_NAME = "TutorDB", DB_STORE = "appdata", DB_KEY = "main";
const DB_FILES_STORE = "files"; // FIX #15: Separate store for file blobs
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 2);
    r.onupgradeneeded = (e) => {
      const db = r.result;
      if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
      if (!db.objectStoreNames.contains(DB_FILES_STORE)) db.createObjectStore(DB_FILES_STORE);
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function dbGet() {
  try { const db = await openDB(); return new Promise(res => { const tx = db.transaction(DB_STORE,"readonly"); const r = tx.objectStore(DB_STORE).get(DB_KEY); r.onsuccess = () => res(r.result||null); r.onerror = () => res(null); }); }
  catch { return null; }
}

function migrateData(data) {

// ─── Free Lesson Helpers ───
const FREE_EXPIRY_WEEKS = 6;
function freeExpiry(s) {
  if (!s.startDate || !(s.freeTotal||0)) return {expired:false, daysLeft:0, expiryDate:null};
  const start = new Date(s.startDate);
  const expiry = new Date(start.getTime() + FREE_EXPIRY_WEEKS * 7 * 86400000);
  const now = new Date();
  const daysLeft = Math.ceil((expiry - now) / 86400000);
  return {expired: daysLeft <= 0, daysLeft: Math.max(0, daysLeft), expiryDate: expiry.toISOString().split("T")[0]};
}
function freeLeft(s) {
  const fe = freeExpiry(s);
  if (fe.expired) return 0;
  return Math.max(0, (s.freeTotal||0) - (s.freeTaken||0));
}

// ─── Skill Helpers ───
const SKILL_LABELS = ["—","Beginner","Developing","Intermediate","Proficient","Advanced"];
const SKILL_COLORS = ["#ccc","#dd2222","#ff8800","#ddaa00","#44aa44","#00aa55"];
function skillAvg(s) { return Math.round(((s.skillReading||3)+(s.skillWriting||3)+(s.skillListening||3)+(s.skillSpeaking||3))/4*10)/10; }

// FIX #6: Attendance & streak only count past completed lessons
function attendanceStats(sid, lessons) {
  const sL = lessons.filter(l => l.studentId === sid);
  // Only count lessons that are in the past or have a definitive status
  const pastLessons = sL.filter(l => l.status === "Completed" || l.status === "Missed" || l.status === "Cancelled");
  const total = pastLessons.length;
  const completed = pastLessons.filter(l => l.status === "Completed").length;
  const missed = pastLessons.filter(l => l.status === "Missed").length;
  const cancelled = pastLessons.filter(l => l.status === "Cancelled").length;
  const rate = total > 0 ? Math.round(completed / total * 100) : 0;
  const dates = pastLessons.filter(l => l.status === "Completed").map(l => new Date(l.date)).sort((a,b) => a-b);
  let perWeek = 0;
  if (dates.length >= 2) {
    const weeks = Math.max(1, (dates[dates.length-1] - dates[0]) / (7 * 86400000));
    perWeek = Math.round(dates.length / weeks * 10) / 10;
  } else if (dates.length === 1) perWeek = 1;
  // FIX: Streak from most recent, only consider past non-Scheduled lessons
  const recent = [...pastLessons].sort((a,b) => new Date(b.date) - new Date(a.date));
  let streak = 0;
  for (const l of recent) { if (l.status === "Completed") streak++; else break; }
  return {total, completed, missed, cancelled, rate, perWeek, streak};
}

function recordSkillSnapshot(s) {
  const hist = s.skillHistory || [];
  const last = hist[hist.length - 1];
  const now = {date: today(), r: s.skillReading||3, w: s.skillWriting||3, l: s.skillListening||3, sp: s.skillSpeaking||3};
  if (!last || last.r!==now.r || last.w!==now.w || last.l!==now.l || last.sp!==now.sp || (new Date()-new Date(last.date))>7*86400000) {
    return [...hist, now].slice(-20);
  }
  return hist;
}

function genEncouragement(s, data) {
  const name = s.name.split(" ")[0];
  const avg = skillAvg(s);
  const taken = s.lessonsTaken + (s.freeTaken||0);
  const cur = data.curriculum||[];
  const assigned = cur.filter(c=>(s.assignedLessons||[]).includes(c.id));
  const doneCount = (s.completedLessons||[]).filter(id=>(s.assignedLessons||[]).includes(id)).length;
  const startD = new Date(s.startDate);
  const weeks = Math.max(1, Math.round((new Date() - startD) / (7*86400000)));
  const att = attendanceStats(s.id, data.lessons);
  const skills = [
    {n:"Reading",v:s.skillReading||3},{n:"Writing",v:s.skillWriting||3},
    {n:"Listening",v:s.skillListening||3},{n:"Speaking",v:s.skillSpeaking||3}
  ].sort((a,b)=>b.v-a.v);
  const best = skills[0];
  const growing = skills[skills.length-1];
  let p = "";
  if (avg >= 4) p += name + " has shown exceptional dedication and growth in Arabic. ";
  else if (avg >= 3) p += name + " is making excellent progress in Arabic and should be very proud of what has been achieved so far. ";
  else p += name + " has been putting in great effort and is building a strong foundation in Arabic. Every lesson brings growth, and the commitment is clear. ";
  if (taken > 0) p += "Over the past " + weeks + " week" + (weeks>1?"s":"") + ", " + name + " has completed " + taken + " lesson" + (taken>1?"s":"") + ". ";
  if (att.rate >= 90 && att.total >= 3) p += "With an outstanding " + att.rate + "% attendance rate, " + name + " shows excellent commitment. ";
  else if (att.rate >= 75 && att.total >= 3) p += name + " maintains a solid " + att.rate + "% attendance rate. ";
  if (att.streak >= 5) p += "Impressively, " + name + " is on a " + att.streak + "-lesson streak! ";
  if (doneCount > 0 && assigned.length > 0) p += doneCount + " out of " + assigned.length + " curriculum topics have been covered — " + (doneCount >= assigned.length ? "an incredible achievement!" : "great momentum!") + " ";
  p += name + "'s strongest area is " + best.n + " (" + SKILL_LABELS[best.v] + "), which is a fantastic foundation to build on. ";
  if (growing.v < best.v) {
    p += growing.n + " is the next area of focus, and with " + name + "'s work ethic, improvement will come naturally. ";
  }
  const hist = s.skillHistory || [];
  if (hist.length >= 2) {
    const first = hist[0], last = hist[hist.length-1];
    const totalGain = (last.r+last.w+last.l+last.sp) - (first.r+first.w+first.l+first.sp);
    if (totalGain > 0) p += "Since starting, " + name + " has improved by " + totalGain + " skill point" + (totalGain>1?"s":"") + " across all areas — clear evidence of dedication. ";
  }
  if (s.teacherSummary) p += s.teacherSummary + " ";
  if (s.teacherStrengths) p += "Key strengths: " + s.teacherStrengths + ". ";
  if (avg >= 4) p += "Keep up the outstanding work — the sky is the limit!";
  else if (avg >= 3) p += "The path forward is bright, and the next level is well within reach!";
  else p += "With continued practice, amazing progress is just ahead. Keep going!";
  return p;
}

    setTimeout(()=>waMsg(s.whatsapp, "Hi " + s.name.split(" ")[0] + "! Here is your Arabic progress report."), 500);
    return;
  }
  doc.save(fileName);
}

// ─── Chip Editor ───
function Chips({items, onUpdate, label}) {
  const [adding, setAdding] = useState(false);
  const [val, setVal] = useState("");
  const ref = useRef(null);
  useEffect(() => { if (adding && ref.current) ref.current.focus(); }, [adding]);
  const add = () => { if (val.trim() && !items.includes(val.trim())) { onUpdate([...items, val.trim()]); setVal(""); setAdding(false); }};
  const rm = i => onUpdate(items.filter((_,idx) => idx !== i));
  return h`<div class="fg"><label>${label}</label><div style=${{display:"flex",flexWrap:"wrap",gap:2,alignItems:"center"}}>
    ${items.map((t,i) => h`<div class="chip" key=${i}>${t}<span class="chip-x" onClick=${()=>rm(i)}>×</span></div>`)}
    ${adding ? h`<div style=${{display:"flex",gap:4,alignItems:"center"}}><input ref=${ref} value=${val} onInput=${e=>setVal(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter")add();if(e.key==="Escape")setAdding(false);}} style=${{padding:"3px 7px",border:"2px solid #000",fontSize:11,width:110,fontFamily:"var(--fb)"}} placeholder="Type & Enter"/><button class="bi" onClick=${add}>${ic('chk')}</button><button class="bi" onClick=${()=>setAdding(false)}>${ic('x')}</button></div>`
    : h`<div class="chip chip-add" onClick=${()=>setAdding(true)}>+ Add</div>`}
  </div></div>`;
}

// AI RIGHT PANEL (sticky sidebar for students)
// ════════════════════════════════════════
function StudentAIPanel({student, data}) {
  const CACHE_KEY = "ai_tasks_" + student.id;
  const CACHE_TTL = 24 * 60 * 60 * 1000; // 24 hours
  const [tasks, setTasks] = useState([]);
  const [tasksLoading, setTasksLoading] = useState(true);
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);

  useEffect(() => {
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const {items, ts} = JSON.parse(cached);
        if (Date.now() - ts < CACHE_TTL && items?.length) { setTasks(items); setTasksLoading(false); return; }
      }
    } catch {}
    loadTasks();
  }, []);

  const loadTasks = async () => {
    setTasksLoading(true);
    const att = attendanceStats(student.id, data.lessons);
    try {
      const res = await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"student_tasks",context:{name:student.name,level:student.level,type:student.type,skillReading:student.skillReading||3,skillWriting:student.skillWriting||3,skillListening:student.skillListening||3,skillSpeaking:student.skillSpeaking||3,goals:student.goals||"",nextSteps:student.nextSteps||"",attendance:att.rate,lessonsTaken:student.lessonsTaken}})});
      const d = await res.json();
      const lines = (d.result||"").split("\n").map(l=>l.trim()).filter(l=>l&&l.length>2);
      setTasks(lines);
      try { localStorage.setItem(CACHE_KEY, JSON.stringify({items:lines,ts:Date.now()})); } catch {}
    } catch(e) { setTasks(["Could not load. Check your connection."]); }
    setTasksLoading(false);
  };

  const send = async () => {
    const msg = input.trim(); if (!msg) return;
    setInput(""); setMsgs(m=>[...m,{r:"user",t:msg}]); setChatLoading(true);
    try {
      const res = await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"student_chat",context:{message:msg,level:student.level,type:student.type,goals:student.goals||""}})});
      const d = await res.json();
      setMsgs(m=>[...m,{r:"ai",t:d.result||d.error||"No response."}]);
    } catch(e) { setMsgs(m=>[...m,{r:"ai",t:"Error: "+e.message}]); }
    setChatLoading(false);
  };

  return h`<div class="ai-panel">
    <div class="ai-panel-hd">
      <div style=${{fontWeight:700,fontSize:13,letterSpacing:1}}>🤖 AI ASSISTANT</div>
      <div style=${{fontSize:10,color:"#aaa",marginTop:2}}>Your personal learning guide</div>
    </div>

    <div style=${{padding:"14px 16px",borderBottom:"2px solid var(--g100)"}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"1.2px",color:"var(--g600)"}}>THIS WEEK'S TASKS</div>
        <button style=${{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"var(--g400)",padding:0}} onClick=${loadTasks} title="Refresh">↻ refresh</button>
      </div>
      ${tasksLoading
        ? h`<div style=${{fontSize:12,color:"var(--g400)",fontStyle:"italic",padding:"10px 0"}}>Generating your tasks...</div>`
        : tasks.length===0
          ? h`<div style=${{fontSize:12,color:"var(--g400)"}}>No tasks yet. Try refreshing.</div>`
          : h`<div>${tasks.map((t,i)=>h`<div key=${i} class="ai-task">${t}</div>`)}</div>`
      }
    </div>

    <div style=${{borderBottom:"2px solid var(--g100)"}}>
      <div style=${{padding:"10px 16px",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"1.2px",color:"var(--g600)"}}>ASK A QUESTION</div>
      <div class="ai-chat-msgs">
        ${msgs.length===0&&h`<p style=${{color:"var(--g400)",fontSize:12,textAlign:"center",marginTop:20}}>Ask me anything about Arabic!</p>`}
        ${msgs.map((m,i)=>h`<div key=${i} class=${m.r==="user"?"ai-msg-user":"ai-msg-ai"}>${m.t}</div>`)}
        ${chatLoading&&h`<div style=${{fontSize:11,color:"var(--g400)",fontStyle:"italic"}}>Thinking...</div>`}
      </div>
      <div style=${{padding:"8px 12px",borderTop:"1px solid var(--g100)",display:"flex",gap:6}}>
        <input style=${{flex:1,padding:"7px 9px",border:"1.5px solid var(--g200)",fontFamily:"var(--fa),var(--fb)",fontSize:12,outline:"none"}} placeholder="Type your question..." value=${input} onInput=${e=>setInput(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter")send();}}/>
        <button class="btn btn-p" style=${{padding:"7px 12px"}} onClick=${send}>${ic('snd')}</button>
      </div>
    </div>
  </div>`;
}

function AuthScreen({onAuth}) {
  const [mode, setMode] = useState("login"); // login | signup
  const [method, setMethod] = useState("email"); // email | phone
  const [role, setRole] = useState("tutor"); // tutor | student
  const [email, setEmail] = useState("");
  const [phone, setPhone] = useState("");
  const [password, setPassword] = useState("");
  const [otp, setOtp] = useState("");
  const [otpSent, setOtpSent] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");

  const handleEmailAuth = async () => {
    setLoading(true); setError(""); setSuccess("");
    try {
      if (supabase) {
        if (mode === "signup") {
          const {error: err} = await supabase.auth.signUp({email, password, options:{data:{role}}});
          if (err) throw err;
          setSuccess("Check your email for a confirmation link!");
        } else {
          const {data, error: err} = await supabase.auth.signInWithPassword({email, password});
          if (err) throw err;
          onAuth({user: data.user, role: data.user.user_metadata?.role || "student"});
        }
      } else {
        // Offline / demo mode
        onAuth({user:{email, id:"local"}, role});
      }
    } catch(e) { setError(e.message || "Authentication failed"); }
    setLoading(false);
  };

  const handlePhoneAuth = async () => {
    setLoading(true); setError(""); setSuccess("");
    try {
      if (supabase) {
        if (!otpSent) {
          const {error: err} = await supabase.auth.signInWithOtp({phone});
          if (err) throw err;
          setOtpSent(true);
          setSuccess("OTP sent to your phone!");
        } else {
          const {data, error: err} = await supabase.auth.verifyOtp({phone, token: otp, type:"sms"});
          if (err) throw err;
          onAuth({user: data.user, role: data.user.user_metadata?.role || "student"});
        }
      } else {
        onAuth({user:{phone, id:"local"}, role});
      }
    } catch(e) { setError(e.message || "Authentication failed"); }
    setLoading(false);
  };

  const skipAuth = () => onAuth({user:{id:"local",email:"demo@local"}, role:"tutor"});

  return h`<div class="auth-wrap">
    <div class="auth-box">
      <h1>ARABIC TUTOR</h1>
      <div class="sub">Student Management System</div>

      ${!supabaseReady && h`<div style=${{padding:"12px",background:"#fff8f0",border:"2px solid var(--wn)",marginBottom:20,fontSize:12}}>
        <b>Demo Mode</b> — Supabase not configured. Data is stored locally in your browser.
        <button class="btn btn-p btn-sm" style=${{marginTop:8,display:"block"}} onClick=${skipAuth}>Enter as Tutor (Demo)</button>
        <button class="btn btn-sm" style=${{marginTop:6,display:"block"}} onClick=${()=>onAuth({user:{id:"demo-student"}, role:"student"})}>Enter as Student (Demo)</button>
      </div>`}

      ${supabaseReady && h`<div>
        <div class="fg"><label>Email</label><input type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="you@example.com"/></div>
        <div class="fg"><label>Password</label><input type="password" value=${password} onInput=${e=>setPassword(e.target.value)} placeholder="Your password"/></div>
        <button class="btn btn-p" style=${{width:"100%",justifyContent:"center",padding:"12px"}} onClick=${handleEmailAuth} disabled=${loading}>
          ${loading?"Please wait...":"Log In"}
        </button>
        <div style=${{marginTop:14,padding:"10px 12px",background:"var(--g50)",border:"1px solid var(--g200)",fontSize:11,color:"var(--g500)",lineHeight:1.6}}>
          No account yet? Contact your tutor — accounts are set up for you.
        </div>
        ${error && h`<div class="error">${error}</div>`}
        ${success && h`<div class="success">${success}</div>`}
      </div>`}
    </div>
  </div>`;
}

        <div class="skill-level" style=${{color:SKILL_COLORS[s[k]||3]}}>${SKILL_LABELS[s[k]||3]}</div>
      </div>`)}

      ${(s.goals || s.nextSteps || s.homeworkNotes) && h`<div class="card" style=${{marginTop:20}}>
        ${s.goals && h`<div style=${{marginBottom:14}}><h3 style=${{fontFamily:"var(--fh)",fontSize:18,color:"#1976d2"}}>MY GOALS</h3><p style=${{fontSize:13,lineHeight:1.7,color:"var(--g600)",marginTop:6}}>${s.goals}</p></div>`}
        ${s.nextSteps && h`<div style=${{marginBottom:14}}><h3 style=${{fontFamily:"var(--fh)",fontSize:18,color:"var(--wn)"}}>NEXT STEPS</h3><p style=${{fontSize:13,lineHeight:1.7,color:"var(--g600)",marginTop:6}}>${s.nextSteps}</p></div>`}
        ${s.homeworkNotes && h`<div><h3 style=${{fontFamily:"var(--fh)",fontSize:18,color:"#7e57c2"}}>HOMEWORK</h3><p style=${{fontSize:13,lineHeight:1.7,color:"var(--g600)",marginTop:6}}>${s.homeworkNotes}</p></div>`}
      </div>`}

      ${pendingHw.length>0&&h`<div style=${{marginTop:14,padding:"12px 16px",background:"#fff8f0",border:"2px solid var(--wn)"}}>
        <div style=${{fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:"1px",color:"var(--wn)",marginBottom:6}}>📋 ${pendingHw.length} Homework Task${pendingHw.length>1?"s":""} Pending</div>
        ${pendingHw.map(hw=>h`<div key=${hw.id} style=${{fontSize:13,padding:"4px 0"}}>• ${hw.title} <span style=${{fontSize:11,color:"var(--g500)"}}>due ${fmt(hw.dueDate)}</span></div>`)}
      </div>`}

      ${sHomework.length>0&&h`<div class="card" style=${{marginTop:14}}>
        <h3>HOMEWORK</h3>
        ${sHomework.map(hw=>h`<div key=${hw.id} style=${{padding:"14px 0",borderBottom:"1px solid var(--g100)"}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
            <div>
              <div style=${{fontWeight:700,fontSize:14}}>${hw.title}</div>
              <div style=${{fontSize:11,color:"var(--g400)",marginTop:2}}>Assigned: ${fmt(hw.assignedDate)} · Due: ${fmt(hw.dueDate)}</div>
            </div>
            <span class=${"bg "+(hw.status==="reviewed"?"bg-ok":hw.status==="submitted"?"bg-wn":"bg-n")}>${hw.status}</span>
          </div>
          ${hw.description&&h`<p style=${{fontSize:13,color:"var(--g600)",marginTop:8,lineHeight:1.6}}>${hw.description}</p>`}
          ${hw.status==="assigned"&&h`<${StudentHwSubmit} hw=${hw} data=${data} setData=${setData}/>`}
          ${(hw.status==="submitted"||hw.status==="reviewed")&&hw.submissionText&&h`<div style=${{marginTop:8,padding:"10px 12px",background:"var(--g50)",border:"1px solid var(--g200)",fontSize:13,lineHeight:1.6}}>
            <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--g500)",marginBottom:4}}>Your Submission</div>
            ${hw.submissionText}
            ${hw.submissionUrl&&h`<div style=${{marginTop:4}}><a href=${hw.submissionUrl} target="_blank" style=${{fontSize:12,color:"var(--ok)"}}>🔗 Attached file</a></div>`}
          </div>`}
          ${hw.status==="reviewed"&&hw.teacherComment&&h`<div style=${{marginTop:8,padding:"10px 12px",background:"#f0fff4",border:"1px solid var(--ok)",fontSize:13,lineHeight:1.6}}>
            <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--ok)",marginBottom:4}}>Teacher Feedback</div>
            ${hw.teacherComment}
          </div>`}
        </div>`)}
      </div>`}

      <div class="card" style=${{marginTop:14}}><h3>RECENT LESSONS</h3>
        ${sLessons.length===0?h`<p style=${{color:"var(--g400)",fontSize:13}}>No lessons yet</p>`:h`<table><thead><tr><th>Date</th><th>Time</th><th>Type</th><th>Status</th></tr></thead><tbody>
          ${sLessons.slice(0,10).map(l=>h`<tr key=${l.id}><td>${fmt(l.date)}</td><td>${l.time}</td><td><span class="tg">${l.type}</span></td><td><span class=${"bg "+(l.status==="Completed"?"bg-ok":"bg-n")}>${l.status}</span></td></tr>`)}
        </tbody></table>`}
      </div>

      <div style=${{textAlign:"center",marginTop:20}}>
        <button class="btn" onClick=${()=>exportProfilePDF(s,data,false)}>${ic('pdf')} Download My Progress Report</button>
      </div>
    </div>

    <${StudentAIPanel} student=${s} data=${data}/>
    </div>
    </div>
  </div>`;
}

// STUDENT PROFILE (teacher view)
// ════════════════════════════════════════
function StudentProfile({data, setData, profileId}) {
  const s = data.students.find(x=>x.id===profileId);
  const [tab, setTab] = useState("overview");
  const [aiResult, setAiResult] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [showHwForm, setShowHwForm] = useState(false);
  const [hwForm, setHwForm] = useState(null);
  const S = data.settings;

  if (!s) return h`<div style=${{padding:40,textAlign:"center",color:"var(--g400)"}}>Student not found.</div>`;

  const upd = (k,v) => setData({...data, students:data.students.map(x=>x.id===s.id?{...x,[k]:v}:x)});
  const sLessons = data.lessons.filter(l=>l.studentId===s.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sHomework = (data.homework||[]).filter(hw=>hw.studentId===s.id).sort((a,b)=>new Date(b.assignedDate)-new Date(a.assignedDate));
  const att = attendanceStats(s.id, data.lessons);

  const runAI = async () => {
    setAiLoading(true); setAiResult("");
    try {
      const res = await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"student_analysis",context:{name:s.name,level:s.level,type:s.type,lessonsTaken:s.lessonsTaken,attendance:att.rate,skillReading:s.skillReading||3,skillWriting:s.skillWriting||3,skillListening:s.skillListening||3,skillSpeaking:s.skillSpeaking||3,goals:s.goals||"",nextSteps:s.nextSteps||"",teacherNotes:s.teacherPrivateNotes||"",homeworkNotes:s.homeworkNotes||""}})});
      const d = await res.json();
      setAiResult(d.result||d.error||"No response from AI.");
    } catch(e) { setAiResult("Error: "+e.message); }
    setAiLoading(false);
  };

  const saveHw = () => {
    if (!hwForm||!hwForm.title.trim()) return;
    const ex=(data.homework||[]).find(x=>x.id===hwForm.id);
    const nHw = ex?data.homework.map(x=>x.id===hwForm.id?{...hwForm}:x):[...(data.homework||[]),{...hwForm,studentId:s.id}];
    setData({...data,homework:nHw}); setShowHwForm(false); setHwForm(null);
  };

  const deleteHw = id => { if(confirm("Delete this homework?")) setData({...data,homework:(data.homework||[]).filter(x=>x.id!==id)}); };

  const sendHwReminder = hw => {
    if(!s.whatsapp) return alert("No WhatsApp number set for this student.");
    waMsg(s.whatsapp,`Hi ${s.name.split(" ")[0]}! 📝 Reminder: You have homework due ${fmt(hw.dueDate)}.\n\nTask: ${hw.title}${hw.description?"\n\n"+hw.description:""}`);
  };

  const draftAiFeedback = async hw => {
    if (!hw.submissionText) return alert("No submission to give feedback on.");
    const btn = document.activeElement; if(btn) btn.textContent="Loading...";
    try {
      const res = await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"homework_feedback",context:{title:hw.title,description:hw.description,submission:hw.submissionText}})});
      const d = await res.json();
      const comment = d.result||d.error||"";
      setData({...data,homework:data.homework.map(x=>x.id===hw.id?{...x,teacherComment:comment}:x)});
    } catch(e) { alert("Error: "+e.message); }
    if(btn) btn.textContent="AI Draft";
  };

  const markReviewed = hw => setData({...data,homework:data.homework.map(x=>x.id===hw.id?{...x,status:"reviewed",reviewedAt:today()}:x)});

  const tabs = [["overview","Overview"],["homework","Homework ("+sHomework.length+")"],["ai","AI Analysis"]];

  return h`<div>
    <div class="prof-hd" style=${{marginBottom:20}}>
      <div class="prof-av">${s.name.charAt(0).toUpperCase()}</div>
      <div class="prof-info">
        <h2>${s.name}</h2>
        <div class="prof-meta"><span class="tg">${s.type}</span><span class="tg" style=${{background:"transparent",color:"var(--bk)",border:"1.5px solid var(--g300)"}}>${s.level}</span><span class=${"bg "+(s.active?"bg-ok":"bg-n")}>${s.active?"Active":"Off"}</span></div>
        ${s.email&&h`<div style=${{fontSize:12,color:"var(--g500)",marginTop:4}}>${s.email}${s.phone?" · "+s.phone:""}</div>`}
      </div>
      <div style=${{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
        <button class="btn btn-sm" onClick=${()=>exportProfilePDF(s,data,false)}>${ic('pdf')} PDF</button>
        ${s.whatsapp&&h`<button class="btn btn-sm btn-share" onClick=${()=>exportProfilePDF(s,data,true)}>${ic('wa')} Share</button>`}
      </div>
    </div>

    <div class="stats" style=${{gridTemplateColumns:"repeat(4,1fr)",marginBottom:20}}>
      <div class="stat"><div class="lb">Lessons Done</div><div class="vl">${s.lessonsTaken}</div></div>
      <div class="stat"><div class="lb">Lessons Left</div><div class=${"vl ll "+((s.lessonsTotal-s.lessonsTaken)<=0?"low":(s.lessonsTotal-s.lessonsTaken)<=2?"ok":"good")}>${s.lessonsTotal-s.lessonsTaken}</div></div>
      <div class="stat"><div class="lb">Attendance</div><div class="vl" style=${{color:att.rate>=80?"var(--ok)":att.rate>=60?"var(--wn)":"var(--bd)"}}>${att.rate}%</div></div>
      <div class="stat"><div class="lb">HW Pending</div><div class="vl" style=${{color:sHomework.filter(x=>x.status==="assigned").length>0?"var(--wn)":"var(--ok)"}}>${sHomework.filter(x=>x.status==="assigned").length}</div></div>
    </div>

    <div class="auth-tabs" style=${{marginBottom:20}}>
      ${tabs.map(([k,l])=>h`<div key=${k} class=${"auth-tab "+(tab===k?"on":"")} onClick=${()=>setTab(k)}>${l}</div>`)}
    </div>

    ${tab==="overview" && h`<div>
      <div class="assess-card">
        <h4>SKILL ASSESSMENT</h4>
        ${[["skillReading","Reading"],["skillWriting","Writing"],["skillListening","Listening"],["skillSpeaking","Speaking"]].map(([k,label])=>h`<div key=${k} class="skill-row">
          <div class="skill-label">${label}</div>
          <div class="skill-dots">${[1,2,3,4,5].map(v=>h`<div key=${v} class=${"skill-dot "+(v<=(s[k]||3)?"on":"")} onClick=${()=>{const hist=recordSkillSnapshot(s);upd("skillHistory",hist);upd(k,v);}}>${v}</div>`)}</div>
          <div class="skill-level" style=${{color:SKILL_COLORS[s[k]||3]}}>${SKILL_LABELS[s[k]||3]}</div>
        </div>`)}
        <div style=${{marginTop:8,fontSize:11,color:"var(--g500)"}}>Overall avg: ${skillAvg(s)} / 5</div>
      </div>

      <div class="assess-card">
        <h4>🎯 Goals & Next Steps</h4>
        <div class="fg"><label>Student Goals</label><textarea value=${s.goals||""} onInput=${e=>upd("goals",e.target.value)} placeholder="What does this student want to achieve?"/></div>
        <div class="fg"><label>Next Steps</label><textarea value=${s.nextSteps||""} onInput=${e=>upd("nextSteps",e.target.value)} placeholder="What are we working on next?"/></div>
      </div>

      <div class="assess-card">
        <h4>📝 Teacher Notes (visible to student in PDF)</h4>
        <div class="fg"><label>Strengths</label><textarea value=${s.teacherStrengths||""} onInput=${e=>upd("teacherStrengths",e.target.value)} placeholder="What is this student good at?"/></div>
        <div class="fg"><label>Areas to Improve</label><textarea value=${s.teacherImprove||""} onInput=${e=>upd("teacherImprove",e.target.value)} placeholder="What needs more work?"/></div>
        <div class="fg"><label>General Summary</label><textarea value=${s.teacherSummary||""} onInput=${e=>upd("teacherSummary",e.target.value)} placeholder="Overall assessment..."/></div>
      </div>

      <div class="assess-card private">
        <h4>🔒 Private Notes (never shared)</h4>
        <textarea value=${s.teacherPrivateNotes||""} onInput=${e=>upd("teacherPrivateNotes",e.target.value)} placeholder="These notes are NOT visible to the student..."/>
      </div>

      <div class="assess-card">
        <h4>📚 Homework Observations</h4>
        <textarea value=${s.homeworkNotes||""} onInput=${e=>upd("homeworkNotes",e.target.value)} placeholder="General homework notes..."/>
      </div>

      <${Chips} items=${s.focusItems||[]} onUpdate=${v=>upd("focusItems",v)} label="Focus Items"/>

      <div class="card" style=${{marginTop:20}}>
        <h3>LESSON HISTORY</h3>
        ${sLessons.length===0?h`<p style=${{color:"var(--g400)",fontSize:13}}>No lessons yet.</p>`:h`<table><thead><tr><th>Date</th><th>Time</th><th>Type</th><th>Status</th><th>Notes</th></tr></thead><tbody>
          ${sLessons.slice(0,15).map(l=>h`<tr key=${l.id}><td>${fmt(l.date)}</td><td>${l.time}</td><td><span class="tg">${l.type}</span></td><td><span class=${"bg "+(l.status==="Completed"?"bg-ok":"bg-n")}>${l.status}</span></td><td style=${{fontSize:12,color:"var(--g500)",maxWidth:200}}>${l.notes||"—"}</td></tr>`)}
        </tbody></table>`}
      </div>
    </div>`}

    ${tab==="homework" && h`<div>
      <div style=${{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
        <button class="btn btn-p" onClick=${()=>{setHwForm(mkHomework(s.id));setShowHwForm(true);}}>${ic('plus')} Assign Homework</button>
      </div>

      ${sHomework.length===0?h`<div class="empty"><h3>NO HOMEWORK</h3><p>Assign the first task to ${s.name}</p></div>`:
      h`<div>${sHomework.map(hw=>h`<div key=${hw.id} class="assess-card" style=${{borderLeftColor:hw.status==="reviewed"?"var(--ok)":hw.status==="submitted"?"var(--wn)":"var(--g300)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div>
            <h4 style=${{marginBottom:4,fontSize:15}}>${hw.title}</h4>
            <div style=${{fontSize:11,color:"var(--g500)"}}>Assigned: ${fmt(hw.assignedDate)} · Due: ${fmt(hw.dueDate)}</div>
            <span class=${"bg "+(hw.status==="reviewed"?"bg-ok":hw.status==="submitted"?"bg-wn":"bg-n")} style=${{marginTop:6,display:"inline-block"}}>${hw.status}</span>
          </div>
          <div style=${{display:"flex",gap:4,flexShrink:0}}>
            ${s.whatsapp&&h`<button class="btn btn-xs btn-wa" onClick=${()=>sendHwReminder(hw)} title="WhatsApp reminder">${ic('wa')}</button>`}
            <button class="bi" onClick=${()=>{setHwForm({...hw});setShowHwForm(true);}}>${ic('edt')}</button>
            <button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>deleteHw(hw.id)}>${ic('del')}</button>
          </div>
        </div>
        ${hw.description&&h`<p style=${{fontSize:13,color:"var(--g600)",marginTop:8,lineHeight:1.6}}>${hw.description}</p>`}
        ${hw.submissionText&&h`<div style=${{marginTop:12,padding:"10px 12px",background:"#f0f7ff",border:"1px solid #c3d9f5"}}>
          <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"#1976d2",marginBottom:4}}>Student Submission</div>
          <p style=${{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>${hw.submissionText}</p>
          ${hw.submissionUrl&&h`<a href=${hw.submissionUrl} target="_blank" style=${{fontSize:12,color:"var(--ok)",display:"block",marginTop:4}}>🔗 Attached file</a>`}
          <div style=${{fontSize:11,color:"var(--g400)",marginTop:4}}>Submitted: ${hw.submittedAt?fmt(hw.submittedAt):"—"}</div>
        </div>`}
        ${hw.status==="submitted"&&h`<div style=${{marginTop:10}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <label style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--g600)"}}>Teacher Comment / Correction</label>
            <button class="btn btn-xs" onClick=${()=>draftAiFeedback(hw)}>🤖 AI Draft</button>
          </div>
          <textarea style=${{width:"100%",padding:"8px 10px",border:"2px solid var(--g200)",fontFamily:"var(--fa),var(--fb)",fontSize:13,resize:"vertical",minHeight:70,boxSizing:"border-box"}} placeholder="Write your feedback..." value=${hw.teacherComment||""} onInput=${e=>{const v=e.target.value;setData({...data,homework:data.homework.map(x=>x.id===hw.id?{...x,teacherComment:v}:x)});}}/>
          <button class="btn btn-p btn-sm" style=${{marginTop:6}} onClick=${()=>markReviewed(hw)}>${ic('chk')} Mark as Reviewed</button>
        </div>`}
        ${hw.status==="reviewed"&&hw.teacherComment&&h`<div style=${{marginTop:10,padding:"10px 12px",background:"#f0fff4",border:"1px solid var(--ok)"}}>
          <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--ok)",marginBottom:4}}>Your Feedback</div>
          <p style=${{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>${hw.teacherComment}</p>
        </div>`}
      </div>`)}</div>`}

      ${showHwForm&&h`<${Modal} title=${hwForm?.id&&(data.homework||[]).find(x=>x.id===hwForm.id)?"EDIT HOMEWORK":"ASSIGN HOMEWORK"} onClose=${()=>setShowHwForm(false)} footer=${h`<button class="btn" onClick=${()=>setShowHwForm(false)}>Cancel</button><button class="btn btn-p" onClick=${saveHw}>Save</button>`}>
        <div class="fg"><label>Title / Task</label><input value=${hwForm?.title||""} onInput=${e=>setHwForm({...hwForm,title:e.target.value})} placeholder="e.g. Write 5 sentences using past tense"/></div>
        <div class="fg"><label>Description / Instructions</label><textarea value=${hwForm?.description||""} onInput=${e=>setHwForm({...hwForm,description:e.target.value})} placeholder="Detailed instructions for the student..."/></div>
        <div class="fr">
          <div class="fg"><label>Due Date</label><input type="date" value=${hwForm?.dueDate||today()} onInput=${e=>setHwForm({...hwForm,dueDate:e.target.value})}/></div>
          <div class="fg"><label>Status</label><select value=${hwForm?.status||"assigned"} onChange=${e=>setHwForm({...hwForm,status:e.target.value})}><option value="assigned">Assigned</option><option value="submitted">Submitted</option><option value="reviewed">Reviewed</option></select></div>
        </div>
      <//>`}
    </div>`}

    ${tab==="ai" && h`<div>
      <div class="assess-card">
        <h4>🤖 AI Student Analysis</h4>
        <p style=${{fontSize:13,color:"var(--g500)",marginBottom:14,lineHeight:1.6}}>Uses Claude AI to analyze ${s.name}'s full profile — skills, attendance, goals, notes — and provide a concise teaching recommendation.</p>
        <button class="btn btn-p" onClick=${runAI} disabled=${aiLoading}>${aiLoading?"Analyzing...":"Run AI Analysis"}</button>
        ${aiResult&&h`<div style=${{marginTop:16,padding:"14px 16px",background:"var(--g50)",border:"2px solid var(--bk)",whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.8,fontFamily:"var(--fb)"}}>${aiResult}</div>`}
      </div>
    </div>`}
  </div>`;
}

// ════════════════════════════════════════
// DASHBOARD (fixed #2: only paid revenue)
// ════════════════════════════════════════
function Dashboard({data}) {
  const {students, lessons, payments, settings: S} = data;
  const CUR = S.currency || "$";
  const active = students.filter(s => s.active);
  const now = new Date();
  const mPay = payments.filter(p => { const d = new Date(p.date); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); });
  // FIX #2: Only count paid payments for revenue
  const mRev = mPay.filter(p=>p.status==="Paid").reduce((a,p) => a+(p.amount||0), 0);
  const wk = lessons.filter(l => new Date(l.date) >= weekStart(S.weekStartDay) && l.status !== "Cancelled");
  const noL = active.filter(s => !hadLesson(s.id, lessons, S.weekStartDay));
  const up = lessons.filter(l => l.status==="Scheduled" && new Date(l.date)>=new Date(today())).sort((a,b) => new Date(a.date)-new Date(b.date)).slice(0,5);

  return h`<div>
    <div class="stats">
      <div class="stat"><div class="lb">Active Students</div><div class="vl">${active.length}</div></div>
      <div class="stat"><div class="lb">This Month (Paid)</div><div class="vl">${fm(mRev, CUR)}</div><div class="su">${mPay.filter(p=>p.status==="Paid").length} payments</div></div>
      <div class="stat"><div class="lb">Lessons This Week</div><div class="vl">${wk.length}</div></div>
      <div class="stat"><div class="lb">No Lesson This Week</div><div class="vl" style=${{color:noL.length?"var(--bd)":"var(--ok)"}}>${noL.length}</div></div>
      <div class="stat"><div class="lb">Avg Attendance</div><div class="vl" style=${{color:(() => { const rates=active.map(s=>attendanceStats(s.id,lessons).rate); const avg=rates.length?Math.round(rates.reduce((a,b)=>a+b,0)/rates.length):0; return avg>=80?"var(--ok)":avg>=60?"var(--wn)":"var(--bd)"; })()}}>${(() => { const rates=active.map(s=>attendanceStats(s.id,lessons).rate); return rates.length?Math.round(rates.reduce((a,b)=>a+b,0)/rates.length):0; })()}%</div><div class="su">across all students</div></div>
    </div>
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <div class="card"><h3>UPCOMING LESSONS</h3>
        ${up.length===0 ? h`<p style=${{color:"var(--g400)",fontSize:13}}>None scheduled</p>` : h`<table><thead><tr><th>Date</th><th>Student</th><th>Time</th><th></th></tr></thead><tbody>
          ${up.map(l => { const st = students.find(x => x.id===l.studentId); return h`<tr key=${l.id}><td style=${{fontWeight:600}}>${fmt(l.date)}</td><td>${st?.name||"Group"}</td><td>${l.time}</td><td style=${{whiteSpace:"nowrap"}}><button class="bi" onClick=${()=>openGcal(l,students)} title="Google Calendar">${ic('gc')}</button>${st?.whatsapp && h`<button class="bi" style=${{color:"#25D366"}} onClick=${()=>waMsg(st.whatsapp,fillMsg(S.msgDay,st,l))} title="WhatsApp">${ic('wa')}</button>`}</td></tr>`; })}
        </tbody></table>`}
      </div>
      <div>

      ${list.map((s,i) => {

// ════════════════════════════════════════
// CALENDAR — FIX #11: configurable week start
// ════════════════════════════════════════
function Calendar({data, setData}) {
  const [mo, setMo] = useState(new Date().getMonth());
  const [yr, setYr] = useState(new Date().getFullYear());
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkLesson(data.settings));
  const S = data.settings;
  const wsd = S.weekStartDay || 1;
  const fd = new Date(yr,mo,1).getDay(), dim = new Date(yr,mo+1,0).getDate(), pd = new Date(yr,mo,0).getDate();
  // FIX #11: Adjust first day offset based on week start
  const offset = (fd - wsd + 7) % 7;
  const cells = []; for(let i=offset-1;i>=0;i--) cells.push({d:pd-i,m:false}); for(let i=1;i<=dim;i++) cells.push({d:i,m:true}); while(cells.length<42) cells.push({d:cells.length-offset-dim+1,m:false});
  const ts = today(), MN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAY_NAMES = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const orderedDays = [...DAY_NAMES.slice(wsd), ...DAY_NAMES.slice(0,wsd)];
  const getLessons = day => { const ds=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0"); return data.lessons.filter(l=>l.date===ds); };

  const doSave = () => {
    if (!form.studentId && !form.groupId) return;
    const ex = data.lessons.find(l=>l.id===form.id);
    let nL = ex ? data.lessons.map(l=>l.id===form.id?{...form}:l) : [...data.lessons,{...form}];
    let nS = data.students;
    if (form.status==="Completed" && ex?.status!=="Completed" && form.studentId) nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTaken:s.lessonsTaken+1}:s);
    if (form.status!=="Completed" && ex?.status==="Completed" && form.studentId) nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTaken:Math.max(0,s.lessonsTaken-1)}:s);
    setData({...data, lessons:nL, students:nS}); setShow(false); setForm(mkLesson(S));
  };
  const doDel = id => { if(confirm("Delete this lesson?")) { setData({...data, lessons:data.lessons.filter(l=>l.id!==id)}); setShow(false); } };

  return h`<div>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
      <div style=${{display:"flex",alignItems:"center",gap:14}}>
        <button class="bi" onClick=${()=>{if(mo===0){setMo(11);setYr(yr-1);}else setMo(mo-1);}}>${icb('cL')}</button>
        <h3 style=${{fontFamily:"var(--fh)",fontSize:26,letterSpacing:2,minWidth:200,textAlign:"center"}}>${MN[mo]} ${yr}</h3>
        <button class="bi" onClick=${()=>{if(mo===11){setMo(0);setYr(yr+1);}else setMo(mo+1);}}>${icb('cR')}</button>
      </div>
      <button class="btn btn-p" onClick=${()=>{setForm(mkLesson(S));setShow(true);}}>${ic('plus')} Add Lesson</button>
    </div>
    <div class="cal">
      ${orderedDays.map(d=>h`<div key=${d} class="cal-h">${d}</div>`)}
      ${cells.map((c,i) => { const ds=c.m?yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(c.d).padStart(2,"0"):""; const dl=c.m?getLessons(c.d):[]; return h`<div key=${i} class=${"cal-c"+(c.m?"":" om")+(ds===ts?" today":"")}>
        <div class="cal-d">${c.d}</div>
        ${dl.map(l=>{const st=data.students.find(s=>s.id===l.studentId);return h`<div key=${l.id} class=${"cal-e "+l.status.toLowerCase()} onClick=${()=>{setForm({...l});setShow(true);}}>${l.time} ${st?.name||"Grp"}</div>`;})}
      </div>`; })}
    </div>
    ${show && h`<${Modal} title=${data.lessons.find(l=>l.id===form.id)?"EDIT LESSON":"ADD LESSON"} onClose=${()=>setShow(false)} footer=${h`
      ${data.lessons.find(l=>l.id===form.id) && h`<button class="btn btn-d btn-sm" onClick=${()=>doDel(form.id)}>Delete</button>`}
      <button class="btn" onClick=${()=>setShow(false)}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>
    `}>
      <div class="fr"><div class="fg"><label>Student</label><select value=${form.studentId} onChange=${e=>setForm({...form,studentId:e.target.value})}><option value="">— Select —</option>${data.students.filter(s=>s.active).map(s=>h`<option key=${s.id} value=${s.id}>${s.name}</option>`)}</select></div><div class="fg"><label>Group</label><select value=${form.groupId} onChange=${e=>setForm({...form,groupId:e.target.value})}><option value="">— None —</option>${(data.groups||[]).map(g=>h`<option key=${g.id} value=${g.id}>${g.name}</option>`)}</select></div></div>
      <div class="fr3"><div class="fg"><label>Date</label><input type="date" value=${form.date} onInput=${e=>setForm({...form,date:e.target.value})}/></div><div class="fg"><label>Time</label><input type="time" value=${form.time} onInput=${e=>setForm({...form,time:e.target.value})}/></div><div class="fg"><label>Duration</label><input type="number" value=${form.duration} onInput=${e=>setForm({...form,duration:+e.target.value})}/></div></div>
      <div class="fr"><div class="fg"><label>Type</label><select value=${form.type} onChange=${e=>setForm({...form,type:e.target.value})}>${S.types.map(t=>h`<option key=${t}>${t}</option>`)}</select></div><div class="fg"><label>Status</label><select value=${form.status} onChange=${e=>setForm({...form,status:e.target.value})}>${S.statuses.map(s=>h`<option key=${s}>${s}</option>`)}</select></div></div>
      <div class="fg"><label>Notes</label><textarea value=${form.notes} onInput=${e=>setForm({...form,notes:e.target.value})}/></div>
    <//>`}
  </div>`;
}
