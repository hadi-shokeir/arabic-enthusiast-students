<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Enthusiast</title>
<meta name="description" content="Your Arabic learning portal with Hadi">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Arabic Enthusiast">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Montserrat:wght@400;600;700;800&family=Raleway:wght@400;600;700;800&family=Playfair+Display:wght@400;600;700&family=Anton&family=Teko:wght@400;500;600;700&family=Russo+One&family=Black+Han+Sans&family=Exo+2:wght@400;600;700;800&family=Orbitron:wght@400;600;700&family=Cinzel:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Lato:wght@400;700&family=Nunito:wght@400;600;700&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&family=Manrope:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&family=Noto+Kufi+Arabic:wght@400;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/htm/3.1.1/htm.module.js" type="module"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bk:#000;--wh:#fff;--g50:#fafafa;--g100:#f0f0f0;--g200:#e0e0e0;--g300:#c0c0c0;--g400:#888;--g500:#666;--g600:#444;--g700:#333;--g800:#1a1a1a;--ok:#00aa55;--wn:#ff8800;--bd:#dd2222;--fh:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;--fa:'Noto Kufi Arabic',sans-serif}
html,body{height:100%}#root{height:100%;overflow:hidden}.student-root ~ * {overflow:auto}
body:has(.student-root){overflow:auto}
#root:has(.student-root){overflow:auto;height:auto}
/* RTL support for Arabic content */
[dir="rtl"]{font-family:var(--fa),var(--fb)}
.ar-text{font-family:var(--fa),var(--fb);direction:rtl;text-align:right}
textarea,input[type="text"],input:not([type]){font-family:var(--fa),var(--fb);direction:auto;unicode-bidi:plaintext}
.app{display:flex;height:100vh;font-family:var(--fb);background:var(--wh);color:var(--bk);overflow:hidden}
/* Sidebar */
.sb{width:220px;min-width:220px;background:var(--bk);color:var(--wh);display:flex;flex-direction:column}
.sb-hd{padding:24px 20px;border-bottom:1px solid var(--g700)}
.sb-hd h1{font-family:var(--fh);font-size:24px;letter-spacing:3px;text-shadow:0 1px 0 #000,0 0 14px rgba(201,146,42,0.5),0 2px 6px rgba(0,0,0,0.9);color:#c9922a}
.sb-hd small{font-size:11px;color:rgba(201,146,42,0.6);display:block;margin-top:4px;text-shadow:0 1px 2px rgba(0,0,0,0.8);font-weight:600;letter-spacing:1.5px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-it{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;border-left:3px solid transparent;color:#ccc;font-size:13px;font-weight:700;transition:background .1s;text-shadow:0 1px 3px rgba(0,0,0,0.9)}
.sb-it:hover{background:rgba(255,255,255,0.06);color:var(--wh)}
.sb-it.on{background:var(--wh);color:var(--bk);border-left-color:#c9922a;font-weight:800;text-shadow:none}
.sb-ft{padding:14px 20px;border-top:1px solid var(--g700);font-size:11px;color:var(--g500);text-shadow:0 1px 2px rgba(0,0,0,0.8)}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:18px 28px;border-bottom:2px solid var(--bk);background:var(--wh);display:flex;align-items:center;gap:12px}
.topbar h2{font-family:var(--fh);font-size:28px;letter-spacing:2px}
.page{flex:1;overflow-y:auto;padding:24px 28px;background:var(--g50)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;font-family:var(--fb);font-size:12px;font-weight:600;border:2px solid var(--bk);cursor:pointer;text-transform:uppercase;letter-spacing:.8px;background:var(--wh);color:var(--bk);transition:all .1s}
.btn:hover{background:var(--g100)}.btn-p{background:var(--bk);color:var(--wh)}.btn-p:hover{background:var(--g700)}
.btn-d{border-color:var(--bd);color:var(--bd)}.btn-d:hover{background:var(--bd);color:#fff}
.btn-wa{background:#25D366;color:#fff;border-color:#25D366}.btn-wa:hover{background:#1ebe5d}
.btn-sm{padding:5px 10px;font-size:10px}.btn-xs{padding:3px 8px;font-size:10px}
.bi{padding:6px;border:none;background:none;cursor:pointer;color:var(--g500);display:inline-flex}.bi:hover{color:var(--bk)}
/* Cards */
.card{background:var(--wh);border:2px solid var(--bk);padding:18px;margin-bottom:14px}
.card h3{font-family:var(--fh);font-size:20px;letter-spacing:1.5px;margin-bottom:12px}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--wh);border:2px solid var(--bk);padding:16px}
.stat .lb{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--g500);font-weight:600}
.stat .vl{font-family:var(--fh);font-size:36px;margin-top:2px}
.stat .su{font-size:11px;color:var(--g500);margin-top:1px}
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;border-bottom:2px solid var(--bk);color:var(--g600);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--g200)}
tr.ck{cursor:pointer}tr.ck:hover td{background:var(--g100)}
/* Tags & badges */
.tg{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;background:var(--bk);color:var(--wh);letter-spacing:.5px;text-transform:uppercase}
.bg{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border:1.5px solid}
.bg-ok{border-color:var(--ok);color:var(--ok)}.bg-bd{border-color:var(--bd);color:var(--bd)}.bg-n{border-color:var(--g300);color:var(--g500)}.bg-wn{border-color:var(--wn);color:var(--wn)}
/* Forms */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:5px;color:var(--g600)}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:2px solid var(--g200);font-family:var(--fa),var(--fb);font-size:13px;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--bk)}
.fg textarea{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
/* Modal */
.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100}
.mo{background:var(--wh);border:2px solid var(--bk);width:92%;max-width:580px;max-height:82vh;overflow-y:auto}
.mo-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:2px solid var(--bk)}
.mo-hd h3{font-family:var(--fh);font-size:22px;letter-spacing:1.5px}
.mo-bd{padding:22px}
.mo-ft{padding:14px 22px;border-top:2px solid var(--g200);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
/* Tabs */
.tabs{display:flex;border-bottom:2px solid var(--bk);margin-bottom:18px;background:var(--wh);overflow-x:auto}
.tab{padding:10px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--g400);white-space:nowrap}
.tab:hover{color:var(--bk)}.tab.on{color:var(--bk);border-bottom-color:var(--bk)}
/* Profile */
.prof-hd{display:flex;gap:20px;align-items:flex-start;padding:20px;background:var(--wh);border:2px solid var(--bk);margin-bottom:20px}
.prof-av{width:70px;height:70px;background:var(--bk);color:var(--wh);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:28px;flex-shrink:0}
.prof-info{flex:1}.prof-info h2{font-family:var(--fh);font-size:26px;letter-spacing:1.5px}
.prof-meta{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;align-items:center}
/* Calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--g200);border:2px solid var(--bk)}
.cal-h{background:var(--bk);color:var(--wh);padding:7px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.cal-c{background:var(--wh);min-height:80px;padding:5px}
.cal-c.om{background:var(--g50);color:var(--g300)}.cal-c.today{box-shadow:inset 0 0 0 2px var(--bk)}
.cal-d{font-size:11px;font-weight:700;margin-bottom:3px}
.cal-e{font-size:9px;padding:2px 3px;margin-bottom:1px;background:var(--bk);color:var(--wh);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.cal-e.completed{background:var(--g300)}.cal-e.cancelled{background:var(--wh);border:1px solid var(--g300);color:var(--g400);text-decoration:line-through}
/* Misc */
.ll{font-family:var(--fh);font-size:20px}.ll.low{color:var(--bd)}.ll.ok{color:var(--wn)}.ll.good{color:var(--ok)}
.rd{width:9px;height:9px;border-radius:50%;background:var(--bd);display:inline-block;margin-left:5px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ri td{opacity:.45}
.nc{width:32px;text-align:center;font-family:var(--fh);font-size:16px;color:var(--g400)}
.ni{padding:10px 14px;border:1px solid var(--g200);margin-bottom:6px;background:var(--wh)}
.ni .nd{font-size:10px;color:var(--g400);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.ni .nt{margin-top:3px;font-size:13px;line-height:1.5}
.ci{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1.5px solid var(--g200);margin-bottom:5px;background:var(--wh);cursor:pointer}
.cb{width:20px;height:20px;border:2px solid var(--bk);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb.on{background:var(--bk);color:var(--wh)}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;font-size:10px;font-weight:600;border:1.5px solid var(--g300);margin:2px;background:var(--wh)}
.chip-x{cursor:pointer;font-weight:700;color:var(--g400);margin-left:3px}.chip-x:hover{color:var(--bd)}
.chip-add{cursor:pointer;border-style:dashed;color:var(--g400)}.chip-add:hover{border-color:var(--bk);color:var(--bk)}
.fu{border:2px dashed var(--g300);padding:16px;text-align:center;cursor:pointer}.fu:hover{border-color:var(--bk)}.fu input{display:none}
.empty{text-align:center;padding:50px 20px;color:var(--g400)}.empty h3{font-family:var(--fh);font-size:22px;color:var(--g300)}.empty p{font-size:13px;margin:6px 0 16px}
.sb-x{display:flex;align-items:center;gap:8px;border:2px solid var(--g200);padding:7px 12px;background:var(--wh)}
.sb-x input{border:none;outline:none;font-size:13px;font-family:var(--fb);width:180px}
/* +/- stepper */
.stepper{display:inline-flex;align-items:center;gap:0;border:2px solid var(--bk)}
.stepper .st-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bk);color:var(--wh);font-size:16px;font-weight:700;border:none;font-family:var(--fb);transition:background .1s}
.stepper .st-btn:hover{background:var(--g700)}
.stepper .st-btn.minus{background:var(--g800)}
.stepper .st-val{min-width:38px;text-align:center;font-family:var(--fh);font-size:20px;padding:0 4px;background:var(--wh)}
/* Progress bar */
.prog{height:6px;background:var(--g200);width:100%;margin-top:4px;overflow:hidden}
.prog-fill{height:100%;transition:width .3s}
.prog-fill.good{background:var(--ok)}.prog-fill.ok{background:var(--wn)}.prog-fill.low{background:var(--bd)}
/* Student card grid */
.stu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.stu-card{background:var(--wh);border:2px solid var(--bk);padding:16px;transition:border-color .15s;cursor:pointer;position:relative}
.stu-card:hover{border-color:var(--g400)}
.stu-card.alert{border-left:4px solid var(--bd)}
.stu-card.inactive{opacity:.5;border-style:dashed}
.stu-card .sc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.stu-card .sc-name{font-weight:700;font-size:15px}
.stu-card .sc-num{font-family:var(--fh);font-size:14px;color:var(--g400);margin-right:6px}
.stu-card .sc-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.stu-card .sc-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.stu-card .sc-stat{padding:6px 8px;background:var(--g50);border:1px solid var(--g200)}
.stu-card .sc-stat .sc-sl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--g500);font-weight:600}
.stu-card .sc-stat .sc-sv{font-family:var(--fh);font-size:22px;margin-top:1px}
.sc-actions{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
/* Quick complete btn */
.btn-done{background:var(--ok);color:#fff;border-color:var(--ok);font-size:10px;padding:4px 10px}.btn-done:hover{background:#008844}
/* Skill bar */
.skill-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.skill-label{width:80px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g600)}
.skill-dots{display:flex;gap:4px}
.skill-dot{width:28px;height:28px;border:2px solid var(--bk);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .15s}
.skill-dot.on{background:var(--bk);color:var(--wh)}
.skill-dot:hover{background:var(--g200)}
.skill-dot.on:hover{background:var(--g700)}
.skill-level{font-size:10px;color:var(--g500);margin-left:6px;min-width:70px}
/* Assessment card */
.assess-card{background:var(--wh);border:2px solid var(--g200);padding:16px;margin-bottom:14px;border-left:4px solid var(--g300)}
.assess-card.private{border-left-color:var(--bd);background:#fffafa}
.assess-card h4{font-family:var(--fh);font-size:16px;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.assess-card textarea{width:100%;padding:9px 11px;border:2px solid var(--g200);font-family:var(--fa),var(--fb);font-size:13px;resize:vertical;min-height:70px;outline:none;line-height:1.6;direction:auto;unicode-bidi:plaintext}
.assess-card textarea:focus{border-color:var(--bk)}
/* Share button */
.btn-share{background:#128C7E;color:#fff;border-color:#128C7E}.btn-share:hover{background:#075E54}
.free-left-stepper{display:inline-flex;align-items:center;gap:0;border:2px solid var(--ok);margin-top:4px}
.free-left-stepper .st-btn{background:var(--ok)}.free-left-stepper .st-btn:hover{background:#008844}
/* Auth screens */
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bk);font-family:var(--fb);padding:16px;box-sizing:border-box;overflow-y:auto}
.auth-box{background:var(--wh);border:2px solid var(--bk);padding:40px;width:100%;max-width:420px}
.auth-box h1{font-family:var(--fh);font-size:36px;letter-spacing:4px;margin-bottom:4px}
.auth-box .sub{font-size:12px;color:var(--g500);margin-bottom:28px}
.auth-box .fg input{padding:12px 14px;font-size:14px}
.auth-box .error{color:var(--bd);font-size:12px;margin-top:8px;font-weight:600}
.auth-box .success{color:var(--ok);font-size:12px;margin-top:8px;font-weight:600}
.auth-tabs{display:flex;border-bottom:2px solid var(--bk);margin-bottom:20px}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--g400)}
.auth-tab.on{color:var(--bk);border-bottom-color:var(--bk)}
.auth-role-sel{display:flex;gap:10px;margin-bottom:20px}
.auth-role{flex:1;padding:14px;border:2px solid var(--g200);text-align:center;cursor:pointer;transition:all .1s}
.auth-role.on{border-color:var(--bk);background:var(--bk);color:var(--wh)}
.auth-role h4{font-family:var(--fh);font-size:18px;letter-spacing:1px}
.auth-role p{font-size:10px;margin-top:3px;opacity:.7}
/* Student portal */
.stu-portal-hd{padding:20px 28px;background:#fff;color:#111;border-bottom:2px solid #eee;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.stu-portal-hd h1{font-family:var(--fh);font-size:22px;letter-spacing:3px;color:#111}
.portal-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.ai-panel{background:var(--wh);border:2px solid var(--bk);position:sticky;top:20px;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.ai-panel-hd{padding:12px 16px;background:var(--bk);color:var(--wh)}
.ai-task{font-size:12px;line-height:1.7;padding:7px 10px;border-left:3px solid var(--ok);background:var(--g50);margin-bottom:6px}
.ai-chat-msgs{height:200px;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.ai-msg-user{padding:8px 12px;font-size:12px;line-height:1.6;background:var(--g100);align-self:flex-end;max-width:90%;border-radius:16px 16px 4px 16px}
.ai-msg-ai{padding:8px 12px;font-size:12px;line-height:1.6;background:#f0fff4;align-self:flex-start;max-width:90%;white-space:pre-wrap;border-radius:16px 16px 16px 4px}
@media(max-width:900px){.portal-grid{grid-template-columns:1fr}}

/* ── Mobile — admin panel ── */
@media(max-width:768px){
  /* App shell */
  .app{flex-direction:column}
  .sb{width:100%;min-width:100%;flex-direction:column;border-bottom:2px solid var(--bk);flex-shrink:0}
  .sb-hd{display:none}
  .sb-nav{display:flex;flex-direction:row;padding:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .sb-nav::-webkit-scrollbar{display:none}
  .sb-it{padding:8px 10px;border-left:none;border-bottom:3px solid transparent;white-space:nowrap;font-size:10px;font-weight:700;gap:3px;flex-shrink:0;flex-direction:column;align-items:center;min-width:56px;text-align:center}
  .sb-it svg{width:18px;height:18px}
  .sb-it span{display:block;font-size:9px;margin-top:2px;letter-spacing:.3px}
  .sb-it.on{border-bottom-color:var(--wh);border-left-color:transparent;background:rgba(255,255,255,0.12)}
  .sb-ft{display:none}
  .main{flex:1;overflow:hidden}
  /* Page */
  .topbar{padding:10px 14px;gap:8px}
  .topbar h2{font-size:16px;letter-spacing:1px}
  .page{padding:10px 10px;padding-bottom:24px}
  .card{padding:12px}
  /* Grids — collapse to single column; !important overrides inline styles */
  .fr,.fr3{grid-template-columns:1fr !important}
  .stats{grid-template-columns:1fr 1fr !important}
  .sc-stats{grid-template-columns:1fr 1fr !important}
  .stu-grid{grid-template-columns:1fr}
  /* 2-col dashboard/profile grids → 1 col */
  .dash-two-col,.prof-two-col{grid-template-columns:1fr !important}
  /* Profile header */
  .prof-hd{flex-direction:column;align-items:center;text-align:center}
  /* Modals */
  .mo{width:98%;max-height:92vh}
  .mo-bd{padding:12px}
  .mo-ft{padding:10px 12px;gap:8px}
  /* Auth */
  .auth-box{padding:20px 16px}
  /* Tables: smaller text, horizontal scroll */
  table{font-size:11px}
  td,th{padding:5px 6px}
  .tbl-wrap{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
  .card > div > table,.card > table,.tbl-wrap > table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  /* Calendar — fit 7 cols on phone */
  .cal-h{font-size:8px !important;padding:5px 2px !important;letter-spacing:0 !important}
  .cal-c{min-height:44px !important;padding:3px !important}
  .cal-d{font-size:10px}

// ─── IndexedDB Storage ───
const DB_NAME = "TutorDB", DB_STORE = "appdata", DB_KEY = "main";
const DB_FILES_STORE = "files"; // FIX #15: Separate store for file blobs
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 2);
    r.onupgradeneeded = (e) => {
      const db = r.result;
      if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
      if (!db.objectStoreNames.contains(DB_FILES_STORE)) db.createObjectStore(DB_FILES_STORE);
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function dbGet() {
  try { const db = await openDB(); return new Promise(res => { const tx = db.transaction(DB_STORE,"readonly"); const r = tx.objectStore(DB_STORE).get(DB_KEY); r.onsuccess = () => res(r.result||null); r.onerror = () => res(null); }); }
  catch { return null; }
}
async function dbSet(data) {
  try { const db = await openDB(); return new Promise((res,rej) => { const tx = db.transaction(DB_STORE,"readwrite"); tx.objectStore(DB_STORE).put(data, DB_KEY); tx.oncomplete = () => res(true); tx.onerror = () => rej(tx.error); }); }
  catch(e) { console.error("Save failed:", e); }
}

// FIX #14: Flush save immediately on beforeunload, debounce otherwise

window.addEventListener("beforeunload", () => {

// FIX #16: Data migration
function migrateData(data) {
  if (!data) return {...DD};
  const v = data._version || 1;
  let d = {...DD, ...data, settings:{...DEFS,...(data.settings||{})}};
  if (v < 2) {
    if (!d.settings.currency) d.settings.currency = "$";
    if (d.settings.weekStartDay === undefined) d.settings.weekStartDay = 1;
  }
  if (v < 3) {
    if (!d.homework) d.homework = [];
  }
  if (v < 4) {
    // Rename Lebanese → Levantine everywhere
    if (d.settings.types) d.settings.types = d.settings.types.map(t => t === "Lebanese" ? "Levantine" : t);
    d.students = (d.students||[]).map(s => s.type === "Lebanese" ? {...s, type:"Levantine"} : s);
    d.lessons = (d.lessons||[]).map(l => l.type === "Lebanese" ? {...l, type:"Levantine"} : l);
    d.groups = (d.groups||[]).map(g => g.type === "Lebanese" ? {...g, type:"Levantine"} : g);
    d._version = DATA_VERSION;
  }
  if (v < 5) {
    if (d.settings.types && !d.settings.types.includes("General Dialect")) {
      d.settings.types = [...d.settings.types, "General Dialect"];
    }
    d._version = DATA_VERSION;
  }
  if (v < 6) {
    if (!d.lessonRequests) d.lessonRequests = [];
    d._version = DATA_VERSION;
  }
  if (v < 7) {
    // Remove "Mixed Dialects" from types
    if (d.settings.types) d.settings.types = d.settings.types.filter(t => t !== "Mixed Dialects");
    d._version = DATA_VERSION;
  }
  if (v < 8) {
    if (d.settings.types && !d.settings.types.includes("Quranic + Dialect")) {
      d.settings.types = [...d.settings.types, "Quranic + Dialect"];
    }
    d._version = DATA_VERSION;
  }
  if (v < 9) {
    // Force brand to Arabic Enthusiast if still using old name
    if (d.settings.brand && d.settings.brand.toLowerCase().includes("tutor")) {
      d.settings.brand = "ARABIC ENTHUSIAST";
    }
    if (!d.settings.sub || d.settings.sub.toLowerCase().includes("tutor")) {
      d.settings.sub = "Student Management";
    }
    d._version = DATA_VERSION;
  }
  if (v < 10) {
    if (!d.settings.availability) d.settings.availability = {};
    d._version = DATA_VERSION;
  }
  if (v < 11) {
    // Convert old array-style availability to new object-by-day format
    const defaultAvail = {0:{enabled:false,ranges:[]},1:{enabled:false,ranges:[]},2:{enabled:false,ranges:[]},3:{enabled:false,ranges:[]},4:{enabled:false,ranges:[]},5:{enabled:false,ranges:[]},6:{enabled:false,ranges:[]}};
    if (!d.settings.availability || Array.isArray(d.settings.availability)) {
      // Old format was an array of slots — reset to empty (user sets again)
      d.settings.availability = defaultAvail;
    } else {
      // Fill missing days
      for (let i = 0; i <= 6; i++) {
        if (!d.settings.availability[i]) d.settings.availability[i] = {enabled:false,ranges:[]};
      }
    }
    if (!d.settings.lessonDuration) d.settings.lessonDuration = 60;
    d._version = DATA_VERSION;
  }
  return d;
}

// ─── Free Lesson Helpers ───
const FREE_EXPIRY_WEEKS = 6;
function freeExpiry(s) {
  if (!s.startDate || !(s.freeTotal||0)) return {expired:false, daysLeft:0, expiryDate:null};
  const start = new Date(s.startDate);
  const expiry = new Date(start.getTime() + FREE_EXPIRY_WEEKS * 7 * 86400000);
  const now = new Date();
  const daysLeft = Math.ceil((expiry - now) / 86400000);
  return {expired: daysLeft <= 0, daysLeft: Math.max(0, daysLeft), expiryDate: expiry.toISOString().split("T")[0]};
}
function freeLeft(s) {
  const fe = freeExpiry(s);
  if (fe.expired) return 0;
  return Math.max(0, (s.freeTotal||0) - (s.freeTaken||0));
}

// ─── Skill Helpers ───
const SKILL_LABELS = ["—","Beginner","Developing","Intermediate","Proficient","Advanced"];
const SKILL_COLORS = ["#ccc","#dd2222","#ff8800","#ddaa00","#44aa44","#00aa55"];
function skillAvg(s) { return Math.round(((s.skillReading||3)+(s.skillWriting||3)+(s.skillListening||3)+(s.skillSpeaking||3))/4*10)/10; }

// FIX #6: Attendance & streak only count past completed lessons
function attendanceStats(sid, lessons) {
  const sL = lessons.filter(l => l.studentId === sid);
  // Only count lessons that are in the past or have a definitive status
  const pastLessons = sL.filter(l => l.status === "Completed" || l.status === "Missed" || l.status === "Cancelled");
  const total = pastLessons.length;
  const completed = pastLessons.filter(l => l.status === "Completed").length;
  const missed = pastLessons.filter(l => l.status === "Missed").length;
  const cancelled = pastLessons.filter(l => l.status === "Cancelled").length;
  const rate = total > 0 ? Math.round(completed / total * 100) : 0;
  const dates = pastLessons.filter(l => l.status === "Completed").map(l => new Date(l.date)).sort((a,b) => a-b);
  let perWeek = 0;
  if (dates.length >= 2) {
    const weeks = Math.max(1, (dates[dates.length-1] - dates[0]) / (7 * 86400000));
    perWeek = Math.round(dates.length / weeks * 10) / 10;
  } else if (dates.length === 1) perWeek = 1;
  // FIX: Streak from most recent, only consider past non-Scheduled lessons
  const recent = [...pastLessons].sort((a,b) => new Date(b.date) - new Date(a.date));
  let streak = 0;
  for (const l of recent) { if (l.status === "Completed") streak++; else break; }
  return {total, completed, missed, cancelled, rate, perWeek, streak};
}

function recordSkillSnapshot(s) {
  const hist = s.skillHistory || [];
  const last = hist[hist.length - 1];
  const now = {date: today(), r: s.skillReading||3, w: s.skillWriting||3, l: s.skillListening||3, sp: s.skillSpeaking||3};
  if (!last || last.r!==now.r || last.w!==now.w || last.l!==now.l || last.sp!==now.sp || (new Date()-new Date(last.date))>7*86400000) {
    return [...hist, now].slice(-20);
  }
  return hist;
}

function genEncouragement(s, data) {
  const name = s.name.split(" ")[0];
  const avg = skillAvg(s);
  const taken = s.lessonsTaken + (s.freeTaken||0);
  const cur = data.curriculum||[];
  const assigned = cur.filter(c=>(s.assignedLessons||[]).includes(c.id));
  const doneCount = (s.completedLessons||[]).filter(id=>(s.assignedLessons||[]).includes(id)).length;
  const startD = new Date(s.startDate);
  const weeks = Math.max(1, Math.round((new Date() - startD) / (7*86400000)));
  const att = attendanceStats(s.id, data.lessons);
  const skills = [
    {n:"Reading",v:s.skillReading||3},{n:"Writing",v:s.skillWriting||3},
    {n:"Listening",v:s.skillListening||3},{n:"Speaking",v:s.skillSpeaking||3}
  ].sort((a,b)=>b.v-a.v);
  const best = skills[0];
  const growing = skills[skills.length-1];
  let p = "";
  if (avg >= 4) p += name + " has shown exceptional dedication and growth in Arabic. ";
  else if (avg >= 3) p += name + " is making excellent progress in Arabic and should be very proud of what has been achieved so far. ";
  else p += name + " has been putting in great effort and is building a strong foundation in Arabic. Every lesson brings growth, and the commitment is clear. ";
  if (taken > 0) p += "Over the past " + weeks + " week" + (weeks>1?"s":"") + ", " + name + " has completed " + taken + " lesson" + (taken>1?"s":"") + ". ";
  if (att.rate >= 90 && att.total >= 3) p += "With an outstanding " + att.rate + "% attendance rate, " + name + " shows excellent commitment. ";
  else if (att.rate >= 75 && att.total >= 3) p += name + " maintains a solid " + att.rate + "% attendance rate. ";
  if (att.streak >= 5) p += "Impressively, " + name + " is on a " + att.streak + "-lesson streak! ";
  if (doneCount > 0 && assigned.length > 0) p += doneCount + " out of " + assigned.length + " curriculum topics have been covered — " + (doneCount >= assigned.length ? "an incredible achievement!" : "great momentum!") + " ";
  p += name + "'s strongest area is " + best.n + " (" + SKILL_LABELS[best.v] + "), which is a fantastic foundation to build on. ";
  if (growing.v < best.v) {
    p += growing.n + " is the next area of focus, and with " + name + "'s work ethic, improvement will come naturally. ";
  }
  const hist = s.skillHistory || [];
  if (hist.length >= 2) {
    const first = hist[0], last = hist[hist.length-1];
    const totalGain = (last.r+last.w+last.l+last.sp) - (first.r+first.w+first.l+first.sp);
    if (totalGain > 0) p += "Since starting, " + name + " has improved by " + totalGain + " skill point" + (totalGain>1?"s":"") + " across all areas — clear evidence of dedication. ";
  }
  if (s.teacherSummary) p += s.teacherSummary + " ";
  if (s.teacherStrengths) p += "Key strengths: " + s.teacherStrengths + ". ";
  if (avg >= 4) p += "Keep up the outstanding work — the sky is the limit!";
  else if (avg >= 3) p += "The path forward is bright, and the next level is well within reach!";
  else p += "With continued practice, amazing progress is just ahead. Keep going!";
  return p;
}

    ${payment.notes ? `<div class="row"><span class="label">Notes</span><span>${payment.notes}</span></div>` : ""}

// FIX #5: PDF with Arabic font support
function exportProfilePDF(s, data, shareWA) {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  const W = doc.internal.pageSize.getWidth();
  const CUR = data.settings.currency || "$";
  const sLessons = data.lessons.filter(l=>l.studentId===s.id&&l.status==="Completed").sort((a,b)=>new Date(b.date)-new Date(a.date));
  const cur = data.curriculum||[];
  const assigned = cur.filter(c=>(s.assignedLessons||[]).includes(c.id));
  const completed = (s.completedLessons||[]);
  const doneCount = assigned.filter(c=>completed.includes(c.id)).length;
  const totalTaken = s.lessonsTaken + (s.freeTaken||0);
  const att = attendanceStats(s.id, data.lessons);
  let y = 20;
  const ln = (inc=6) => { y+=inc; if(y>275){doc.addPage();y=20;} };

  // Note: For full Arabic text support in PDF, you would need to embed an Arabic font.
  // jsPDF's default Helvetica does not support Arabic glyphs.
  // The workaround below uses the built-in font for Latin text.
  // For production, load a custom font: doc.addFont('NotoKufiArabic-Regular.ttf', 'NotoKufi', 'normal');

  doc.setFillColor(0,0,0);
  doc.rect(0,0,W,42,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(24);
  doc.setFont("helvetica","bold");
  doc.text(data.settings.brand || "ARABIC ENTHUSIAST", 14, 20);
  doc.setFontSize(11);
  doc.setFont("helvetica","normal");
  doc.text("Student Progress Report", 14, 30);
  doc.setFontSize(9);
  doc.text(new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"}), W-14, 30, {align:"right"});
  doc.setTextColor(0,0,0);
  y = 54;

  doc.setFontSize(20);
  doc.setFont("helvetica","bold");
  doc.text(s.name, 14, y);
  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.setTextColor(100);
  doc.text(s.type + "  |  " + s.level + "  |  Started " + fmt(s.startDate), 14, y+8);
  y += 18;

  doc.setDrawColor(0,170,85); doc.setLineWidth(0.8);
  doc.line(14, y, 18, y);
  y += 6;
  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.setTextColor(30,30,30);
  const summary = genEncouragement(s, data);
  const sumLines = doc.splitTextToSize(summary, W-32);
  sumLines.forEach(line => { doc.text(line, 16, y); ln(5); });
  ln(4);

  doc.setDrawColor(0); doc.setLineWidth(0.5);
  doc.line(14, y, W-14, y); ln(8);
  doc.setFontSize(13); doc.setFont("helvetica","bold"); doc.setTextColor(0);
  doc.text("ATTENDANCE & CONSISTENCY", 14, y); ln(10);

  const attBoxW = (W-38)/4;
  const attBoxes = [
    {label:"ATTENDANCE RATE", val: att.rate+"%", color: att.rate>=90?[0,170,85]:att.rate>=75?[255,136,0]:[221,34,34]},
    {label:"LESSONS/WEEK", val: att.perWeek.toFixed(1), color: att.perWeek>=2?[0,170,85]:att.perWeek>=1?[255,136,0]:[221,34,34]},
    {label:"CURRENT STREAK", val: String(att.streak), color: att.streak>=5?[0,170,85]:att.streak>=3?[255,136,0]:[100,100,100]},
    {label:"TOTAL COMPLETED", val: String(att.completed), color: [0,0,0]},
  ];
  attBoxes.forEach((b,i) => {
    const bx = 14 + i*(attBoxW+5);
    doc.setFillColor(245,245,245);
    doc.rect(bx, y, attBoxW, 24, "F");
    doc.setDrawColor(b.color[0],b.color[1],b.color[2]); doc.setLineWidth(1.5);
    doc.line(bx, y, bx, y+24);
    doc.setDrawColor(0); doc.setLineWidth(0.5);
    doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(120);
    doc.text(b.label, bx+6, y+7);
    doc.setFontSize(18); doc.setFont("helvetica","bold"); doc.setTextColor(b.color[0],b.color[1],b.color[2]);
    doc.text(b.val, bx+6, y+20);
  });
  y += 32;
  if (att.missed > 0 || att.cancelled > 0) {
    doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(120);
    doc.text("Missed: " + att.missed + "  |  Cancelled: " + att.cancelled + "  |  Total scheduled: " + att.total, 18, y);
    ln(8);
  }

  // Skill ratings
  doc.setDrawColor(0); doc.setLineWidth(0.5);
  doc.line(14, y, W-14, y); ln(8);
  doc.setFontSize(13); doc.setFont("helvetica","bold"); doc.setTextColor(0);
  doc.text("SKILL ASSESSMENT", 14, y); ln(10);

  const drawSkill = (label, val, prevVal) => {
    doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(80);
    doc.text(label.toUpperCase(), 18, y);
    const bx = 70;
    for (let i = 1; i <= 5; i++) {
      const filled = i <= val;
      if (filled) {
        const r = i<=1?221:i<=2?255:i<=3?221:i<=4?68:0;
        const g = i<=1?34:i<=2?136:i<=3?170:i<=4?170:170;
        const b = i<=1?34:i<=2?0:i<=3?0:i<=4?68:85;
        doc.setFillColor(r,g,b);
        doc.rect(bx+(i-1)*22, y-5, 18, 7, "F");
        doc.setTextColor(255);
      } else {
        doc.setFillColor(240,240,240);
        doc.rect(bx+(i-1)*22, y-5, 18, 7, "F");
        doc.setDrawColor(200); doc.rect(bx+(i-1)*22, y-5, 18, 7, "S");
        doc.setTextColor(180);
      }
      doc.setFontSize(7); doc.setFont("helvetica","bold");
      doc.text(String(i), bx+(i-1)*22+7, y);
    }
    doc.setFontSize(9); doc.setFont("helvetica","normal");
    doc.setTextColor(60);
    doc.text(SKILL_LABELS[val], bx + 5*22 + 4, y);
    if (prevVal !== null && prevVal !== undefined && prevVal !== val) {
      const diff = val - prevVal;
      const arrow = diff > 0 ? " +" + diff + " ↑" : " " + diff + " ↓";
      doc.setTextColor(diff>0?0:221, diff>0?170:34, diff>0?85:34);
      doc.setFontSize(8); doc.setFont("helvetica","bold");
      doc.text(arrow, bx + 5*22 + 4 + doc.getTextWidth(SKILL_LABELS[val]) + 4, y);
    }
    ln(11);
  };

  const histArr = s.skillHistory || [];
  const prev = histArr.length >= 2 ? histArr[0] : null;
  drawSkill("Reading", s.skillReading||3, prev?.r);
  drawSkill("Writing", s.skillWriting||3, prev?.w);
  drawSkill("Listening", s.skillListening||3, prev?.l);
  drawSkill("Speaking", s.skillSpeaking||3, prev?.sp);

  const avg = skillAvg(s);
  doc.setFontSize(10); doc.setFont("helvetica","bold"); doc.setTextColor(0,140,70);
  doc.text("Overall: " + avg + " / 5", 18, y);
  ln(10);

  // Progress
  doc.setDrawColor(0); doc.line(14, y, W-14, y); ln(8);
  doc.setFontSize(13); doc.setFont("helvetica","bold"); doc.setTextColor(0);
  doc.text("PROGRESS SNAPSHOT", 14, y); ln(10);

  const boxW = (W-38)/3;
  const boxes = [
    {label:"LESSONS COMPLETED", val:String(totalTaken)},
    {label:"TOPICS COVERED", val:doneCount+"/"+assigned.length},
    {label:"WEEKS OF STUDY", val:String(Math.max(1,Math.round((new Date()-new Date(s.startDate))/(7*86400000))))},
  ];
  boxes.forEach((b,i) => {
    const bx = 14 + i*(boxW+5);
    doc.setFillColor(245,245,245);
    doc.rect(bx, y, boxW, 24, "F");
    doc.setDrawColor(0); doc.rect(bx, y, boxW, 24, "S");
    doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(120);
    doc.text(b.label, bx+boxW/2, y+7, {align:"center"});
    doc.setFontSize(18); doc.setFont("helvetica","bold"); doc.setTextColor(0);
    doc.text(b.val, bx+boxW/2, y+20, {align:"center"});
  });
  y += 32;

  if (s.goals || s.nextSteps) {
    doc.setDrawColor(0); doc.line(14, y, W-14, y); ln(8);
    doc.setFontSize(13); doc.setFont("helvetica","bold"); doc.setTextColor(0);
    doc.text("GOALS & NEXT STEPS", 14, y); ln(8);
    if (s.goals) {
      doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(0,80,180);
      doc.text("CURRENT GOALS", 18, y+1); ln(6);
      doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(50);
      doc.splitTextToSize(s.goals, W-40).forEach(line => { doc.text(line, 18, y); ln(5); });
      ln(4);
    }
    if (s.nextSteps) {
      doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(200,130,0);
      doc.text("NEXT STEPS", 18, y+1); ln(6);
      doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(50);
      doc.splitTextToSize(s.nextSteps, W-40).forEach(line => { doc.text(line, 18, y); ln(5); });
      ln(4);
    }
  }

  if (s.homeworkNotes) {
    doc.setDrawColor(0); doc.line(14, y, W-14, y); ln(8);
    doc.setFontSize(13); doc.setFont("helvetica","bold"); doc.setTextColor(0);
    doc.text("HOMEWORK & PRACTICE", 14, y); ln(8);
    doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(50);
    doc.splitTextToSize(s.homeworkNotes, W-40).forEach(line => { doc.text(line, 18, y); ln(5); });
    ln(4);
  }

  // Lesson history
  if (sLessons.length > 0) {
    doc.setDrawColor(0); doc.line(14, y, W-14, y); ln(8);
    doc.setFontSize(13); doc.setFont("helvetica","bold"); doc.setTextColor(0);
    doc.text("RECENT LESSONS", 14, y); ln(8);
    doc.setFillColor(0); doc.rect(14, y-4, W-28, 7, "F");
    doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(255);
    doc.text("DATE", 18, y+1); doc.text("TIME", 65, y+1); doc.text("TYPE", 100, y+1); doc.text("DURATION", 145, y+1);
    ln(9);
    doc.setFont("helvetica","normal"); doc.setTextColor(60); doc.setFontSize(9);
    sLessons.slice(0,12).forEach((l,i) => {
      if (i%2===0) { doc.setFillColor(248,248,248); doc.rect(14, y-4, W-28, 7, "F"); }
      doc.setTextColor(60);
      doc.text(fmt(l.date), 18, y);
      doc.text(l.time||"—", 65, y);
      doc.text(l.type||"—", 100, y);
      doc.text((l.duration||60)+" min", 145, y);
      ln(7);
    });
    ln(4);
  }

  // Teacher notes (public only)
  if (s.teacherStrengths || s.teacherImprove) {
    doc.setDrawColor(0); doc.line(14, y, W-14, y); ln(8);
    doc.setFontSize(13); doc.setFont("helvetica","bold"); doc.setTextColor(0);
    doc.text("TEACHER'S NOTES", 14, y); ln(8);
    if (s.teacherStrengths) {
      doc.setFontSize(10); doc.setFont("helvetica","bold"); doc.setTextColor(0,140,70);
      doc.text("Strengths:", 18, y); ln(6);
      doc.setFont("helvetica","normal"); doc.setTextColor(50);
      doc.splitTextToSize(s.teacherStrengths, W-40).forEach(line => { doc.text(line, 18, y); ln(5); });
      ln(4);
    }
    if (s.teacherImprove) {
      doc.setFontSize(10); doc.setFont("helvetica","bold"); doc.setTextColor(200,130,0);
      doc.text("Areas to Focus On:", 18, y); ln(6);
      doc.setFont("helvetica","normal"); doc.setTextColor(50);
      doc.splitTextToSize(s.teacherImprove, W-40).forEach(line => { doc.text(line, 18, y); ln(5); });
      ln(4);
    }
  }

  // Footer
  doc.setDrawColor(0); doc.setLineWidth(0.5); doc.line(14, y, W-14, y); ln(6);
  doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(0);
  doc.text(data.settings.brand || "ARABIC ENTHUSIAST", 14, y);
  doc.setFontSize(8); doc.setFont("helvetica","normal"); doc.setTextColor(150);
  doc.text("Progress Report — " + s.name, W-14, y, {align:"right"});

  const fileName = s.name.replace(/\s+/g,"_") + "_progress.pdf";
  if (shareWA && navigator.canShare) {
    const blob = doc.output("blob");
    const file = new File([blob], fileName, {type:"application/pdf"});
    if (navigator.canShare({files:[file]})) {
      navigator.share({files:[file], title:s.name+" Progress Report"}).catch(()=>doc.save(fileName));
      return;
    }
  }
  if (shareWA && s.whatsapp) {
    doc.save(fileName);
    setTimeout(()=>waMsg(s.whatsapp, "Hi " + s.name.split(" ")[0] + "! Here is your Arabic progress report."), 500);
    return;
  }
  doc.save(fileName);
}

// ─── Image Crop Editor ───
function ImageCropEditor({src, posX, posY, zoom, onSave}) {
  const stRef = useRef({posX, posY, zoom});
  stRef.current = {posX, posY, zoom};
  const cz = zoom !== undefined ? zoom : 100;

  const startDrag = (e) => {
    e.preventDefault();
    const t0 = e.touches ? e.touches[0] : e;
    let lx = t0.clientX, ly = t0.clientY;
    const move = (ev) => {
      const c = ev.touches ? ev.touches[0] : ev;
      const dx = c.clientX - lx, dy = c.clientY - ly;
      const {posX:px, posY:py, zoom:z} = stRef.current;
      const cz2 = z !== undefined ? z : 100;
      const sens = 80 / Math.max(cz2, 50);
      onSave(
        Math.max(0, Math.min(100, px - dx * sens)),
        Math.max(0, Math.min(100, py - dy * sens)),
        cz2
      );
      lx = c.clientX; ly = c.clientY;
    };
    const end = () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", end);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("touchend", end);
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", end);
    window.addEventListener("touchmove", move, {passive:false});
    window.addEventListener("touchend", end);
  };

  const wheel = (e) => {
    e.preventDefault();
    const {posX:px, posY:py, zoom:z} = stRef.current;
    const cz2 = z !== undefined ? z : 100;

}

// ─── Chip Editor ───
function Chips({items, onUpdate, label}) {
  const [adding, setAdding] = useState(false);
  const [val, setVal] = useState("");
  const [dropTarget, setDropTarget] = useState(null);
  const ref = useRef(null);
  const dragIdx = useRef(null);
  useEffect(() => { if (adding && ref.current) ref.current.focus(); }, [adding]);
  const add = () => { if (val.trim() && !items.includes(val.trim())) { onUpdate([...items, val.trim()]); setVal(""); setAdding(false); }};
  const rm = i => onUpdate(items.filter((_,idx) => idx !== i));
  const onDragStart = (e, i) => { dragIdx.current = i; e.dataTransfer.effectAllowed = "move"; };
  const onDragOver = (e, i) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; setDropTarget(i); };
  const onDrop = (e, i) => {
    e.preventDefault();
    const from = dragIdx.current;
    if (from === null || from === i) { setDropTarget(null); return; }
    const arr = [...items];
    const [moved] = arr.splice(from, 1);
    arr.splice(i, 0, moved);
    onUpdate(arr);
    dragIdx.current = null;
    setDropTarget(null);
  };
  const onDragEnd = () => { dragIdx.current = null; setDropTarget(null); };
  return h`<div class="fg">
    <label>${label}</label>
    <div style=${{display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>
      ${items.map((t,i) => h`<div key=${i} class="chip"
        draggable=${true}
        onDragStart=${e=>onDragStart(e,i)}
        onDragOver=${e=>onDragOver(e,i)}
        onDrop=${e=>onDrop(e,i)}
        onDragEnd=${onDragEnd}
        style=${{cursor:"grab",outline:dropTarget===i?"2px dashed var(--ac)":"2px solid transparent",outlineOffset:1}}>
        <span style=${{opacity:.4,fontSize:10,marginRight:3,userSelect:"none"}}>⠿</span>${t}<span class="chip-x" onClick=${()=>rm(i)}>×</span>
      </div>`)}
      ${adding ? h`<div style=${{display:"flex",gap:4,alignItems:"center"}}><input ref=${ref} value=${val} onInput=${e=>setVal(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter")add();if(e.key==="Escape")setAdding(false);}} style=${{padding:"3px 7px",border:"2px solid #000",fontSize:11,width:110,fontFamily:"var(--fb)"}} placeholder="Type & Enter"/><button class="bi" onClick=${add}>${ic('chk')}</button><button class="bi" onClick=${()=>setAdding(false)}>${ic('x')}</button></div>`
      : h`<div class="chip chip-add" onClick=${()=>setAdding(true)}>+ Add</div>`}
    </div>
    <div style=${{fontSize:10,color:"var(--g400)",marginTop:3}}>Drag to reorder</div>
  </div>`;
}

// STUDENT WEEKLY TASKS (student view — urgency grows each day)
// ════════════════════════════════════════
function StudentWeeklyTasks({student, data, setData}) {
  const tasks = student.weeklyTasks || [];
  const pending = tasks.filter(t => !t.doneAt);
  const done = tasks.filter(t => t.doneAt);

  const markDone = (id) => {
    const updated = tasks.map(t => t.id===id ? {...t, doneAt: new Date().toISOString()} : t);
    setData({...data, students: data.students.map(s => s.id===student.id ? {...s, weeklyTasks: updated} : s)});
  };

  const urgencyStyle = (task) => {
    const days = Math.floor((Date.now() - new Date(task.assignedAt)) / 86400000);
    if (days <= 1) return {
      fontSize:13, padding:"14px 16px", background:"#fff", border:"2px solid #e0e0e0",
      borderRadius:12, marginBottom:10, display:"flex", alignItems:"center", gap:12, cursor:"pointer"
    };
    if (days <= 3) return {
      fontSize:14, padding:"16px 18px", background:"#fff8e1", border:"2px solid #ff9800",
      borderRadius:12, marginBottom:10, display:"flex", alignItems:"center", gap:12, cursor:"pointer", fontWeight:500
    };
    if (days <= 5) return {
      fontSize:15, padding:"18px 20px", background:"#fff3e0", border:"3px solid #f44336",
      borderRadius:12, marginBottom:10, display:"flex", alignItems:"center", gap:12, cursor:"pointer", fontWeight:700
    };
    return {
      fontSize:16, padding:"20px 22px", background:"#ffebee", border:"3px solid #c62828",
      borderRadius:12, marginBottom:10, display:"flex", alignItems:"center", gap:12, cursor:"pointer",
      fontWeight:700, animation:"pulse 1.2s infinite", boxShadow:"0 0 12px rgba(198,40,40,0.3)"
    };
  };

  const urgencyLabel = (task) => {
    const days = Math.floor((Date.now() - new Date(task.assignedAt)) / 86400000);
    if (days <= 1) return null;
    if (days <= 3) return h`<span style=${{fontSize:10,background:"#ff9800",color:"#fff",padding:"2px 7px",borderRadius:20,fontWeight:700,flexShrink:0}}>${days}d</span>`;
    if (days <= 5) return h`<span style=${{fontSize:10,background:"#f44336",color:"#fff",padding:"2px 7px",borderRadius:20,fontWeight:700,flexShrink:0}}>⚠️ ${days}d overdue</span>`;
    return h`<span style=${{fontSize:10,background:"#c62828",color:"#fff",padding:"2px 7px",borderRadius:20,fontWeight:700,flexShrink:0}}>🚨 ${days}d — DO THIS NOW</span>`;
  };

  if (tasks.length === 0) return null;

  return h`<div style=${{background:"#fff",borderRadius:12,padding:"18px 20px",marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:"1px solid #eee"}}>
    <div style=${{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"var(--g500)",marginBottom:14}}>
      📋 Your Tasks This Week
      ${pending.length>0&&h`<span style=${{marginLeft:8,background:"var(--bd)",color:"#fff",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>${pending.length} to do</span>`}
    </div>

    ${pending.length===0&&h`<div style=${{textAlign:"center",padding:"12px 0",color:"var(--ok)",fontWeight:700,fontSize:14}}>✅ All done! Great work this week!</div>`}

    ${pending.map(task => h`<div key=${task.id} style=${urgencyStyle(task)} onClick=${()=>markDone(task.id)}>
      <div style=${{width:22,height:22,border:"2px solid currentColor",borderRadius:6,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",opacity:0.5}}>☐</div>
      <div style=${{flex:1,lineHeight:1.5}}>${task.text}</div>
      ${urgencyLabel(task)}
    </div>`)}

    ${done.length>0&&h`<div style=${{marginTop:8,borderTop:"1px solid #f0f0f0",paddingTop:10}}>
      ${done.map(task=>h`<div key=${task.id} style=${{fontSize:12,color:"var(--g400)",padding:"6px 0",display:"flex",alignItems:"center",gap:8,textDecoration:"line-through"}}>

    if (!email || !password) return setError("Email and password required");

    const d = await apiPost("/api/auth", {action:"login", email, password});

    if (d.error === "pending") return setError("Your request is pending. Your teacher hasn't confirmed it yet.");

// STUDENT LESSON SCHEDULER
// Shows Hadi's available slots for the next 4 weeks
// ════════════════════════════════════════
function StudentLessonRequest({student, data, setData}) {
  const [selectedSlot, setSelectedSlot] = useState(null); // {date, time, duration}
  const [note, setNote] = useState("");
  const [sent, setSent] = useState(false);
  const [view, setView] = useState("slots"); // slots | confirm
  const existing = (data.lessonRequests||[]).filter(r=>r.studentId===student.id&&r.status==="pending");
  const avail = (data.settings.availability&&!Array.isArray(data.settings.availability)) ? data.settings.availability : {};
  const lessonDuration = data.settings.lessonDuration||60;
  const anyDayEnabled = Object.values(avail).some(d=>d&&d.enabled);

  // Build available date slots for next 4 weeks from today
  const buildSlots = () => {
    if (!anyDayEnabled) return [];
    const result = [];
    const now = new Date();
    const confirmed = (data.lessonRequests||[]).filter(r=>r.status==="confirmed"||r.status==="pending");
    for (let d = 0; d < 28; d++) {
      const dt = new Date(now);
      dt.setDate(now.getDate() + d + 1); // start from tomorrow
      const dayOfWeek = dt.getDay();
      const dateStr = dt.toISOString().split("T")[0];
      const dayAvail = avail[dayOfWeek];
      if (!dayAvail||!dayAvail.enabled||!dayAvail.ranges||dayAvail.ranges.length===0) continue;
      dayAvail.ranges.forEach(range=>{
        const [sh,sm] = (range.start||"00:00").split(":").map(Number);
        const [eh,em] = (range.end||"00:00").split(":").map(Number);
        let cur = sh*60+(sm||0);
        const endMin = eh*60+(em||0);
        while (cur+lessonDuration <= endMin) {
          const timeStr = String(Math.floor(cur/60)).padStart(2,"0")+":"+String(cur%60).padStart(2,"0");
          const alreadyBooked = confirmed.some(r=>r.preferredDate===dateStr&&r.preferredTime===timeStr);
          const lessonBooked = (data.lessons||[]).some(l=>l.date===dateStr&&l.time===timeStr&&l.status!=="Cancelled");
          if (!alreadyBooked&&!lessonBooked) {
            result.push({date:dateStr, time:timeStr, duration:lessonDuration});
          }
          cur += lessonDuration;
        }
      });
    }
    return result.sort((a,b)=>a.date+a.time < b.date+b.time ? -1 : 1);
  };

  const available = buildSlots();

  // Format display for student's timezone
  const tz = student.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
  const fmtSlot = (dateStr, timeStr) => {
    try {
      const dt = new Date(dateStr + "T" + timeStr + ":00");
      return {
        dayName: dt.toLocaleDateString("en-GB",{weekday:"long",timeZone:tz}),
        dateDisp: dt.toLocaleDateString("en-GB",{day:"numeric",month:"long",timeZone:tz}),
        timeDisp: dt.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:tz})
      };
    } catch { return {dayName:"",dateDisp:dateStr,timeDisp:timeStr}; }
  };

  const send = () => {
    if (!selectedSlot) return;
    const req = {id:uid(),studentId:student.id,preferredDate:selectedSlot.date,preferredTime:selectedSlot.time,duration:selectedSlot.duration,message:note,status:"pending",requestedAt:new Date().toISOString()};
    setData({...data,lessonRequests:[...(data.lessonRequests||[]),req]});
    setSent(true); setView("slots"); setSelectedSlot(null); setNote("");
    // Notify Hadi via WhatsApp
    const {dayName,dateDisp,timeDisp} = fmtSlot(selectedSlot.date, selectedSlot.time);
    const msg = "📅 New lesson request from " + student.name + "!\n📆 " + dayName + ", " + dateDisp + " at " + timeDisp + (note?"\n💬 "+note:"") + "\n\nOpen the app to confirm: arabic-enthusiast.vercel.app";
    waMsg("96176957495", msg);
  };

  // Group available slots by week
  const weeks = [];
  available.forEach(sl => {
    const wk = sl.date.slice(0,7); // YYYY-MM
    let w = weeks.find(x=>x.key===wk);
    if (!w) { w={key:wk,label:"",slots:[]}; weeks.push(w); }
    w.slots.push(sl);
  });

  return h`<div style=${{background:"#fff",borderRadius:12,padding:"18px 20px",marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:"1px solid #eee"}}>
    <div style=${{fontSize:14,fontWeight:800,fontFamily:"var(--fh)",letterSpacing:1,marginBottom:4}}>📅 SCHEDULE A LESSON</div>

    ${existing.length>0&&h`<div style=${{fontSize:13,background:"#fff8e1",border:"1px solid #ff9800",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#b26a00"}}>
      ⏳ You have ${existing.length} pending request${existing.length>1?"s":""} — waiting for Hadi to confirm.
    </div>`}

    ${sent&&h`<div style=${{fontSize:13,background:"#f0fff4",border:"1px solid var(--ok)",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"var(--ok)"}}>
      ✅ Request sent! Hadi will confirm your lesson shortly.
    </div>`}

    ${view==="confirm"&&selectedSlot&&(()=>{
      const {dayName,dateDisp,timeDisp} = fmtSlot(selectedSlot.date, selectedSlot.time);
      return h`<div>
        <div style=${{background:"linear-gradient(135deg,#e3f2fd,#f0f8ff)",border:"2px solid #1976d2",borderRadius:12,padding:"18px 20px",marginBottom:14}}>
          <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#1976d2",marginBottom:8}}>Confirm your booking</div>
          <div style=${{fontSize:22,fontWeight:800,fontFamily:"var(--fh)",letterSpacing:1,marginBottom:2}}>${dayName}</div>
          <div style=${{fontSize:16,fontWeight:600,color:"#333",marginBottom:2}}>${dateDisp}</div>
          <div style=${{fontSize:15,color:"#1976d2",fontWeight:700}}>${timeDisp} · ${selectedSlot.duration} min</div>
          ${tz !== "Asia/Beirut" && h`<div style=${{fontSize:11,color:"#888",marginTop:4}}>Shown in your timezone (${tz})</div>`}
        </div>
        <div class="fg"><label>Note to Hadi (optional)</label>
          <textarea value=${note} onInput=${e=>setNote(e.target.value)} placeholder="e.g. I want to focus on conversational practice..." style=${{width:"100%",minHeight:60,padding:"8px 10px",border:"2px solid var(--g200)",fontFamily:"var(--fa),var(--fb)",fontSize:13,resize:"vertical",boxSizing:"border-box"}}/>
        </div>
        <div style=${{display:"flex",gap:8}}>
          <button style=${{flex:1,padding:"12px",background:"#1976d2",color:"#fff",border:"none",borderRadius:8,fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"var(--fb)"}} onClick=${send}>✅ Confirm Booking</button>
          <button style=${{padding:"12px 16px",background:"#fff",border:"2px solid var(--g200)",borderRadius:8,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"var(--fb)"}} onClick=${()=>{setView("slots");setSelectedSlot(null);}}>← Back</button>
        </div>
      </div>`;
    })()}

    ${view==="slots"&&h`<div>
      ${!anyDayEnabled
        ? h`<div style=${{textAlign:"center",padding:"20px",color:"var(--g400)",fontSize:13}}>No available slots yet — check back soon!</div>`
        : available.length===0
          ? h`<div style=${{textAlign:"center",padding:"20px",color:"var(--g400)",fontSize:13}}>All slots for the next 4 weeks are taken. Check back soon!</div>`
          : h`<div>
              <div style=${{fontSize:11,color:"var(--g500)",marginBottom:14}}>Pick a time that works for you (shown in your local time):</div>
              <div class="slot-grid" style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
                ${available.slice(0,12).map(sl=>{
                  const {dayName,dateDisp,timeDisp} = fmtSlot(sl.date, sl.time);
                  return h`<button key=${sl.date+sl.time}
                    onClick=${()=>{setSelectedSlot(sl);setView("confirm");setSent(false);}}
                    style=${{
                      background:"#fff",border:"2px solid #e0e0e0",borderRadius:10,
                      padding:"12px 10px",cursor:"pointer",textAlign:"center",
                      transition:"all .15s",fontFamily:"var(--fb)",
                    }}
                    onMouseEnter=${e=>{e.currentTarget.style.borderColor="#1976d2";e.currentTarget.style.background="#e3f2fd";}}
                    onMouseLeave=${e=>{e.currentTarget.style.borderColor="#e0e0e0";e.currentTarget.style.background="#fff";}}
                  >
                    <div style=${{fontSize:11,fontWeight:800,color:"#1976d2",textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>${dayName}</div>
                    <div style=${{fontSize:12,fontWeight:700,color:"#222",marginBottom:2}}>${dateDisp}</div>
                    <div style=${{fontSize:13,fontWeight:800,color:"#1976d2"}}>${timeDisp}</div>
                    <div style=${{fontSize:10,color:"#888",marginTop:2}}>${sl.duration} min</div>
                  </button>`;
                })}
              </div>
              ${available.length>12&&h`<div style=${{marginTop:8,fontSize:11,color:"var(--g400)",textAlign:"center"}}>Showing next 12 available slots</div>`}
            </div>`
      }
    </div>`}
  </div>`;
}

// STUDENT PORTAL — CURRICULUM TAB
// ════════════════════════════════════════
function StudentCurriculumTab({student: s, data, setData}) {
  const assigned = (data.curriculum||[]).filter(c=>(s.assignedLessons||[]).includes(c.id));
  const done = s.completedLessons||[];
  const total = assigned.length;
  const doneCount = done.filter(id=>(s.assignedLessons||[]).includes(id)).length;
  const pct = total>0?Math.round((doneCount/total)*100):0;
  const toggle = (id) => {
    const updated = done.includes(id)?done.filter(x=>x!==id):[...done,id];
    setData({...data,students:data.students.map(x=>x.id===s.id?{...x,completedLessons:updated}:x)});
  };
  if (assigned.length===0) return h`<div style=${{padding:32,textAlign:"center",color:"var(--g400)"}}>No curriculum topics assigned yet. Hadi will add them soon!</div>`;
  return h`<div style=${{maxWidth:700,margin:"0 auto"}}>
    <div class="card" style=${{marginBottom:16}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style=${{fontWeight:700,fontSize:14}}>📚 My Curriculum Progress</div>
        <div style=${{fontSize:13,fontWeight:700,color:"#7e57c2"}}>${doneCount}/${total} topics (${pct}%)</div>
      </div>
      <div style=${{height:10,background:"#f0f0f0",borderRadius:8,overflow:"hidden"}}>
        <div style=${{height:"100%",width:pct+"%",background:"#7e57c2",borderRadius:8,transition:"width 0.6s ease"}}></div>
      </div>
    </div>
    ${assigned.map((c,i)=>{
      const isDone = done.includes(c.id);
      return h`<div key=${c.id} style=${{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.05)",opacity:isDone?0.7:1,display:"flex",alignItems:"flex-start",gap:12}}>
        <button onClick=${()=>toggle(c.id)} style=${{width:24,height:24,borderRadius:6,border:"2px solid "+(isDone?"#7e57c2":"#ccc"),background:isDone?"#7e57c2":"#fff",color:"#fff",fontSize:14,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--fb)",padding:0}}>${isDone?"✓":""}</button>
        <div style=${{flex:1}}>
          <div style=${{fontWeight:700,fontSize:14,textDecoration:isDone?"line-through":"none",color:isDone?"#aaa":"#111"}}>${i+1}. ${c.title||c.name||"Lesson "+(i+1)}</div>
          ${c.description&&h`<div style=${{fontSize:12,color:"var(--g500)",marginTop:4,lineHeight:1.6}}>${c.description}</div>`}
          ${c.category&&h`<span style=${{display:"inline-block",marginTop:6,padding:"2px 8px",background:"#f0ebff",color:"#7e57c2",borderRadius:20,fontSize:10,fontWeight:700}}>${c.category}</span>`}
        </div>
      </div>`;
    })}
  </div>`;
}

// STUDENT PORTAL — QUIZ TAB
// ════════════════════════════════════════
function StudentQuizTab({student: s, data}) {
  const [loading, setLoading] = useState(false);
  const [questions, setQuestions] = useState(null);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [error, setError] = useState("");
  const topics = (data.curriculum||[]).filter(c=>(s.assignedLessons||[]).includes(c.id)).map(c=>c.title||c.name).join(", ");

  const generate = async () => {
    setLoading(true); setQuestions(null); setAnswers({}); setSubmitted(false); setError("");
    try {
      const d = await apiPost("/api/ai", {type:"student_quiz", context:{
        name:s.name, level:s.level||"beginner", type:s.type||"Classical Arabic",
        skillReading:s.skillReading||3, skillWriting:s.skillWriting||3,
        skillListening:s.skillListening||3, skillSpeaking:s.skillSpeaking||3,
        topics: topics||"General Arabic", goals:s.goals||""
      }});
      if (d.result) {
        const raw = d.result.replace(/```json|```/g,"").trim();
        const parsed = JSON.parse(raw);
        setQuestions(parsed);
      } else { setError("Could not generate quiz."); }
    } catch(e) { setError("Error: "+e.message); }
    setLoading(false);
  };

  const score = questions ? questions.filter((q,i)=>answers[i]===q.answer).length : 0;

  const isArabic = str => /[\u0600-\u06FF]/.test(str||"");

  return h`<div style=${{maxWidth:680,margin:"0 auto"}}>
    <div class="card" style=${{marginBottom:16}}>
      <h3 style=${{marginBottom:4}}>🧠 AI QUIZ</h3>
      <p style=${{fontSize:13,color:"var(--g500)",marginBottom:14,lineHeight:1.6}}>Generate a 5-question quiz personalised to your level and topics.</p>
      <button class="btn btn-p" onClick=${generate} disabled=${loading}>${loading?"Generating quiz...":"Generate New Quiz"}</button>
      ${error&&h`<div style=${{marginTop:10,color:"var(--bd)",fontSize:13}}>${error}</div>`}
    </div>
    ${questions&&h`<div>
      ${questions.map((q,i)=>h`<div key=${i} style=${{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"20px 18px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>

        <!-- Question number + English text -->
        <div style=${{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#888",marginBottom:6}}>${"Question "+(i+1)+" of "+questions.length}</div>
        <div style=${{fontWeight:700,fontSize:15,marginBottom:q.ar?"10px":"16px",lineHeight:1.6,color:"#111"}}>${q.q}</div>

        <!-- Arabic focal item (Amiri, with diacritics, centred) -->
        ${q.ar&&h`<div style=${{
          background:"linear-gradient(135deg,#fafafa,#f5f0e8)",
          border:"1px solid #e8dcc8",borderRadius:10,
          padding:"14px 20px",marginBottom:16,textAlign:"center"
        }}>
          <div class="qz-ar">${q.ar}</div>
        </div>`}

        <!-- Options -->
        <div style=${{display:"flex",flexDirection:"column",gap:10}}>
          ${q.options.map((opt,j)=>{
            let cls = "qz-opt";
            if (submitted) {
              if (j===q.answer) cls+=" qz-correct";
              else if (answers[i]===j) cls+=" qz-wrong";
            } else if (answers[i]===j) cls+=" qz-correct";
            const arOpt = isArabic(opt);
            return h`<button key=${j} class=${cls+(arOpt?" qz-opt-ar":"")} onClick=${()=>{if(!submitted)setAnswers({...answers,[i]:j})}} disabled=${submitted}>
              <span style=${{display:"inline-flex",alignItems:"center",gap:10,width:"100%",justifyContent:arOpt?"flex-end":"flex-start"}}>
                <span style=${{width:22,height:22,borderRadius:50,border:"2px solid currentColor",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,flexShrink:0,fontFamily:"var(--fb)"}}>
                  ${["A","B","C","D"][j]}
                </span>
                <span style=${{flex:1,textAlign:arOpt?"right":"left",fontSize:arOpt?"20px":"14px"}}>${opt}</span>
              </span>
            </button>`;
          })}
        </div>

        <!-- Tip after submit -->
        ${submitted&&h`<div style=${{marginTop:14,padding:"10px 14px",background:"#f0f7ff",border:"1px solid #bbdefb",borderRadius:8,fontSize:13,color:"#1565c0",lineHeight:1.7}}>
          💡 ${q.tip}
        </div>`}
      </div>`)}

      ${!submitted&&Object.keys(answers).length===questions.length&&h`<button class="btn btn-p" style=${{width:"100%",marginTop:4,padding:"14px"}} onClick=${()=>setSubmitted(true)}>Submit Quiz ✓</button>`}
      ${!submitted&&Object.keys(answers).length<(questions?questions.length:0)&&h`<div style=${{textAlign:"center",fontSize:12,color:"#aaa",marginTop:8}}>${Object.keys(answers).length}/${questions.length} answered</div>`}

      ${submitted&&h`<div style=${{background:"#fff",border:"2px solid #111",borderRadius:12,padding:"24px 20px",textAlign:"center",marginTop:4}}>
        <div style=${{fontSize:40,marginBottom:10}}>${score>=4?"🏆":score>=3?"👍":"📚"}</div>
        <div style=${{fontFamily:"var(--fh)",fontSize:36,letterSpacing:2}}>${score}/5</div>
        <div style=${{fontSize:14,color:"var(--g500)",marginTop:8}}>${score===5?"Perfect score! Excellent work!":score>=3?"Good job — keep practising!":"Review the tips above and try again!"}</div>
        <button class="btn" style=${{marginTop:16}} onClick=${generate}>Try Another Quiz</button>
      </div>`}
    </div>`}
  </div>`;
}

          fontFamily:"var(--fb)",fontSize:11,fontWeight:700,
          display:"flex",alignItems:"center",gap:6
        }}>
          <div style=${{width:14,height:14,borderRadius:50,background:t.val,flexShrink:0}}></div>
          ${t.label}
        </button>`)}
      </div>
    </div>
  </div>`;
}

            <div>

                <div style=${{height:"100%",width:(pct*100)+"%",background:col,borderRadius:6,transition:"width 0.6s ease"}}></div>
              </div>
              <div style=${{fontSize:11,color:col,fontWeight:700,marginTop:6}}>${rem<=0?"All done! 🎉":rem<=2?"Almost there!":"Keep going!"}</div>
            </div>
          </div>
        </div>`;
      })()}
      <${StudentAIPanel} student=${s} data=${data}/>
    </div>
    </div>`}
    </div>
  </div>`;

function LessonPlanAI({student: s, data}) {

    setLoading(true); setPlan("");
    const att = attendanceStats(s.id, data.lessons);
    const d = await apiPost("/api/ai", {type:"lesson_plan", context:{
      name:s.name, level:s.level, type:s.type,
      skillReading:s.skillReading||3, skillWriting:s.skillWriting||3,
      skillListening:s.skillListening||3, skillSpeaking:s.skillSpeaking||3,
      goals:s.goals, nextSteps:s.nextSteps, lessonsTaken:s.lessonsTaken, attendance:att.rate
    }});
    setLoading(false);
    if (d.result) setPlan(d.result);
  };
  return h`<div class="assess-card" style=${{marginTop:14}}>
    <h4>📋 AI 4-Week Lesson Plan</h4>
    <p style=${{fontSize:13,color:"var(--g500)",marginBottom:14,lineHeight:1.6}}>Generate a personalized 4-week plan based on ${s.name}'s current level, weak areas, and goals.</p>
    <button class="btn btn-p" onClick=${run} disabled=${loading}>${loading?"Generating...":"Generate Plan"}</button>
    ${plan&&h`<div style=${{marginTop:16,padding:"14px 16px",background:"var(--g50)",border:"2px solid var(--bk)",whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.9,fontFamily:"var(--fb)"}}>${plan}</div>`}
  </div>`;
}

// TEACHER WEEKLY TASKS MANAGER
// ════════════════════════════════════════
function TeacherWeeklyTasks({student: s, upd}) {
  const [newTask, setNewTask] = useState("");
  const tasks = s.weeklyTasks || [];

  const addTask = () => {
    const text = newTask.trim();
    if (!text) return;
    const updated = [...tasks, {id: uid(), text, assignedAt: new Date().toISOString(), doneAt: null}];
    upd("weeklyTasks", updated);
    setNewTask("");
  };

  const removeTask = (id) => upd("weeklyTasks", tasks.filter(t => t.id !== id));

  const clearDone = () => upd("weeklyTasks", tasks.filter(t => !t.doneAt));

  return h`<div class="assess-card">
    <h4>📋 Weekly Tasks <span style=${{fontSize:11,fontWeight:400,color:"var(--g400)"}}>— shown to student, grows urgent each day</span></h4>

    <div style=${{display:"flex",gap:8,marginBottom:14}}>
      <input style=${{flex:1,padding:"9px 11px",border:"2px solid var(--g200)",fontFamily:"var(--fb)",fontSize:13,outline:"none"}}
        placeholder="Add a task for this week..." value=${newTask}
        onInput=${e=>setNewTask(e.target.value)}
        onKeyDown=${e=>{if(e.key==="Enter")addTask();}}/>
      <button class="btn btn-p" onClick=${addTask}>${ic('plus')} Add</button>
    </div>

    ${tasks.length===0 && h`<p style=${{color:"var(--g400)",fontSize:13}}>No tasks assigned yet.</p>`}

    ${tasks.filter(t=>!t.doneAt).map(task=>{
      const days = Math.floor((Date.now()-new Date(task.assignedAt))/86400000);
      const color = days<=1?"var(--g300)":days<=3?"var(--wn)":days<=5?"var(--bd)":"#c62828";
      return h`<div key=${task.id} style=${{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",border:"1.5px solid var(--g200)",borderRadius:8,marginBottom:6,background:"var(--wh)"}}>
        <div style=${{width:8,height:8,borderRadius:50,background:color,flexShrink:0}}></div>
        <div style=${{flex:1,fontSize:13}}>${task.text}</div>
        <div style=${{fontSize:10,color,fontWeight:700,minWidth:30}}>${days}d</div>
        <button class="bi" onClick=${()=>removeTask(task.id)} title="Remove">✕</button>
      </div>`;
    })}

    ${tasks.filter(t=>t.doneAt).length>0&&h`<div style=${{marginTop:8}}>
      <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--ok)",letterSpacing:1,marginBottom:6}}>✅ Done</div>
      ${tasks.filter(t=>t.doneAt).map(task=>h`<div key=${task.id} style=${{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,marginBottom:4,opacity:0.6,fontSize:12,textDecoration:"line-through",color:"var(--g500)"}}>
        <span>✅</span><span style=${{flex:1}}>${task.text}</span>
        <button class="bi" onClick=${()=>removeTask(task.id)} title="Remove">✕</button>
      </div>`)}
      <button class="btn btn-sm" onClick=${clearDone} style=${{marginTop:4}}>Clear completed</button>
    </div>`}
  </div>`;
}
