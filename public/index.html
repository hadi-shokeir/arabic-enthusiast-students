<script>
(function(){
  try {
    document.documentElement.dataset.siteTheme = localStorage.getItem('ae_site_theme') || 'light';
  } catch {
    document.documentElement.dataset.siteTheme = 'light';
  }
})();

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #080808; --ink2: #111111;
  --gold: #c9a24a; --gold2: #e5c978;
  --cream: #f7efe0; --muted: rgba(247,239,224,0.56);
  --border: rgba(229,201,120,0.16);
}
html { scroll-behavior: smooth; }
body {
  background: #080808; color: var(--cream);
  font-family: 'DM Sans', sans-serif; overflow-x: hidden; min-height: 100vh;
}
html[data-site-theme="light"] body {
  background: #f4f1e9 !important;
  color: #17130c !important;
}
::selection { background: rgba(201,162,74,0.32); color: #fff8ea; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0805; }
::-webkit-scrollbar-thumb { background: rgba(201,162,74,0.36); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(201,162,74,0.56); }
@keyframes spin       { to { transform: rotate(360deg); } }
@keyframes float      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes letterFade { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
@keyframes fadeInUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes scrollLine { 0%,100%{opacity:0;transform:scaleY(0);transform-origin:top} 50%{opacity:1;transform:scaleY(1)} }
.page-enter { animation: pageIn 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes pageIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
input::placeholder, textarea::placeholder { color: rgba(245,240,232,0.2); }
input, textarea { color-scheme: dark; }
html[data-site-theme="light"] input,
html[data-site-theme="light"] textarea { color-scheme: light; }
[dir="rtl"], .arabic, .ar {
  direction: rtl;
  unicode-bidi: plaintext;
  font-family: 'Amiri', serif;
}
button, a, input, select, textarea { touch-action: manipulation; }
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}
html[data-site-theme="light"] body::before { opacity: 0.035; mix-blend-mode: multiply; }
#root { position: relative; z-index: 1; }
.nav-mobile { display: none; }
.nav-desktop { display: flex; }
.site-theme-toggle {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 250;
  min-width: 92px;
  min-height: 44px;
  border: 1px solid rgba(229,201,120,0.42);
  border-radius: 999px;
  background: rgba(12,10,6,0.86);
  color: #fff8ea;
  box-shadow: 0 16px 38px rgba(0,0,0,0.24);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.76rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  backdrop-filter: blur(14px);
}
html[data-site-theme="light"] .site-theme-toggle {
  background: rgba(255,253,248,0.9);
  color: #17130c;
  border-color: rgba(111,75,0,0.28);
}
html[data-site-theme="light"] nav {
  background: rgba(255,253,248,0.9) !important;
  border-bottom-color: rgba(111,75,0,0.12) !important;
  backdrop-filter: blur(18px) !important;
}
html[data-site-theme="light"] nav img { filter: none !important; }
html[data-site-theme="light"] nav span,
html[data-site-theme="light"] nav button {
  color: #3b2c12 !important;
  border-color: rgba(111,75,0,0.24) !important;
}
html[data-site-theme="light"] main section {
  background: transparent !important;
}
html[data-site-theme="light"] main h1,
html[data-site-theme="light"] main h2,
html[data-site-theme="light"] main h3,
html[data-site-theme="light"] main div[style*="Playfair Display"],
html[data-site-theme="light"] main div[style*="Cinzel"] {
  color: #17130c !important;
  text-shadow: none !important;
}
html[data-site-theme="light"] main p,
html[data-site-theme="light"] main span,
html[data-site-theme="light"] main div[style*="rgba(240,240,240"],
html[data-site-theme="light"] main div[style*="rgba(255,255,255"] {
  color: #625741 !important;
}
html[data-site-theme="light"] main em,
html[data-site-theme="light"] main [style*="Amiri"] {
  color: #2b2114 !important;
  text-shadow: none !important;
}
html[data-site-theme="light"] main div[style*="background: rgba(18,18,18"],
html[data-site-theme="light"] main div[style*="background: rgba(16,16,16"],
html[data-site-theme="light"] main div[style*="background: rgba(12,12,12"],
html[data-site-theme="light"] main div[style*="rgba(18, 18, 18"],
html[data-site-theme="light"] main div[style*="rgba(16, 16, 16"] {
  background: rgba(255,253,248,0.78) !important;
  border-color: rgba(111,75,0,0.16) !important;
  box-shadow: 0 16px 40px rgba(67,48,16,0.08);
}
html[data-site-theme="light"] main div[style*="border: 1px solid rgba(255"],
html[data-site-theme="light"] main div[style*="border: 1px dashed rgba(255"] {
  border-color: rgba(111,75,0,0.18) !important;
}
html[data-site-theme="light"] .hero-actions > button:not(:first-child) {
  background: rgba(255,253,248,0.62) !important;
  border-color: rgba(111,75,0,0.28) !important;
  color: #3a2d1c !important;
}
html[data-site-theme="light"] footer {
  background: #fffdf8 !important;
  border-top-color: rgba(111,75,0,0.12) !important;
}
html[data-site-theme="light"] footer * {
  color: #625741 !important;
}
html[data-site-theme="light"] footer div[style*="Cinzel"] {

}
@media (max-width: 768px) {
  .nav-mobile { display: flex !important; }
  .nav-desktop { display: none !important; }
  nav { padding-left: 20px !important; padding-right: 20px !important; }

@media (max-width: 900px) {
  main section { padding-left: 22px !important; padding-right: 22px !important; }
  main section > div[style*="grid-template-columns: 1fr 1fr"],
  main section div[style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
    gap: 34px !important;
  }
  main section div[style*="grid-template-columns: repeat(4"],
  main section div[style*="grid-template-columns: repeat(3"] {
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
  }
  .hero-actions > button {
    min-height: 44px !important;

}
@media (max-width: 520px) {
  main section {
    min-height: auto !important;
    padding-top: 92px !important;
    padding-bottom: 52px !important;
  }
  main h1 {
    font-size: clamp(2.4rem, 12vw, 3.45rem) !important;
    overflow-wrap: anywhere;
  }
  main p { font-size: 1rem !important; }
  .hero-actions {
    width: 100%;
    flex-direction: column;
    align-items: stretch !important;
  }
  .hero-actions > button {
    width: 100%;
    padding: 15px 18px !important;
    white-space: normal;
  }
  main section div[style*="width: 420px"] {
    width: min(82vw, 320px) !important;
    height: min(82vw, 320px) !important;
  }
  main section div[style*="font-size: 10rem"] {
    font-size: clamp(5rem, 30vw, 7.5rem) !important;
  }
  main section div[style*="grid-template-columns: repeat(4"],
  main section div[style*="grid-template-columns: repeat(3"],
  main section div[style*="grid-template-columns: repeat(7"] {
    grid-template-columns: 1fr !important;
  }
}
</style>
</head>
<body>
<div id="root"></div>
<button id="siteThemeToggle" class="site-theme-toggle" type="button" aria-label="Toggle dark theme">Dark</button>

<script src="/site-content.js"></script>
<script src="/data.js"></script>
<script type="text/babel" src="/components.jsx"></script>
<script type="text/babel" src="/pages/Home.jsx"></script>
<script type="text/babel" src="/pages/Courses.jsx"></script>
<script type="text/babel" src="/pages/Pricing.jsx"></script>
<script type="text/babel" src="/pages/About.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [page, setPage] = useState('home');
  const [lesson, setLesson] = useState('arabic-foundations');
  const [key, setKey] = useState(0);
  const [siteKey, setSiteKey] = useState(0);

  useEffect(() => {
    const saved = sessionStorage.getItem('ae_page');
    const savedLesson = sessionStorage.getItem('ae_lesson');
    // Never restore 'dashboard' — always redirect to portal
    if (saved && saved !== 'dashboard') setPage(saved);
    if (savedLesson) setLesson(savedLesson);
  }, []);

  useEffect(() => {
    let alive = true;
    const params = new URLSearchParams(window.location.search);
    if (params.get('preview') === 'draft') {
      try {
        const draft = JSON.parse(localStorage.getItem('ae_site_preview') || 'null');
        if (draft && window.AE?.mergeSiteContent) {
          window.AE.DATA = window.AE.mergeSiteContent(window.AE.DATA, draft);
          if (params.get('page')) setPage(params.get('page'));
          if (alive) setSiteKey(k => k + 1);
          return () => { alive = false; };
        }
      } catch {}
    }
    fetch('/api/site')
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (d?.content && window.AE?.mergeSiteContent) {
          window.AE.DATA = window.AE.mergeSiteContent(window.AE.DATA, d.content);
          if (alive) setSiteKey(k => k + 1);
        }
      })
      .catch(() => {});
    return () => { alive = false; };
  }, []);

  function navigateTo(newPage) {
    // 'dashboard' clicks → go to the real student portal
    if (newPage === 'dashboard') { window.location.href = '/portal'; return; }
    setPage(newPage);
    setKey(k => k + 1);
    sessionStorage.setItem('ae_page', newPage);
    window.scrollTo(0, 0);
  }

  function navigateLesson(courseId) {
    setLesson(courseId);
    sessionStorage.setItem('ae_lesson', courseId);
  }

  return (
    <div>
      <Nav page={page} setPage={navigateTo} />
      <main key={`${key}-${siteKey}`} className="page-enter">
        {page === 'home'    && <HomePage    setPage={navigateTo} />}
        {page === 'courses' && <CoursesPage setPage={navigateTo} setLesson={navigateLesson} />}
        {page === 'lesson'  && <LessonPage  courseId={lesson}    setPage={navigateTo} />}
        {page === 'pricing' && <PricingPage setPage={navigateTo} />}
        {page === 'about'   && <AboutPage   setPage={navigateTo} />}
      </main>
      {page !== 'lesson' && <Footer setPage={navigateTo} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
(function(){
  const key = 'ae_site_theme';
  const btn = document.getElementById('siteThemeToggle');
  const meta = document.querySelector('meta[name="theme-color"]');
  function apply(theme) {
    document.documentElement.dataset.siteTheme = theme;
    if (meta) meta.setAttribute('content', theme === 'dark' ? '#0a0805' : '#f4f1e9');
    if (btn) {
      btn.textContent = theme === 'dark' ? 'Light' : 'Dark';
      btn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
    }
  }
  let theme = 'light';
  try { theme = localStorage.getItem(key) || 'light'; } catch {}
  apply(theme);
  btn?.addEventListener('click', () => {
    const next = document.documentElement.dataset.siteTheme === 'dark' ? 'light' : 'dark';
    try { localStorage.setItem(key, next); } catch {}
    apply(next);
  });
})();
</script>
</body>
</html>
