// CALENDAR — FIX #11: configurable week start
// ════════════════════════════════════════
function Calendar({data, setData}) {
  const [mo, setMo] = useState(new Date().getMonth());
  const [yr, setYr] = useState(new Date().getFullYear());
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkLesson(data.settings));
  const S = data.settings;
  const wsd = S.weekStartDay || 1;
  const fd = new Date(yr,mo,1).getDay(), dim = new Date(yr,mo+1,0).getDate(), pd = new Date(yr,mo,0).getDate();
  // FIX #11: Adjust first day offset based on week start
  const offset = (fd - wsd + 7) % 7;
  const cells = []; for(let i=offset-1;i>=0;i--) cells.push({d:pd-i,m:false}); for(let i=1;i<=dim;i++) cells.push({d:i,m:true}); while(cells.length<42) cells.push({d:cells.length-offset-dim+1,m:false});
  const ts = today(), MN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAY_NAMES = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const orderedDays = [...DAY_NAMES.slice(wsd), ...DAY_NAMES.slice(0,wsd)];
  const getLessons = day => { const ds=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0"); return data.lessons.filter(l=>l.date===ds); };

  const doSave = () => {
    if (!form.studentId && !form.groupId) return;
    const ex = data.lessons.find(l=>l.id===form.id);
    let nL = ex ? data.lessons.map(l=>l.id===form.id?{...form}:l) : [...data.lessons,{...form}];
    let nS = data.students;
    if (form.status==="Completed" && ex?.status!=="Completed" && form.studentId) nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTaken:s.lessonsTaken+1}:s);
    if (form.status!=="Completed" && ex?.status==="Completed" && form.studentId) nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTaken:Math.max(0,s.lessonsTaken-1)}:s);
    setData({...data, lessons:nL, students:nS}); setShow(false); setForm(mkLesson(S));
  };
  const doDel = id => { if(confirm("Delete this lesson?")) { setData({...data, lessons:data.lessons.filter(l=>l.id!==id)}); setShow(false); } };

  return h`<div>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div style=${{display:"flex",alignItems:"center",gap:10}}>
        <button class="bi" onClick=${()=>{if(mo===0){setMo(11);setYr(yr-1);}else setMo(mo-1);}}>${icb('cL')}</button>
        <h3 style=${{fontFamily:"var(--fh)",fontSize:22,letterSpacing:1.5,minWidth:160,textAlign:"center"}}>${MN[mo]} ${yr}</h3>
        <button class="bi" onClick=${()=>{if(mo===11){setMo(0);setYr(yr+1);}else setMo(mo+1);}}>${icb('cR')}</button>
      </div>
      <button class="btn btn-p" onClick=${()=>{setForm(mkLesson(S));setShow(true);}}>${ic('plus')} Add Lesson</button>
    </div>
    <div style=${{overflowX:"auto",WebkitOverflowScrolling:"touch"}}><div class="cal" style=${{minWidth:320}}>
      ${orderedDays.map(d=>h`<div key=${d} class="cal-h">${d}</div>`)}
      ${cells.map((c,i) => { const ds=c.m?yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(c.d).padStart(2,"0"):""; const dl=c.m?getLessons(c.d):[]; return h`<div key=${i} class=${"cal-c"+(c.m?"":" om")+(ds===ts?" today":"")}>
        <div class="cal-d">${c.d}</div>
        ${dl.map(l=>{const st=data.students.find(s=>s.id===l.studentId);return h`<div key=${l.id} class=${"cal-e "+l.status.toLowerCase()} onClick=${()=>{setForm({...l});setShow(true);}}>${l.time} ${st?.name||"Grp"}</div>`;})}
      </div>`; })}
    </div></div>
    ${show && h`<${Modal} title=${data.lessons.find(l=>l.id===form.id)?"EDIT LESSON":"ADD LESSON"} onClose=${()=>setShow(false)} footer=${h`
      ${data.lessons.find(l=>l.id===form.id) && h`<button class="btn btn-d btn-sm" onClick=${()=>doDel(form.id)}>Delete</button>`}
      <button class="btn" onClick=${()=>setShow(false)}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>
    `}>
      <div class="fr"><div class="fg"><label>Student</label><select value=${form.studentId} onChange=${e=>setForm({...form,studentId:e.target.value})}><option value="">— Select —</option>${data.students.filter(s=>s.active).map(s=>h`<option key=${s.id} value=${s.id}>${s.name}</option>`)}</select></div><div class="fg"><label>Group</label><select value=${form.groupId} onChange=${e=>setForm({...form,groupId:e.target.value})}><option value="">— None —</option>${(data.groups||[]).map(g=>h`<option key=${g.id} value=${g.id}>${g.name}</option>`)}</select></div></div>
      <div class="fr3"><div class="fg"><label>Date</label><input type="date" value=${form.date} onInput=${e=>setForm({...form,date:e.target.value})}/></div><div class="fg"><label>Time (Lebanon)</label><input type="time" step="1800" value=${form.time} onInput=${e=>setForm({...form,time:e.target.value})}/></div><div class="fg"><label>Duration (min)</label><input type="number" value=${form.duration} onInput=${e=>setForm({...form,duration:+e.target.value})}/></div></div>
      ${(()=>{
        if (!form.date || !form.time) return null;
        const student = data.students.find(s=>s.id===form.studentId);
        const studentTz = student?.timezone;
        try {
          const dt = new Date(form.date+"T"+form.time+":00");
          const fmt = tz => new Intl.DateTimeFormat("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:tz}).format(dt);
          const lbTime = fmt("Asia/Beirut");
          return h`<div style=${{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8,padding:"8px 12px",background:"#f0f4ff",borderRadius:8,fontSize:12}}>
            <span style=${{fontWeight:700}}>🇱🇧 Lebanon:</span><span>${lbTime}</span>
            ${studentTz && studentTz !== "Asia/Beirut" && h`<span style=${{margin:"0 6px",color:"#aaa"}}>→</span><span style=${{fontWeight:700}}>🌍 Student:</span><span>${fmt(studentTz)}</span>`}
          </div>`;
        } catch(e) { return null; }
      })()}
      <div class="fr"><div class="fg"><label>Type</label><select value=${form.type} onChange=${e=>setForm({...form,type:e.target.value})}>${S.types.map(t=>h`<option key=${t}>${t}</option>`)}</select></div><div class="fg"><label>Status</label><select value=${form.status} onChange=${e=>setForm({...form,status:e.target.value})}>${S.statuses.map(s=>h`<option key=${s}>${s}</option>`)}</select></div></div>
      <div class="fg"><label>Notes</label><textarea value=${form.notes} onInput=${e=>setForm({...form,notes:e.target.value})}/></div>
    <//>`}
  </div>`;
}

// PAYMENTS — FIX #7 & #8
// ════════════════════════════════════════
function Payments({data, setData}) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkPayment());
  const [search, setSearch] = useState("");
  const S = data.settings;
  const CUR = S.currency || "$";
  const sorted = [...data.payments].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filtered = search ? sorted.filter(p=>{const st=data.students.find(s=>s.id===p.studentId); return st?.name?.toLowerCase().includes(search.toLowerCase());}) : sorted;
  const now = new Date();
  const mPay = data.payments.filter(p=>{const d=new Date(p.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const mRev = mPay.filter(p=>p.status==="Paid").reduce((a,p)=>a+(p.amount||0),0);
  const tRev = data.payments.filter(p=>p.status==="Paid").reduce((a,p)=>a+(p.amount||0),0);
  const pending = data.payments.filter(p=>p.status!=="Paid");
  const pendingTotal = pending.reduce((a,p)=>a+(p.amount||0),0);

  // FIX #8: Track original lessonsAdded to adjust on edit
  const doSave = () => {
    if(!form.studentId||!form.amount) return;
    const ex=data.payments.find(p=>p.id===form.id);
    let nP, nS=data.students;
    if(ex) {
      nP=data.payments.map(p=>p.id===form.id?{...form}:p);
      // Adjust lessons if lessonsAdded changed
      const diff = (form.lessonsAdded||0) - (ex.lessonsAdded||0);
      if(diff !== 0) {
        nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTotal:Math.max(0,s.lessonsTotal+diff),remainingClasses:Math.max(0,(typeof s.remainingClasses==="number"?s.remainingClasses:Math.max(0,(s.lessonsTotal||0)-(s.lessonsTaken||0)))+diff)}:s);
      }
    } else {
      nP=[...data.payments,{...form}];
      if(form.lessonsAdded>0) nS=nS.map(s=>s.id===form.studentId?{...s,lessonsTotal:s.lessonsTotal+form.lessonsAdded,remainingClasses:(typeof s.remainingClasses==="number"?s.remainingClasses:Math.max(0,(s.lessonsTotal||0)-(s.lessonsTaken||0)))+form.lessonsAdded,totalPaid:s.totalPaid+form.amount}:s);
    }
    setData({...data,payments:nP,students:nS}); setShow(false); setForm(mkPayment());
  };
  const toggleStatus = pid => { setData({...data, payments: data.payments.map(p => p.id===pid ? {...p, status: p.status==="Paid"?"Pending":"Paid"} : p)}); };

  return h`<div>
    <div class="stats" style=${{gridTemplateColumns:"repeat(4,1fr)"}}>
      <div class="stat"><div class="lb">This Month (Paid)</div><div class="vl">${fm(mRev,CUR)}</div></div>
      <div class="stat"><div class="lb">Total Collected</div><div class="vl">${fm(tRev,CUR)}</div></div>
      <div class="stat"><div class="lb">Pending</div><div class="vl" style=${{color:pendingTotal>0?"var(--wn)":"var(--ok)"}}>${fm(pendingTotal,CUR)}</div><div class="su">${pending.length} unpaid</div></div>
      <div class="stat"><div class="lb">Avg Payment</div><div class="vl">${fm(data.payments.length?data.payments.reduce((a,p)=>a+(p.amount||0),0)/data.payments.length:0,CUR)}</div></div>
    </div>
    <div class="card" style=${{padding:0}}>
      <div style=${{padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"2px solid var(--bk)",gap:10,flexWrap:"wrap"}}>
        <h3 style=${{fontFamily:"var(--fh)",fontSize:20,letterSpacing:1.5,margin:0}}>PAYMENTS</h3>
        <div style=${{display:"flex",gap:8,alignItems:"center"}}>
          <div class="sb-x" style=${{border:"1.5px solid var(--g200)"}}>${ic('srch')}<input placeholder="Filter by student..." value=${search} onInput=${e=>setSearch(e.target.value)} style=${{width:140}}/></div>
          <button class="btn btn-p btn-sm" onClick=${()=>{setForm(mkPayment());setShow(true);}}>${ic('plus')} Add</button>
        </div>
      </div>
    <div style=${{overflowX:"auto"}}><table><thead><tr><th>Date</th><th>Student</th><th>Amount</th><th>Status</th><th>Method</th><th>Lessons+</th><th>Notes</th><th></th></tr></thead><tbody>
      ${filtered.map(p=>{const st=data.students.find(s=>s.id===p.studentId); return h`<tr key=${p.id} style=${{background:p.status!=="Paid"?"#fff8f0":"transparent"}}>
        <td style=${{fontWeight:600}}>${fmt(p.date)}</td>
        <td>${st?.name||"?"}</td>
        <td style=${{fontFamily:"var(--fh)",fontSize:18}}>${fm(p.amount,CUR)}</td>
        <td><button class=${"btn btn-xs "+(p.status==="Paid"?"btn-done":"btn-d")} onClick=${()=>toggleStatus(p.id)} style=${{minWidth:70,justifyContent:"center"}}>${p.status==="Paid"?"✓ Paid":"Pending"}</button></td>
        <td>${p.method}</td>
        <td>${p.lessonsAdded||"—"}</td>
        <td style=${{fontSize:12,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis"}}>${p.notes||"—"}</td>
        <td style=${{whiteSpace:"nowrap"}}>${p.status==="Paid"&&h`<button class="bi" title="Print Invoice" onClick=${()=>printInvoice(p,st,S)}>${ic('pdf')}</button>`}<button class="bi" onClick=${()=>{setForm({...p});setShow(true);}}>${ic('edt')}</button><button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>{
          if(confirm("Delete this payment record?")) setData({...data,payments:data.payments.filter(x=>x.id!==p.id)});
        }}>${ic('del')}</button></td>
      </tr>`;})}
      ${filtered.length===0&&h`<tr><td colspan="8" style=${{textAlign:"center",color:"var(--g400)",padding:30}}>No payments</td></tr>`}
    </tbody></table></div></div>
    ${show && h`<${Modal} title=${data.payments.find(p=>p.id===form.id)?"EDIT PAYMENT":"ADD PAYMENT"} onClose=${()=>setShow(false)} footer=${h`<button class="btn" onClick=${()=>setShow(false)}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>`}>
      <div class="fr"><div class="fg"><label>Student</label><select value=${form.studentId} onChange=${e=>setForm({...form,studentId:e.target.value})}><option value="">— Select —</option>${data.students.map(s=>h`<option key=${s.id} value=${s.id}>${s.name}</option>`)}</select></div><div class="fg"><label>Date</label><input type="date" value=${form.date} onInput=${e=>setForm({...form,date:e.target.value})}/></div></div>
      <div class="fr3"><div class="fg"><label>Amount (${CUR})</label><input type="number" value=${form.amount} onInput=${e=>setForm({...form,amount:+e.target.value})}/></div><div class="fg"><label>Method</label><select value=${form.method} onChange=${e=>setForm({...form,method:e.target.value})}>${S.payMethods.map(m=>h`<option key=${m}>${m}</option>`)}</select></div><div class="fg"><label>Lessons Added</label><input type="number" value=${form.lessonsAdded} onInput=${e=>setForm({...form,lessonsAdded:+e.target.value})}/></div></div>
      <div class="fr"><div class="fg"><label>Status</label><select value=${form.status||"Pending"} onChange=${e=>setForm({...form,status:e.target.value})}><option value="Pending">Pending</option><option value="Paid">Paid</option></select></div><div class="fg"><label>Notes</label><input value=${form.notes} onInput=${e=>setForm({...form,notes:e.target.value})}/></div></div>
    <//>`}
  </div>`;
}

// ─── RESOURCES (links, YouTube videos, PDFs for students) ───
function Resources({data, setData, auth}) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkResource());
  const [rType, setRType] = useState("link"); // "link" | "pdf"
  const [fetching, setFetching] = useState(false);
  const [filter, setFilter] = useState("All");
  const fileRef = useRef(null);
  const resources = data.resources || [];
  const cats = [...new Set(resources.map(r => r.category || "General").filter(Boolean))];
  const list = filter === "All" ? resources : resources.filter(r => (r.category||"General") === filter);

  const openAdd = () => { const f = mkResource(); setForm(f); setRType("link"); setShow(true); };
  const openEdit = r => { setForm({...r}); setRType(r.type==="pdf"?"pdf":"link"); setShow(true); };

  const fetchPreview = async () => {
    let raw = form.url.trim();
    if (!raw) return alert("Paste a URL first.");
    // Auto-add https:// if missing
    if (!/^https?:\/\//i.test(raw)) raw = "https://" + raw;
    // Update the form URL in case we fixed it
    setForm(f => ({...f, url: raw}));
    setFetching(true);
    try {
      const d = await apiPost("/api/og", { url: raw });
      if (d && !d.error) {
        setForm(f => ({
          ...f,
          url: raw,
          title: f.title || d.title || "",
          ogTitle: d.title || "",
          ogImage: d.image || "",
          ogDescription: d.description || "",
          type: d.type || "link",
          videoId: d.videoId || f.videoId || "",
        }));
      } else {
        // Preview failed but URL is still valid — let user save manually
        setForm(f => ({...f, url: raw}));
        alert("Could not load a preview for this URL — you can still save it manually with your own title.");
      }
    } catch(e) {
      alert("Preview failed — check the URL and try again.");
    }
    setFetching(false);
  };

  const handleFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 50e6) { alert("Max 50MB"); return; }
    const r = new FileReader();
    r.onload = () => setForm(frm => ({...frm, fileName:f.name, fileData:r.result, title:frm.title||f.name.replace(/\.[^.]+$/,""), type:"pdf"}));
    r.readAsDataURL(f);
  };

  const doSave = async () => {
    if (rType === "pdf") {
      if (!form.fileData) return alert("Please upload a PDF file.");
    } else {
      if (!form.url.trim()) return alert("Please enter a URL.");
    }
    const displayTitle = form.title || form.ogTitle || form.fileName || form.url;
    const toSave = {...form, title: displayTitle, type: rType==="pdf"?"pdf":(form.type||"link"), id: form.id || uid(), addedAt: form.addedAt || new Date().toISOString()};
    const ex = resources.find(r => r.id === toSave.id);
    setData({...data, resources: ex ? resources.map(r => r.id === toSave.id ? toSave : r) : [...resources, toSave]});
    setShow(false); setForm(mkResource());
    // Notify all active students about the new resource
    if (!ex && auth?.token) {
      const activeStudents = (data.students||[]).filter(s => s.active && s.email);
      for (const st of activeStudents) {
        notifyStudent(auth.token, st.email, '📚 New Resource Added', `Hadi added "${displayTitle}" to your library — check it out!`, 'new-resource');
      }
    }
  };

  const safeDomain = url => { try { return new URL(url).hostname.replace(/^www\./,""); } catch { return url; } };

  return h`<div>
    <div style=${{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
      <div style=${{display:"flex",gap:3,flexWrap:"wrap"}}>
        ${["All",...cats].map(t=>h`<button key=${t} class=${"btn btn-sm "+(filter===t?"btn-p":"")} onClick=${()=>setFilter(t)}>${t}</button>`)}
      </div>
      <button class="btn btn-p" onClick=${openAdd}>+ Add Resource</button>
    </div>
    ${list.length===0 ? h`<div class="empty"><h3>NO RESOURCES YET</h3><p>Add YouTube videos, websites, articles, or PDFs for your students</p></div>` : h`
    <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
      ${list.map(r => {
        const isPdf = r.type==="pdf" || (r.fileData&&r.fileData.length>0) || (r.fileName&&r.fileName.toLowerCase().endsWith(".pdf"));
        const thumb = !isPdf && (r.ogImage || (r.type==="youtube"&&r.videoId ? `https://img.youtube.com/vi/${r.videoId}/hqdefault.jpg` : ""));
        const handleClick = () => isPdf ? downloadFile(r.fileName||"resource.pdf", r.fileData) : window.open(r.url,"_blank");
        return h`<div key=${r.id} class="res-card" onClick=${handleClick}>
          ${isPdf ? h`<div style=${{background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px 0",fontSize:40,borderBottom:"1px solid #eee"}}>📄</div>` : (thumb && h`<div class="res-thumb">
            <img src=${thumb} alt="" onError=${e=>{e.target.parentNode.style.display="none"}}/>
            ${r.type==="youtube" && h`<div class="res-play"><svg viewBox="0 0 24 24" fill="white" style=${{width:22,height:22,marginLeft:3}}><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`}
          </div>`)}
          <div class="res-body">
            <div class="res-title">${r.title||r.ogTitle||r.fileName||r.url}</div>
            ${(r.description||r.ogDescription)&&h`<div class="res-desc">${r.description||r.ogDescription}</div>`}
            <div class="res-meta">
              ${r.category&&h`<span class="tg" style=${{fontSize:9,padding:"1px 6px"}}>${r.category}</span>`}
              <span style=${{fontSize:10,color:"var(--g400)"}}>${isPdf?"📎 PDF":(r.type==="youtube"?"▶ YouTube":"🔗 "+safeDomain(r.url))}</span>
              <div style=${{marginLeft:"auto",display:"flex",gap:2}} onClick=${e=>e.stopPropagation()}>
                <button class="bi" style=${{padding:4}} onClick=${()=>openEdit(r)}>${ic('edt')}</button>
                <button class="bi" style=${{padding:4,color:"var(--bd)"}} onClick=${()=>{if(confirm("Delete this resource?"))setData({...data,resources:resources.filter(x=>x.id!==r.id)});}}>${ic('del')}</button>
              </div>
            </div>
          </div>
        </div>`;
      })}
    </div>`}
    ${show && h`<${Modal} title=${resources.find(r=>r.id===form.id)?"EDIT RESOURCE":"ADD RESOURCE"} onClose=${()=>setShow(false)} footer=${h`<button class="btn" onClick=${()=>setShow(false)}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>`}>
      <div style=${{display:"flex",gap:6,marginBottom:16}}>
        <button class=${"btn btn-sm "+(rType==="link"?"btn-p":"")} onClick=${()=>setRType("link")}>🔗 Link / Video</button>
        <button class=${"btn btn-sm "+(rType==="pdf"?"btn-p":"")} onClick=${()=>setRType("pdf")}>📄 PDF File</button>
      </div>
      ${rType==="link" ? h`<div>
        <div class="fg">
          <label>URL — paste a website or YouTube link</label>
          <div style=${{display:"flex",gap:8,alignItems:"stretch"}}>
            <input value=${form.url} onInput=${e=>setForm({...form,url:e.target.value})} placeholder="https://..." style=${{flex:1}}/>
            <button class="btn btn-p btn-sm" onClick=${fetchPreview} disabled=${fetching} style=${{flexShrink:0,minWidth:90,opacity:fetching?.6:1}}>${fetching?"Loading...":"🔍 Preview"}</button>
          </div>
        </div>
        ${form.ogImage&&h`<div style=${{marginBottom:14,borderRadius:8,overflow:"hidden",border:"1px solid var(--g200)",maxHeight:180}}>
          <img src=${form.ogImage} style=${{width:"100%",maxHeight:180,objectFit:"cover",display:"block"}} onError=${e=>{e.target.parentNode.style.display="none"}}/>
        </div>`}
      </div>` : h`<div>
        <div class="fg">
          <label>PDF File (max 50MB)</label>
          <div class="fu" onClick=${()=>fileRef.current?.click()} style=${{cursor:"pointer"}}>
            <input ref=${fileRef} type="file" accept=".pdf,application/pdf" onChange=${handleFile} style=${{display:"none"}}/>
            ${form.fileName ? h`<span>${ic('fi')} ${form.fileName}</span>` : h`<p style=${{fontWeight:600}}>Click to upload PDF</p>`}
          </div>
        </div>
      </div>`}
      <div class="fg"><label>Title</label><input value=${form.title||(rType==="link"?form.ogTitle:"")} onInput=${e=>setForm({...form,title:e.target.value})} placeholder=${rType==="link"?"Auto-filled after preview":"Name for this PDF"}/></div>
      <div class="fg"><label>Description (optional)</label><textarea value=${form.description||(rType==="link"?form.ogDescription:"")} onInput=${e=>setForm({...form,description:e.target.value})} placeholder="What is this resource about?"/></div>
      <div class="fg"><label>Category</label><input value=${form.category} onInput=${e=>setForm({...form,category:e.target.value})} placeholder="e.g. Grammar, Vocabulary, Quran, Listening..."/></div>
    <//>`}
  </div>`;
}

// HOMEWORK — teacher overview of all HW
// ════════════════════════════════════════
function HomeworkView({data, onProfile}) {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const all = (data.homework||[]);
  const counts = {all:all.length,assigned:all.filter(x=>x.status==="assigned").length,submitted:all.filter(x=>x.status==="submitted").length,reviewed:all.filter(x=>x.status==="reviewed").length};
  const filtered = all
    .filter(hw=>filter==="all"||hw.status===filter)
    .filter(hw=>{
      if(!search) return true;
      const s=data.students.find(x=>x.id===hw.studentId);
      return s?.name?.toLowerCase().includes(search.toLowerCase())||hw.title.toLowerCase().includes(search.toLowerCase());
    })
    .sort((a,b)=>new Date(b.assignedDate)-new Date(a.assignedDate));
  return h`<div>
    <div style=${{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
      ${[["all","All"],["assigned","Pending"],["submitted","Submitted"],["reviewed","Reviewed"]].map(([k,l])=>h`<button key=${k} class=${"btn btn-sm "+(filter===k?"btn-p":"")} onClick=${()=>setFilter(k)}>${l}${counts[k]>0?" ("+counts[k]+")":""}</button>`)}
      <div class="sb-x" style=${{marginLeft:"auto"}}>${ic('srch')}<input placeholder="Search student or task..." value=${search} onInput=${e=>setSearch(e.target.value)}/></div>
    </div>
    ${filtered.length===0?h`<div class="empty"><h3>NO HOMEWORK</h3><p>Assign homework from a student profile page</p></div>`:
    h`<div class="card" style=${{padding:0}}>
      <div style=${{overflowX:"auto"}}><table><thead><tr><th>Student</th><th>Task</th><th>Due</th><th>Status</th><th>Submitted</th><th></th></tr></thead><tbody>
        ${filtered.map(hw=>{
          const s=data.students.find(x=>x.id===hw.studentId);
          return h`<tr key=${hw.id}>
            <td style=${{fontWeight:600,cursor:"pointer",textDecoration:"underline"}} onClick=${()=>onProfile(hw.studentId)}>${s?.name||"?"}</td>
            <td>${hw.title}</td>
            <td style=${{whiteSpace:"nowrap"}}>${fmt(hw.dueDate)}</td>
            <td><span class=${"bg "+(hw.status==="reviewed"?"bg-ok":hw.status==="submitted"?"bg-wn":"bg-n")}>${hw.status}</span></td>
            <td style=${{fontSize:12,color:"var(--g500)"}}>${hw.submittedAt?fmt(hw.submittedAt):"—"}</td>
            <td><button class="btn btn-xs" onClick=${()=>onProfile(hw.studentId)}>Profile →</button></td>
          </tr>`;
        })}
      </tbody></table></div>
    </div>`}
  </div>`;
}

// SETTINGS — with currency & week start

function Settings({data, setData}) {
  const S = data.settings;
  const u = (k,v) => setData({...data, settings:{...S,[k]:v}});
  // Draft state for text-typed fields so typing doesn't call setData on every keystroke
  const [sd, setSd] = useState({brand:S.brand||"",sub:S.sub||"",currency:S.currency||"$",msgDay:S.msgDay||"",msgHour:S.msgHour||"",msgGen:S.msgGen||""});
  const sset = (k,v) => setSd(d=>({...d,[k]:v}));
  const ssave = k => u(k, sd[k]);
  const [storage, setStorage] = useState(null);
  useEffect(() => { getStorageEstimate().then(est => setStorage(est)); }, [data]);
  const dataSizeMB = (new Blob([JSON.stringify(data)]).size / 1024 / 1024).toFixed(2);

  return h`<div>
    <div class="card"><h3>STORAGE</h3>
      <div style=${{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>

        ${storage && storage.quota > 0 && h`<div><div style=${{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:600,color:"var(--g500)"}}>Browser Quota</div><div style=${{fontFamily:"var(--fh)",fontSize:32}}>${(storage.quota/1024/1024).toFixed(0)} MB</div></div>`}
      </div>
    </div>
    <div class="card"><h3>BRANDING</h3>

        <div style=${{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <div style=${{width:80,height:80,borderRadius:"50%",overflow:"hidden",border:"2px solid var(--g200)",background:"var(--g100)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            ${S.tutorAvatar ? h`<img src=${S.tutorAvatar} style=${{width:"100%",height:"100%",objectFit:"cover"}}/>` : h`<span style=${{fontSize:32}}>👤</span>`}
          </div>
          <label style=${{cursor:"pointer",fontSize:11,fontWeight:700,textTransform:"uppercase",padding:"5px 10px",border:"1.5px solid var(--g300)",borderRadius:6,whiteSpace:"nowrap"}}>
            📷 ${S.tutorAvatar?"Change":"Upload"} Photo
            <input type="file" accept="image/*" style=${{display:"none"}} onInput=${e=>{
              const f=e.target.files[0]; if(!f) return;
              const canvas=document.createElement("canvas"); const img=new Image(); const url=URL.createObjectURL(f);
              img.onload=()=>{const sz=300;const s=Math.min(sz/img.width,sz/img.height,1);canvas.width=img.width*s;canvas.height=img.height*s;canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);const av=canvas.toDataURL("image/jpeg",0.85);u("tutorAvatar",av);pushImages({...S,tutorAvatar:av});URL.revokeObjectURL(url);};
              img.src=url;
            }}/>
          </label>
          ${S.tutorAvatar && h`<button class="btn btn-sm" style=${{fontSize:10,padding:"3px 8px"}} onClick=${()=>u("tutorAvatar","")}>Remove</button>`}
        </div>
        <div style=${{flex:1,minWidth:200}}>
          <div class="fr"><div class="fg"><label>App Title</label><input value=${sd.brand} onInput=${e=>sset("brand",e.target.value)} onBlur=${()=>ssave("brand")}/></div><div class="fg"><label>Subtitle</label><input value=${sd.sub} onInput=${e=>sset("sub",e.target.value)} onBlur=${()=>ssave("sub")}/></div></div>
        </div>

      <p style=${{fontSize:12,color:"var(--g500)",marginBottom:16}}>Pick a preset — one click applies all colors at once.</p>

    <div class="card"><h3>📅 MY AVAILABILITY</h3>

      ${(()=>{
        const avail = S.availability || {};
        const dur = S.lessonDuration || 60;
        const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        const dayShort = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

        const setDay = (dayIdx, patch) => {
          const cur = avail[dayIdx] || {enabled:false,ranges:[]};
          u("availability", {...avail, [dayIdx]: {...cur, ...patch}});
        };
        const addRange = (dayIdx) => {
          const cur = avail[dayIdx] || {enabled:true,ranges:[]};
          u("availability", {...avail, [dayIdx]: {...cur, ranges:[...(cur.ranges||[]),{start:"09:00",end:"17:00"}]}});
        };
        const rmRange = (dayIdx, ri) => {
          const cur = avail[dayIdx];
          u("availability", {...avail, [dayIdx]: {...cur, ranges:cur.ranges.filter((_,i)=>i!==ri)}});
        };
        const updRange = (dayIdx, ri, key, val) => {
          const cur = avail[dayIdx];
          const ranges = cur.ranges.map((r,i)=>i===ri?{...r,[key]:val}:r);
          u("availability", {...avail, [dayIdx]: {...cur, ranges}});
        };

        const enabledCount = [0,1,2,3,4,5,6].filter(i=>(avail[i]||{}).enabled).length;

        return h`<div>
          <!-- Lesson duration setting -->
          <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:20,padding:"12px 14px",background:"var(--g50)",border:"1.5px solid var(--g200)",borderRadius:8,flexWrap:"wrap"}}>

            <select value=${dur} onChange=${e=>u("lessonDuration",+e.target.value)} style=${{border:"2px solid var(--bk)",padding:"7px 10px",fontFamily:"var(--fb)",fontSize:13,borderRadius:7,fontWeight:700}}>
              <option value=${30}>30 min</option>
              <option value=${45}>45 min</option>
              <option value=${60}>60 min (1 hour)</option>
              <option value=${90}>90 min</option>
              <option value=${120}>2 hours</option>

            <span style=${{fontSize:11,color:"var(--g400)"}}>Students book in these blocks</span>

          <!-- Day toggles -->
          <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:16}}>
            ${[0,1,2,3,4,5,6].map(i => {

              return h`<button key=${i} onClick=${()=>setDay(i,{enabled:!day.enabled})} style=${{
                padding:"10px 4px",borderRadius:8,fontWeight:800,fontSize:11,cursor:"pointer",
                border:day.enabled?"2px solid var(--bk)":"2px solid var(--g200)",
                background:day.enabled?"var(--bk)":"var(--wh)",
                color:day.enabled?"var(--wh)":"var(--g400)",
                transition:"all .15s",textAlign:"center",lineHeight:1.3

            })}
          </div>

          <!-- Per-day time ranges -->
          ${[0,1,2,3,4,5,6].map(i => {
            const day = avail[i] || {enabled:false,ranges:[]};
            if (!day.enabled) return null;
            return h`<div key=${i} style=${{marginBottom:12,padding:"12px 14px",border:"2px solid var(--bk)",borderRadius:10,background:"var(--wh)"}}>
              <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>

              ${(day.ranges||[]).map((r,ri)=>h`<div key=${ri} class="avail-range-row" style=${{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"10px 12px",background:"var(--g50)",borderRadius:8,border:"1.5px solid var(--g200)"}}>
                <div style=${{display:"flex",alignItems:"center",gap:6,flex:1,flexWrap:"wrap"}}>
                  <span style=${{fontSize:11,fontWeight:800,color:"var(--g600)",minWidth:34,textTransform:"uppercase",letterSpacing:.5}}>From</span>
                  <input type="time" value=${r.start} step="1800" onInput=${e=>updRange(i,ri,"start",e.target.value)} style=${{border:"2px solid var(--g200)",padding:"7px 10px",fontFamily:"var(--fb)",fontSize:15,borderRadius:7,fontWeight:700,flex:1,minWidth:120}}/>
                  <span style=${{fontSize:11,fontWeight:800,color:"var(--g600)",minWidth:16,textAlign:"center"}}>to</span>
                  <input type="time" value=${r.end} step="1800" onInput=${e=>updRange(i,ri,"end",e.target.value)} style=${{border:"2px solid var(--g200)",padding:"7px 10px",fontFamily:"var(--fb)",fontSize:15,borderRadius:7,fontWeight:700,flex:1,minWidth:120}}/>
                </div>
                <button onClick=${()=>rmRange(i,ri)} style=${{background:"rgba(200,0,0,0.07)",border:"1.5px solid rgba(200,0,0,0.2)",color:"var(--bd)",borderRadius:7,padding:"6px 10px",cursor:"pointer",fontWeight:800,fontSize:13,flexShrink:0}}>✕</button>
              </div>`)}
            </div>`;
          })}

          ${enabledCount===0&&h`<div style=${{textAlign:"center",padding:"20px",color:"var(--g400)",border:"2px dashed var(--g200)",borderRadius:8,marginTop:8}}>
            <div style=${{fontSize:24,marginBottom:6}}>📅</div>

        </div>`;
      })()}

// TUTOR PUSH NOTIFICATION SETTINGS
// ════════════════════════════════════════
function TutorPushSettings() {
  const [status, setStatus] = useState(() => {
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission; // 'default' | 'granted' | 'denied'
  });
  const [loading, setLoading] = useState(false);

  const enable = async () => {
    setLoading(true);
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { setStatus(perm); setLoading(false); return; }
    const auth = getAuth();
    const result = await window.registerPushNotifications?.(auth?.token);
    setStatus(result === 'ok' ? 'granted' : result || 'error');
    setLoading(false);
  };

  if (status === 'unsupported') return h`<p style=${{fontSize:13,color:"var(--g500)"}}>Push notifications are not supported on this browser.</p>`;
  if (status === 'denied') return h`<div>
    <p style=${{fontSize:13,color:"var(--bd)",marginBottom:8}}>🚫 Notifications are blocked on this device.</p>
    <p style=${{fontSize:12,color:"var(--g500)",lineHeight:1.7}}>To fix on iPhone: <b>Settings → Safari → arabic-enthusiast.vercel.app → Notifications → Allow</b>.<br/>On Android/Chrome: click the lock icon in the address bar → Notifications → Allow.</p>
  </div>`;
  if (status === 'granted') return h`<div>
    <p style=${{fontSize:13,color:"var(--ok)",fontWeight:700,marginBottom:6}}>✅ Notifications enabled on this device.</p>
    <p style=${{fontSize:12,color:"var(--g500)",marginBottom:10}}>You'll get notified when students complete tasks, submit homework, request lessons, or leave you notes.</p>
    <button class="btn btn-sm" onClick=${enable} disabled=${loading} style=${{marginBottom:12}}>${loading?"Refreshing...":"🔄 Refresh subscription"}</button>
    <div style=${{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#5f4300",lineHeight:1.7}}>
      <b>📱 Not getting alerts when your phone screen is off?</b><br/>
      Android: Go to <b>Settings → Apps → Chrome → Battery → Unrestricted</b>.<br/>
      iPhone: Make sure you've added this site to your Home Screen (PWA) — tap Share → Add to Home Screen.
    </div>
  </div>`;
  return h`<div>
    <p style=${{fontSize:13,color:"var(--g500)",marginBottom:10}}>Enable notifications so you get pinged when a student completes a task, submits homework, requests a lesson, or leaves you a note — even when the app is closed.</p>
    <button class="btn btn-p" style=${{width:"100%",justifyContent:"center",padding:"12px"}} onClick=${enable} disabled=${loading}>${loading?"Setting up...":"🔔 Enable Notifications"}</button>
    <p style=${{fontSize:11,color:"var(--g400)",marginTop:8,textAlign:"center"}}>Works on Android Chrome and desktop Chrome/Edge/Firefox. iPhone requires Add to Home Screen (iOS 16.4+).</p>
  </div>`;
}

// USER MANAGEMENT — teacher panel
// ════════════════════════════════════════
function UserManagement({auth, data, setData}) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("requests"); // requests | all | create
  const [createForm, setCreateForm] = useState({name:"",email:"",password:"",role:"student"});
  const [pwForm, setPwForm] = useState({email:"",password:""});
  const [msg, setMsg] = useState("");
  const [err, setErr] = useState("");

  const call = async body => apiPost("/api/users", {token: auth.token, ...body});

  const load = async () => {
    setLoading(true);
    const d = await call({action:"list"});
    setUsers(d.users || []);
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const pending = users.filter(u=>u.status==="pending");
  const approved = users.filter(u=>u.status==="approved");

  const approve = async (email, name, gender) => {
    await call({action:"approve", email});
    // Auto-create student profile if one doesn't exist yet
    if (data && setData) {
      const exists = (data.students||[]).find(s => s.email === email);
      if (!exists) {
        const S = data.settings;
        const newStudent = {...mkStudent(S), studentNumber: nextStudentNumber(data.students), name: name||email, email, gender: gender||"", enrollmentStatus:"pending"};
        setData({...data, students:[...data.students, newStudent]});
      }
    }
    setMsg("Approved! Student added to your list."); load();
  };
  const reject = async email => {
    if (!confirm("Reject and remove this request?")) return;
    await call({action:"reject", email});
    setMsg("Removed."); load();
  };
  const del = async email => {
    if (!confirm("Delete this user? They will lose access immediately.")) return;
    await call({action:"delete", email});
    setMsg("Deleted."); load();
  };
  const resetPw = async (email, pw) => {
    if (!pw || pw.length < 6) return setErr("Password must be at least 6 characters");
    const d = await call({action:"setPassword", email, password:pw});
    if (d.error) return setErr(d.error);
    setMsg("Password updated for "+email);
    setPwForm({email:"",password:""});
  };
  const create = async () => {
    setErr(""); setMsg("");
    if (!createForm.name||!createForm.email||!createForm.password) return setErr("All fields required");
    const d = await call({action:"create",...createForm});
    if (d.error) return setErr(d.error);
    setMsg("Account created for "+createForm.email);
    setCreateForm({name:"",email:"",password:"",role:"student"});
    load();
  };

  const fmt2 = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";

  if (loading) return h`<div style=${{textAlign:"center",padding:40,color:"var(--g400)"}}>Loading...</div>`;

  return h`<div>
    ${msg && h`<div style=${{padding:"10px 14px",background:"#f0fff4",border:"1px solid var(--ok)",marginBottom:14,fontSize:13,color:"var(--ok)",fontWeight:600}}>${msg}</div>`}
    ${err && h`<div style=${{padding:"10px 14px",background:"#fff0f0",border:"1px solid var(--bd)",marginBottom:14,fontSize:13,color:"var(--bd)",fontWeight:600}}>${err}</div>`}

    <div class="auth-tabs" style=${{marginBottom:20}}>
      <div class=${"auth-tab "+(tab==="requests"?"on":"")} onClick=${()=>{setTab("requests");setMsg("");setErr("");}}>Requests ${pending.length>0?h`<span style=${{marginLeft:4,background:"var(--bd)",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:700}}>${pending.length}</span>`:""}</div>
      <div class=${"auth-tab "+(tab==="all"?"on":"")} onClick=${()=>{setTab("all");setMsg("");setErr("");}}>All Users (${approved.length})</div>
      <div class=${"auth-tab "+(tab==="create"?"on":"")} onClick=${()=>{setTab("create");setMsg("");setErr("");}}>Create Account</div>
    </div>

    ${tab==="requests" && h`<div>
      ${pending.length===0 ? h`<div class="empty"><h3>NO PENDING REQUESTS</h3><p>When a student requests access, they'll appear here.</p></div>` :
      h`<div>${pending.map(u=>h`<div key=${u.email} class="assess-card" style=${{borderLeftColor:"var(--wn)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div>
            <div style=${{fontWeight:700,fontSize:15}}>${u.name}</div>
            <div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>${u.email}</div>
            <div style=${{fontSize:11,color:"var(--g400)",marginTop:2}}>Requested: ${fmt2(u.createdAt)}${u.gender?" · "+(u.gender==="female"?"👩 Female":"👨 Male"):""}</div>
            ${u.learnType&&h`<div style=${{fontSize:11,color:"#1976d2",marginTop:2}}>Wants to learn: ${u.learnType}</div>`}
            ${u.message&&h`<div style=${{marginTop:8,padding:"8px 10px",background:"var(--g50)",fontSize:12,lineHeight:1.6,borderLeft:"2px solid var(--g300)"}}>"${u.message}"</div>`}
          </div>
          <div style=${{display:"flex",gap:6,flexShrink:0}}>
            <button class="btn btn-p btn-sm" onClick=${()=>approve(u.email, u.name, u.gender)}>✓ Approve</button>
            <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>reject(u.email)}>✗ Reject</button>
          </div>
        </div>
      </div>`)}</div>`}
    </div>`}

    ${tab==="all" && h`<div>
      ${approved.length===0 ? h`<div class="empty"><h3>NO APPROVED USERS</h3></div>` :
      h`<div class="card" style=${{padding:0}}>
        <div style=${{overflowX:"auto"}}><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Since</th><th>Reset Password</th><th></th></tr></thead><tbody>
          ${approved.map(u=>h`<tr key=${u.email}>
            <td style=${{fontWeight:600}}>${u.name}</td>
            <td style=${{fontSize:12}}>${u.email}</td>
            <td><span class="tg">${u.role}</span></td>
            <td style=${{fontSize:12,color:"var(--g500)"}}>${fmt2(u.createdAt)}</td>
            <td>
              <div style=${{display:"flex",gap:4,alignItems:"center"}}>
                <input style=${{padding:"5px 8px",border:"1.5px solid var(--g200)",fontFamily:"var(--fb)",fontSize:12,width:120}} type="password" placeholder="New password" value=${pwForm.email===u.email?pwForm.password:""} onFocus=${()=>setPwForm({email:u.email,password:""})} onInput=${e=>setPwForm({email:u.email,password:e.target.value})}/>
                <button class="btn btn-xs" onClick=${()=>resetPw(u.email, pwForm.email===u.email?pwForm.password:"")}>Set</button>
              </div>
            </td>
            <td><button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>del(u.email)}>${ic('del')}</button></td>
          </tr>`)}
        </tbody></table></div>
      </div>`}
    </div>`}

    ${tab==="create" && h`<div class="card" style=${{maxWidth:480}}>
      <h3 style=${{marginBottom:16}}>CREATE ACCOUNT</h3>
      <div class="fg"><label>Name</label><input value=${createForm.name} onInput=${e=>setCreateForm({...createForm,name:e.target.value})} placeholder="Student's full name"/></div>
      <div class="fg"><label>Email</label><input type="email" value=${createForm.email} onInput=${e=>setCreateForm({...createForm,email:e.target.value})}/></div>
      <div class="fg"><label>Password</label><input type="password" value=${createForm.password} onInput=${e=>setCreateForm({...createForm,password:e.target.value})} placeholder="Min 6 characters"/></div>
      <div class="fg"><label>Role</label><select value=${createForm.role} onChange=${e=>setCreateForm({...createForm,role:e.target.value})}><option value="student">Student</option><option value="tutor">Tutor</option></select></div>
      <button class="btn btn-p" onClick=${create}>Create Account</button>
      <div style=${{marginTop:10,fontSize:11,color:"var(--g500)",lineHeight:1.6}}>Share the email and password with the student via WhatsApp. They can log in immediately.</div>
    </div>`}
  </div>`;
}

// REQUESTS INBOX — unified notifications
// ════════════════════════════════════════
function RequestsInbox({auth, data, setData, onProfile}) {
  const [users, setUsers] = useState([]);
  const [tab, setTab] = useState("all");
  const [createForm, setCreateForm] = useState({name:"",email:"",password:"",role:"student"});
  const [pwForm, setPwForm] = useState({email:"",password:""});
  const [msg, setMsg] = useState("");
  const [err, setErr] = useState("");

  const call = async body => apiPost("/api/users", {token: auth.token, ...body});
  const load = async () => { const d = await call({action:"list"}); setUsers(d.users||[]); };
  useEffect(() => { load(); }, []);

  const approve = async (email, name, gender, phone) => {
    setErr("");
    try {
      const r = await call({action:"approve", email});
      if (r.error) { setErr("Could not approve: " + r.error); return; }
    } catch(e) { setErr("Network error: " + e.message); return; }

    // Build the new student profile
    const exists = (data.students||[]).find(s => s.email && s.email.toLowerCase() === email.toLowerCase());
    let newData = data;
    let newStudentId = exists ? exists.id : null;
    if (!exists) {
      const newStudent = {
        ...mkStudent(data.settings),
        studentNumber: nextStudentNumber(data.students),
        name: name || email,
        email: email.toLowerCase(),
        phone: phone || "",
        whatsapp: phone || "",
        gender: gender || "",
        active: true,
        enrollmentStatus: "pending"
      };
      newStudentId = newStudent.id;
      newData = {...data, students:[...(data.students||[]), newStudent]};
      setData(newData);
    }

    // Immediately back up to the cloud so the profile is available on any device
    try {
      await apiPost("/api/data", {token: auth.token, action:"backup", data: newData});
    } catch(e) { /* backup failed — local state still updated */ }

    load();
    // Navigate straight to the new student's profile so tutor can fill in details
    if (newStudentId && onProfile) onProfile(newStudentId);
  };
  const reject = async email => { await call({action:"reject", email}); setMsg("Rejected."); load(); };
  const create = async () => {
    if (!createForm.name||!createForm.email||!createForm.password) return setErr("Fill all fields");
    const d = await call({action:"create",...createForm});
    if (d.error) return setErr(d.error);

    // If creating a student, also add their profile to data.students
    if ((createForm.role||"student") === "student") {
      const exists = (data.students||[]).find(s => s.email && s.email.toLowerCase() === createForm.email.toLowerCase());
      if (!exists) {
        const newStudent = {
          ...mkStudent(data.settings),
          studentNumber: nextStudentNumber(data.students),
          name: createForm.name,
          email: createForm.email.toLowerCase(),
          active: true,
          enrollmentStatus: "pending"
        };
        const newData = {...data, students:[...(data.students||[]), newStudent]};
        setData(newData);
        try { await apiPost("/api/data", {token: auth.token, action:"backup", data: newData}); } catch(e) {}
        setCreateForm({name:"",email:"",password:"",role:"student"}); load();
        if (onProfile) onProfile(newStudent.id);
        return;
      }
    }
    setMsg("Account created for "+createForm.email);
    setCreateForm({name:"",email:"",password:"",role:"student"}); load();
  };
  const resetPw = async () => {
    if (!pwForm.password||pwForm.password.length<6) return setErr("Min 6 chars");
    const d = await call({action:"setPassword",...pwForm});
    if (d.error) return setErr(d.error);
    setMsg("Password updated!"); setPwForm({email:"",password:""});
  };

  const pending = users.filter(u=>u.status==="pending");
  const approved = users.filter(u=>u.status==="approved");
  const pendingReqs = (data.lessonRequests||[]).filter(r=>r.status==="pending");
  const studentNotes = (data.students||[]).filter(s=>s.studentNote&&s.studentNote.trim());
  const submittedHw = (data.homework||[]).filter(hw=>hw.status==="submitted");

  const confirmReq = req => {
    const st = (data.students||[]).find(s=>s.id===req.studentId);
    const S = data.settings;
    const newLesson = {id:uid(),studentId:req.studentId,groupId:"",date:req.preferredDate||today(),time:req.preferredTime||"10:00",duration:req.duration||60,type:st?.type||(S.types||[])[0]||"Levantine",status:"Scheduled",notes:"Requested by student"};
    const updated = (data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"confirmed"}:r);
    // Auto-increment lesson count when confirmed
    const updatedStudents = data.students.map(s=>s.id===req.studentId
      ? {...s, lessonsTaken: Math.max(0, (s.lessonsTaken||0))} // lessonsTaken only increments on Completed; just add lesson
      : s);
    setData({...data, lessons:[...data.lessons,newLesson], lessonRequests:updated, students:updatedStudents});
    // Open Google Calendar for Hadi
    window.open(gcalUrl(newLesson, st?.name||"Student"), "_blank");
    if (st?.whatsapp) {
      waMsg(st.whatsapp, "✅ Hi " + (st.name.split(" ")[0]) + "! Your Arabic lesson is confirmed for " + (req.preferredDate||today()) + " at " + (req.preferredTime||"10:00") + ". See you then! 🎓");
    }
  };
  const declineReq = req => { setData({...data, lessonRequests:(data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"declined"}:r)}); };
  const clearNote = sid => setData({...data, students:data.students.map(s=>s.id===sid?{...s,studentNote:""}:s)});

  const totalBadge = pending.length + pendingReqs.length + studentNotes.length + submittedHw.length;
  const badge = n => n>0 ? h`<span style=${{marginLeft:5,background:"#e53935",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:800}}>${n}</span>` : null;

  return h`<div>
    ${msg&&h`<div style=${{padding:"10px 14px",background:"#f0fff4",border:"1px solid var(--ok)",marginBottom:14,fontSize:13,color:"var(--ok)",fontWeight:600}}>${msg}</div>`}

    <div class="auth-tabs" style=${{marginBottom:20}}>

      <div class=${"auth-tab "+(tab==="approvals"?"on":"")} onClick=${()=>{setTab("approvals");setMsg("");setErr("");}}>✅ Approvals ${badge(pending.length)}</div>
      <div class=${"auth-tab "+(tab==="users"?"on":"")} onClick=${()=>{setTab("users");setMsg("");setErr("");}}>👥 Users (${approved.length})</div>
      <div class=${"auth-tab "+(tab==="create"?"on":"")} onClick=${()=>{setTab("create");setMsg("");setErr("");}}>➕ Create</div>
    </div>

    ${tab==="all" && h`<div>
      ${totalBadge===0 && h`<div class="empty"><h3>ALL CLEAR</h3><p>No pending requests or messages.</p></div>`}

      ${pending.length>0 && h`<div class="card" style=${{borderLeftColor:"#ff9800",borderLeftWidth:4}}>
        <h3 style=${{color:"#ff9800",marginBottom:12}}>🔔 New Sign-up Requests (${pending.length})</h3>

      ${pendingReqs.length>0 && h`<div class="card" style=${{borderLeftColor:"#1976d2",borderLeftWidth:4}}>
        <h3 style=${{color:"#1976d2",marginBottom:12}}>📅 Lesson Requests (${pendingReqs.length})</h3>
        ${pendingReqs.map(req=>{const st=(data.students||[]).find(s=>s.id===req.studentId);return h`<div key=${req.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--g100)"}}>

          <div style=${{display:"flex",gap:6,flexShrink:0}}>
            <button class="btn btn-p btn-sm" onClick=${()=>confirmReq(req)}>✓ Confirm</button>
            <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>declineReq(req)}>✗ Decline</button>
          </div>
        </div>`;})}
      </div>`}

      ${studentNotes.length>0 && h`<div class="card" style=${{borderLeftColor:"#7b1fa2",borderLeftWidth:4}}>
        <h3 style=${{color:"#7b1fa2",marginBottom:12}}>✉️ Student Notes (${studentNotes.length})</h3>
        ${studentNotes.map(s=>h`<div key=${s.id} style=${{padding:"8px 0",borderBottom:"1px solid var(--g100)"}}>

      ${submittedHw.length>0 && h`<div class="card" style=${{borderLeftColor:"#2e7d32",borderLeftWidth:4}}>
        <h3 style=${{color:"#2e7d32",marginBottom:12}}>📝 Submitted Homework (${submittedHw.length})</h3>
        ${submittedHw.map(hw=>{const st=(data.students||[]).find(s=>s.id===hw.studentId);return h`<div key=${hw.id} style=${{padding:"8px 0",borderBottom:"1px solid var(--g100)"}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div style=${{flex:1}}>

              <div style=${{fontSize:13,color:"var(--g700)",background:"#f1f8e9",padding:"8px 10px",borderRadius:6,lineHeight:1.5}}>${hw.submissionText||"(no text)"}</div>
              ${hw.submissionUrl&&h`<a href=${hw.submissionUrl} target="_blank" style=${{fontSize:12,color:"#1976d2",display:"block",marginTop:4}}>🔗 Attached link</a>`}
            </div>
            <button class="btn btn-sm" onClick=${()=>onProfile(st?.id)}>Review</button>

        </div>`;})}

    </div>`}

    ${tab==="approvals" && h`<div>
      ${pending.length===0 ? h`<div class="empty"><h3>NO PENDING REQUESTS</h3></div>` :
      h`<div>${pending.map(u=>h`<div key=${u.email} class="assess-card" style=${{borderLeftColor:"var(--wn)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>

            <div style=${{fontWeight:700,fontSize:15}}>${u.name}</div>
            <div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>${u.email}${u.phone?" · "+u.phone:""}</div>
            ${u.learnType&&h`<div style=${{marginTop:5,fontSize:11,background:"#e8f4fd",color:"#1565c0",padding:"3px 8px",borderRadius:4,display:"inline-block",fontWeight:700}}>Wants to learn: ${u.learnType}</div>`}
            ${u.message&&h`<div style=${{marginTop:6,fontSize:13,color:"var(--g600)",fontStyle:"italic",lineHeight:1.5}}>"${u.message}"</div>`}
          </div>
          <div style=${{display:"flex",gap:6,flexShrink:0,flexDirection:"column",alignItems:"flex-end"}}>
            <button class="btn btn-p btn-sm" onClick=${()=>approve(u.email,u.name,u.gender,u.phone)}>✓ Approve</button>
            <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>reject(u.email)}>✗ Reject</button>
            ${u.phone&&h`<a href=${"https://wa.me/"+u.phone.replace(/[^0-9+]/g,"")} target="_blank" class="btn btn-sm btn-wa">WhatsApp</a>`}
          </div>
        </div>
      </div>`)}</div>`}
    </div>`}

    ${tab==="users" && h`<div>
      ${approved.length===0 ? h`<div class="empty"><h3>NO USERS</h3></div>` :
      h`<div class="card" style=${{padding:0}}>
        <div style=${{overflowX:"auto"}}><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Since</th><th>Actions</th></tr></thead><tbody>
          ${approved.map(u=>h`<tr key=${u.email}>
            <td style=${{fontWeight:600}}>${u.name}</td>
            <td style=${{fontSize:12}}>${u.email}</td>
            <td><span class="tg">${u.role}</span></td>
            <td style=${{fontSize:11,color:"var(--g500)"}}>${u.createdAt?new Date(u.createdAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"—"}</td>
            <td style=${{whiteSpace:"nowrap",display:"flex",gap:6}}>
              <button class="btn btn-sm" onClick=${()=>setPwForm({email:u.email,password:""})}>🔑 Reset PW</button>
              ${u.role!=="tutor"&&h`<button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>{if(confirm("Delete account for "+u.name+"? They will lose access immediately."))call({action:"delete",email:u.email}).then(()=>{setMsg("Deleted "+u.name);load();})}}>✕ Delete</button>`}
            </td>
          </tr>`)}
        </tbody></table></div>
      </div>`}
      ${pwForm.email&&h`<div class="card" style=${{marginTop:14}}>
        <h4>Reset Password for ${pwForm.email}</h4>
        <div class="fr">
          <div class="fg"><label>New Password</label><input type="password" value=${pwForm.password} onInput=${e=>setPwForm({...pwForm,password:e.target.value})} placeholder="Min 6 characters"/></div>
          <button class="btn btn-p" style=${{alignSelf:"flex-end"}} onClick=${resetPw}>Save</button>
          <button class="btn" style=${{alignSelf:"flex-end"}} onClick=${()=>setPwForm({email:"",password:""})}>Cancel</button>
        </div>

    ${tab==="create" && h`<div class="card">
      <h3>CREATE ACCOUNT</h3>
      <div class="fg"><label>Name</label><input value=${createForm.name} onInput=${e=>setCreateForm({...createForm,name:e.target.value})} placeholder="Student's full name"/></div>
      <div class="fg"><label>Email</label><input type="email" value=${createForm.email} onInput=${e=>setCreateForm({...createForm,email:e.target.value})}/></div>
      <div class="fg"><label>Password</label><input type="password" value=${createForm.password} onInput=${e=>setCreateForm({...createForm,password:e.target.value})} placeholder="Min 6 characters"/></div>
      <div class="fg"><label>Role</label><select value=${createForm.role} onChange=${e=>setCreateForm({...createForm,role:e.target.value})}><option value="student">Student</option><option value="tutor">Tutor</option></select></div>
      <button class="btn btn-p" onClick=${create}>Create Account</button>
      <div style=${{marginTop:10,fontSize:11,color:"var(--g500)",lineHeight:1.6}}>Share the email and password with the student. They can log in immediately.</div>
    </div>`}

}

// MAIN APP with Auth
// ════════════════════════════════════════
function App() {
  const [data, setData] = useState(null);
  const [view, setView] = useState(() => {
    try {
      const s = localStorage.getItem('ae_view');
      if (!s || s === 'profile') return 'dashboard';
      // Remap old view names after merge
      if (s === 'scheduling' || s === 'calendar') return 'lessons';
      if (s === 'curriculum' || s === 'resources') return 'materials';
      return s;
    } catch { return 'dashboard'; }
  });
  const [profileId, setProfileId] = useState(null);
  const [auth, setAuth] = useState(null); // {user, role}
  const [checkingAuth, setCheckingAuth] = useState(true);
  const [pendingUsers, setPendingUsers] = useState(0);

  // Check existing session from localStorage token
  useEffect(() => {
    (async () => {
      const stored = getAuth();
      if (stored?.token) {
        try {
          const d = await apiPost("/api/auth", {action:"validate", token: stored.token});
          if (d.valid) {
            setAuth({...stored, token: stored.token, role: d.role, name: d.name, email: d.email, user: {email: d.email, id: d.email}});
          } else {
            clearAuthStore();
          }
        } catch { /* network error — let them try again */ }
      }
      setCheckingAuth(false);
    })();
  }, []);

  // Load data — always try cloud first, fall back to local IndexedDB
  useEffect(() => {
    if (!auth) return;
    const action = auth.role === 'student' ? 'studentRead' : 'restore';
    const mergeImages = async (d) => {
      // Load background images from their separate cloud key and merge into settings
      if (auth.role !== 'tutor') return d;
      try {
        const ir = await apiPost('/api/data', {token: auth.token, action:'restoreImages'});
        if (ir.images && Object.keys(ir.images).length > 0) {
          return {...d, settings:{...d.settings, ...ir.images}};
        }
      } catch {}
      return d;
    };
    apiPost('/api/data', {token: auth.token, action})
      .then(async d => {
        if (d.data) {
          // Cloud has data — use it, also save locally
          const migrated = migrateData(d.data);
          const withImages = await mergeImages(migrated);
          setData(withImages);
          save(withImages);
        } else {
          // Cloud empty — fall back to local (tutor's own device)
          const local = await loadData();
          setData(local);
        }
      })
      .catch(async () => {
        // Network error — use local
        const local = await loadData();
        setData(local);
      });
  }, [auth]);
  // Save locally on change
  useEffect(() => { if (data) save(data); }, [data]);
  // Auto cloud backup — tutor: 3s first load then 8s; students: 5s delay
  const backupTimer = useRef(null);
  const firstBackup = useRef(true);
  useEffect(() => {
    if (!data || !auth) return;
    clearTimeout(backupTimer.current);
    const isTutor = auth.role === "tutor";
    const delay = isTutor ? (firstBackup.current ? 3000 : 8000) : 5000;
    firstBackup.current = false;
    const action = isTutor ? "backup" : "studentWrite";
    backupTimer.current = setTimeout(async () => {
      try { await apiPost("/api/data", {token: auth.token, action, data}); } catch {}
    }, delay);
    return () => clearTimeout(backupTimer.current);
  }, [data]);

  // Save to cloud immediately when tab/browser is closed
  useEffect(() => {
    if (!auth) return;
    const handler = () => {
      if (!data) return;
      const action = auth.role === "tutor" ? "backup" : "studentWrite";
      const body = JSON.stringify({token: auth.token, action, data});
      try {
        navigator.sendBeacon ? navigator.sendBeacon("/api/data", new Blob([body], {type:"application/json"}))
          : fetch("/api/data", {method:"POST", headers:{"Content-Type":"application/json"}, body, keepalive:true});
      } catch {}
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [data, auth]);

  // Badge: fetch pending user count whenever data changes (tutor only)
  useEffect(() => {
    if (!auth?.token || auth.role !== 'tutor') return;
    apiPost("/api/users", {token: auth.token, action:"list"})
      .then(d => setPendingUsers((d.users||[]).filter(u=>u.status==="pending").length))
      .catch(()=>{});
  }, [data, auth]);

  const [syncStatus, setSyncStatus] = useState(""); // "", "syncing", "ok", "err"
  const manualSync = async () => {
    if (!data || !auth?.token) return;
    setSyncStatus("syncing");
    try {
      await apiPost("/api/data", {token: auth.token, action:"backup", data});
      setSyncStatus("ok");
      setTimeout(() => setSyncStatus(""), 3000);
    } catch { setSyncStatus("err"); setTimeout(() => setSyncStatus(""), 3000); }
  };

  const update = useCallback(d => setData(d), []);
  const openProfile = id => { setProfileId(id); setView("profile"); };
  const handleLogout = async () => {
    const stored = getAuth();
    if (stored?.token) apiPost("/api/auth", {action:"logout", token: stored.token}).catch(()=>{});
    clearAuthStore();
    setAuth(null); setData(null);
  };

  if (checkingAuth) return h`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"var(--fh)",fontSize:28,letterSpacing:3}}>LOADING...</div>`;
  if (!auth) return h`<${AuthScreen} onAuth=${a=>setAuth({...a, user:{email:a.email||a.user?.email,id:a.email||a.user?.email}})}/>`;

  if (!data) return h`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"var(--fh)",fontSize:28,letterSpacing:3}}>LOADING...</div>`;

  // Student role → student portal
  if (auth.role === "student") return h`<${StudentPortal} data=${data} setData=${update} user=${auth.user} auth=${auth} onLogout=${handleLogout}/>`;

  const S = data ? data.settings : null;
  const submittedHw = data ? (data.homework||[]).filter(hw=>hw.status==="submitted").length : 0;
  const pendingLessonReqs = data ? (data.lessonRequests||[]).filter(r=>r.status==="pending").length : 0;
  const studentNoteCount = data ? data.students.filter(s=>s.studentNote&&s.studentNote.trim()).length : 0;
  const totalRequestsBadge = pendingUsers + pendingLessonReqs + studentNoteCount;
  const badges = {
    students: 0,
    homework: submittedHw,
    lessons: pendingLessonReqs,
  };

  const nav = [
    ["dashboard","Dashboard","dash"],
    ["students","Students","stu"],
    ["lessons","Lessons","cal"],
    ["payments","Payments","pay"],
    ["materials","Materials","cur"],
    ["homework","Homework","hw"],
    ["settings","Settings","set"]
  ];
  // Remap old view names for activeNav highlight
  const navViewMap = {scheduling:"lessons", calendar:"lessons", curriculum:"materials", resources:"materials", requests:"dashboard"};
  const activeNav = view === "profile" ? "students" : (navViewMap[view] || view);

  // Apply theme CSS vars
  const accent         = S.themeAccent||"#c9922a";
  const sidebarBg      = S.themeSidebar||"#000000";
  const sidebarText    = S.themeSidebarText||"#cccccc";
  const pageBg         = S.themeBackground||"#fafafa";
  const topbarBg       = S.themeTopbar||"#ffffff";
  const topbarBorder   = S.themeTopbarBorder||"#000000";
  const cardBg         = S.themeCardBg||"#ffffff";
  const cardBorder     = S.themeCardBorder||"#000000";
  const statBg         = S.themeStatBg||"#ffffff";
  const statBorder     = S.themeStatBorder||"#000000";
  const tblHdrBg       = S.themeTableHeader||"#000000";
  const tblHdrText     = S.themeTableHeaderText||"#ffffff";
  const calHdrBg       = S.themeCalHeader||"#000000";
  const calHdrText     = S.themeCalHeaderText||"#ffffff";
  const primBtn        = S.themePrimaryBtn||"#000000";
  const primBtnText    = S.themePrimaryBtnText||"#ffffff";
  const textMain       = S.themeTextMain||"#000000";
  const fontH          = S.themeFontHeading||"Bebas Neue";
  const fontB          = S.themeFontBody||"DM Sans";
  const fontBrand      = S.themeFontBrand||"Bebas Neue";
  const fontSizeH      = S.themeFontSizeHeading||28;
  const fontSizeB      = S.themeFontSizeBody||14;
  const fontSizeBrand  = S.themeFontSizeBrand||24;
  const bgImage        = S.themeBackgroundImage||"";
  const bgImageX       = S.themeBackgroundImageX !== undefined ? S.themeBackgroundImageX : 50;

// ── Error Boundary — catches any render crash so users see a message, not a blank page ──
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error('[App Error]', error, info?.componentStack);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{fontFamily:'sans-serif',padding:'40px 20px',textAlign:'center',maxWidth:520,margin:'80px auto'}},
        React.createElement('div', {style:{fontSize:52,marginBottom:16}}, '⚠️'),
        React.createElement('h2', {style:{color:'#333',marginBottom:8,fontFamily:'sans-serif'}}, 'Something went wrong'),
        React.createElement('p', {style:{color:'#888',fontSize:13,marginBottom:4}}, 'Error: ' + (this.state.error?.message || 'Unknown error')),
        React.createElement('p', {style:{color:'#aaa',fontSize:11,marginBottom:20}}, 'Check the browser console for details, then reload.'),
        React.createElement('button', {onClick:()=>location.reload(), style:{padding:'10px 28px',background:'#000',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:14,fontFamily:'sans-serif'}}, 'Reload App')
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, h`<${App}/>`)
);

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function registerPush(token) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return 'unsupported';
  if (Notification.permission === 'denied') return 'denied';
  try {
    // Ensure SW is active — with 10s timeout so it never hangs
    const reg = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, rej) => setTimeout(() => rej(new Error('SW timeout')), 10000))
    ]);
    // Always unsubscribe stale subscription and get a fresh one
    const existing = await reg.pushManager.getSubscription();
    if (existing) await existing.unsubscribe();
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    const r = await fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, subscription: sub.toJSON() })
    });
    return r.ok ? 'ok' : 'server_error';
  } catch (e) {
    console.warn('Push registration failed:', e.message);
    return 'error';
  }
}

window.registerPushNotifications = registerPush;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => reg.update()) // force check for new SW version
      .catch(e => console.warn('SW:', e));
  });
}
