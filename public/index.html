// STUDENT WEEKLY TASKS (student view — urgency grows each day)
// ════════════════════════════════════════
function StudentWeeklyTasks({student, data, setData, auth}) {
  const tasks = student.weeklyTasks || [];
  const pending = tasks.filter(t => !t.doneAt);
  const done = tasks.filter(t => t.doneAt);

  const markDone = async (id) => {
    const task = tasks.find(t => t.id === id);
    const updated = tasks.map(t => t.id===id ? {...t, doneAt: new Date().toISOString()} : t);
    setData({...data, students: data.students.map(s => s.id===student.id ? {...s, weeklyTasks: updated} : s)});
    if (auth?.token && task) notifyTutor(auth.token, '✅ Task completed', `${student.name} completed: "${task.text}"`, 'task-done');
  };

  const urgencyStyle = (task) => {
    const days = Math.floor((Date.now() - new Date(task.assignedAt)) / 86400000);
    if (days <= 1) return {
      fontSize:13, padding:"14px 16px", background:"#fff", border:"2px solid #e0e0e0",
      borderRadius:12, marginBottom:10, display:"flex", alignItems:"center", gap:12, cursor:"pointer"
    };
    if (days <= 3) return {
      fontSize:14, padding:"16px 18px", background:"#fff8e1", border:"2px solid #ff9800",
      borderRadius:12, marginBottom:10, display:"flex", alignItems:"center", gap:12, cursor:"pointer", fontWeight:500
    };
    if (days <= 5) return {
      fontSize:15, padding:"18px 20px", background:"#fff3e0", border:"3px solid #f44336",
      borderRadius:12, marginBottom:10, display:"flex", alignItems:"center", gap:12, cursor:"pointer", fontWeight:700
    };
    return {
      fontSize:16, padding:"20px 22px", background:"#ffebee", border:"3px solid #c62828",
      borderRadius:12, marginBottom:10, display:"flex", alignItems:"center", gap:12, cursor:"pointer",
      fontWeight:700, animation:"pulse 1.2s infinite", boxShadow:"0 0 12px rgba(198,40,40,0.3)"
    };
  };

  const urgencyLabel = (task) => {
    const days = Math.floor((Date.now() - new Date(task.assignedAt)) / 86400000);
    if (days <= 1) return null;
    if (days <= 3) return h`<span style=${{fontSize:10,background:"#ff9800",color:"#fff",padding:"2px 7px",borderRadius:20,fontWeight:700,flexShrink:0}}>${days}d</span>`;
    if (days <= 5) return h`<span style=${{fontSize:10,background:"#f44336",color:"#fff",padding:"2px 7px",borderRadius:20,fontWeight:700,flexShrink:0}}>⚠️ ${days}d overdue</span>`;
    return h`<span style=${{fontSize:10,background:"#c62828",color:"#fff",padding:"2px 7px",borderRadius:20,fontWeight:700,flexShrink:0}}>🚨 ${days}d — DO THIS NOW</span>`;
  };

  if (tasks.length === 0) return null;

  return h`<div style=${{background:"#fff",borderRadius:12,padding:"18px 20px",marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:"1px solid #eee"}}>
    <div style=${{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"var(--g500)",marginBottom:14}}>
      📋 Your Tasks This Week
      ${pending.length>0&&h`<span style=${{marginLeft:8,background:"var(--bd)",color:"#fff",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>${pending.length} to do</span>`}
    </div>

    ${pending.length===0&&h`<div style=${{textAlign:"center",padding:"12px 0",color:"var(--ok)",fontWeight:700,fontSize:14}}>✅ All done! Great work this week!</div>`}

    ${pending.map(task => h`<div key=${task.id} style=${urgencyStyle(task)} onClick=${()=>markDone(task.id)}>
      <div style=${{width:22,height:22,border:"2px solid currentColor",borderRadius:6,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",opacity:0.5}}>☐</div>
      <div style=${{flex:1,lineHeight:1.5}}>${task.text}</div>
      ${urgencyLabel(task)}
    </div>`)}

    ${done.length>0&&h`<div style=${{marginTop:8,borderTop:"1px solid #f0f0f0",paddingTop:10}}>
      ${done.map(task=>h`<div key=${task.id} style=${{fontSize:12,color:"var(--g400)",padding:"6px 0",display:"flex",alignItems:"center",gap:8,textDecoration:"line-through"}}>
        <span style=${{color:"var(--ok)"}}>✅</span>${task.text}
      </div>`)}
    </div>`}
  </div>`;
}

// ════════════════════════════════════════
// AUTH SCREEN — login + request access + first setup
// ════════════════════════════════════════
function AuthScreen({onAuth}) {
  const [mode, setMode] = useState("login"); // login | request | setup
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [learnType, setLearnType] = useState("Levantine");
  const [gender, setGender] = useState("female");
  const [message, setMessage] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");

  const reset = () => { setError(""); setSuccess(""); };

  const doLogin = async () => {
    if (!email || !password) return setError("Email and password required");
    setLoading(true); reset();
    const d = await apiPost("/api/auth", {action:"login", email, password});
    setLoading(false);
    if (d.error === "pending") return setError("Your request is pending. Your teacher hasn't confirmed it yet.");
    if (d.error === "rejected") return setError("Access denied. Contact your teacher.");
    if (d.error) return setError(d.error);
    if (d.error === "kv_not_configured") return setError("Storage not connected yet. Go to vercel.com → your project → Storage tab → Create KV database → Connect to project → redeploy.");
    setAuthStore(d);
    onAuth({token: d.token, role: d.role, name: d.name, email: d.email, user: {email: d.email, id: d.email}});
    // If notification permission was already granted on a previous visit, silently refresh the subscription
    if ('Notification' in window && Notification.permission === 'granted') {
      window.registerPushNotifications?.(d.token);
    }
  };

  const doRequest = async () => {
    if (!name || !phone || !email || !password) return setError("Name, phone, email and password are all required");
    if (password.length < 6) return setError("Password must be at least 6 characters");
    setLoading(true); reset();
    const d = await apiPost("/api/auth", {action:"request", name, phone, email, password, learnType, gender, message});
    setLoading(false);
    if (d.error) return setError(d.error);
    setSuccess("Request sent! Hadi will review your request and get back to you soon.");
    setMode("login");
  };

  const doSetup = async () => {
    if (!name || !email || !password) return setError("All fields required");
    setLoading(true); reset();
    const d = await apiPost("/api/auth", {action:"setup", name, email, password});
    setLoading(false);
    if (d.error) return setError(d.error);
    setSuccess("Tutor account created! You can now log in.");
    setMode("login");
  };

  return h`<div class="auth-wrap">
    <div class="auth-box">
      <div style=${{textAlign:"center",marginBottom:8}}><img src="/logo.jpeg" style=${{width:110,height:110,objectFit:"contain",borderRadius:20}}/></div>
      <h1 style=${{textAlign:"center"}}>ARABIC ENTHUSIAST</h1>
      <div class="sub" style=${{textAlign:"center"}}>Student Management System</div>

      <div class="auth-tabs" style=${{marginBottom:20}}>
        <div class=${"auth-tab "+(mode==="login"?"on":"")} onClick=${()=>{setMode("login");reset();}}>Log In</div>
        <div class=${"auth-tab "+(mode==="request"?"on":"")} onClick=${()=>{setMode("request");reset();}}>Request Access</div>
      </div>

      ${mode==="login" && h`<div>
        <div class="fg"><label>Email</label><input type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="your@email.com" onKeyDown=${e=>e.key==="Enter"&&doLogin()}/></div>
        <div class="fg"><label>Password</label><input type="password" value=${password} onInput=${e=>setPassword(e.target.value)} placeholder="Your password" onKeyDown=${e=>e.key==="Enter"&&doLogin()}/></div>
        <button class="btn btn-p" style=${{width:"100%",justifyContent:"center",padding:"12px"}} onClick=${doLogin} disabled=${loading}>${loading?"Please wait...":"Log In"}</button>
        <div style=${{marginTop:12,fontSize:11,color:"var(--g500)",textAlign:"center",cursor:"pointer"}} onClick=${()=>{setMode("setup");reset();}}>First time setting up? →</div>
      </div>`}

      ${mode==="request" && h`<div>
        <div class="fg"><label>Your Full Name *</label><input value=${name} onInput=${e=>setName(e.target.value)} placeholder="e.g. Sarah Johnson"/></div>
        <div class="fg"><label>Gender *</label>
          <div style=${{display:"flex",gap:16,marginTop:4}}>
            ${[["female","👩 Female"],["male","👨 Male"]].map(([v,l])=>h`<label key=${v} style=${{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:14,fontWeight:gender===v?700:400}}>
              <input type="radio" name="gender" value=${v} checked=${gender===v} onChange=${()=>setGender(v)} style=${{accentColor:"#111",width:16,height:16}}/>
              ${l}
            </label>`)}
          </div>
        </div>
        <div class="fg"><label>Phone / WhatsApp (with country code) *</label><input value=${phone} onInput=${e=>setPhone(e.target.value)} placeholder="e.g. +1 555 123 4567"/></div>
        <div class="fg"><label>Email *</label><input type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="your@email.com"/></div>
        <div class="fg"><label>Choose a Password *</label><input type="password" value=${password} onInput=${e=>setPassword(e.target.value)} placeholder="Min 6 characters"/></div>
        <div class="fg"><label>What would you like to learn? *</label>
          <select value=${learnType} onChange=${e=>setLearnType(e.target.value)}>
            <option value="Levantine">🗣 Levantine Arabic (Lebanese dialect)</option>
            <option value="Classical">📜 Classical / Modern Standard Arabic (MSA)</option>
            <option value="Quranic">🕌 Quranic Arabic</option>
            <option value="General Dialect">💬 General Arabic Dialect</option>
            <option value="Quranic + Dialect">🕌💬 Quranic + Dialect (combined)</option>
          </select>
        </div>
        <div class="fg"><label>Notes to Hadi (optional)</label><textarea value=${message} onInput=${e=>setMessage(e.target.value)} placeholder="e.g. I'm a complete beginner... or I want to improve my reading for travel..." style=${{minHeight:70}}/></div>
        <button class="btn btn-p" style=${{width:"100%",justifyContent:"center",padding:"12px"}} onClick=${doRequest} disabled=${loading}>${loading?"Sending...":"Send Request to Hadi"}</button>
        <div style=${{marginTop:10,fontSize:11,color:"var(--g500)",lineHeight:1.6}}>Hadi will review your info and confirm your access shortly.</div>
      </div>`}

      ${mode==="setup" && h`<div>
        <div style=${{marginBottom:16,padding:"10px 12px",background:"#fff8f0",border:"2px solid var(--wn)",fontSize:12,lineHeight:1.6}}>First-time setup. Create your tutor account.</div>
        <div class="fg"><label>Your Name</label><input value=${name} onInput=${e=>setName(e.target.value)} placeholder="Your name"/></div>
        <div class="fg"><label>Email</label><input type="email" value=${email} onInput=${e=>setEmail(e.target.value)}/></div>
        <div class="fg"><label>Password</label><input type="password" value=${password} onInput=${e=>setPassword(e.target.value)} placeholder="Min 6 characters"/></div>
        <button class="btn btn-p" style=${{width:"100%",justifyContent:"center",padding:"12px"}} onClick=${doSetup} disabled=${loading}>${loading?"Creating...":"Create Tutor Account"}</button>
        <div style=${{marginTop:10,fontSize:11,color:"var(--g500)",cursor:"pointer"}} onClick=${()=>{setMode("login");reset();}}>← Back to login</div>
      </div>`}

      ${error && h`<div class="error" style=${{marginTop:12}}>${error}</div>`}
      ${success && h`<div class="success" style=${{marginTop:12}}>${success}</div>`}
    </div>
  </div>`;
}

// ════════════════════════════════════════
// STUDENT SCHEDULER — Calendly-style 2-week calendar
// Availability is set per weekday in Settings.
// Students pick a day, then a time, then confirm.
// ════════════════════════════════════════
function StudentScheduler({student, data, setData, auth}) {
  // view: "cal" = 2-week calendar, "times" = time list for selected day, "confirm" = booking confirmation
  const [view, setView] = useState("cal");
  const [selDate, setSelDate] = useState(null); // selected Date object
  const [selSlot, setSelSlot] = useState(null); // {date, time, duration}
  const [bookedSlots, setBookedSlots] = useState(null); // loaded from API
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState("");

  const avail       = (data.settings.availability && !Array.isArray(data.settings.availability)) ? data.settings.availability : {};
  const lessonDur   = data.settings.lessonDuration || 60;
  const blockedDates = data.settings.blockedDates || [];
  const tz        = student.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
  const accent    = student.studentTheme || "#1976d2";
  const credits   = typeof student.remainingClasses === "number"
    ? student.remainingClasses
    : Math.max(0, (student.lessonsTotal||0) - (student.lessonsTaken||0));

  const flash = (m, isErr) => {
    if (isErr) setErr(m); else setMsg(m);
    setTimeout(() => { setErr(""); setMsg(""); }, 4000);
  };

  // Load already-booked slots so we can grey them out
  useEffect(() => {
    apiPost("/api/schedule", {token: auth.token, action:"getSlots"})
      .then(r => setBookedSlots(r.slots || []))
      .catch(() => setBookedSlots([]));
  }, []);

  // ── Helpers ────────────────────────────────────────────────────────────────
  const toMin = t => { const [h,m] = (t||"00:00").split(":").map(Number); return h*60+(m||0); };

  const fmtDateTime = (dateStr, timeStr) => {
    try {
      const dt = new Date(dateStr+"T"+timeStr+":00");
      return {
        dayName:   dt.toLocaleDateString("en-GB",{weekday:"long",  timeZone:tz}),
        dateLabel: dt.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric",timeZone:tz}),
        timeLabel: dt.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:tz}),
      };
    } catch { return {dayName:"",dateLabel:dateStr,timeLabel:timeStr}; }
  };

  // Build available time slots for a given Date object (uses weekly availability)
  const getTimesForDate = (date) => {
    const dateStr = date.toISOString().split("T")[0];
    if (blockedDates.includes(dateStr)) return []; // tutor blocked this specific date
    const dow     = date.getDay(); // 0=Sun … 6=Sat
    const dayAvail = avail[dow];
    if (!dayAvail || !dayAvail.enabled || !(dayAvail.ranges||[]).length) return [];

    const now   = new Date();
    // Slots already taken on this date (booked or completed)
    const taken = (bookedSlots||[]).filter(s => s.date === dateStr && s.status !== "cancelled" && s.status !== "open");

    const slots = [];
    dayAvail.ranges.forEach(range => {
      const [sh,sm] = (range.start||"00:00").split(":").map(Number);
      const [eh,em] = (range.end||"00:00").split(":").map(Number);
      let cur = sh*60+(sm||0);
      const endMin = eh*60+(em||0);
      while (cur + lessonDur <= endMin) {
        const timeStr  = String(Math.floor(cur/60)).padStart(2,"0")+":"+String(cur%60).padStart(2,"0");
        const slotDt   = new Date(dateStr+"T"+timeStr+":00");
        const conflict = taken.some(s => { const ss=toMin(s.time), se=ss+(s.duration||60); return cur<se && (cur+lessonDur)>ss; });
        if (!conflict && slotDt > now) {
          slots.push({date:dateStr, time:timeStr, duration:lessonDur});
        }
        cur += lessonDur;
      }
    });
    return slots;
  };

  // Build the 14-day list (tomorrow → 14 days out)
  const now = new Date();
  const days = Array.from({length:14}, (_,i) => {
    const d = new Date(now); d.setDate(now.getDate()+i+1); return d;
  });

  const anyAvail = Object.values(avail).some(d => d && d.enabled);

  // My upcoming bookings
  const todayStr  = now.toISOString().split("T")[0];
  const myBookings = (bookedSlots||[])
    .filter(s => s.studentId===student.id && s.status==="booked" && s.date>=todayStr)
    .sort((a,b) => (a.date+a.time)<(b.date+b.time)?-1:1);

  // ── Actions ────────────────────────────────────────────────────────────────
  const doBook = async () => {
    if (!selSlot) return;
    setBusy(true); setErr("");
    try {
      const r = await apiPost("/api/schedule", {token:auth.token, action:"bookSlot", date:selSlot.date, time:selSlot.time, duration:selSlot.duration});
      if (r.error) {
        setErr(r.message || r.error);
      } else {
        setBookedSlots(prev => [...(prev||[]), r.slot]);
        setView("cal"); setSelDate(null); setSelSlot(null);
        flash(r.calendarWarning ? "Booked! (Note: " + r.calendarWarning + ")" : "Booked! See you at your lesson.");
        const {dayName,dateLabel,timeLabel} = fmtDateTime(selSlot.date, selSlot.time);
        notifyTutor(auth.token, "📅 Lesson booked!", `${student.name} booked ${dayName} ${dateLabel} at ${timeLabel}`, "booking");
      }
    } catch(e) { setErr(e.message); }
    setBusy(false);
  };

  const doCancel = async (slotId) => {
    if (!confirm("Cancel this booking? The time slot will reopen.")) return;
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token:auth.token, action:"cancelBooking", slotId});
      if (r.error) flash(r.error, true);
      else setBookedSlots(prev => (prev||[]).map(s => s.id===slotId ? {...s,status:"open",studentId:null,studentName:null} : s));
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };


  // ── Render ─────────────────────────────────────────────────────────────────
  return h`<div style=${{fontFamily:"var(--fb)"}}>

    <!-- Credit badge -->
    <div style=${{display:"flex",alignItems:"center",gap:14,background:"#fff",borderRadius:12,padding:"14px 18px",marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:"1px solid #eee",borderTop:"3px solid "+accent}}>
      <div style=${{textAlign:"center",minWidth:56}}>
        <div style=${{fontFamily:"var(--fh)",fontSize:42,lineHeight:1,color:credits<=0?"var(--bd)":credits<=2?"var(--wn)":accent}}>${credits}</div>
        <div style=${{fontSize:10,color:"var(--g500)",textTransform:"uppercase",letterSpacing:1,marginTop:3}}>Classes Left</div>
      </div>
      <div style=${{flex:1}}>
        ${credits<=0 ? h`<div style=${{fontSize:14,fontWeight:700,color:"var(--bd)"}}>No classes remaining</div><div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>Contact Hadi to top up your balance.</div>`
          : credits<=2 ? h`<div style=${{fontSize:14,fontWeight:700,color:"var(--wn)"}}>Running low — ${credits} left</div><div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>Consider asking Hadi to top up soon.</div>`
          : h`<div style=${{fontSize:14,fontWeight:700}}>Ready to book</div><div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>Pick a day, then a time. 1 class deducted after session ends.</div>`}
      </div>
    </div>

    ${err && h`<div style=${{background:"#ffebee",border:"1px solid var(--bd)",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"var(--bd)",fontSize:13,fontWeight:600}}>${err}</div>`}
    ${msg && h`<div style=${{background:"#e8f5e9",border:"1px solid var(--ok)",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"var(--ok)",fontSize:13,fontWeight:600}}>${msg}</div>`}

    <!-- Upcoming bookings -->
    ${myBookings.length>0 && h`<div style=${{marginBottom:18}}>
      <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"var(--g500)",marginBottom:8}}>Your upcoming sessions</div>
      ${myBookings.map(sl => {
        const {dayName,dateLabel,timeLabel} = fmtDateTime(sl.date, sl.time);
        return h`<div key=${sl.id} style=${{background:"#fff",borderLeft:"4px solid "+accent,borderRadius:10,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style=${{flex:1}}>
            <div style=${{fontWeight:800,fontSize:14}}>${dayName}, ${dateLabel}</div>
            <div style=${{fontSize:13,color:accent,fontWeight:700,marginTop:2}}>${timeLabel} · ${sl.duration} min</div>
          </div>
          <button style=${{background:"none",border:"1px solid var(--bd)",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"var(--fb)",color:"var(--bd)"}} onClick=${()=>doCancel(sl.id)}>Cancel</button>
        </div>`;
      })}
    </div>`}

    <!-- No availability configured yet -->
    ${!anyAvail && h`<div style=${{background:"#f9f9f9",borderRadius:12,padding:"36px",textAlign:"center",border:"1px dashed var(--g300)"}}>
      <div style=${{fontSize:36,marginBottom:10}}>📅</div>
      <div style=${{fontSize:14,fontWeight:700,color:"var(--g500)"}}>No schedule set up yet</div>
      <div style=${{fontSize:12,color:"var(--g400)",marginTop:4}}>Hadi hasn't set up availability yet — check back soon!</div>
    </div>`}

    <!-- ── CALENDAR VIEW ──────────────────────────────────────── -->
    ${anyAvail && view==="cal" && h`<div>
      ${bookedSlots===null
        ? h`<div style=${{textAlign:"center",padding:"30px",color:"var(--g400)",fontSize:13}}>Loading calendar…</div>`
        : credits<=0
          ? h`<div style=${{background:"#fff8f8",borderRadius:10,padding:"24px",textAlign:"center",fontSize:13,color:"var(--bd)",border:"1px solid #ffd0d0"}}>No remaining classes. Contact Hadi to top up your balance before booking.</div>`
          : h`<div>
              <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"var(--g500)",marginBottom:12}}>Pick a day — next 2 weeks:</div>
              <!-- Day-of-week headers -->
              <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
                ${["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>h`<div key=${d} style=${{textAlign:"center",fontSize:9,fontWeight:700,color:"var(--g400)",letterSpacing:.5,padding:"2px 0"}}>${d}</div>`)}
              </div>
              <!-- Day cells -->
              <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                <!-- leading empty cells so first day aligns to correct column (Mon=0) -->
                ${Array.from({length:(days[0].getDay()+6)%7},(_,i)=>h`<div key=${"pad"+i}></div>`)}
                ${days.map(d => {
                  const dow      = d.getDay();
                  const dayAvail = avail[dow];
                  const hasAvail = dayAvail && dayAvail.enabled && (dayAvail.ranges||[]).length>0;
                  const times    = hasAvail && bookedSlots!==null ? getTimesForDate(d) : [];
                  const hasFree  = times.length>0;
                  const num      = d.getDate();
                  const mon      = d.toLocaleDateString("en-GB",{month:"short"});
                  return h`<button key=${d.toISOString()} disabled=${!hasFree}
                    onClick=${()=>{setSelDate(d);setView("times");setErr("");}}
                    style=${{
                      textAlign:"center",padding:"10px 4px",borderRadius:10,border:"none",
                      background: !hasAvail?"transparent":hasFree?"#fff":accent+"11",
                      color: !hasAvail?"var(--g200)":hasFree?accent:"var(--g400)",
                      cursor:hasFree?"pointer":"default",
                      fontFamily:"var(--fb)",width:"100%",
                      boxShadow:hasFree?"0 1px 4px "+accent+"33":"none",
                      transition:"all .12s"
                    }}
                    onMouseEnter=${e=>{if(hasFree){e.currentTarget.style.background=accent;e.currentTarget.style.color="#fff";}}}
                    onMouseLeave=${e=>{if(hasFree){e.currentTarget.style.background="#fff";e.currentTarget.style.color=accent;}}}
                  >
                    <div style=${{fontSize:15,fontWeight:800,lineHeight:1}}>${num}</div>
                    <div style=${{fontSize:9,opacity:.7,marginTop:1}}>${mon}</div>
                    ${hasAvail && hasFree  && h`<div style=${{fontSize:8,marginTop:3,color:"inherit",opacity:.8}}>${times.length} free</div>`}
                    ${hasAvail && !hasFree && h`<div style=${{fontSize:8,marginTop:3,color:"var(--bd)"}}>Full</div>`}
                  </button>`;
                })}
              </div>
              <div style=${{fontSize:11,color:"var(--g400)",marginTop:10,textAlign:"center"}}>Times shown in your timezone${tz!=="Asia/Beirut"?" ("+tz+")":""}</div>
            </div>`
      }
    </div>`}

    <!-- ── TIMES VIEW ─────────────────────────────────────────── -->
    ${view==="times" && selDate && (()=>{
      const times    = getTimesForDate(selDate);
      const dayName  = selDate.toLocaleDateString("en-GB",{weekday:"long", timeZone:tz});
      const dateLbl  = selDate.toLocaleDateString("en-GB",{day:"numeric",month:"long",timeZone:tz});
      return h`<div>
        <button style=${{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,color:"var(--g500)",marginBottom:14,padding:0,fontFamily:"var(--fb)"}} onClick=${()=>{setView("cal");setSelDate(null);}}>← Back</button>
        <div style=${{fontFamily:"var(--fh)",fontSize:22,letterSpacing:.5,marginBottom:2}}>${dayName}</div>
        <div style=${{fontSize:13,color:"var(--g500)",marginBottom:16}}>${dateLbl}</div>
        ${times.length===0
          ? h`<div style=${{background:"#f5f5f5",borderRadius:10,padding:"24px",textAlign:"center",fontSize:13,color:"var(--g500)"}}>All times on this day are taken. Go back and pick another day.</div>`
          : h`<div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:10}}>
              ${times.map(sl => {
                const {timeLabel} = fmtDateTime(sl.date, sl.time);
                return h`<button key=${sl.time}

// STUDENT LESSON SCHEDULER
// Shows Hadi's available slots for the next 4 weeks
// ════════════════════════════════════════
function StudentLessonRequest({student, data, setData, auth}) {
  const [selectedSlot, setSelectedSlot] = useState(null); // {date, time, duration}
  const [selDay, setSelDay]             = useState(null);  // dateStr e.g. "2025-05-10"
  const [note, setNote]                 = useState("");
  const [sent, setSent]                 = useState(false);
  const [view, setView]                 = useState("days"); // days | times | confirm
  const existing = (data.lessonRequests||[]).filter(r=>r.studentId===student.id&&r.status==="pending");
  const avail = (data.settings.availability&&!Array.isArray(data.settings.availability)) ? data.settings.availability : {};
  const lessonDuration = data.settings.lessonDuration||60;
  const anyDayEnabled = Object.values(avail).some(d=>d&&d.enabled);
  const blockedDates = data.settings.blockedDates || [];

  // Format display for student's timezone
  const tz = student.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
  const fmtSlot = (dateStr, timeStr) => {
    try {
      const dt = new Date(dateStr + "T" + timeStr + ":00");
      return {
        dayName: dt.toLocaleDateString("en-GB",{weekday:"long",timeZone:tz}),
        dateDisp: dt.toLocaleDateString("en-GB",{day:"numeric",month:"long",timeZone:tz}),
        timeDisp: dt.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:tz})
      };
    } catch { return {dayName:"",dateDisp:dateStr,timeDisp:timeStr}; }
  };

  // Build available time slots per date for next 4 weeks
  const buildDayMap = () => {
    if (!anyDayEnabled) return {};
    const map = {};
    const now = new Date();
    const confirmed = (data.lessonRequests||[]).filter(r=>r.status==="confirmed"||r.status==="pending");
    for (let d = 0; d < 28; d++) {
      const dt = new Date(now);
      dt.setDate(now.getDate() + d + 1);
      const dow = dt.getDay();
      const dateStr = dt.toISOString().split("T")[0];
      if (blockedDates.includes(dateStr)) continue; // tutor blocked this date
      const dayAvail = avail[dow];
      if (!dayAvail||!dayAvail.enabled||!dayAvail.ranges||dayAvail.ranges.length===0) continue;
      const times = [];
      dayAvail.ranges.forEach(range=>{
        const [sh,sm] = (range.start||"00:00").split(":").map(Number);
        const [eh,em] = (range.end||"00:00").split(":").map(Number);
        let cur = sh*60+(sm||0);
        const endMin = eh*60+(em||0);
        while (cur+lessonDuration <= endMin) {
          const timeStr = String(Math.floor(cur/60)).padStart(2,"0")+":"+String(cur%60).padStart(2,"0");
          const alreadyBooked = confirmed.some(r=>r.preferredDate===dateStr&&r.preferredTime===timeStr);
          const lessonBooked = (data.lessons||[]).some(l=>l.date===dateStr&&l.time===timeStr&&l.status!=="Cancelled");
          if (!alreadyBooked&&!lessonBooked) times.push({date:dateStr, time:timeStr, duration:lessonDuration});
          cur += lessonDuration;
        }
      });
      if (times.length>0) map[dateStr] = {date:dt, times};
    }
    return map;
  };

  const dayMap = buildDayMap();
  const dayKeys = Object.keys(dayMap).sort();

  const send = async () => {
    if (!selectedSlot) return;
    const req = {id:uid(),studentId:student.id,preferredDate:selectedSlot.date,preferredTime:selectedSlot.time,duration:selectedSlot.duration,message:note,status:"pending",requestedAt:new Date().toISOString()};
    const newData = {...data,lessonRequests:[...(data.lessonRequests||[]),req]};
    setData(newData);
    setSent(true); setView("days"); setSelDay(null); setSelectedSlot(null); setNote("");
    const stored = getAuth();
    if (stored?.token) {
      try { await apiPost("/api/data", {token: stored.token, action:"studentWrite", data: newData}); } catch {}
    }
    const {dayName,dateDisp,timeDisp} = fmtSlot(selectedSlot.date, selectedSlot.time);
    const msg = "📅 New lesson request from " + student.name + "!\n📆 " + dayName + ", " + dateDisp + " at " + timeDisp + (note?"\n💬 "+note:"") + "\n\nOpen the app to confirm: arabic-enthusiast.vercel.app";
    const tutorPhone = data.settings?.tutorPhone || "96176957495";
    waMsg(tutorPhone, msg);
    if (auth?.token) notifyTutor(auth.token, '📅 New Lesson Request', `${student.name} wants a lesson on ${dateDisp} at ${timeDisp}${note?" — "+note:""}`, 'lesson-request');
  };

  return h`<div style=${{background:"#fff",borderRadius:12,padding:"18px 20px",marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:"1px solid #eee"}}>
    <div style=${{fontSize:14,fontWeight:800,fontFamily:"var(--fh)",letterSpacing:1,marginBottom:4}}>📅 BOOK A LESSON</div>

    ${existing.length>0&&h`<div style=${{fontSize:13,background:"#fff8e1",border:"1px solid #ff9800",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#b26a00"}}>
      ⏳ You have ${existing.length} pending request${existing.length>1?"s":""} — waiting for Hadi to confirm.
    </div>`}

    ${sent&&h`<div style=${{fontSize:13,background:"#f0fff4",border:"1px solid var(--ok)",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"var(--ok)"}}>
      ✅ Request sent! Hadi will confirm your lesson shortly.
    </div>`}

    <!-- ── DAYS VIEW ────────────────────────────────────────── -->
    ${view==="days"&&h`<div>
      ${!anyDayEnabled
        ? h`<div style=${{textAlign:"center",padding:"20px",color:"var(--g400)",fontSize:13}}>No availability set up yet — check back soon!</div>`
        : dayKeys.length===0
          ? h`<div style=${{textAlign:"center",padding:"20px",color:"var(--g400)",fontSize:13}}>All slots for the next 4 weeks are taken. Check back soon!</div>`
          : h`<div>
              <div style=${{fontSize:11,color:"var(--g500)",marginBottom:14}}>Choose a day (shown in your local time):</div>
              <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8}}>
                ${dayKeys.map(dateStr=>{
                  const {date,times} = dayMap[dateStr];
                  const {dayName,dateDisp} = fmtSlot(dateStr,"00:00");
                  const num = date.getDate();
                  const mon = date.toLocaleDateString("en-GB",{month:"short"});
                  return h`<button key=${dateStr}
                    onClick=${()=>{setSelDay(dateStr);setView("times");setSent(false);}}
                    style=${{background:"#fff",border:"2px solid #e0e0e0",borderRadius:10,padding:"14px 10px",cursor:"pointer",textAlign:"center",transition:"all .15s",fontFamily:"var(--fb)"}}
                    onMouseEnter=${e=>{e.currentTarget.style.borderColor="#1976d2";e.currentTarget.style.background="#e3f2fd";}}
                    onMouseLeave=${e=>{e.currentTarget.style.borderColor="#e0e0e0";e.currentTarget.style.background="#fff";}}
                  >
                    <div style=${{fontSize:11,fontWeight:800,color:"#1976d2",textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>${dayName.slice(0,3)}</div>
                    <div style=${{fontSize:24,fontWeight:900,color:"#222",lineHeight:1}}>${num}</div>
                    <div style=${{fontSize:10,color:"#888",marginTop:2}}>${mon}</div>
                    <div style=${{fontSize:9,color:"#1976d2",marginTop:4,fontWeight:700}}>${times.length} time${times.length>1?"s":""}</div>
                  </button>`;
                })}
              </div>
            </div>`
      }
    </div>`}

    <!-- ── TIMES VIEW ───────────────────────────────────────── -->
    ${view==="times"&&selDay&&dayMap[selDay]&&(()=>{
      const {date, times} = dayMap[selDay];
      const {dayName,dateDisp} = fmtSlot(selDay,"00:00");
      return h`<div>
        <button style=${{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,color:"var(--g500)",marginBottom:14,padding:0,fontFamily:"var(--fb)"}} onClick=${()=>{setView("days");setSelDay(null);}}>← Back to days</button>
        <div style=${{fontFamily:"var(--fh)",fontSize:20,letterSpacing:.5,marginBottom:2}}>${dayName}</div>
        <div style=${{fontSize:13,color:"var(--g500)",marginBottom:14}}>${dateDisp}</div>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8}}>
          ${times.map(sl=>{
            const {timeDisp} = fmtSlot(sl.date,sl.time);
            return h`<button key=${sl.time}
              onClick=${()=>{setSelectedSlot(sl);setView("confirm");}}
              style=${{padding:"16px 8px",borderRadius:10,border:"2px solid #1976d255",background:"#fff",color:"#1976d2",cursor:"pointer",fontFamily:"var(--fb)",fontWeight:800,fontSize:15,transition:"all .12s",textAlign:"center",width:"100%"}}
              onMouseEnter=${e=>{e.currentTarget.style.background="#1976d2";e.currentTarget.style.color="#fff";e.currentTarget.style.borderColor="#1976d2";}}
              onMouseLeave=${e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.color="#1976d2";e.currentTarget.style.borderColor="#1976d255";}}
            >
              ${timeDisp}
              <div style=${{fontSize:10,fontWeight:600,opacity:.65,marginTop:3}}>${sl.duration} min</div>
            </button>`;
          })}
        </div>
      </div>`;
    })()}

    <!-- ── CONFIRM VIEW ─────────────────────────────────────── -->
    ${view==="confirm"&&selectedSlot&&(()=>{
      const {dayName,dateDisp,timeDisp} = fmtSlot(selectedSlot.date, selectedSlot.time);
      return h`<div>
        <button style=${{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,color:"var(--g500)",marginBottom:14,padding:0,fontFamily:"var(--fb)"}} onClick=${()=>{setView("times");setSelectedSlot(null);}}>← Back to times</button>
        <div style=${{background:"linear-gradient(135deg,#e3f2fd,#f0f8ff)",border:"2px solid #1976d2",borderRadius:12,padding:"18px 20px",marginBottom:14}}>
          <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#1976d2",marginBottom:8}}>Confirm your request</div>
          <div style=${{fontSize:22,fontWeight:800,fontFamily:"var(--fh)",letterSpacing:1,marginBottom:2}}>${dayName}</div>
          <div style=${{fontSize:16,fontWeight:600,color:"#333",marginBottom:2}}>${dateDisp}</div>
          <div style=${{fontSize:15,color:"#1976d2",fontWeight:700}}>${timeDisp} · ${selectedSlot.duration} min</div>
          ${tz !== "Asia/Beirut" && h`<div style=${{fontSize:11,color:"#888",marginTop:4}}>Shown in your timezone (${tz})</div>`}
        </div>
        <div class="fg"><label>Note to Hadi (optional)</label>
          <textarea value=${note} onInput=${e=>setNote(e.target.value)} placeholder="e.g. I want to focus on conversational practice..." style=${{width:"100%",minHeight:60,padding:"8px 10px",border:"2px solid var(--g200)",fontFamily:"var(--fa),var(--fb)",fontSize:13,resize:"vertical",boxSizing:"border-box"}}/>
        </div>
        <div style=${{display:"flex",gap:8}}>
          <button style=${{flex:1,padding:"12px",background:"#1976d2",color:"#fff",border:"none",borderRadius:8,fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"var(--fb)"}} onClick=${send}>✅ Send Request</button>
        </div>
      </div>`;
    })()}
  </div>`;
}

// SM-2 SPACED REPETITION
// ════════════════════════════════════════
function sm2(card, rating) {
  // rating: 0=Again  1=Hard  2=Good  3=Easy
  let interval = card.srsInterval || 1;
  let ease     = card.srsEase     || 2.5;
  let reps     = card.srsReps     || 0;

  if (rating < 2) {
    interval = 1;
    reps = 0;
  } else {
    if (reps === 0)      interval = 1;
    else if (reps === 1) interval = 6;
    else                 interval = Math.round(interval * ease);
    reps += 1;
    ease += 0.1 - (3 - rating) * (0.08 + (3 - rating) * 0.02);
    ease = Math.max(1.3, ease);
  }

  const due = new Date();
  due.setDate(due.getDate() + interval);
  return {
    ...card,
    srsInterval: interval,
    srsEase: parseFloat(ease.toFixed(2)),
    srsReps: reps,
    srsDue: due.toISOString().split('T')[0],
    srsLastReviewed: new Date().toISOString().split('T')[0]
  };
}

function isDueToday(card) {
  if (!card.srsDue) return true; // never reviewed = always due
  return card.srsDue <= new Date().toISOString().split('T')[0];
}

// LIBRARY — FLASHCARDS
// ════════════════════════════════════════
function LibraryFlashcards({student: s, data, setData, initialTopic}) {
  const [view, setView] = useState("decks"); // "decks" | "study"
  const [activeDeckId, setActiveDeckId] = useState(null);
  const [cardIdx, setCardIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [srsMode, setSrsMode] = useState(true); // true = SRS/due only, false = all cards
  const [lastRating, setLastRating] = useState(null); // show "next review in X days" feedback
  const [newTopic, setNewTopic] = useState(initialTopic||"");
  const [newWord, setNewWord] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  const decks = s.flashcardDecks || [];
  const activeDeck = decks.find(d=>d.id===activeDeckId);
  const allCards = activeDeck ? (activeDeck.cards||[]) : [];

  // In SRS mode show only due cards, sorted by most overdue first
  const today = new Date().toISOString().split('T')[0];
  const dueCards = allCards.filter(isDueToday).sort((a,b)=>(a.srsDue||'')<(b.srsDue||'')?-1:1);
  const cards = srsMode ? dueCards : allCards;
  const card = cards[cardIdx] || null;

  const updDecks = (d) => setData({...data, students: data.students.map(x=>x.id===s.id?{...x,flashcardDecks:d}:x)});

  const openDeck = (id) => { setActiveDeckId(id); setCardIdx(0); setFlipped(false); setLastRating(null); setView("study"); };

  // Apply an SRS rating to the current card
  const rate = (rating) => {
    if (!card) return;
    const updated = sm2(card, rating);
    const nextInterval = updated.srsInterval;
    setLastRating({rating, nextDays: nextInterval});
    // 1 XP per card reviewed; bonus 2 XP for Good/Easy ratings
    const xpAmt = rating >= 2 ? 2 : 1;
    const xpPatch = earnXP(s, xpAmt);
    const newDecks = decks.map(dk=>dk.id===activeDeckId ? {...dk, cards: dk.cards.map(c=>c.id===card.id ? updated : c)} : dk);
    setData({...data, students: data.students.map(x=>x.id===s.id?{...x,...xpPatch,flashcardDecks:newDecks}:x)});
    setFlipped(false);
    setTimeout(() => {
      setLastRating(null);
      if (cardIdx < cards.length - 1) setCardIdx(cardIdx + 1);
      else setCardIdx(cards.length); // finished
    }, 800);
  };

  const safeParseCards = (raw) => {
    try {
      let str = raw.replace(/```json|```/g,"").trim();
      const start = str.indexOf("[");
      if (start > 0) str = str.slice(start);
      let arr = JSON.parse(str);
      if (!Array.isArray(arr)) {
        const key = Object.keys(arr).find(k=>Array.isArray(arr[k]));
        arr = key ? arr[key] : [];
      }
      return arr.map(c=>({id:uid(), known:false, en:c.en||"", ar:c.ar||"", translit:c.translit||""}));
    } catch(e) { return null; }
  };

  const generateDeck = async (topic) => {
    if (!topic.trim()) return;
    setLoading(true); setErr("");
    try {
      const d = await apiPost("/api/ai", {type:"flashcard_generate", context:{topic:topic.trim(), level:s.level||"beginner", type:s.type||"Classical Arabic"}});
      if (d.result) {
        const cards = safeParseCards(d.result);
        if (!cards || cards.length === 0) { setErr("Generated cards were empty. Please try again."); setLoading(false); return; }
        updDecks([...decks, {id:uid(), name:topic.trim(), cards, createdAt:new Date().toISOString()}]);
        setNewTopic("");
      } else { setErr(d.error || "Could not generate. Try again."); }
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const translateWord = async () => {
    if (!newWord.trim()||!activeDeckId) return;
    setLoading(true); setErr("");
    try {
      const d = await apiPost("/api/ai", {type:"flashcard_translate", context:{word:newWord.trim(), level:s.level||"beginner", type:s.type||"Classical Arabic"}});
      if (d.result) {
        let raw = d.result.replace(/```json|```/g,"").trim();
        const card = JSON.parse(raw);
        card.id = uid(); card.known = false;
        card.en = card.en||newWord.trim(); card.ar = card.ar||""; card.translit = card.translit||"";
        updDecks(decks.map(dk=>dk.id===activeDeckId?{...dk,cards:[...(dk.cards||[]),card]}:dk));
        setNewWord("");
      } else { setErr(d.error || "Could not translate. Try again."); }
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const markKnown = (isKnown) => {
    updDecks(decks.map(dk=>dk.id===activeDeckId?{...dk,cards:dk.cards.map((c,i)=>i===cardIdx?{...c,known:isKnown}:c)}:dk));
    setFlipped(false); // always unflip
    if (cardIdx < cards.length-1) setCardIdx(cardIdx+1);
  };

  const deleteDeck = (id) => {
    if (!confirm("Delete this deck?")) return;
    updDecks(decks.filter(d=>d.id!==id));
    if (activeDeckId===id) { setView("decks"); setActiveDeckId(null); }
  };

  const STARTERS = ["Numbers (الأرقام)","Greetings (التحيات)","Family (العائلة)","Food & Drink (الطعام)","Colors (الألوان)","Common Verbs (أفعال شائعة)","Travel (السفر)","Days & Time (الوقت)","The Body (الجسم)","Weather (الطقس)"];

  if (view==="study" && activeDeck) {
    const dueCount = allCards.filter(isDueToday).length;
    const sessionCards = cards; // already filtered by mode
    const isFinished = cardIdx >= sessionCards.length;
    const accent = s.studentTheme || "#4a90d9";

    return h`<div style=${{maxWidth:580,margin:"0 auto"}}>
      <!-- Header -->
      <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button class="btn btn-sm" onClick=${()=>{setView("decks");setFlipped(false);setLastRating(null);}}>← Back</button>
        <div style=${{flex:1,fontWeight:800,fontSize:15,fontFamily:"var(--fh)",letterSpacing:1}}>${activeDeck.name.toUpperCase()}</div>
        <button class="btn btn-sm" onClick=${()=>exportFlashcardPDF(activeDeck, s.name)} title="PDF">📥</button>
      </div>

      <!-- Mode toggle -->
      <div style=${{display:"flex",gap:6,marginBottom:14,background:"#f5f5f5",borderRadius:10,padding:4}}>
        <button onClick=${()=>{setSrsMode(true);setCardIdx(0);setFlipped(false);setLastRating(null);}} style=${{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"var(--fb)",background:srsMode?"#fff":"transparent",color:srsMode?accent:"#888",boxShadow:srsMode?"0 1px 4px rgba(0,0,0,0.1)":"none",transition:"all .15s"}}>
          ⏰ Review Due${dueCount>0?h`<span style=${{marginLeft:5,background:accent,color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10}}>${dueCount}</span>`:null}
        </button>
        <button onClick=${()=>{setSrsMode(false);setCardIdx(0);setFlipped(false);setLastRating(null);}} style=${{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"var(--fb)",background:!srsMode?"#fff":"transparent",color:!srsMode?accent:"#888",boxShadow:!srsMode?"0 1px 4px rgba(0,0,0,0.1)":"none",transition:"all .15s"}}>
          📚 All Cards (${allCards.length})
        </button>
      </div>

      ${sessionCards.length===0 ? h`<div style=${{textAlign:"center",padding:"32px 20px",background:"#f8f9fb",borderRadius:14}}>
        ${srsMode
          ? h`<div><div style=${{fontSize:32,marginBottom:12}}>🎉</div><div style=${{fontWeight:800,fontSize:16,marginBottom:6}}>All caught up!</div><div style=${{fontSize:13,color:"var(--g500)"}}>No cards due right now. Switch to "All Cards" to keep practising, or come back later.</div></div>`
          : h`<div style=${{color:"var(--g400)",fontSize:13}}>No cards yet. Add a word below.</div>`}
      </div>` : isFinished ? h`<div style=${{textAlign:"center",padding:"32px 20px",background:"linear-gradient(135deg,#f0fff4,#e8f5e9)",borderRadius:14,border:"2px solid #4caf50"}}>
        <div style=${{fontSize:36,marginBottom:10}}>✅</div>
        <div style=${{fontWeight:800,fontSize:18,color:"#2e7d32",marginBottom:6}}>${srsMode?"Review session complete!":"All cards done!"}</div>
        <div style=${{fontSize:13,color:"#388e3c",marginBottom:16}}>${srsMode?`You reviewed ${sessionCards.length} card${sessionCards.length!==1?"s":""}.`:`You went through all ${allCards.length} cards.`}</div>
        <button class="btn btn-p" style=${{background:"#4caf50",borderColor:"#4caf50"}} onClick=${()=>{setCardIdx(0);setFlipped(false);setLastRating(null);}}>↺ Go again</button>
      </div>` : h`<div>
        <!-- Progress bar -->
        <div style=${{height:5,background:"#f0f0f0",borderRadius:4,overflow:"hidden",marginBottom:4}}>
          <div style=${{height:"100%",width:((cardIdx)/sessionCards.length*100)+"%",background:accent,borderRadius:4,transition:"width 0.4s"}}></div>
        </div>
        <div style=${{fontSize:11,color:"#aaa",textAlign:"right",marginBottom:14}}>${cardIdx+1} / ${sessionCards.length}</div>

        <!-- SRS info chip for this card -->
        ${srsMode && card.srsDue && h`<div style=${{fontSize:11,color:"#888",marginBottom:8,textAlign:"center"}}>
          Last reviewed: ${card.srsLastReviewed||"never"} · Ease: ${(card.srsEase||2.5).toFixed(1)} · Streak: ${card.srsReps||0}
        </div>`}

        <!-- Rating feedback flash -->
        ${lastRating && h`<div style=${{
          textAlign:"center",fontSize:13,fontWeight:700,marginBottom:8,
          color:lastRating.rating===0?"#c62828":lastRating.rating===1?"#e65100":lastRating.rating===2?"#2e7d32":"#1565c0"
        }}>
          ${lastRating.rating===0?"🔁 Review again tomorrow":lastRating.rating===1?"📅 Next in "+lastRating.nextDays+" days":lastRating.rating===2?"✅ Next in "+lastRating.nextDays+" days":"🚀 Next in "+lastRating.nextDays+" days"}
        </div>`}

        <!-- Flashcard -->
        <div class="fc-scene" onClick=${()=>!lastRating&&setFlipped(!flipped)} style=${{marginBottom:14,cursor:lastRating?"default":"pointer"}}>
          <div key=${cardIdx+"-"+flipped} class="fc-card" style=${{
            background:flipped?"#111":"#fff",
            border:"2px solid "+(flipped?"#333":"#e0e0e0"),
            boxShadow:flipped?"0 4px 16px rgba(0,0,0,0.3)":"0 2px 8px rgba(0,0,0,0.08)",
            color:flipped?"#fff":"#111",
            opacity:lastRating?.0.6:1,transition:"opacity 0.3s"
          }}>
            ${flipped
              ? h`<div style=${{display:"flex",flexDirection:"column",alignItems:"center",gap:8,width:"100%"}}>
                  <div style=${{fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Arabic</div>
                  <div style=${{fontFamily:"'Amiri',serif",fontSize:36,fontWeight:700,textAlign:"center",direction:"rtl",lineHeight:1.6}}>${card.ar}</div>
                  ${card.translit?h`<div style=${{fontSize:13,color:"rgba(255,255,255,0.55)",fontStyle:"italic",textAlign:"center"}}>${card.translit}</div>`:null}
                  ${card.note?h`<div style=${{fontSize:11,color:"rgba(255,255,255,0.4)",textAlign:"center",marginTop:4,lineHeight:1.5}}>${card.note}</div>`:null}
                </div>`
              : h`<div style=${{display:"flex",flexDirection:"column",alignItems:"center",gap:8,width:"100%"}}>
                  <div style=${{fontSize:12,color:"#bbb",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>English</div>
                  <div style=${{fontSize:22,fontWeight:800,color:"#111",textAlign:"center",lineHeight:1.4}}>${card.en}</div>
                  <div style=${{fontSize:11,color:"#ddd",marginTop:6}}>Tap to reveal →</div>
                </div>`}
          </div>
        </div>

        <!-- Buttons — SRS mode: 4 ratings. Browse mode: prev/next -->
        ${flipped && !lastRating ? h`<div style=${{marginBottom:14}}>
          <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#aaa",textAlign:"center",marginBottom:8}}>How well did you know it?</div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
            <button onClick=${()=>rate(0)} style=${{padding:"12px 4px",borderRadius:10,border:"2px solid #f44336",background:"#fce4ec",color:"#c62828",cursor:"pointer",fontWeight:800,fontSize:12,fontFamily:"var(--fb)",textAlign:"center"}}>
              <div style=${{fontSize:16}}>🔁</div><div>Again</div>
            </button>
            <button onClick=${()=>rate(1)} style=${{padding:"12px 4px",borderRadius:10,border:"2px solid #ff9800",background:"#fff3e0",color:"#e65100",cursor:"pointer",fontWeight:800,fontSize:12,fontFamily:"var(--fb)",textAlign:"center"}}>
              <div style=${{fontSize:16}}>😅</div><div>Hard</div>
            </button>
            <button onClick=${()=>rate(2)} style=${{padding:"12px 4px",borderRadius:10,border:"2px solid #4caf50",background:"#e8f5e9",color:"#2e7d32",cursor:"pointer",fontWeight:800,fontSize:12,fontFamily:"var(--fb)",textAlign:"center"}}>
              <div style=${{fontSize:16}}>👍</div><div>Good</div>
            </button>
            <button onClick=${()=>rate(3)} style=${{padding:"12px 4px",borderRadius:10,border:"2px solid #2196f3",background:"#e3f2fd",color:"#1565c0",cursor:"pointer",fontWeight:800,fontSize:12,fontFamily:"var(--fb)",textAlign:"center"}}>
              <div style=${{fontSize:16}}>⚡</div><div>Easy</div>
            </button>
          </div>
          <div style=${{fontSize:10,color:"#ccc",textAlign:"center",marginTop:6}}>Again = review tomorrow · Easy = skip ahead many days</div>
        </div>` : !flipped ? h`<div style=${{display:"flex",gap:8,marginBottom:14}}>
          <button class="btn btn-sm" disabled=${cardIdx===0||!!lastRating} onClick=${()=>{setCardIdx(cardIdx-1);setFlipped(false);}}>← Prev</button>
          <div style=${{flex:1,textAlign:"center",fontSize:12,color:"#bbb",alignSelf:"center"}}>Tap card to flip</div>
          <button class="btn btn-sm" disabled=${cardIdx>=sessionCards.length-1||!!lastRating} onClick=${()=>{setCardIdx(cardIdx+1);setFlipped(false);}}>Next →</button>
        </div>` : null}
      </div>`}

      <!-- Add word -->
      <div class="card" style=${{marginTop:12}}>
        <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"var(--g500)",marginBottom:8}}>➕ Add a word</div>
        <div style=${{display:"flex",gap:8}}>
          <input style=${{flex:1,padding:"9px 11px",border:"2px solid var(--g200)",fontFamily:"var(--fb)",fontSize:13,outline:"none",borderRadius:6}} placeholder="Type an English word..." value=${newWord} onInput=${e=>setNewWord(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter")translateWord();}}/>
          <button class="btn btn-p btn-sm" onClick=${translateWord} disabled=${loading||!newWord.trim()}>${loading?"...":"Add"}</button>
        </div>
        ${err?h`<div style=${{marginTop:6,fontSize:12,color:"var(--bd)"}}>${err}</div>`:null}
      </div>
    </div>`;
  }

  // Decks view
  return h`<div style=${{maxWidth:700,margin:"0 auto"}}>
    ${initialTopic&&h`<div style=${{background:"#e3f2fd",border:"1px solid #90caf9",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#1565c0",display:"flex",alignItems:"center",gap:8}}>
      <span style=${{fontSize:16}}>🃏</span>
      <span>Creating flashcards for <strong>${initialTopic}</strong> — hit <strong>Create</strong> to generate your deck!</span>
    </div>`}
    <!-- Create new deck -->
    <div class="card" style=${{marginBottom:20}}>
      <div style=${{fontWeight:700,fontSize:14,marginBottom:4}}>🃏 Create a Flashcard Deck</div>
      <div style=${{fontSize:12,color:"var(--g500)",marginBottom:12}}>Pick a topic below or type your own, then let the AI generate the cards for you.</div>
      <!-- Starter topics -->
      <div style=${{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        ${STARTERS.map(t=>h`<button key=${t} class="chip" onClick=${()=>generateDeck(t)} disabled=${loading} style=${{fontSize:11,padding:"4px 10px"}}>${t}</button>`)}
      </div>
      <div style=${{display:"flex",gap:8}}>
        <input style=${{flex:1,padding:"9px 11px",border:"2px solid var(--g200)",fontFamily:"var(--fb)",fontSize:13,outline:"none",borderRadius:6}} placeholder="Or type a custom topic, e.g. 'Airport vocabulary'" value=${newTopic} onInput=${e=>setNewTopic(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter")generateDeck(newTopic);}}/>
        <button class="btn btn-p btn-sm" onClick=${()=>generateDeck(newTopic)} disabled=${loading||!newTopic.trim()}>${loading?"Generating...":"Create"}</button>
      </div>
      ${err?h`<div style=${{marginTop:6,fontSize:12,color:"var(--bd)"}}>${err}</div>`:null}
    </div>

    <!-- Existing decks -->
    ${decks.length===0?h`<div style=${{textAlign:"center",padding:"24px 0",color:"var(--g400)",fontSize:13}}>No decks yet — pick a topic above to get started!</div>`:h`<div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
      ${decks.map(dk=>{
        const total = (dk.cards||[]).length;
        const due = (dk.cards||[]).filter(isDueToday).length;
        const mastered = (dk.cards||[]).filter(c=>c.srsReps>=3).length;
        const pct = total>0?Math.round(mastered/total*100):0;
        return h`<div key=${dk.id} class="fc-deck" onClick=${()=>openDeck(dk.id)} style=${{position:"relative"}}>
          <div style=${{position:"absolute",top:10,right:10,display:"flex",gap:4}} onClick=${e=>e.stopPropagation()}>
            <button style=${{background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:12,padding:"2px 4px",fontFamily:"var(--fb)"}} title="Download PDF" onClick=${()=>exportFlashcardPDF(dk, s.name)}>📥</button>
            <button style=${{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:14,padding:2}} title="Delete deck" onClick=${()=>deleteDeck(dk.id)}>✕</button>
          </div>
          ${due>0?h`<div style=${{position:"absolute",top:10,left:10,background:"#f44336",color:"#fff",fontSize:10,fontWeight:800,borderRadius:10,padding:"2px 8px"}}>${due} due</div>`:null}
          <div style=${{fontSize:28,marginBottom:8,marginTop:due>0?16:0}}>🃏</div>
          <div style=${{fontWeight:800,fontSize:14,fontFamily:"var(--fh)",letterSpacing:1,marginBottom:6}}>${dk.name.toUpperCase()}</div>
          <div style=${{fontSize:12,color:"var(--g500)",marginBottom:8}}>${total} card${total!==1?"s":""}</div>
          <div style=${{height:4,background:"#f0f0f0",borderRadius:4,overflow:"hidden"}}>
            <div style=${{height:"100%",width:pct+"%",background:"#4caf50",borderRadius:4}}></div>
          </div>
          <div style=${{fontSize:11,color:"var(--g400)",marginTop:4}}>${mastered}/${total} mastered</div>
        </div>`;
      })}
    </div>`}
  </div>`;
}

// LIBRARY — CONJUGATION (تصريف)
// ════════════════════════════════════════
function LibraryConjugation({student: s}) {
  const [word, setWord] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [tense, setTense] = useState("all"); // "all" | "past" | "present" | "imperative"

  const generate = async () => {
    if (!word.trim()) return;
    setLoading(true); setResult(null); setErr(""); setTense("all");
    try {
      const d = await apiPost("/api/ai", {type:"conjugation", context:{word:word.trim(), level:s.level||"beginner", type:s.type||"Classical Arabic"}});
      if (d.result) {
        const parsed = JSON.parse(d.result.replace(/```json|```/g,"").trim());
        setResult(parsed);
      } else { setErr("Could not generate. Try again."); }
    } catch(e) { setErr("Error: "+e.message); }
    setLoading(false);
  };

  // Parse [[...]] markers → render non-marked part normal, marked part in red
  const rC = (str) => {
    if (!str || str === "—") return str;
    const parts = str.split(/(\[\[[\s\S]*?\]\])/);
    if (parts.length === 1) return str; // no markers
    return parts.map((p, i) => {
      if (p.startsWith("[[") && p.endsWith("]]")) {
        const inner = p.slice(2, -2);
        return React.createElement("span", {key:i, style:{color:"#d32f2f",fontWeight:900,textDecoration:"underline",textDecorationColor:"rgba(211,47,47,0.4)"}}, inner);
      }
      return p;
    });
  };

  const USAGE_COLOR = {"very common":"#2e7d32","common":"#1565c0","uncommon":"#e65100","rare":"#b71c1c"};
  const usageColor = result ? (USAGE_COLOR[result.usage]||"#555") : "#555";

  // Person group label & row background
  const personStyle = (person) => {
    if (person==="1st") return {background:"#f3f8ff"};
    if (person==="2nd") return {background:"#fff9f0"};
    return {}; // 3rd — white
  };
  const personLabel = (person, i, rows) => i===0 || rows[i-1].person !== person;

  return h`<div style=${{maxWidth:820,margin:"0 auto"}}>
    <!-- Input -->
    <div class="card" style=${{marginBottom:20}}>
      <div style=${{fontWeight:700,fontSize:15,marginBottom:4}}>📖 تصريف — Conjugation & Declension</div>
      <div style=${{fontSize:12,color:"var(--g500)",marginBottom:14,lineHeight:1.7}}>
        Type any Arabic word (with or without diacritics) or its English meaning. The AI generates the full conjugation table — pronouns marked in <span style=${{color:"#d32f2f",fontWeight:700}}>red</span> show the letters added to the base verb.
      </div>
      <div style=${{display:"flex",gap:8}}>
        <input style=${{flex:1,padding:"11px 14px",border:"2px solid var(--g200)",fontFamily:"'Amiri',serif",fontSize:18,outline:"none",borderRadius:6,direction:"rtl",textAlign:"right"}} placeholder="اكتب كلمة... أو type in English" value=${word} onInput=${e=>setWord(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter")generate();}} autoComplete="off" autoCorrect="off"/>
        <button class="btn btn-p" onClick=${generate} disabled=${loading||!word.trim()} style=${{whiteSpace:"nowrap"}}>${loading?"Generating...":"Generate ↗"}</button>
      </div>
      ${err?h`<div style=${{marginTop:8,color:"var(--bd)",fontSize:13}}>${err}</div>`:null}
      <div style=${{display:"flex",flexWrap:"wrap",gap:6,marginTop:12}}>
        ${["كَتَبَ","ذَهَبَ","أَكَلَ","قَرَأَ","عَلِمَ","كِتَابٌ","بَيْتٌ","write","go","eat"].map(w=>h`<button key=${w} class="chip" style=${{fontFamily:/[\u0600-\u06FF]/.test(w)?"'Amiri',serif":"var(--fb)",fontSize:/[\u0600-\u06FF]/.test(w)?16:11,direction:/[\u0600-\u06FF]/.test(w)?"rtl":"ltr"}} onClick=${()=>setWord(w)}>${w}</button>`)}
      </div>
    </div>

    ${result&&h`<div>
      <!-- Word header -->
      <div style=${{background:"#fff",borderRadius:14,padding:"18px 20px",marginBottom:16,display:"flex",flexWrap:"wrap",alignItems:"center",gap:14,border:"2px solid #e0e0e0",borderLeft:"6px solid "+(s.studentTheme||"#4a90d9")}}>
        <div style=${{fontFamily:"'Amiri',serif",fontSize:46,fontWeight:700,direction:"rtl",lineHeight:1.3,color:"#111",minWidth:80,textAlign:"center"}}>${result.word}</div>
        <div style=${{flex:1,minWidth:180}}>
          <div style=${{fontSize:11,color:"#aaa",marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>${result.type==="verb"?"Verb — فِعْل":"Noun — اِسْم"}</div>
          <div style=${{fontSize:18,fontWeight:700,color:"#111",marginBottom:4}}>${result.meaning}</div>
          <div style=${{display:"flex",flexWrap:"wrap",gap:10,fontSize:13,color:"#555"}}>
            ${result.root?h`<span>Root: <span style=${{fontFamily:"'Amiri',serif",fontSize:15,direction:"rtl",marginRight:4}}>${result.root}</span></span>`:null}
            ${result.pattern?h`<span>Pattern: <span style=${{fontFamily:"'Amiri',serif",fontSize:15,direction:"rtl",marginRight:4}}>${result.pattern}</span></span>`:null}
          </div>
        </div>
        <span style=${{background:usageColor,color:"#fff",padding:"4px 14px",borderRadius:20,fontSize:11,fontWeight:700,textTransform:"capitalize",alignSelf:"flex-start"}}>${result.usage||"—"}</span>
      </div>

      ${result.note?h`<div style=${{background:"#fffde7",border:"1px solid #ffe082",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#5f4300",lineHeight:1.7}}>💡 ${result.note}</div>`:null}

      <div style=${{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
        <button class="btn btn-sm" onClick=${()=>exportConjugationPDF(result, s.name)} style=${{fontSize:11}}>📥 Download PDF</button>
      </div>

      <!-- VERB TABLE -->
      ${result.type==="verb"&&result.table?h`<div>
        <!-- Legend + tense filter -->
        <div style=${{display:"flex",flexWrap:"wrap",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:12}}>
          <div style=${{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#555"}}>
            <span style=${{color:"#d32f2f",fontWeight:900,fontSize:14}}>أَ</span>
            <span>= letters added to mark the pronoun</span>
          </div>
          <div style=${{display:"flex",gap:4,flexWrap:"wrap"}}>
            ${[["all","All Tenses"],["past","ماضي Past"],["present","مضارع Present"],["imperative","أمر Imperative"]].map(([t,l])=>h`
              <button key=${t} class=${"btn btn-sm "+(tense===t?"btn-p":"")} onClick=${()=>setTense(t)} style=${{fontSize:11}}>${l}</button>
            `)}
          </div>
        </div>

        <!-- Person legend -->
        <div style=${{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",fontSize:11}}>

              })}
            </tbody>

        </div>
      </div>`:null}

      <!-- NOUN DECLENSION TABLE -->
      ${result.type==="noun"&&result.table?h`<div>
        ${result.gender?h`<div style=${{marginBottom:10,fontSize:13,color:"var(--g600)",fontWeight:600}}>Gender: ${result.gender}</div>`:null}
        <div style=${{overflowX:"auto",WebkitOverflowScrolling:"touch",marginBottom:16,borderRadius:10,border:"1px solid #e8e8e8",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          <table class="conj-tbl" dir="rtl" style=${{minWidth:360}}>

              <th>مَعْرِفَة<br/><span class="en" style=${{color:"rgba(255,255,255,0.6)"}}>Definite</span></th>
              <th style=${{direction:"ltr",textAlign:"center"}}>Meaning</th>
            </tr></thead>
            <tbody>
              ${result.table.map((row,i)=>h`<tr key=${i}>
                <td style=${{textAlign:"center"}}><div class="pron">${row.form_ar}</div><div class="pron-en">${row.form_en}</div></td>
                <td class="ar" style=${{fontSize:20,textAlign:"center"}}>${row.indef||"—"}</td>

              </tr>`)}
            </tbody>
          </table>
        </div>
      </div>`:null}
    </div>`}
  </div>`;
}
