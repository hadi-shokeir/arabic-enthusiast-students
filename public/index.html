// DASHBOARD (fixed #2: only paid revenue)
// ════════════════════════════════════════
function Dashboard({data, setData, auth}) {
  const {students, lessons, payments, settings: S} = data;
  const CUR = S.currency || "$";
  const active = students.filter(s => s.active);
  const now = new Date();
  const mPay = payments.filter(p => { const d = new Date(p.date); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); });
  const mRev = mPay.filter(p=>p.status==="Paid").reduce((a,p) => a+(p.amount||0), 0);
  const wk = lessons.filter(l => new Date(l.date) >= weekStart(S.weekStartDay) && l.status !== "Cancelled");
  const noL = active.filter(s => !hadLesson(s.id, lessons, S.weekStartDay));
  const up = lessons.filter(l => l.status==="Scheduled" && new Date(l.date)>=new Date(today())).sort((a,b) => new Date(a.date)-new Date(b.date)).slice(0,5);

  // 10-day attendance alert
  const inactive10 = active.filter(s => {
    const last = lessons.filter(l=>l.studentId===s.id && l.status==="Completed").sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    if (!last) return s.lessonsTaken > 0;
    return (now - new Date(last.date)) > 10 * 86400000;
  });

  // Pending lesson requests
  const pendingReqs = (data.lessonRequests||[]).filter(r=>r.status==="pending");

  // AI scheduling
  const [scheduleInput, setScheduleInput] = useState("");
  const [scheduleLoading, setScheduleLoading] = useState(false);
  const [scheduleResult, setScheduleResult] = useState(null);
  const [scheduleErr, setScheduleErr] = useState("");

  const runSchedule = async () => {
    if (!scheduleInput.trim()) return;
    setScheduleLoading(true); setScheduleErr(""); setScheduleResult(null);
    const d = await apiPost("/api/ai", {type:"schedule_lesson", context:{message:scheduleInput}});
    setScheduleLoading(false);
    if (d.error) return setScheduleErr(d.error);
    try {
      const parsed = JSON.parse(d.result);
      setScheduleResult(parsed);
    } catch { setScheduleErr("Couldn't parse AI response. Try again."); }
  };

  const confirmSchedule = () => {
    if (!scheduleResult) return;
    const st = students.find(s => s.name.toLowerCase().includes((scheduleResult.studentName||"").toLowerCase()));
    const newLesson = {
      id: uid(),
      studentId: st?.id || "",
      groupId: "",
      date: scheduleResult.date || today(),
      time: scheduleResult.time || "10:00",
      duration: scheduleResult.duration || 60,
      type: st?.type || (S.types||[])[0] || "Levantine",
      status: "Scheduled",
      notes: scheduleResult.notes || ""
    };
    setData({...data, lessons:[...lessons, newLesson]});
    setScheduleInput(""); setScheduleResult(null);
    alert("Lesson scheduled for " + (st?.name || scheduleResult.studentName) + " on " + scheduleResult.date + " at " + scheduleResult.time);
  };

  // Confirm a lesson request
  const confirmRequest = (req) => {
    const st = students.find(s=>s.id===req.studentId);
    const newLesson = {id:uid(),studentId:req.studentId,groupId:"",date:req.preferredDate||today(),time:req.preferredTime||"10:00",duration:60,type:st?.type||(S.types||[])[0]||"Levantine",status:"Scheduled",notes:"Requested by student"};
    const updated = (data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"confirmed"}:r);
    setData({...data, lessons:[...lessons,newLesson], lessonRequests:updated});
    if (st?.whatsapp) {
      const msg = "Hi " + st.name + "! Your lesson request has been confirmed for " + (req.preferredDate||"TBD") + " at " + (req.preferredTime||"TBD") + ". See you then! 🎓";
      waMsg(st.whatsapp, msg);
    }
  };
  const declineRequest = (req) => {
    const updated = (data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"declined"}:r);
    setData({...data, lessonRequests:updated});
  };

  return h`<div>
    <div class="stats">
      <div class="stat"><div class="lb">Active Students</div><div class="vl">${active.length}</div></div>
      <div class="stat"><div class="lb">This Month (Paid)</div><div class="vl">${fm(mRev, CUR)}</div><div class="su">${mPay.filter(p=>p.status==="Paid").length} payments</div></div>
      <div class="stat"><div class="lb">Lessons This Week</div><div class="vl">${wk.length}</div></div>
      <div class="stat"><div class="lb">No Lesson This Week</div><div class="vl" style=${{color:noL.length?"var(--bd)":"var(--ok)"}}>${noL.length}</div></div>
      <div class="stat"><div class="lb">Avg Attendance</div><div class="vl" style=${{color:(() => { const rates=active.map(s=>attendanceStats(s.id,lessons).rate); const avg=rates.length?Math.round(rates.reduce((a,b)=>a+b,0)/rates.length):0; return avg>=80?"var(--ok)":avg>=60?"var(--wn)":"var(--bd)"; })()}}>${(() => { const rates=active.map(s=>attendanceStats(s.id,lessons).rate); return rates.length?Math.round(rates.reduce((a,b)=>a+b,0)/rates.length):0; })()}%</div><div class="su">across all students</div></div>
    </div>

    ${pendingReqs.length>0&&h`<div class="card" style=${{borderColor:"#1976d2",marginBottom:14}}>
      <h3 style=${{color:"#1976d2"}}>📅 LESSON REQUESTS (${pendingReqs.length})</h3>
      ${pendingReqs.map(req=>{const st=students.find(s=>s.id===req.studentId);return h`<div key=${req.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--g100)",gap:10}}>
        <div>
          <div style=${{fontWeight:700}}>${st?.name||"Unknown"}</div>
          <div style=${{fontSize:12,color:"var(--g500)"}}>${req.preferredDate||"No date"} at ${req.preferredTime||"No time"}${req.message?" · "+req.message:""}</div>
        </div>
        <div style=${{display:"flex",gap:6,flexShrink:0}}>
          <button class="btn btn-p btn-sm" onClick=${()=>confirmRequest(req)}>✓ Confirm</button>
          <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>declineRequest(req)}>✗ Decline</button>
        </div>
      </div>`;})}
    </div>`}

    ${(()=>{
      const studentNotes = students.filter(s=>s.studentNote&&s.studentNote.trim());
      const submittedHw = (data.homework||[]).filter(hw=>hw.status==="submitted");
      const total = studentNotes.length + submittedHw.length;
      if (total===0) return null;
      return h`<div class="card" style=${{borderColor:"#7b1fa2",marginBottom:14}}>
        <h3 style=${{color:"#7b1fa2"}}>📬 INBOX (${total})</h3>
        ${studentNotes.map(s=>h`<div key=${s.id} style=${{padding:"10px 0",borderBottom:"1px solid var(--g100)"}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div>
              <div style=${{fontWeight:700,fontSize:13,marginBottom:3}}>✉️ ${s.name} <span style=${{fontWeight:400,color:"var(--g500)",fontSize:11}}>sent you a note</span></div>
              <div style=${{fontSize:13,color:"var(--g700)",lineHeight:1.6,whiteSpace:"pre-wrap",background:"#f9f0ff",padding:"8px 10px",borderRadius:6,borderLeft:"3px solid #7b1fa2"}}>${s.studentNote}</div>
            </div>
            <button class="btn btn-sm" style=${{flexShrink:0,fontSize:11}} onClick=${()=>setData({...data,students:data.students.map(x=>x.id===s.id?{...x,studentNote:""}:x)})}>✓ Clear</button>
          </div>
        </div>`)}
        ${submittedHw.map(hw=>{const st=students.find(s=>s.id===hw.studentId);return h`<div key=${hw.id} style=${{padding:"10px 0",borderBottom:"1px solid var(--g100)"}}>
          <div style=${{fontWeight:700,fontSize:13,marginBottom:3}}>📝 ${st?.name||"Student"} <span style=${{fontWeight:400,color:"var(--g500)",fontSize:11}}>submitted homework · ${hw.title}</span></div>
          <div style=${{fontSize:13,color:"var(--g700)",lineHeight:1.6,background:"#fafafa",padding:"8px 10px",borderRadius:6,borderLeft:"3px solid #888",marginBottom:6}}>${hw.submissionText||"(no text)"}</div>
          <div style=${{fontSize:11,color:"var(--g500)"}}>Submitted ${hw.submittedAt||""} — go to student profile → Homework to leave feedback</div>
        </div>`;})}
      </div>`;
    })()}

    ${inactive10.length>0&&h`<div class="card" style=${{borderColor:"var(--wn)",marginBottom:14}}>
      <h3 style=${{color:"var(--wn)"}}>⚠️ NO LESSON IN 10+ DAYS</h3>
      ${inactive10.map(s=>h`<div key=${s.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--g100)"}}>
        <span style=${{fontWeight:600}}>${s.name}</span>
        ${s.whatsapp&&h`<button class="btn btn-xs btn-wa" onClick=${()=>waMsg(s.whatsapp,"Hi "+s.name+"! Hope you're doing well — it's been a while since your last Arabic lesson. Ready to get back on track? 😊")}>${ic('wa')} Check In</button>`}
      </div>`)}
    </div>`}

    <div class="dash-two-col" style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <div>
        <div class="card" style=${{marginBottom:14}}>
          <h3>🗓 SCHEDULE A LESSON</h3>
          <p style=${{fontSize:12,color:"var(--g500)",marginBottom:10}}>Type naturally — e.g. "Schedule with Ahmed tomorrow at 3pm"</p>
          <div style=${{display:"flex",gap:6}}>
            <input style=${{flex:1,padding:"8px 10px",border:"2px solid var(--g200)",fontFamily:"var(--fb)",fontSize:13}} placeholder="Class with Sarah next Monday at 5pm..." value=${scheduleInput} onInput=${e=>setScheduleInput(e.target.value)} onKeyDown=${e=>e.key==="Enter"&&runSchedule()}/>
            <button class="btn btn-p" onClick=${runSchedule} disabled=${scheduleLoading}>${scheduleLoading?"...":"Schedule"}</button>
          </div>
          ${scheduleErr&&h`<div style=${{fontSize:12,color:"var(--bd)",marginTop:6}}>${scheduleErr}</div>`}
          ${scheduleResult&&h`<div style=${{marginTop:10,padding:"10px 12px",background:"var(--g50)",border:"2px solid var(--ok)"}}>
            <div style=${{fontSize:12,fontWeight:700,marginBottom:6}}>AI parsed this as:</div>
            <div style=${{fontSize:13}}>👤 ${scheduleResult.studentName} · 📅 ${scheduleResult.date} · 🕐 ${scheduleResult.time} · ⏱ ${scheduleResult.duration}min${scheduleResult.notes?" · "+scheduleResult.notes:""}</div>
            <div style=${{display:"flex",gap:6,marginTop:8}}>
              <button class="btn btn-p btn-sm" onClick=${confirmSchedule}>✓ Confirm & Add</button>
              <button class="btn btn-sm" onClick=${()=>setScheduleResult(null)}>✗ Cancel</button>
            </div>
          </div>`}
        </div>
        <div class="card"><h3>UPCOMING LESSONS</h3>
          ${up.length===0 ? h`<p style=${{color:"var(--g400)",fontSize:13}}>None scheduled</p>` : h`<table><thead><tr><th>Date</th><th>Student</th><th>Time</th><th></th></tr></thead><tbody>
            ${up.map(l => { const st = students.find(x => x.id===l.studentId); return h`<tr key=${l.id}><td style=${{fontWeight:600}}>${fmt(l.date)}</td><td>${st?.name||"Group"}</td><td>${l.time}</td><td style=${{whiteSpace:"nowrap"}}><button class="bi" onClick=${()=>openGcal(l,students)} title="Google Calendar">${ic('gc')}</button>${st?.whatsapp && h`<button class="bi" style=${{color:"#25D366"}} onClick=${()=>waMsg(st.whatsapp,fillMsg(S.msgDay,st,l))} title="WhatsApp">${ic('wa')}</button>`}</td></tr>`; })}
          </tbody></table>`}
        </div>
      </div>
      <div>
        ${noL.length > 0 && h`<div class="card" style=${{borderColor:"var(--bd)",marginBottom:14}}><h3 style=${{color:"var(--bd)"}}>NO LESSON THIS WEEK</h3>
          ${noL.map(s => h`<div key=${s.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--g100)"}}><div style=${{display:"flex",alignItems:"center",gap:6}}><span class="rd"></span><span style=${{fontWeight:600}}>${s.name}</span></div>${s.whatsapp && h`<button class="btn btn-xs btn-wa" onClick=${()=>waMsg(s.whatsapp,fillMsg(S.msgGen,s,null))}>${ic('wa')} Remind</button>`}</div>`)}
        </div>`}
        <div class="card" style=${{marginBottom:14}}><h3>LOW BALANCE</h3>
          ${active.filter(s=>(s.lessonsTotal-s.lessonsTaken)<=2).length===0 ? h`<p style=${{color:"var(--g400)",fontSize:13}}>All good</p>` : h`<table><thead><tr><th>Student</th><th>Left</th></tr></thead><tbody>
            ${active.filter(s=>(s.lessonsTotal-s.lessonsTaken)<=2).map(s => h`<tr key=${s.id}><td style=${{fontWeight:600}}>${s.name}</td><td><span class=${"ll "+(s.lessonsTotal-s.lessonsTaken<=0?"low":"ok")}>${s.lessonsTotal-s.lessonsTaken}</span></td></tr>`)}
          </tbody></table>`}
        </div>
        <div class="card">
          <h3>💬 STUDENT ENGAGEMENT TIPS</h3>
          <div style=${{fontSize:12,lineHeight:1.8,color:"var(--g600)"}}>
            <div style=${{padding:"6px 0",borderBottom:"1px solid var(--g100)"}}>🎯 <b>Celebrate milestones</b> — message students when they hit 10, 25, 50 lessons</div>
            <div style=${{padding:"6px 0",borderBottom:"1px solid var(--g100)"}}>🔥 <b>Streak reminders</b> — students with 5+ lesson streaks are most likely to continue</div>
            <div style=${{padding:"6px 0",borderBottom:"1px solid var(--g100)"}}>📝 <b>Share their progress report</b> — send a PDF every month to keep them motivated</div>
            <div style=${{padding:"6px 0",borderBottom:"1px solid var(--g100)"}}>💬 <b>Check in after absence</b> — a simple WhatsApp after 7 days brings most back</div>
            <div style=${{padding:"6px 0"}}>🎁 <b>Offer a free lesson</b> — after every 10 paid, it builds loyalty and word-of-mouth</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════
// STUDENTS LIST — all bugs fixed
// ════════════════════════════════════════
function Students({data, setData, onProfile}) {
  const [search, setSearch] = useState("");
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkStudent(data.settings));
  const [viewMode, setViewMode] = useState("cards");
  const S = data.settings;
  const CUR = S.currency || "$";

  const sorted = [...data.students].sort((a,b) => { if(a.active!==b.active) return a.active?-1:1; return a.name.localeCompare(b.name); });
  const list = sorted.filter(s => s.name.toLowerCase().includes(search.toLowerCase()));

  const [payStatus, setPayStatus] = useState("Pending");
  const doSave = () => {
    if (!form.name.trim()) return;
    const ex = data.students.find(s=>s.id===form.id);
    if (ex) {
      // If lessons increased, auto-create a payment for the difference
      const lessonDiff = form.lessonsTotal - (ex.lessonsTotal||0);
      let newPayments = data.payments;
      if (lessonDiff > 0 && form.lessonRate > 0) {
        const amount = lessonDiff * form.lessonRate;
        const note = lessonDiff === form.lessonsTotal
          ? "Initial enrollment — "+form.lessonsTotal+" lessons"
          : "Top-up — "+lessonDiff+" lesson"+(lessonDiff>1?"s":"")+" added";
        newPayments = [...data.payments, {id:uid(),studentId:form.id,amount,date:today(),method:"Cash",notes:note,lessonsAdded:lessonDiff,status:payStatus}];
      }
      setData({...data, students: data.students.map(s=>s.id===form.id?{...form}:s), payments: newPayments});
    } else {
      const amount = form.lessonsTotal * form.lessonRate;
      const newPayment = {id:uid(),studentId:form.id,amount,date:today(),method:"Cash",notes:"Initial enrollment — "+form.lessonsTotal+" lessons",lessonsAdded:form.lessonsTotal,status:payStatus};
      setData({...data, students:[...data.students,{...form}], payments: amount>0 ? [...data.payments,newPayment] : data.payments});
    }
    setShow(false); setForm(mkStudent(S)); setPayStatus("Pending");
  };
  const doDelete = id => { if(confirm("Delete student and all their records?")) setData({...data,students:data.students.filter(s=>s.id!==id),lessons:data.lessons.filter(l=>l.studentId!==id),payments:data.payments.filter(p=>p.studentId!==id)}); };

  const adjTaken = (sid, delta) => { setData({...data, students: data.students.map(s => s.id===sid ? {...s, lessonsTaken: Math.max(0, s.lessonsTaken+delta)} : s)}); };
  const adjTotal = (sid, delta) => { setData({...data, students: data.students.map(s => s.id===sid ? {...s, lessonsTotal: Math.max(0, s.lessonsTotal+delta)} : s)}); };
  const adjFreeTaken = (sid, delta) => { setData({...data, students: data.students.map(s => { if(s.id!==sid) return s; const fe=freeExpiry(s); if(fe.expired && delta>0) return s; const nv=Math.max(0, Math.min((s.freeTotal||0), (s.freeTaken||0)+delta)); return {...s, freeTaken:nv}; })}); };

  // FIX #4: Quick complete creates a lesson record if none exists
  const completeLesson = (sid) => {
    const todayL = data.lessons.find(l => l.studentId===sid && l.date===today() && l.status==="Scheduled");
    if (todayL) {
      setData({...data,
        lessons: data.lessons.map(l => l.id===todayL.id ? {...l,status:"Completed"} : l),
        students: data.students.map(s => s.id===sid ? {...s, lessonsTaken: s.lessonsTaken+1} : s)
      });
    } else {
      // Create a new completed lesson record + increment counter
      const st = data.students.find(s=>s.id===sid);
      const newLesson = {id:uid(),studentId:sid,groupId:"",date:today(),time:new Date().toTimeString().slice(0,5),duration:60,type:st?.type||(S.types||[])[0]||"Levantine",status:"Completed",notes:"Quick-completed"};
      setData({...data,
        lessons: [...data.lessons, newLesson],
        students: data.students.map(s => s.id===sid ? {...s, lessonsTaken: s.lessonsTaken+1} : s)
      });
    }
  };

  return h`<div>
    <div style=${{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
      <div class="sb-x">${ic('srch')}<input placeholder="Search..." value=${search} onInput=${e=>setSearch(e.target.value)}/></div>
      <button class="btn btn-p" onClick=${()=>{setForm(mkStudent(S));setShow(true);}}>${ic('plus')} Add Student</button>
      <div style=${{marginLeft:"auto",display:"flex",gap:4}}>
        <button class=${"btn btn-sm "+(viewMode==="cards"?"btn-p":"")} onClick=${()=>setViewMode("cards")}>Cards</button>
        <button class=${"btn btn-sm "+(viewMode==="table"?"btn-p":"")} onClick=${()=>setViewMode("table")}>Table</button>
      </div>
    </div>
    ${list.length===0 ? h`<div class="empty"><h3>NO STUDENTS</h3><p>Add your first student</p><button class="btn btn-p" onClick=${()=>{setForm(mkStudent(S));setShow(true);}}>${ic('plus')} Add</button></div>` :

    viewMode==="cards" ? h`<div class="stu-grid">
      ${list.map((s,i) => {
        const left = s.lessonsTotal - s.lessonsTaken;
        const noL = s.active && !hadLesson(s.id, data.lessons, S.weekStartDay);
        const pct = s.lessonsTotal > 0 ? Math.round(s.lessonsTaken / s.lessonsTotal * 100) : 0;
        const sPay = data.payments.filter(p=>p.studentId===s.id);
        const totalPaid = sPay.reduce((a,p)=>a+(p.amount||0),0);
        const hasToday = data.lessons.some(l => l.studentId===s.id && l.date===today() && l.status==="Scheduled");
        const att = attendanceStats(s.id, data.lessons);
        return h`<div key=${s.id} class=${"stu-card"+(noL?" alert":"")+(s.active?"":" inactive")}>
          <div class="sc-top">
            <div onClick=${()=>onProfile(s.id)} style=${{cursor:"pointer",flex:1,display:"flex",alignItems:"center",gap:10}}>
              ${s.avatar ? h`<img src=${s.avatar} style=${{width:40,height:40,borderRadius:8,objectFit:"cover",flexShrink:0,border:"1.5px solid var(--g200)"}}/>` : h`<div style=${{width:40,height:40,borderRadius:8,background:"var(--g100)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:18}}>👤</div>`}
              <div>
              <div style=${{display:"flex",alignItems:"center"}}><span class="sc-num">#${i+1}</span><span class="sc-name">${s.name}</span>${noL && h`<span class="rd"></span>`}</div>
              <div class="sc-row"><span class="tg">${s.type}</span><span class="tg" style=${{background:"transparent",color:"var(--bk)",border:"1.5px solid var(--g300)"}}>${s.level}</span><span class=${"bg "+(s.active?"bg-ok":"bg-n")}>${s.active?"Active":"Off"}</span>${s.enrollmentStatus==="pending"&&h`<span class="bg bg-wn" style=${{fontSize:10}}>Pending Setup</span>`}</div>
            </div></div>
            <div style=${{display:"flex",gap:2}}><button class="bi" onClick=${()=>{setForm({...s});setShow(true);}}>${ic('edt')}</button><button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>doDelete(s.id)}>${ic('del')}</button></div>
          </div>
          <div class="sc-stats" style=${{gridTemplateColumns:"1fr 1fr 1fr"}}>
            <div class="sc-stat">
              <div class="sc-sl">Lessons Taken</div>
              <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div class="stepper" onClick=${e=>e.stopPropagation()}>
                  <button class="st-btn minus" onClick=${()=>adjTaken(s.id,-1)}>−</button>
                  <div class="st-val">${s.lessonsTaken}</div>
                  <button class="st-btn" onClick=${()=>adjTaken(s.id,1)}>+</button>
                </div>
              </div>
            </div>
            <div class="sc-stat">
              <div class="sc-sl">Lessons Left</div>
              <span class=${"ll "+(left<=0?"low":left<=2?"ok":"good")} style=${{fontSize:26}}>${left}</span>
              <span style=${{fontSize:10,color:"var(--g400)"}}> / ${s.lessonsTotal}</span>
              <div class="prog"><div class=${"prog-fill "+(pct>=80?"low":pct>=50?"ok":"good")} style=${{width:pct+"%"}}></div></div>
            </div>
            <div class="sc-stat">
              <div class="sc-sl">Attendance</div>
              <span class=${"ll "+(att.rate>=80?"good":att.rate>=60?"ok":"low")} style=${{fontSize:22}}>${att.rate}%</span>
              ${att.streak>=3 && h`<span style=${{fontSize:9,color:"var(--ok)",fontWeight:600,marginLeft:4}}>${att.streak} streak</span>`}
            </div>
          </div>
          <div class="sc-actions" onClick=${e=>e.stopPropagation()}>
            <button class="btn btn-xs btn-done" onClick=${()=>completeLesson(s.id)}>${ic('chk')} ${hasToday?"Done Today":"Complete"}</button>
            ${s.whatsapp && h`<button class="btn btn-xs btn-wa" onClick=${()=>waMsg(s.whatsapp,fillMsg(S.msgGen,s,null))}>${ic('wa')}</button>`}
            <button class="btn btn-xs" onClick=${()=>exportProfilePDF(s,data,false)}>${ic('pdf')} PDF</button>
            <button class="btn btn-xs" onClick=${()=>onProfile(s.id)}>Profile →</button>
          </div>
        </div>`;
      })}
    </div>` :

    h`<div class="card" style=${{padding:0,overflow:"hidden"}}><div style=${{overflowX:"auto"}}><table><thead><tr><th>#</th><th>Name</th><th>Type</th><th>Taken</th><th>Left</th><th>Attend.</th><th>Paid</th><th>Status</th><th></th></tr></thead><tbody>
      ${list.map((s,i) => {
        const left = s.lessonsTotal - s.lessonsTaken;
        const att = attendanceStats(s.id, data.lessons);
        const sPay = data.payments.filter(p=>p.studentId===s.id);
        const totalPaid = sPay.reduce((a,p)=>a+(p.amount||0),0);
        return h`<tr key=${s.id} class=${"ck"+(s.active?"":" ri")} onClick=${()=>onProfile(s.id)}>
          <td class="nc">${i+1}</td>
          <td style=${{fontWeight:600}}>${s.name}</td>
          <td><span class="tg">${s.type}</span></td>
          <td>${s.lessonsTaken}</td>
          <td><span class=${"ll "+(left<=0?"low":left<=2?"ok":"good")}>${left}</span></td>
          <td><span class=${"ll "+(att.rate>=80?"good":att.rate>=60?"ok":"low")} style=${{fontSize:16}}>${att.rate}%</span></td>
          <td style=${{fontFamily:"var(--fh)",fontSize:16}}>${fm(totalPaid, CUR)}</td>
          <td><span class=${"bg "+(s.active?"bg-ok":"bg-n")}>${s.active?"Active":"Off"}</span></td>
          <td onClick=${e=>e.stopPropagation()} style=${{whiteSpace:"nowrap"}}>

// CALENDAR — FIX #11: configurable week start
// ════════════════════════════════════════
function Calendar({data, setData}) {
  const [mo, setMo] = useState(new Date().getMonth());
  const [yr, setYr] = useState(new Date().getFullYear());
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkLesson(data.settings));
  const S = data.settings;
  const wsd = S.weekStartDay || 1;
  const fd = new Date(yr,mo,1).getDay(), dim = new Date(yr,mo+1,0).getDate(), pd = new Date(yr,mo,0).getDate();
  // FIX #11: Adjust first day offset based on week start
  const offset = (fd - wsd + 7) % 7;
  const cells = []; for(let i=offset-1;i>=0;i--) cells.push({d:pd-i,m:false}); for(let i=1;i<=dim;i++) cells.push({d:i,m:true}); while(cells.length<42) cells.push({d:cells.length-offset-dim+1,m:false});
  const ts = today(), MN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAY_NAMES = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const orderedDays = [...DAY_NAMES.slice(wsd), ...DAY_NAMES.slice(0,wsd)];
  const getLessons = day => { const ds=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0"); return data.lessons.filter(l=>l.date===ds); };

  const doSave = () => {
    if (!form.studentId && !form.groupId) return;
    const ex = data.lessons.find(l=>l.id===form.id);
    let nL = ex ? data.lessons.map(l=>l.id===form.id?{...form}:l) : [...data.lessons,{...form}];
    let nS = data.students;
    if (form.status==="Completed" && ex?.status!=="Completed" && form.studentId) nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTaken:s.lessonsTaken+1}:s);
    if (form.status!=="Completed" && ex?.status==="Completed" && form.studentId) nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTaken:Math.max(0,s.lessonsTaken-1)}:s);
    setData({...data, lessons:nL, students:nS}); setShow(false); setForm(mkLesson(S));
  };
  const doDel = id => { if(confirm("Delete this lesson?")) { setData({...data, lessons:data.lessons.filter(l=>l.id!==id)}); setShow(false); } };

  return h`<div>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div style=${{display:"flex",alignItems:"center",gap:10}}>
        <button class="bi" onClick=${()=>{if(mo===0){setMo(11);setYr(yr-1);}else setMo(mo-1);}}>${icb('cL')}</button>
        <h3 style=${{fontFamily:"var(--fh)",fontSize:22,letterSpacing:1.5,minWidth:160,textAlign:"center"}}>${MN[mo]} ${yr}</h3>
        <button class="bi" onClick=${()=>{if(mo===11){setMo(0);setYr(yr+1);}else setMo(mo+1);}}>${icb('cR')}</button>
      </div>
      <button class="btn btn-p" onClick=${()=>{setForm(mkLesson(S));setShow(true);}}>${ic('plus')} Add Lesson</button>
    </div>
    <div style=${{overflowX:"auto",WebkitOverflowScrolling:"touch"}}><div class="cal" style=${{minWidth:320}}>
      ${orderedDays.map(d=>h`<div key=${d} class="cal-h">${d}</div>`)}
      ${cells.map((c,i) => { const ds=c.m?yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(c.d).padStart(2,"0"):""; const dl=c.m?getLessons(c.d):[]; return h`<div key=${i} class=${"cal-c"+(c.m?"":" om")+(ds===ts?" today":"")}>
        <div class="cal-d">${c.d}</div>
        ${dl.map(l=>{const st=data.students.find(s=>s.id===l.studentId);return h`<div key=${l.id} class=${"cal-e "+l.status.toLowerCase()} onClick=${()=>{setForm({...l});setShow(true);}}>${l.time} ${st?.name||"Grp"}</div>`;})}
      </div>`; })}
    </div></div>
    ${show && h`<${Modal} title=${data.lessons.find(l=>l.id===form.id)?"EDIT LESSON":"ADD LESSON"} onClose=${()=>setShow(false)} footer=${h`
      ${data.lessons.find(l=>l.id===form.id) && h`<button class="btn btn-d btn-sm" onClick=${()=>doDel(form.id)}>Delete</button>`}
      <button class="btn" onClick=${()=>setShow(false)}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>
    `}>
      <div class="fr"><div class="fg"><label>Student</label><select value=${form.studentId} onChange=${e=>setForm({...form,studentId:e.target.value})}><option value="">— Select —</option>${data.students.filter(s=>s.active).map(s=>h`<option key=${s.id} value=${s.id}>${s.name}</option>`)}</select></div><div class="fg"><label>Group</label><select value=${form.groupId} onChange=${e=>setForm({...form,groupId:e.target.value})}><option value="">— None —</option>${(data.groups||[]).map(g=>h`<option key=${g.id} value=${g.id}>${g.name}</option>`)}</select></div></div>
      <div class="fr3"><div class="fg"><label>Date</label><input type="date" value=${form.date} onInput=${e=>setForm({...form,date:e.target.value})}/></div><div class="fg"><label>Time (Lebanon)</label><input type="time" step="1800" value=${form.time} onInput=${e=>setForm({...form,time:e.target.value})}/></div><div class="fg"><label>Duration (min)</label><input type="number" value=${form.duration} onInput=${e=>setForm({...form,duration:+e.target.value})}/></div></div>
      ${(()=>{
        if (!form.date || !form.time) return null;
        const student = data.students.find(s=>s.id===form.studentId);
        const studentTz = student?.timezone;
        try {
          const dt = new Date(form.date+"T"+form.time+":00");
          const fmt = tz => new Intl.DateTimeFormat("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:tz}).format(dt);
          const lbTime = fmt("Asia/Beirut");
          return h`<div style=${{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8,padding:"8px 12px",background:"#f0f4ff",borderRadius:8,fontSize:12}}>
            <span style=${{fontWeight:700}}>🇱🇧 Lebanon:</span><span>${lbTime}</span>
            ${studentTz && studentTz !== "Asia/Beirut" && h`<span style=${{margin:"0 6px",color:"#aaa"}}>→</span><span style=${{fontWeight:700}}>🌍 Student:</span><span>${fmt(studentTz)}</span>`}
          </div>`;
        } catch(e) { return null; }
      })()}
      <div class="fr"><div class="fg"><label>Type</label><select value=${form.type} onChange=${e=>setForm({...form,type:e.target.value})}>${S.types.map(t=>h`<option key=${t}>${t}</option>`)}</select></div><div class="fg"><label>Status</label><select value=${form.status} onChange=${e=>setForm({...form,status:e.target.value})}>${S.statuses.map(s=>h`<option key=${s}>${s}</option>`)}</select></div></div>
      <div class="fg"><label>Notes</label><textarea value=${form.notes} onInput=${e=>setForm({...form,notes:e.target.value})}/></div>
    <//>`}
  </div>`;
}

// PAYMENTS — FIX #7 & #8
// ════════════════════════════════════════
function Payments({data, setData}) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkPayment());
  const [search, setSearch] = useState("");
  const S = data.settings;
  const CUR = S.currency || "$";
  const sorted = [...data.payments].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filtered = search ? sorted.filter(p=>{const st=data.students.find(s=>s.id===p.studentId); return st?.name?.toLowerCase().includes(search.toLowerCase());}) : sorted;
  const now = new Date();
  const mPay = data.payments.filter(p=>{const d=new Date(p.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const mRev = mPay.filter(p=>p.status==="Paid").reduce((a,p)=>a+(p.amount||0),0);
  const tRev = data.payments.filter(p=>p.status==="Paid").reduce((a,p)=>a+(p.amount||0),0);
  const pending = data.payments.filter(p=>p.status!=="Paid");
  const pendingTotal = pending.reduce((a,p)=>a+(p.amount||0),0);

  // FIX #8: Track original lessonsAdded to adjust on edit
  const doSave = () => {
    if(!form.studentId||!form.amount) return;
    const ex=data.payments.find(p=>p.id===form.id);
    let nP, nS=data.students;
    if(ex) {
      nP=data.payments.map(p=>p.id===form.id?{...form}:p);
      // Adjust lessons if lessonsAdded changed
      const diff = (form.lessonsAdded||0) - (ex.lessonsAdded||0);
      if(diff !== 0) {
        nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTotal:Math.max(0,s.lessonsTotal+diff)}:s);
      }
    } else {
      nP=[...data.payments,{...form}];
      if(form.lessonsAdded>0) nS=nS.map(s=>s.id===form.studentId?{...s,lessonsTotal:s.lessonsTotal+form.lessonsAdded,totalPaid:s.totalPaid+form.amount}:s);
    }
    setData({...data,payments:nP,students:nS}); setShow(false); setForm(mkPayment());
  };
  const toggleStatus = pid => { setData({...data, payments: data.payments.map(p => p.id===pid ? {...p, status: p.status==="Paid"?"Pending":"Paid"} : p)}); };

  return h`<div>
    <div class="stats" style=${{gridTemplateColumns:"repeat(4,1fr)"}}>
      <div class="stat"><div class="lb">This Month (Paid)</div><div class="vl">${fm(mRev,CUR)}</div></div>
      <div class="stat"><div class="lb">Total Collected</div><div class="vl">${fm(tRev,CUR)}</div></div>
      <div class="stat"><div class="lb">Pending</div><div class="vl" style=${{color:pendingTotal>0?"var(--wn)":"var(--ok)"}}>${fm(pendingTotal,CUR)}</div><div class="su">${pending.length} unpaid</div></div>
      <div class="stat"><div class="lb">Avg Payment</div><div class="vl">${fm(data.payments.length?data.payments.reduce((a,p)=>a+(p.amount||0),0)/data.payments.length:0,CUR)}</div></div>
    </div>
    <div class="card" style=${{padding:0}}>
      <div style=${{padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"2px solid var(--bk)",gap:10,flexWrap:"wrap"}}>
        <h3 style=${{fontFamily:"var(--fh)",fontSize:20,letterSpacing:1.5,margin:0}}>PAYMENTS</h3>
        <div style=${{display:"flex",gap:8,alignItems:"center"}}>
          <div class="sb-x" style=${{border:"1.5px solid var(--g200)"}}>${ic('srch')}<input placeholder="Filter by student..." value=${search} onInput=${e=>setSearch(e.target.value)} style=${{width:140}}/></div>
          <button class="btn btn-p btn-sm" onClick=${()=>{setForm(mkPayment());setShow(true);}}>${ic('plus')} Add</button>
        </div>
      </div>
    <div style=${{overflowX:"auto"}}><table><thead><tr><th>Date</th><th>Student</th><th>Amount</th><th>Status</th><th>Method</th><th>Lessons+</th><th>Notes</th><th></th></tr></thead><tbody>
      ${filtered.map(p=>{const st=data.students.find(s=>s.id===p.studentId); return h`<tr key=${p.id} style=${{background:p.status!=="Paid"?"#fff8f0":"transparent"}}>
        <td style=${{fontWeight:600}}>${fmt(p.date)}</td>
        <td>${st?.name||"?"}</td>
        <td style=${{fontFamily:"var(--fh)",fontSize:18}}>${fm(p.amount,CUR)}</td>
        <td><button class=${"btn btn-xs "+(p.status==="Paid"?"btn-done":"btn-d")} onClick=${()=>toggleStatus(p.id)} style=${{minWidth:70,justifyContent:"center"}}>${p.status==="Paid"?"✓ Paid":"Pending"}</button></td>
        <td>${p.method}</td>
        <td>${p.lessonsAdded||"—"}</td>
        <td style=${{fontSize:12,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis"}}>${p.notes||"—"}</td>
        <td style=${{whiteSpace:"nowrap"}}>${p.status==="Paid"&&h`<button class="bi" title="Print Invoice" onClick=${()=>printInvoice(p,st,S)}>${ic('pdf')}</button>`}<button class="bi" onClick=${()=>{setForm({...p});setShow(true);}}>${ic('edt')}</button><button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>{
          if(confirm("Delete this payment record?")) setData({...data,payments:data.payments.filter(x=>x.id!==p.id)});
        }}>${ic('del')}</button></td>
      </tr>`;})}
      ${filtered.length===0&&h`<tr><td colspan="8" style=${{textAlign:"center",color:"var(--g400)",padding:30}}>No payments</td></tr>`}

// HOMEWORK — teacher overview of all HW
// ════════════════════════════════════════
function HomeworkView({data, onProfile}) {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const all = (data.homework||[]);
  const counts = {all:all.length,assigned:all.filter(x=>x.status==="assigned").length,submitted:all.filter(x=>x.status==="submitted").length,reviewed:all.filter(x=>x.status==="reviewed").length};
  const filtered = all
    .filter(hw=>filter==="all"||hw.status===filter)
    .filter(hw=>{
      if(!search) return true;
      const s=data.students.find(x=>x.id===hw.studentId);
      return s?.name?.toLowerCase().includes(search.toLowerCase())||hw.title.toLowerCase().includes(search.toLowerCase());
    })
    .sort((a,b)=>new Date(b.assignedDate)-new Date(a.assignedDate));
  return h`<div>
    <div style=${{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
      ${[["all","All"],["assigned","Pending"],["submitted","Submitted"],["reviewed","Reviewed"]].map(([k,l])=>h`<button key=${k} class=${"btn btn-sm "+(filter===k?"btn-p":"")} onClick=${()=>setFilter(k)}>${l}${counts[k]>0?" ("+counts[k]+")":""}</button>`)}
      <div class="sb-x" style=${{marginLeft:"auto"}}>${ic('srch')}<input placeholder="Search student or task..." value=${search} onInput=${e=>setSearch(e.target.value)}/></div>
    </div>
    ${filtered.length===0?h`<div class="empty"><h3>NO HOMEWORK</h3><p>Assign homework from a student profile page</p></div>`:
    h`<div class="card" style=${{padding:0}}>
      <div style=${{overflowX:"auto"}}><table><thead><tr><th>Student</th><th>Task</th><th>Due</th><th>Status</th><th>Submitted</th><th></th></tr></thead><tbody>
        ${filtered.map(hw=>{
          const s=data.students.find(x=>x.id===hw.studentId);
          return h`<tr key=${hw.id}>
            <td style=${{fontWeight:600,cursor:"pointer",textDecoration:"underline"}} onClick=${()=>onProfile(hw.studentId)}>${s?.name||"?"}</td>
            <td>${hw.title}</td>
            <td style=${{whiteSpace:"nowrap"}}>${fmt(hw.dueDate)}</td>
            <td><span class=${"bg "+(hw.status==="reviewed"?"bg-ok":hw.status==="submitted"?"bg-wn":"bg-n")}>${hw.status}</span></td>
            <td style=${{fontSize:12,color:"var(--g500)"}}>${hw.submittedAt?fmt(hw.submittedAt):"—"}</td>
            <td><button class="btn btn-xs" onClick=${()=>onProfile(hw.studentId)}>Profile →</button></td>
          </tr>`;
        })}
      </tbody></table></div>
    </div>`}
  </div>`;
}

    <div class="card"><h3>📅 MY AVAILABILITY</h3>
      <p style=${{fontSize:12,color:"var(--g500)",marginBottom:16}}>Toggle each day on/off, then add time ranges for when you're available. Students will see open slots and book directly.</p>

        const avail = S.availability || {};
        const dur = S.lessonDuration || 60;
        const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        const dayShort = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

        const setDay = (dayIdx, patch) => {
          const cur = avail[dayIdx] || {enabled:false,ranges:[]};
          u("availability", {...avail, [dayIdx]: {...cur, ...patch}});
        };
        const addRange = (dayIdx) => {
          const cur = avail[dayIdx] || {enabled:true,ranges:[]};
          u("availability", {...avail, [dayIdx]: {...cur, ranges:[...(cur.ranges||[]),{start:"09:00",end:"17:00"}]}});
        };
        const rmRange = (dayIdx, ri) => {
          const cur = avail[dayIdx];
          u("availability", {...avail, [dayIdx]: {...cur, ranges:cur.ranges.filter((_,i)=>i!==ri)}});
        };
        const updRange = (dayIdx, ri, key, val) => {
          const cur = avail[dayIdx];
          const ranges = cur.ranges.map((r,i)=>i===ri?{...r,[key]:val}:r);
          u("availability", {...avail, [dayIdx]: {...cur, ranges}});
        };

        const enabledCount = [0,1,2,3,4,5,6].filter(i=>(avail[i]||{}).enabled).length;

        return h`<div>
          <!-- Lesson duration setting -->
          <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:20,padding:"12px 14px",background:"var(--g50)",border:"1.5px solid var(--g200)",borderRadius:8,flexWrap:"wrap"}}>
            <span style=${{fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>⏱ Lesson duration:</span>
            <select value=${dur} onChange=${e=>u("lessonDuration",+e.target.value)} style=${{border:"2px solid var(--bk)",padding:"7px 10px",fontFamily:"var(--fb)",fontSize:13,borderRadius:7,fontWeight:700}}>
              <option value=${30}>30 min</option>
              <option value=${45}>45 min</option>
              <option value=${60}>60 min (1 hour)</option>
              <option value=${90}>90 min</option>
              <option value=${120}>2 hours</option>
            </select>
            <span style=${{fontSize:11,color:"var(--g400)"}}>Students book in these blocks</span>
          </div>

          <!-- Day toggles -->
          <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:16}}>
            ${[0,1,2,3,4,5,6].map(i => {
              const day = avail[i] || {enabled:false,ranges:[]};
              return h`<button key=${i} onClick=${()=>setDay(i,{enabled:!day.enabled})} style=${{
                padding:"10px 4px",borderRadius:8,fontWeight:800,fontSize:11,cursor:"pointer",
                border:day.enabled?"2px solid var(--bk)":"2px solid var(--g200)",
                background:day.enabled?"var(--bk)":"var(--wh)",
                color:day.enabled?"var(--wh)":"var(--g400)",
                transition:"all .15s",textAlign:"center",lineHeight:1.3
              }}>${dayShort[i]}${day.enabled?h`<br/><span style=${{fontSize:8,letterSpacing:.3}}>ON</span>`:""}</button>`;
            })}
          </div>

          <!-- Per-day time ranges -->
          ${[0,1,2,3,4,5,6].map(i => {
            const day = avail[i] || {enabled:false,ranges:[]};
            if (!day.enabled) return null;
            return h`<div key=${i} style=${{marginBottom:12,padding:"12px 14px",border:"2px solid var(--bk)",borderRadius:10,background:"var(--wh)"}}>
              <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style=${{fontWeight:800,fontSize:13}}>${dayNames[i]}</div>
                <button class="btn btn-sm" onClick=${()=>addRange(i)}>+ Add Range</button>
              </div>
              ${(day.ranges||[]).length===0 && h`<div style=${{fontSize:12,color:"var(--g400)",fontStyle:"italic",padding:"6px 0"}}>No time ranges yet — click "Add Range" to set your hours.</div>`}

                <div style=${{display:"flex",alignItems:"center",gap:6,flex:1,flexWrap:"wrap"}}>
                  <span style=${{fontSize:11,fontWeight:800,color:"var(--g600)",minWidth:34,textTransform:"uppercase",letterSpacing:.5}}>From</span>
                  <input type="time" value=${r.start} step="1800" onInput=${e=>updRange(i,ri,"start",e.target.value)} style=${{border:"2px solid var(--g200)",padding:"7px 10px",fontFamily:"var(--fb)",fontSize:15,borderRadius:7,fontWeight:700,flex:1,minWidth:120}}/>
                  <span style=${{fontSize:11,fontWeight:800,color:"var(--g600)",minWidth:16,textAlign:"center"}}>to</span>
                  <input type="time" value=${r.end} step="1800" onInput=${e=>updRange(i,ri,"end",e.target.value)} style=${{border:"2px solid var(--g200)",padding:"7px 10px",fontFamily:"var(--fb)",fontSize:15,borderRadius:7,fontWeight:700,flex:1,minWidth:120}}/>
                </div>
                <button onClick=${()=>rmRange(i,ri)} style=${{background:"rgba(200,0,0,0.07)",border:"1.5px solid rgba(200,0,0,0.2)",color:"var(--bd)",borderRadius:7,padding:"6px 10px",cursor:"pointer",fontWeight:800,fontSize:13,flexShrink:0}}>✕</button>
              </div>`)}
            </div>`;
          })}

          ${enabledCount===0&&h`<div style=${{textAlign:"center",padding:"20px",color:"var(--g400)",border:"2px dashed var(--g200)",borderRadius:8,marginTop:8}}>
            <div style=${{fontSize:24,marginBottom:6}}>📅</div>

        </div>`;
      })()}

            </div>
            ${val
              ? h`<img src=${val} style=${{display:"block",width:"100%",height:130,objectFit:"cover",objectPosition:posX+"% "+posY+"%"}}/>`
              : h`<div style=${{height:130,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#f5f6f8 0%,#eaecef 100%)",color:"var(--g300)",gap:8,cursor:"pointer"}}>

        <button class="btn" onClick=${()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.students&&d.settings){if(confirm("Replace ALL data?")){setData(migrateData(d));}}else{alert("Invalid backup.");}}catch{alert("Could not read file.");}};r.readAsText(f);};inp.click();}}>⬆ Import Local Backup</button>
        <button class="btn" onClick=${async()=>{if(!confirm("Restore from cloud? This will overwrite your current data.")) return; const auth=getAuth(); const d=await apiPost("/api/data",{token:auth?.token,action:"restore"}); if(d.data){setData(migrateData(d.data));alert("Restored from cloud backup saved on "+d.savedAt);}else{alert("No cloud backup found.");}}}>☁ Restore from Cloud</button>
      </div>
    </div>
    <div class="card" style=${{borderColor:"var(--bd)"}}><h3 style=${{color:"var(--bd)"}}>DANGER ZONE</h3><button class="btn btn-d" onClick=${()=>{if(confirm("Delete ALL data? Cannot be undone.")){indexedDB.deleteDatabase(DB_NAME);localStorage.removeItem(SK);location.reload();}}}>Reset All Data</button></div>
  </div>`;
}

// USER MANAGEMENT — teacher panel
// ════════════════════════════════════════
function UserManagement({auth, data, setData}) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("requests"); // requests | all | create
  const [createForm, setCreateForm] = useState({name:"",email:"",password:"",role:"student"});
  const [pwForm, setPwForm] = useState({email:"",password:""});
  const [msg, setMsg] = useState("");
  const [err, setErr] = useState("");

  const call = async body => apiPost("/api/users", {token: auth.token, ...body});

  const load = async () => {
    setLoading(true);
    const d = await call({action:"list"});
    setUsers(d.users || []);
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const pending = users.filter(u=>u.status==="pending");
  const approved = users.filter(u=>u.status==="approved");

  const approve = async (email, name) => {
    await call({action:"approve", email});
    // Auto-create student profile if one doesn't exist yet
    if (data && setData) {
      const exists = (data.students||[]).find(s => s.email === email);
      if (!exists) {
        const S = data.settings;
        const newStudent = {...mkStudent(S), name: name||email, email, enrollmentStatus:"pending"};
        setData({...data, students:[...data.students, newStudent]});
      }
    }
    setMsg("Approved! Student added to your list."); load();
  };
  const reject = async email => {
    if (!confirm("Reject and remove this request?")) return;
    await call({action:"reject", email});
    setMsg("Removed."); load();
  };
  const del = async email => {
    if (!confirm("Delete this user? They will lose access immediately.")) return;
    await call({action:"delete", email});
    setMsg("Deleted."); load();
  };
  const resetPw = async (email, pw) => {
    if (!pw || pw.length < 6) return setErr("Password must be at least 6 characters");
    const d = await call({action:"setPassword", email, password:pw});
    if (d.error) return setErr(d.error);
    setMsg("Password updated for "+email);
    setPwForm({email:"",password:""});
  };
  const create = async () => {
    setErr(""); setMsg("");
    if (!createForm.name||!createForm.email||!createForm.password) return setErr("All fields required");
    const d = await call({action:"create",...createForm});
    if (d.error) return setErr(d.error);
    setMsg("Account created for "+createForm.email);
    setCreateForm({name:"",email:"",password:"",role:"student"});
    load();
  };

  const fmt2 = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";

  if (loading) return h`<div style=${{textAlign:"center",padding:40,color:"var(--g400)"}}>Loading...</div>`;

  return h`<div>
    ${msg && h`<div style=${{padding:"10px 14px",background:"#f0fff4",border:"1px solid var(--ok)",marginBottom:14,fontSize:13,color:"var(--ok)",fontWeight:600}}>${msg}</div>`}
    ${err && h`<div style=${{padding:"10px 14px",background:"#fff0f0",border:"1px solid var(--bd)",marginBottom:14,fontSize:13,color:"var(--bd)",fontWeight:600}}>${err}</div>`}

    <div class="auth-tabs" style=${{marginBottom:20}}>
      <div class=${"auth-tab "+(tab==="requests"?"on":"")} onClick=${()=>{setTab("requests");setMsg("");setErr("");}}>Requests ${pending.length>0?h`<span style=${{marginLeft:4,background:"var(--bd)",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:700}}>${pending.length}</span>`:""}</div>
      <div class=${"auth-tab "+(tab==="all"?"on":"")} onClick=${()=>{setTab("all");setMsg("");setErr("");}}>All Users (${approved.length})</div>
      <div class=${"auth-tab "+(tab==="create"?"on":"")} onClick=${()=>{setTab("create");setMsg("");setErr("");}}>Create Account</div>
    </div>

    ${tab==="requests" && h`<div>
      ${pending.length===0 ? h`<div class="empty"><h3>NO PENDING REQUESTS</h3><p>When a student requests access, they'll appear here.</p></div>` :
      h`<div>${pending.map(u=>h`<div key=${u.email} class="assess-card" style=${{borderLeftColor:"var(--wn)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div>
            <div style=${{fontWeight:700,fontSize:15}}>${u.name}</div>
            <div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>${u.email}</div>
            <div style=${{fontSize:11,color:"var(--g400)",marginTop:2}}>Requested: ${fmt2(u.createdAt)}</div>
            ${u.message&&h`<div style=${{marginTop:8,padding:"8px 10px",background:"var(--g50)",fontSize:12,lineHeight:1.6,borderLeft:"2px solid var(--g300)"}}>"${u.message}"</div>`}
          </div>
          <div style=${{display:"flex",gap:6,flexShrink:0}}>
            <button class="btn btn-p btn-sm" onClick=${()=>approve(u.email, u.name)}>✓ Approve</button>
            <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>reject(u.email)}>✗ Reject</button>
          </div>
        </div>
      </div>`)}</div>`}
    </div>`}

    ${tab==="all" && h`<div>
      ${approved.length===0 ? h`<div class="empty"><h3>NO APPROVED USERS</h3></div>` :
      h`<div class="card" style=${{padding:0}}>
        <div style=${{overflowX:"auto"}}><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Since</th><th>Reset Password</th><th></th></tr></thead><tbody>
          ${approved.map(u=>h`<tr key=${u.email}>
            <td style=${{fontWeight:600}}>${u.name}</td>
            <td style=${{fontSize:12}}>${u.email}</td>
            <td><span class="tg">${u.role}</span></td>
            <td style=${{fontSize:12,color:"var(--g500)"}}>${fmt2(u.createdAt)}</td>
            <td>
              <div style=${{display:"flex",gap:4,alignItems:"center"}}>
                <input style=${{padding:"5px 8px",border:"1.5px solid var(--g200)",fontFamily:"var(--fb)",fontSize:12,width:120}} type="password" placeholder="New password" value=${pwForm.email===u.email?pwForm.password:""} onFocus=${()=>setPwForm({email:u.email,password:""})} onInput=${e=>setPwForm({email:u.email,password:e.target.value})}/>
                <button class="btn btn-xs" onClick=${()=>resetPw(u.email, pwForm.email===u.email?pwForm.password:"")}>Set</button>
              </div>
            </td>
            <td><button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>del(u.email)}>${ic('del')}</button></td>
          </tr>`)}
        </tbody></table></div>
      </div>`}
    </div>`}

    ${tab==="create" && h`<div class="card" style=${{maxWidth:480}}>
      <h3 style=${{marginBottom:16}}>CREATE ACCOUNT</h3>
      <div class="fg"><label>Name</label><input value=${createForm.name} onInput=${e=>setCreateForm({...createForm,name:e.target.value})} placeholder="Student's full name"/></div>
      <div class="fg"><label>Email</label><input type="email" value=${createForm.email} onInput=${e=>setCreateForm({...createForm,email:e.target.value})}/></div>
      <div class="fg"><label>Password</label><input type="password" value=${createForm.password} onInput=${e=>setCreateForm({...createForm,password:e.target.value})} placeholder="Min 6 characters"/></div>
      <div class="fg"><label>Role</label><select value=${createForm.role} onChange=${e=>setCreateForm({...createForm,role:e.target.value})}><option value="student">Student</option><option value="tutor">Tutor</option></select></div>
      <button class="btn btn-p" onClick=${create}>Create Account</button>
      <div style=${{marginTop:10,fontSize:11,color:"var(--g500)",lineHeight:1.6}}>Share the email and password with the student via WhatsApp. They can log in immediately.</div>
    </div>`}
  </div>`;
}

// REQUESTS INBOX — unified notifications
// ════════════════════════════════════════
function RequestsInbox({auth, data, setData, onProfile}) {
  const [users, setUsers] = useState([]);
  const [tab, setTab] = useState("all");
  const [createForm, setCreateForm] = useState({name:"",email:"",password:"",role:"student"});
  const [pwForm, setPwForm] = useState({email:"",password:""});
  const [msg, setMsg] = useState("");
  const [err, setErr] = useState("");

  const call = async body => apiPost("/api/users", {token: auth.token, ...body});
  const load = async () => { const d = await call({action:"list"}); setUsers(d.users||[]); };
  useEffect(() => { load(); }, []);

  const approve = async (email, name) => {
    await call({action:"approve", email});
    const exists = (data.students||[]).find(s=>s.email===email);
    if (!exists) {
      const newStudent = {...mkStudent(data.settings), name:name||email, email, enrollmentStatus:"pending"};
      setData({...data, students:[...data.students, newStudent]});
    }
    setMsg("Approved!"); load();
  };
  const reject = async email => { await call({action:"reject", email}); setMsg("Rejected."); load(); };
  const create = async () => {
    if (!createForm.name||!createForm.email||!createForm.password) return setErr("Fill all fields");
    const d = await call({action:"create",...createForm});
    if (d.error) return setErr(d.error);
    setMsg("Account created for "+createForm.email);
    setCreateForm({name:"",email:"",password:"",role:"student"}); load();
  };
  const resetPw = async () => {
    if (!pwForm.password||pwForm.password.length<6) return setErr("Min 6 chars");
    const d = await call({action:"setPassword",...pwForm});
    if (d.error) return setErr(d.error);
    setMsg("Password updated!"); setPwForm({email:"",password:""});
  };

  const pending = users.filter(u=>u.status==="pending");
  const approved = users.filter(u=>u.status==="approved");
  const pendingReqs = (data.lessonRequests||[]).filter(r=>r.status==="pending");
  const studentNotes = (data.students||[]).filter(s=>s.studentNote&&s.studentNote.trim());
  const submittedHw = (data.homework||[]).filter(hw=>hw.status==="submitted");

  const confirmReq = req => {
    const st = (data.students||[]).find(s=>s.id===req.studentId);
    const S = data.settings;
    const newLesson = {id:uid(),studentId:req.studentId,groupId:"",date:req.preferredDate||today(),time:req.preferredTime||"10:00",duration:req.duration||60,type:st?.type||(S.types||[])[0]||"Levantine",status:"Scheduled",notes:"Requested by student"};
    const updated = (data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"confirmed"}:r);
    // Auto-increment lesson count when confirmed
    const updatedStudents = data.students.map(s=>s.id===req.studentId
      ? {...s, lessonsTaken: Math.max(0, (s.lessonsTaken||0))} // lessonsTaken only increments on Completed; just add lesson
      : s);
    setData({...data, lessons:[...data.lessons,newLesson], lessonRequests:updated, students:updatedStudents});
    // Open Google Calendar for Hadi
    window.open(gcalUrl(newLesson, st?.name||"Student"), "_blank");
    if (st?.whatsapp) {
      waMsg(st.whatsapp, "✅ Hi " + (st.name.split(" ")[0]) + "! Your Arabic lesson is confirmed for " + (req.preferredDate||today()) + " at " + (req.preferredTime||"10:00") + ". See you then! 🎓");
    }
  };
  const declineReq = req => { setData({...data, lessonRequests:(data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"declined"}:r)}); };
  const clearNote = sid => setData({...data, students:data.students.map(s=>s.id===sid?{...s,studentNote:""}:s)});

  const totalBadge = pending.length + pendingReqs.length + studentNotes.length + submittedHw.length;
  const badge = n => n>0 ? h`<span style=${{marginLeft:5,background:"#e53935",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:800}}>${n}</span>` : null;

  return h`<div>
    ${msg&&h`<div style=${{padding:"10px 14px",background:"#f0fff4",border:"1px solid var(--ok)",marginBottom:14,fontSize:13,color:"var(--ok)",fontWeight:600}}>${msg}</div>`}
    ${err&&h`<div style=${{padding:"10px 14px",background:"#fff0f0",border:"1px solid var(--bd)",marginBottom:14,fontSize:13,color:"var(--bd)",fontWeight:600}}>${err}</div>`}

    <div class="auth-tabs" style=${{marginBottom:20}}>
      <div class=${"auth-tab "+(tab==="all"?"on":"")} onClick=${()=>{setTab("all");setMsg("");setErr("");}}>📬 All Incoming ${badge(totalBadge)}</div>
      <div class=${"auth-tab "+(tab==="approvals"?"on":"")} onClick=${()=>{setTab("approvals");setMsg("");setErr("");}}>✅ Approvals ${badge(pending.length)}</div>
      <div class=${"auth-tab "+(tab==="users"?"on":"")} onClick=${()=>{setTab("users");setMsg("");setErr("");}}>👥 Users (${approved.length})</div>
      <div class=${"auth-tab "+(tab==="create"?"on":"")} onClick=${()=>{setTab("create");setMsg("");setErr("");}}>➕ Create</div>
    </div>

    ${tab==="all" && h`<div>
      ${totalBadge===0 && h`<div class="empty"><h3>ALL CLEAR</h3><p>No pending requests or messages.</p></div>`}

      ${pending.length>0 && h`<div class="card" style=${{borderLeftColor:"#ff9800",borderLeftWidth:4}}>
        <h3 style=${{color:"#ff9800",marginBottom:12}}>🔔 New Sign-up Requests (${pending.length})</h3>
        ${pending.map(u=>h`<div key=${u.email} style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:"1px solid var(--g100)"}}>
          <div style=${{flex:1}}>
            <div style=${{fontWeight:700,fontSize:14}}>${u.name}</div>
            <div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>${u.email}${u.phone?" · 📱 "+u.phone:""}</div>
            ${u.learnType&&h`<div style=${{marginTop:4,fontSize:11,background:"#e8f4fd",color:"#1565c0",padding:"3px 8px",borderRadius:4,display:"inline-block",fontWeight:700}}>Wants to learn: ${u.learnType}</div>`}
            ${u.message&&h`<div style=${{fontSize:12,color:"var(--g600)",marginTop:5,fontStyle:"italic",background:"#fffde7",padding:"6px 10px",borderRadius:6,lineHeight:1.5}}>"${u.message}"</div>`}
          </div>
          <div style=${{display:"flex",gap:6,flexShrink:0,flexDirection:"column",alignItems:"flex-end"}}>
            <button class="btn btn-p btn-sm" onClick=${()=>approve(u.email,u.name)}>✓ Approve</button>
            <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>reject(u.email)}>✗ Reject</button>
            ${u.phone&&h`<a href=${"https://wa.me/"+u.phone.replace(/[^0-9+]/g,"")} target="_blank" class="btn btn-sm btn-wa" style=${{marginTop:2}}>WhatsApp</a>`}
          </div>
        </div>`)}
      </div>`}

      ${pendingReqs.length>0 && h`<div class="card" style=${{borderLeftColor:"#1976d2",borderLeftWidth:4}}>
        <h3 style=${{color:"#1976d2",marginBottom:12}}>📅 Lesson Requests (${pendingReqs.length})</h3>
        ${pendingReqs.map(req=>{const st=(data.students||[]).find(s=>s.id===req.studentId);return h`<div key=${req.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--g100)"}}>
          <div>
            <div style=${{fontWeight:700}}>${st?.name||"Unknown"}</div>
            <div style=${{fontSize:12,color:"var(--g500)"}}>${req.preferredDate||"No date"} at ${req.preferredTime||"—"}${req.message?" · "+req.message:""}</div>

          <div style=${{display:"flex",gap:6,flexShrink:0}}>
            <button class="btn btn-p btn-sm" onClick=${()=>confirmReq(req)}>✓ Confirm</button>
            <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>declineReq(req)}>✗ Decline</button>
          </div>
        </div>`;})}
      </div>`}

      ${studentNotes.length>0 && h`<div class="card" style=${{borderLeftColor:"#7b1fa2",borderLeftWidth:4}}>
        <h3 style=${{color:"#7b1fa2",marginBottom:12}}>✉️ Student Notes (${studentNotes.length})</h3>
        ${studentNotes.map(s=>h`<div key=${s.id} style=${{padding:"8px 0",borderBottom:"1px solid var(--g100)"}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>

              <div style=${{fontWeight:700,marginBottom:4}}>${s.name}</div>
              <div style=${{fontSize:13,color:"var(--g700)",lineHeight:1.6,background:"#fdf4ff",padding:"8px 10px",borderRadius:6,whiteSpace:"pre-wrap"}}>${s.studentNote}</div>

              <button class="btn btn-sm" onClick=${()=>onProfile(s.id)}>View Profile</button>
              <button class="btn btn-sm" style=${{color:"var(--ok)",borderColor:"var(--ok)"}} onClick=${()=>clearNote(s.id)}>✓ Clear</button>

              <div style=${{fontSize:13,color:"var(--g700)",background:"#f1f8e9",padding:"8px 10px",borderRadius:6,lineHeight:1.5}}>${hw.submissionText||"(no text)"}</div>

          </div>

    ${tab==="approvals" && h`<div>
      ${pending.length===0 ? h`<div class="empty"><h3>NO PENDING REQUESTS</h3></div>` :
      h`<div>${pending.map(u=>h`<div key=${u.email} class="assess-card" style=${{borderLeftColor:"var(--wn)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div style=${{flex:1}}>
            <div style=${{fontWeight:700,fontSize:15}}>${u.name}</div>
            <div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>${u.email}${u.phone?" · "+u.phone:""}</div>
            ${u.learnType&&h`<div style=${{marginTop:5,fontSize:11,background:"#e8f4fd",color:"#1565c0",padding:"3px 8px",borderRadius:4,display:"inline-block",fontWeight:700}}>Wants to learn: ${u.learnType}</div>`}

            ${u.phone&&h`<a href=${"https://wa.me/"+u.phone.replace(/[^0-9+]/g,"")} target="_blank" class="btn btn-sm btn-wa">WhatsApp</a>`}
          </div>
        </div>

    </div>`}

    ${tab==="users" && h`<div>
      ${approved.length===0 ? h`<div class="empty"><h3>NO USERS</h3></div>` :
      h`<div class="card" style=${{padding:0}}>
        <div style=${{overflowX:"auto"}}><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Reset Password</th></tr></thead><tbody>
          ${approved.map(u=>h`<tr key=${u.email}>
            <td style=${{fontWeight:600}}>${u.name}</td>
            <td style=${{fontSize:12}}>${u.email}</td>

        </div>
      </div>`}
    </div>`}

    ${tab==="create" && h`<div class="card">
      <h3>CREATE ACCOUNT</h3>
      <div class="fg"><label>Name</label><input value=${createForm.name} onInput=${e=>setCreateForm({...createForm,name:e.target.value})} placeholder="Student's full name"/></div>
      <div class="fg"><label>Email</label><input type="email" value=${createForm.email} onInput=${e=>setCreateForm({...createForm,email:e.target.value})}/></div>
      <div class="fg"><label>Password</label><input type="password" value=${createForm.password} onInput=${e=>setCreateForm({...createForm,password:e.target.value})} placeholder="Min 6 characters"/></div>
      <div class="fg"><label>Role</label><select value=${createForm.role} onChange=${e=>setCreateForm({...createForm,role:e.target.value})}><option value="student">Student</option><option value="tutor">Tutor</option></select></div>
      <button class="btn btn-p" onClick=${create}>Create Account</button>
      <div style=${{marginTop:10,fontSize:11,color:"var(--g500)",lineHeight:1.6}}>Share the email and password with the student. They can log in immediately.</div>
    </div>`}
  </div>`;
}

// ════════════════════════════════════════
// MAIN APP with Auth
// ════════════════════════════════════════
function App() {
  const [data, setData] = useState(null);
  const [view, setView] = useState("dashboard");
  const [profileId, setProfileId] = useState(null);
  const [auth, setAuth] = useState(null); // {user, role}
  const [checkingAuth, setCheckingAuth] = useState(true);
  const [pendingUsers, setPendingUsers] = useState(0);

  // Check existing session from localStorage token
  useEffect(() => {
    (async () => {
      const stored = getAuth();
      if (stored?.token) {
        try {
          const d = await apiPost("/api/auth", {action:"validate", token: stored.token});
          if (d.valid) {
            setAuth({...stored, token: stored.token, role: d.role, name: d.name, email: d.email, user: {email: d.email, id: d.email}});
          } else {
            clearAuthStore();
          }
        } catch { /* network error — let them try again */ }
      }
      setCheckingAuth(false);
    })();
  }, []);

  // Load data — always try cloud first, fall back to local IndexedDB
  useEffect(() => {
    if (!auth) return;
    const action = auth.role === 'student' ? 'studentRead' : 'restore';
    const mergeImages = async (d) => {
      // Load background images from their separate cloud key and merge into settings
      if (auth.role !== 'tutor') return d;
      try {
        const ir = await apiPost('/api/data', {token: auth.token, action:'restoreImages'});
        if (ir.images && Object.keys(ir.images).length > 0) {
          return {...d, settings:{...d.settings, ...ir.images}};
        }
      } catch {}
      return d;
    };
    apiPost('/api/data', {token: auth.token, action})
      .then(async d => {
        if (d.data) {
          // Cloud has data — use it, also save locally
          const migrated = migrateData(d.data);
          const withImages = await mergeImages(migrated);
          setData(withImages);
          save(withImages);
        } else {
          // Cloud empty — fall back to local (tutor's own device)
          const local = await loadData();
          setData(local);
        }
      })
      .catch(async () => {
        // Network error — use local
        const local = await loadData();
        setData(local);
      });
  }, [auth]);
  // Save locally on change
  useEffect(() => { if (data) save(data); }, [data]);
  // Auto cloud backup — runs after 3s on first load, then 30s on each change (tutor only)
  const backupTimer = useRef(null);
  const firstBackup = useRef(true);
  useEffect(() => {
    if (!data || !auth || auth.role !== "tutor") return;
    clearTimeout(backupTimer.current);
    const delay = firstBackup.current ? 3000 : 30000;
    firstBackup.current = false;
    backupTimer.current = setTimeout(async () => {
      try { await apiPost("/api/data", {token: auth.token, action:"backup", data}); } catch {}
    }, delay);
    return () => clearTimeout(backupTimer.current);
  }, [data]);

  // Badge: fetch pending user count whenever data changes (tutor only)
  useEffect(() => {
    if (!auth?.token || auth.role !== 'tutor') return;
    apiPost("/api/users", {token: auth.token, action:"list"})
      .then(d => setPendingUsers((d.users||[]).filter(u=>u.status==="pending").length))
      .catch(()=>{});
  }, [data, auth]);

  const [syncStatus, setSyncStatus] = useState(""); // "", "syncing", "ok", "err"
  const manualSync = async () => {
    if (!data || !auth?.token) return;
    setSyncStatus("syncing");
    try {
      await apiPost("/api/data", {token: auth.token, action:"backup", data});
      setSyncStatus("ok");
      setTimeout(() => setSyncStatus(""), 3000);
    } catch { setSyncStatus("err"); setTimeout(() => setSyncStatus(""), 3000); }
  };

  const update = useCallback(d => setData(d), []);
  const openProfile = id => { setProfileId(id); setView("profile"); };
  const handleLogout = async () => {
    const stored = getAuth();
    if (stored?.token) apiPost("/api/auth", {action:"logout", token: stored.token}).catch(()=>{});
    clearAuthStore();
    setAuth(null); setData(null);
  };

  if (checkingAuth) return h`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"var(--fh)",fontSize:28,letterSpacing:3}}>LOADING...</div>`;
  if (!auth) return h`<${AuthScreen} onAuth=${a=>setAuth({...a, user:{email:a.email||a.user?.email,id:a.email||a.user?.email}})}/>`;

  if (!data) return h`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"var(--fh)",fontSize:28,letterSpacing:3}}>LOADING...</div>`;

  // Student role → student portal
  if (auth.role === "student") return h`<${StudentPortal} data=${data} setData=${update} user=${auth.user} onLogout=${handleLogout}/>`;

  const S = data ? data.settings : null;
  const submittedHw = data ? (data.homework||[]).filter(hw=>hw.status==="submitted").length : 0;
  const pendingLessonReqs = data ? (data.lessonRequests||[]).filter(r=>r.status==="pending").length : 0;
  const studentNoteCount = data ? data.students.filter(s=>s.studentNote&&s.studentNote.trim()).length : 0;
  const newStudents = data ? data.students.filter(s=>s.active && s.lessonsTaken===0 && !s.lessonsTotal).length : 0;
  const totalRequestsBadge = pendingUsers + pendingLessonReqs + studentNoteCount;
  const badges = {
    students: newStudents,
    homework: submittedHw,
    requests: totalRequestsBadge,
    messages: studentNoteCount,
  };

  const nav = [["dashboard","Dashboard","dash"],["students","Students","stu"],["calendar","Calendar","cal"],["payments","Payments","pay"],["curriculum","Curriculum","cur"],["homework","Homework","hw"],["requests","Requests","stu"],["settings","Settings","set"]];
  const activeNav = view === "profile" ? "students" : view;

  // Apply theme CSS vars
  const accent         = S.themeAccent||"#c9922a";
  const sidebarBg      = S.themeSidebar||"#000000";
  const sidebarText    = S.themeSidebarText||"#cccccc";
  const pageBg         = S.themeBackground||"#fafafa";
  const topbarBg       = S.themeTopbar||"#ffffff";
  const topbarBorder   = S.themeTopbarBorder||"#000000";
  const cardBg         = S.themeCardBg||"#ffffff";
  const cardBorder     = S.themeCardBorder||"#000000";
  const statBg         = S.themeStatBg||"#ffffff";
  const statBorder     = S.themeStatBorder||"#000000";
  const tblHdrBg       = S.themeTableHeader||"#000000";
  const tblHdrText     = S.themeTableHeaderText||"#ffffff";
  const calHdrBg       = S.themeCalHeader||"#000000";
  const calHdrText     = S.themeCalHeaderText||"#ffffff";
  const primBtn        = S.themePrimaryBtn||"#000000";
  const primBtnText    = S.themePrimaryBtnText||"#ffffff";
  const textMain       = S.themeTextMain||"#000000";
  const fontH          = S.themeFontHeading||"Bebas Neue";
  const fontB          = S.themeFontBody||"DM Sans";
  const fontBrand      = S.themeFontBrand||"Bebas Neue";
  const fontSizeH      = S.themeFontSizeHeading||28;
  const fontSizeB      = S.themeFontSizeBody||14;
  const fontSizeBrand  = S.themeFontSizeBrand||24;
  const bgImage        = S.themeBackgroundImage||"";
  const bgImageX       = S.themeBackgroundImageX !== undefined ? S.themeBackgroundImageX : 50;
  const bgImageY       = S.themeBackgroundImageY !== undefined ? S.themeBackgroundImageY : 50;
  const sidebarImage   = S.themeSidebarImage||"";
  const sbImageX       = S.themeSidebarImageX !== undefined ? S.themeSidebarImageX : 50;
  const sbImageY       = S.themeSidebarImageY !== undefined ? S.themeSidebarImageY : 50;
  const sbHdImage      = S.themeSidebarHeaderImage||"";
  const sbHdImageX     = S.themeSidebarHeaderImageX !== undefined ? S.themeSidebarHeaderImageX : 50;
  const sbHdImageY     = S.themeSidebarHeaderImageY !== undefined ? S.themeSidebarHeaderImageY : 50;
  const sbHdOvColor    = S.themeSidebarHeaderOverlayColor||"#000000";
  const sbHdOvOpacity  = S.themeSidebarHeaderOverlayOpacity !== undefined ? S.themeSidebarHeaderOverlayOpacity : 50;
  const _hr = parseInt(sbHdOvColor.slice(1,3),16)||0;
  const _hg = parseInt(sbHdOvColor.slice(3,5),16)||0;
  const _hb = parseInt(sbHdOvColor.slice(5,7),16)||0;
  const sbHdOverlay    = "rgba("+_hr+","+_hg+","+_hb+","+(sbHdOvOpacity/100)+")";
  const sbHdZoom       = S.themeSidebarHeaderImageZoom;
  const sbHdSz         = sbHdZoom !== undefined ? sbHdZoom+"%" : "cover";
  const sbHdImageCSS   = sbHdImage
    ? "background:"+sbHdOverlay+",url("+sbHdImage+") "+sbHdImageX+"% "+sbHdImageY+"% / "+sbHdSz+"!important"
    : (sbHdOvOpacity > 0 ? "background-color:"+sbHdOverlay+"!important" : "");
  const cardImage      = S.themeCardImage||"";
  const cardImageX     = S.themeCardImageX !== undefined ? S.themeCardImageX : 50;
  const cardImageY     = S.themeCardImageY !== undefined ? S.themeCardImageY : 50;
  const bgZoom         = S.themeBackgroundImageZoom;
  const sbZoom         = S.themeSidebarImageZoom;
  const cardZoom       = S.themeCardImageZoom;
  const bgSz           = bgZoom !== undefined ? bgZoom+"%" : "cover";
  const sbSz           = sbZoom !== undefined ? sbZoom+"%" : "cover";
  const cardSz         = cardZoom !== undefined ? cardZoom+"%" : "cover";
  // Inline styles for images — applied directly on elements (avoids browser CSSOM issues with large base64 in style tags)
  const sbInlineStyle  = sidebarImage ? {backgroundImage:"url("+sidebarImage+")",backgroundSize:sbSz,backgroundPosition:sbImageX+"% "+sbImageY+"%"} : {};
  const pageInlineStyle= bgImage ? {backgroundImage:"url("+bgImage+")",backgroundSize:bgSz,backgroundPosition:bgImageX+"% "+bgImageY+"%",backgroundAttachment:"fixed"} : {};
  const sbHdInlineStyle= sbHdImage
    ? {backgroundImage:"linear-gradient("+sbHdOverlay+","+sbHdOverlay+"),url("+sbHdImage+")",backgroundSize:"100% 100%,"+sbHdSz,backgroundPosition:"0 0,"+sbHdImageX+"% "+sbHdImageY+"%",backgroundRepeat:"no-repeat,no-repeat"}
    : (sbHdOvOpacity > 0 ? {backgroundColor:sbHdOverlay} : {});
  // Card image: stays in CSS (cards are spread across many components; image is smaller so style tag is fine)
  const cardImageCSS   = cardImage ? ".card,.assess-card,.mo,.stu-card{background-image:url("+cardImage+")!important;background-size:"+cardSz+"!important;background-position:"+cardImageX+"% "+cardImageY+"%!important}" : "";

  const themeCSS = (
    ".app{color:"+textMain+";font-family:'"+fontB+"',sans-serif;font-size:"+fontSizeB+"px}" +
    ".sb{background-color:"+sidebarBg+"}" +
    ".sb-it{color:"+sidebarText+"!important}" +
    ".sb-it:hover{color:#fff!important}" +
    ".sb-hd h1{color:"+accent+"!important;font-family:'"+fontBrand+"',sans-serif!important;font-size:"+fontSizeBrand+"px!important}" +
    ".sb-hd small{color:"+accent+"99!important}" +
    ".sb-it.on{background:"+cardBg+"!important;color:"+sidebarBg+"!important;border-left-color:"+accent+"!important}" +
    ".page{background-color:"+pageBg+"}" +
    ".topbar{background:"+topbarBg+"!important;border-bottom-color:"+topbarBorder+"!important}" +
    ".topbar h2,.card h3,.mo-hd h3,.assess-card h4,.stat .vl,.ll,.auth-box h1,.prof-info h2{font-family:'"+fontH+"',sans-serif!important;font-size:"+fontSizeH+"px!important}" +
    ".card,.assess-card,.mo,.stu-card{background-color:"+cardBg+";border-color:"+cardBorder+"!important}" +
    cardImageCSS +
    ".stat{background:"+statBg+"!important;border-color:"+statBorder+"!important}" +
    "th{background:"+tblHdrBg+"!important;color:"+tblHdrText+"!important;border-bottom-color:"+tblHdrBg+"!important}" +
    ".cal-h{background:"+calHdrBg+"!important;color:"+calHdrText+"!important}" +
    ".btn-p{background:"+primBtn+"!important;color:"+primBtnText+"!important;border-color:"+primBtn+"!important}"
  );

  return h`<div class="app">
    <style>${themeCSS}</style>
    <div class="sb" style=${sbInlineStyle}>
      <div class="sb-hd" style=${sbHdInlineStyle}>
        ${S.tutorAvatar
          ? h`<img src=${S.tutorAvatar} style=${{width:70,height:70,borderRadius:"50%",objectFit:"cover",display:"block",margin:"0 auto 10px",border:"2px solid rgba(201,146,42,0.5)"}}/>`
          : h`<img src="/logo.jpeg" style=${{width:110,height:110,objectFit:"contain",display:"block",margin:"0 auto 10px",borderRadius:20}}/>`}
        <h1>${S.brand}</h1><small>${S.sub}</small>
      </div>
      <div class="sb-nav">${nav.map(([k,l,i]) => h`<div key=${k} class=${"sb-it"+(activeNav===k?" on":"")} onClick=${()=>{setView(k);setProfileId(null);}}>
        ${ic(i)}<span>${l}</span>
        ${badges[k]>0 && h`<span style=${{marginLeft:"auto",background:"#e53935",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:800,minWidth:18,textAlign:"center",lineHeight:"17px",display:"inline-block"}}>${badges[k]}</span>`}
      </div>`)}</div>
      <div class="sb-ft">
        <div>${data.students.filter(s=>s.active).length} active students</div>
        <button style=${{marginTop:8,background:"none",border:"1px solid var(--g300)",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700,color:syncStatus==="ok"?"var(--ok)":syncStatus==="err"?"var(--bd)":"var(--g500)",width:"100%"}} onClick=${manualSync}>
          ${syncStatus==="syncing"?"⏳ Syncing...":syncStatus==="ok"?"✓ Synced!":syncStatus==="err"?"✗ Sync failed":"☁️ Sync to Cloud"}
        </button>
        <div style=${{marginTop:8,cursor:"pointer",color:"var(--g400)"}} onClick=${handleLogout}>${ic('logout')} Log out</div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        ${view==="profile"&&h`<button class="bi" onClick=${()=>setView("students")}>${icb('back')}</button>`}
        <h2 style=${{flex:1}}>${view==="profile"?"STUDENT PROFILE":(nav.find(([k])=>k===activeNav)?.[1]||"").toUpperCase()}</h2>
        <div style=${{display:"flex",gap:6,alignItems:"center"}}>
          <button style=${{background:"none",border:"1px solid var(--g300)",borderRadius:6,padding:"4px 9px",cursor:"pointer",fontSize:11,fontWeight:700,color:syncStatus==="ok"?"var(--ok)":syncStatus==="err"?"var(--bd)":"var(--g500)"}} onClick=${manualSync}>
            ${syncStatus==="syncing"?"⏳":syncStatus==="ok"?"✓ Synced":syncStatus==="err"?"✗ Fail":"☁️ Sync"}
          </button>
          <button style=${{background:"none",border:"1px solid var(--g300)",borderRadius:6,padding:"4px 9px",cursor:"pointer",fontSize:11,fontWeight:700,color:"var(--g500)"}} onClick=${handleLogout}>Log Out</button>
        </div>
      </div>
      <div class="page" style=${pageInlineStyle}>
        ${view==="dashboard" && h`<${Dashboard} data=${data} setData=${update} auth=${auth}/>`}
        ${view==="students" && h`<${StudentsAndGroups} data=${data} setData=${update} onProfile=${openProfile}/>`}
        ${view==="profile" && h`<${StudentProfile} data=${data} setData=${update} profileId=${profileId}/>`}
        ${view==="calendar" && h`<${Calendar} data=${data} setData=${update}/>`}
        ${view==="payments" && h`<${Payments} data=${data} setData=${update}/>`}
        ${view==="curriculum" && h`<${Curriculum} data=${data} setData=${update}/>`}
        ${view==="homework" && h`<${HomeworkView} data=${data} onProfile=${openProfile}/>`}
        ${view==="requests" && h`<${RequestsInbox} auth=${auth} data=${data} setData=${update} onProfile=${openProfile}/>`}
        ${view==="settings" && h`<${Settings} data=${data} setData=${update}/>`}
      </div>
    </div>
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(h`<${App}/>`);

const VAPID_PUBLIC_KEY = 'BJoCs_m2_9yAKxfCPHY62v_esJISbehZw2ubDphgnSZ0-P1pGxSi7B_x1u22l1zfT7T1nX_M7ef587sWmvFHWn8';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function registerPush(token) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    await fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, subscription: sub.toJSON() })
    });
  } catch (e) { console.warn('Push registration failed:', e); }
}

window.registerPushNotifications = registerPush;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW:', e));
  });
}
