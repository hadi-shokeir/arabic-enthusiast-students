function StudentsAndGroups({data, setData, onProfile, auth}) {
  const [tab, setTab] = useState("students");
  return h`<div>
    <div class="auth-tabs" style=${{marginBottom:20}}>
      <div class=${"auth-tab "+(tab==="students"?"on":"")} onClick=${()=>setTab("students")}>👤 Private Students</div>
      <div class=${"auth-tab "+(tab==="groups"?"on":"")} onClick=${()=>setTab("groups")}>👥 Groups</div>
    </div>
    ${tab==="students" && h`<${Students} data=${data} setData=${setData} onProfile=${onProfile} auth=${auth}/>`}
    ${tab==="groups" && h`<${Groups} data=${data} setData=${setData}/>`}
  </div>`;
}

// ════════════════════════════════════════
// REQUESTS INBOX — unified notifications
// ════════════════════════════════════════
function RequestsInbox({auth, data, setData, onProfile}) {
  const [users, setUsers] = useState([]);
  const [tab, setTab] = useState("all");
  const [createForm, setCreateForm] = useState({name:"",email:"",password:"",role:"student",phone:"",gender:"female",timezone:"",learnType:"Levantine"});
  const [pwForm, setPwForm] = useState({email:"",password:""});
  const [msg, setMsg] = useState("");
  const [err, setErr] = useState("");

  const call = async body => apiPost("/api/users", {token: auth.token, ...body});
  const load = async () => { const d = await call({action:"list"}); setUsers(d.users||[]); };
  useEffect(() => { load(); }, []);

  const approve = async (email, name, gender, phone) => {
    setErr("");
    try {
      const r = await call({action:"approve", email});
      if (r.error) { setErr("Could not approve: " + r.error); return; }
    } catch(e) { setErr("Network error: " + e.message); return; }

    // Build the new student profile
    const exists = (data.students||[]).find(s => s.email && s.email.toLowerCase() === email.toLowerCase());
    let newData = data;
    let newStudentId = exists ? exists.id : null;
    if (!exists) {
      const newStudent = {
        ...mkStudent(data.settings),
        studentNumber: nextStudentNumber(data.students),
        name: name || email,
        email: email.toLowerCase(),
        phone: phone || "",
        whatsapp: phone || "",
        gender: gender || "",
        active: true,
        enrollmentStatus: "pending"
      };
      newStudentId = newStudent.id;
      newData = {...data, students:[...(data.students||[]), newStudent]};
      setData(newData);
    }

    // Immediately back up to the cloud so the profile is available on any device
    try {
      await apiPost("/api/data", {token: auth.token, action:"backup", data: newData});
    } catch(e) { /* backup failed — local state still updated */ }

    load();
    // Navigate straight to the new student's profile so tutor can fill in details
    if (newStudentId && onProfile) onProfile(newStudentId);
  };
  const reject = async email => { await call({action:"reject", email}); setMsg("Rejected."); load(); };
  const create = async () => {
    if (!createForm.name||!createForm.email||!createForm.password) return setErr("Fill all fields");
    if (createForm.password.length < 6) return setErr("Password must be at least 6 characters");
    const d = await call({action:"create", name:createForm.name, email:createForm.email, password:createForm.password, role:createForm.role, phone:createForm.phone});
    if (d.error) return setErr(d.error);

    // If creating a student, also add their profile to data.students
    if ((createForm.role||"student") === "student") {
      const exists = (data.students||[]).find(s => s.email && s.email.toLowerCase() === createForm.email.toLowerCase());
      if (!exists) {
        const newStudent = {
          ...mkStudent(data.settings),
          studentNumber: nextStudentNumber(data.students),
          name: createForm.name,
          email: createForm.email.toLowerCase(),
          whatsapp: createForm.phone || "",
          gender: createForm.gender || "",
          timezone: createForm.timezone || "",
          learnType: createForm.learnType || "",
          active: true,
          enrollmentStatus: "pending"
        };
        const newData = {...data, students:[...(data.students||[]), newStudent]};
        setData(newData);
        try { await apiPost("/api/data", {token: auth.token, action:"backup", data: newData}); } catch(e) {}
        setCreateForm({name:"",email:"",password:"",role:"student"}); load();
        if (onProfile) onProfile(newStudent.id);
        return;
      }
    }
    setMsg("Account created! Share email + password with the student via WhatsApp.");
    setCreateForm({name:"",email:"",password:"",role:"student",phone:"",gender:"female",timezone:"",learnType:"Levantine"}); load();
  };
  const resetPw = async () => {
    if (!pwForm.password||pwForm.password.length<6) return setErr("Min 6 chars");
    const d = await call({action:"setPassword",...pwForm});
    if (d.error) return setErr(d.error);
    setMsg("Password updated!"); setPwForm({email:"",password:""});
  };

  const pending = users.filter(u=>u.status==="pending");
  const approved = users.filter(u=>u.status==="approved");
  const pendingReqs = (data.lessonRequests||[]).filter(r=>r.status==="pending");
  const studentNotes = (data.students||[]).filter(s=>s.studentNote&&s.studentNote.trim());
  const submittedHw = (data.homework||[]).filter(hw=>hw.status==="submitted");

  const confirmReq = req => {
    const st = (data.students||[]).find(s=>s.id===req.studentId);
    const S = data.settings;
    const newLesson = {id:uid(),studentId:req.studentId,groupId:"",date:req.preferredDate||today(),time:req.preferredTime||"10:00",duration:req.duration||60,type:st?.type||(S.types||[])[0]||"Levantine",status:"Scheduled",notes:"Requested by student"};
    const updated = (data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"confirmed"}:r);
    // Auto-increment lesson count when confirmed
    const updatedStudents = data.students.map(s=>s.id===req.studentId
      ? {...s, lessonsTaken: Math.max(0, (s.lessonsTaken||0))} // lessonsTaken only increments on Completed; just add lesson
      : s);
    setData({...data, lessons:[...data.lessons,newLesson], lessonRequests:updated, students:updatedStudents});
    // Open Google Calendar pre-filled with student as guest
    window.open(gcalUrl(newLesson, st?.name||"Student", st?.email||""), "_blank");
    if (st?.whatsapp) {
      waMsg(st.whatsapp, "✅ Hi " + (st.name.split(" ")[0]) + "! Your Arabic lesson is confirmed for " + (req.preferredDate||today()) + " at " + (req.preferredTime||"10:00") + ". See you then! 🎓");
    }
  };
  const declineReq = req => { setData({...data, lessonRequests:(data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"declined"}:r)}); };
  const clearNote = sid => setData({...data, students:data.students.map(s=>s.id===sid?{...s,studentNote:""}:s)});

  const totalBadge = pending.length + pendingReqs.length + studentNotes.length + submittedHw.length;
  const badge = n => n>0 ? h`<span style=${{marginLeft:5,background:"#e53935",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:800}}>${n}</span>` : null;

  return h`<div>
    ${msg&&h`<div style=${{padding:"10px 14px",background:"#f0fff4",border:"1px solid var(--ok)",marginBottom:14,fontSize:13,color:"var(--ok)",fontWeight:600}}>${msg}</div>`}
    ${err&&h`<div style=${{padding:"10px 14px",background:"#fff0f0",border:"1px solid var(--bd)",marginBottom:14,fontSize:13,color:"var(--bd)",fontWeight:600}}>${err}</div>`}

    <div class="auth-tabs" style=${{marginBottom:20}}>
      <div class=${"auth-tab "+(tab==="all"?"on":"")} onClick=${()=>{setTab("all");setMsg("");setErr("");}}>📬 All Incoming ${badge(totalBadge)}</div>
      <div class=${"auth-tab "+(tab==="approvals"?"on":"")} onClick=${()=>{setTab("approvals");setMsg("");setErr("");}}>✅ Approvals ${badge(pending.length)}</div>
      <div class=${"auth-tab "+(tab==="users"?"on":"")} onClick=${()=>{setTab("users");setMsg("");setErr("");}}>👥 Users (${approved.length})</div>
      <div class=${"auth-tab "+(tab==="create"?"on":"")} onClick=${()=>{setTab("create");setMsg("");setErr("");}}>➕ Create</div>
    </div>

    ${tab==="all" && h`<div>
      ${totalBadge===0 && h`<div class="empty"><h3>ALL CLEAR</h3><p>No pending requests or messages.</p></div>`}

      ${pending.length>0 && h`<div class="card" style=${{borderLeftColor:"#ff9800",borderLeftWidth:4}}>
        <h3 style=${{color:"#ff9800",marginBottom:12}}>🔔 New Sign-up Requests (${pending.length})</h3>
        ${pending.map(u=>h`<div key=${u.email} style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:"1px solid var(--g100)"}}>
          <div style=${{flex:1}}>
            <div style=${{fontWeight:700,fontSize:14}}>${u.name}</div>
            <div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>${u.email}${u.phone?" · 📱 "+u.phone:""}</div>
            ${u.learnType&&h`<div style=${{marginTop:4,fontSize:11,background:"#e8f4fd",color:"#1565c0",padding:"3px 8px",borderRadius:4,display:"inline-block",fontWeight:700}}>Wants to learn: ${u.learnType}</div>`}
            ${u.message&&h`<div style=${{fontSize:12,color:"var(--g600)",marginTop:5,fontStyle:"italic",background:"#fffde7",padding:"6px 10px",borderRadius:6,lineHeight:1.5}}>"${u.message}"</div>`}
          </div>
          <div style=${{display:"flex",gap:6,flexShrink:0,flexDirection:"column",alignItems:"flex-end"}}>
            <button class="btn btn-p btn-sm" onClick=${()=>approve(u.email,u.name,u.gender,u.phone)}>✓ Approve</button>
            <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>reject(u.email)}>✗ Reject</button>
            ${u.phone&&h`<a href=${"https://wa.me/"+u.phone.replace(/[^0-9+]/g,"")} target="_blank" class="btn btn-sm btn-wa" style=${{marginTop:2}}>WhatsApp</a>`}
          </div>
        </div>`)}
      </div>`}

      ${pendingReqs.length>0 && h`<div class="card" style=${{borderLeftColor:"#1976d2",borderLeftWidth:4}}>
        <h3 style=${{color:"#1976d2",marginBottom:12}}>📅 Lesson Requests (${pendingReqs.length})</h3>
        ${pendingReqs.map(req=>{const st=(data.students||[]).find(s=>s.id===req.studentId);return h`<div key=${req.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--g100)"}}>
          <div>
            <div style=${{fontWeight:700}}>${st?.name||"Unknown"}</div>
            <div style=${{fontSize:12,color:"var(--g500)"}}>${req.preferredDate||"No date"} at ${req.preferredTime||"—"}${req.message?" · "+req.message:""}</div>
          </div>
          <div style=${{display:"flex",gap:6,flexShrink:0}}>
            <button class="btn btn-p btn-sm" onClick=${()=>confirmReq(req)}>✓ Confirm</button>
            <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>declineReq(req)}>✗ Decline</button>
          </div>
        </div>`;})}
      </div>`}

      ${studentNotes.length>0 && h`<div class="card" style=${{borderLeftColor:"#7b1fa2",borderLeftWidth:4}}>
        <h3 style=${{color:"#7b1fa2",marginBottom:12}}>✉️ Student Notes (${studentNotes.length})</h3>
        ${studentNotes.map(s=>h`<div key=${s.id} style=${{padding:"8px 0",borderBottom:"1px solid var(--g100)"}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div style=${{flex:1}}>
              <div style=${{fontWeight:700,marginBottom:4}}>${s.name}</div>
              <div style=${{fontSize:13,color:"var(--g700)",lineHeight:1.6,background:"#fdf4ff",padding:"8px 10px",borderRadius:6,whiteSpace:"pre-wrap"}}>${s.studentNote}</div>
            </div>
            <div style=${{display:"flex",gap:6,flexShrink:0}}>
              <button class="btn btn-sm" onClick=${()=>onProfile(s.id)}>View Profile</button>

function StudioAdmin({data, setData}) {
  const [show, setShow] = useState(false);

  const fileRef = useRef(null);
  const items = data.studioItems || [];
  const cats = ["All", ...new Set(items.map(i=>i.category||"General").filter(Boolean))];
  const list = (filter==="All" ? items : items.filter(i=>(i.category||"General")===filter)).sort((a,b)=>new Date(b.updatedAt||b.createdAt||0)-new Date(a.updatedAt||a.createdAt||0));
  const types = ["Exercise","Tracing","Speaking Drill","Listening","Quiz","PDF","Video / Link","Lesson"];
  const tracks = ["General","Levantine","Classical","Quranic","Writing","Speaking","Listening","Reading","Grammar","Vocabulary"];
  const levels = ["All Levels","Beginner","Intermediate","Advanced"];
  const audiences = [["all","All active students"],["subscribers","Studio subscribers only"]];
  const openNew = () => { setForm(mkStudioItem()); setShow(true); };
  const openEdit = item => { setForm({...mkStudioItem(),...item}); setShow(true); };
  const handleFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 50e6) { alert("Max 50MB"); return; }
    const r = new FileReader();
    r.onload = () => setForm(x=>({...x,fileName:f.name,fileData:r.result,title:x.title||f.name.replace(/\.[^.]+$/,"")}));
    r.readAsDataURL(f);
  };
  const saveItem = () => {
    if (!form.title.trim()) return alert("Please add a title.");
    const toSave = {...form, id:form.id||uid(), updatedAt:new Date().toISOString(), createdAt:form.createdAt||new Date().toISOString()};
    const exists = items.find(i=>i.id===toSave.id);
    setData({...data, studioItems: exists ? items.map(i=>i.id===toSave.id?toSave:i) : [...items,toSave]});
    setShow(false); setForm(mkStudioItem());

  const togglePub = item => setData({...data, studioItems: items.map(i=>i.id===item.id?{...i,published:!i.published,updatedAt:new Date().toISOString()}:i)});

// MAIN APP with Auth
// ════════════════════════════════════════
function App() {
  const [data, setData] = useState(null);
  const [view, setView] = useState(() => {
    try {
      const s = localStorage.getItem('ae_view');
      if (!s || s === 'profile') return 'dashboard';
      // Remap old view names after merge
      if (s === 'scheduling' || s === 'calendar') return 'lessons';
      if (s === 'curriculum' || s === 'resources' || s === 'library') return 'materials';
      if (s === 'games' || s === 'quizzes' || s === 'exercises') return 'practice';
      if (s === 'learning-studio') return 'studio';
      return s;
    } catch { return 'dashboard'; }
  });
  const [profileId, setProfileId] = useState(null);
  const [auth, setAuth] = useState(null); // {user, role}
  const [checkingAuth, setCheckingAuth] = useState(true);
  const [pendingUsers, setPendingUsers] = useState(0);
  const [tutorTheme, setTutorTheme] = useState(() => { try { return localStorage.getItem('ae_tutor_theme') || 'dark'; } catch { return 'dark'; } });

  // Check existing session from localStorage token
  useEffect(() => {
    (async () => {
      const stored = getAuth();
      if (stored?.token) {
        try {
          const d = await apiPost("/api/auth", {action:"validate", token: stored.token});
          if (d.valid) {
            setAuth({...stored, token: stored.token, role: d.role, name: d.name, email: d.email, user: {email: d.email, id: d.email}});
          } else {
            clearAuthStore();
          }
        } catch { /* network error — let them try again */ }
      }
      setCheckingAuth(false);
    })();
  }, []);

  // Load data — always try cloud first, fall back to local IndexedDB
  useEffect(() => {
    if (!auth) return;
    const action = auth.role === 'student' ? 'studentRead' : 'restore';
    const mergeImages = async (d) => {
      // Load background images from their separate cloud key and merge into settings
      if (auth.role !== 'tutor') return d;
      try {
        const ir = await apiPost('/api/data', {token: auth.token, action:'restoreImages'});
        if (ir.images && Object.keys(ir.images).length > 0) {
          return {...d, settings:{...d.settings, ...ir.images}};
        }
      } catch {}
      return d;
    };
    apiPost('/api/data', {token: auth.token, action})
      .then(async d => {
        if (d.data) {
          // Cloud has data — use it, also save locally
          const migrated = migrateData(d.data);
          const withImages = await mergeImages(migrated);
          setData(withImages);
          save(withImages);
        } else {
          // Cloud empty — fall back to local (tutor's own device)
          const local = await loadData();
          setData(local);
        }
      })
      .catch(async () => {
        // Network error — use local
        const local = await loadData();
        setData(local);
      });
  }, [auth]);
  // Save locally on change
  useEffect(() => { if (data) save(data); }, [data]);
  // Auto cloud backup — tutor: 3s first load then 8s; students: 5s delay
  const backupTimer = useRef(null);
  const firstBackup = useRef(true);
  useEffect(() => {
    if (!data || !auth) return;
    clearTimeout(backupTimer.current);
    const isTutor = auth.role === "tutor";
    const delay = isTutor ? (firstBackup.current ? 3000 : 8000) : 5000;
    firstBackup.current = false;
    const action = isTutor ? "backup" : "studentWrite";
    backupTimer.current = setTimeout(async () => {
      try { await apiPost("/api/data", {token: auth.token, action, data}); } catch {}
    }, delay);
    return () => clearTimeout(backupTimer.current);
  }, [data]);

  // Save to cloud immediately when tab/browser is closed
  useEffect(() => {
    if (!auth) return;
    const handler = () => {
      if (!data) return;
      const action = auth.role === "tutor" ? "backup" : "studentWrite";
      const body = JSON.stringify({token: auth.token, action, data});
      try {
        navigator.sendBeacon ? navigator.sendBeacon("/api/data", new Blob([body], {type:"application/json"}))
          : fetch("/api/data", {method:"POST", headers:{"Content-Type":"application/json"}, body, keepalive:true});
      } catch {}
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [data, auth]);

  // Badge: fetch pending user count whenever data changes (tutor only)
  useEffect(() => {
    if (!auth?.token || auth.role !== 'tutor') return;
    apiPost("/api/users", {token: auth.token, action:"list"})
      .then(d => setPendingUsers((d.users||[]).filter(u=>u.status==="pending").length))
      .catch(()=>{});
  }, [data, auth]);

  const [syncStatus, setSyncStatus] = useState(""); // "", "syncing", "ok", "err"
  const manualSync = async () => {
    if (!data || !auth?.token) return;
    setSyncStatus("syncing");
    try {
      await apiPost("/api/data", {token: auth.token, action:"backup", data});
      setSyncStatus("ok");
      setTimeout(() => setSyncStatus(""), 3000);
    } catch { setSyncStatus("err"); setTimeout(() => setSyncStatus(""), 3000); }
  };

  const update = useCallback(d => setData(d), []);
  const openProfile = id => { setProfileId(id); setView("profile"); };
  const toggleTutorTheme = () => {
    const next = tutorTheme === "dark" ? "light" : "dark";

// ── Error Boundary — catches any render crash so users see a message, not a blank page ──
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error('[App Error]', error, info?.componentStack);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{fontFamily:'sans-serif',padding:'40px 20px',textAlign:'center',maxWidth:520,margin:'80px auto'}},
        React.createElement('div', {style:{fontSize:52,marginBottom:16}}, '⚠️'),
        React.createElement('h2', {style:{color:'#333',marginBottom:8,fontFamily:'sans-serif'}}, 'Something went wrong'),
        React.createElement('p', {style:{color:'#888',fontSize:13,marginBottom:4}}, 'Error: ' + (this.state.error?.message || 'Unknown error')),
        React.createElement('p', {style:{color:'#aaa',fontSize:11,marginBottom:20}}, 'Check the browser console for details, then reload.'),
        React.createElement('button', {onClick:()=>location.reload(), style:{padding:'10px 28px',background:'#000',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:14,fontFamily:'sans-serif'}}, 'Reload App')
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, h`<${App}/>`)
);

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function registerPush(token) {
  const uiStatus = getPushUiStatus();
  if (uiStatus === 'ios-browser' || uiStatus === 'unsupported') return uiStatus;
  if (Notification.permission === 'denied') return 'denied';
  try {
    await navigator.serviceWorker.register('/sw.js').catch(()=>{});
    // Ensure SW is active — with 10s timeout so it never hangs
    const reg = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, rej) => setTimeout(() => rej(new Error('SW timeout')), 10000))
    ]);
    // Always unsubscribe stale subscription and get a fresh one
    const existing = await reg.pushManager.getSubscription();
    if (existing) await existing.unsubscribe();
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    const r = await fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, subscription: sub.toJSON() })
    });
    return r.ok ? 'ok' : 'server_error';
  } catch (e) {
    console.warn('Push registration failed:', e.message);
    return 'error';
  }
}

window.registerPushNotifications = registerPush;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => reg.update()) // force check for new SW version
      .catch(e => console.warn('SW:', e));
  });
}
