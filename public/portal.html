// DICTATION EXERCISE TAB
// Listen to a word/sentence → type it in Arabic → get instant feedback
// ════════════════════════════════════════
function DictationTab({student: s, data, setData}) {
  const accent = s.studentTheme||"#4a90d9";
  const [items, setItems] = useState([]);       // [{ar, en, translit}]
  const [idx, setIdx] = useState(0);
  const [input, setInput] = useState("");
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState({correct:0,total:0});
  const [loading, setLoading] = useState(false);
  const [speaking, setSpeaking] = useState(false);
  const [sessionXP, setSessionXP] = useState(0);

  const current = items[idx] || null;

  const generate = async () => {
    setLoading(true); setItems([]); setIdx(0); setInput(""); setRevealed(false);
    try {
      const d = await apiPost("/api/ai", {type:"flashcard_generate", context:{
        topic:"Common vocabulary", level:s.level||"beginner", type:s.type||"Classical Arabic"
      }});
      if (d.result) {
        const raw = d.result.replace(/```json|```/g,"").trim();
        const start = raw.indexOf("[");
        const arr = JSON.parse(start>=0?raw.slice(start):raw);
        if (Array.isArray(arr) && arr.length > 0) {
          setItems(arr.slice(0,10).map(c=>({ar:c.ar||"",en:c.en||"",translit:c.translit||""})));
          setScore({correct:0,total:0});
          setSessionXP(0);
        }
      }
    } catch(e) {}
    setLoading(false);
  };

  const speak = (text) => {
    if (!window.speechSynthesis || speaking) return;
    window.speechSynthesis.cancel();
    const voices = window.speechSynthesis.getVoices();
    const arVoice = voices.find(v=>v.lang&&v.lang.startsWith("ar"));
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "ar"; utt.rate = 0.75;
    if (arVoice) utt.voice = arVoice;
    setSpeaking(true);
    utt.onend = utt.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(utt);
  };

  const normalizeAr = str => (str||"").trim().replace(/[\u064B-\u065F\u0670]/g,"").replace(/\s+/g," ");

  const check = () => {
    if (!current || !input.trim()) return;
    setRevealed(true);
    const correct = normalizeAr(input) === normalizeAr(current.ar);
    const xpAmt = correct ? 5 : 1;
    const newCorrect = score.correct + (correct?1:0);
    const newTotal = score.total + 1;
    setScore({correct:newCorrect, total:newTotal});
    setSessionXP(prev => prev + xpAmt);
    if (correct) {
      const xpPatch = earnXP(s, xpAmt);
      setData({...data, students: data.students.map(x=>x.id===s.id?{...x,...xpPatch}:x)});
    }
  };

  const next = () => {
    if (idx < items.length - 1) { setIdx(idx+1); setInput(""); setRevealed(false); }
    else { setIdx(items.length); } // done
  };

  if (items.length === 0) return h`<div style=${{maxWidth:560,margin:"0 auto",textAlign:"center",padding:"32px 16px"}}>
    <div style=${{fontSize:48,marginBottom:16}}>🎧</div>
    <h3 style=${{fontFamily:"var(--fh)",fontSize:22,letterSpacing:2,marginBottom:8}}>DICTATION</h3>
    <p style=${{fontSize:13,color:"var(--g500)",lineHeight:1.7,maxWidth:360,margin:"0 auto 20px"}}>
      Listen to each Arabic word or phrase, then type what you hear. Diacritics (tashkeel) are ignored when checking.
    </p>
    <button class="btn btn-p" onClick=${generate} disabled=${loading} style=${{padding:"12px 28px"}}>
      ${loading?"⏳ Generating...":"▶ Start Dictation"}
    </button>
  </div>`;

  if (idx >= items.length) return h`<div style=${{maxWidth:480,margin:"0 auto",textAlign:"center",padding:"40px 16px"}}>
    <div style=${{fontSize:52,marginBottom:12}}>${score.correct===score.total?"🏆":score.correct>=score.total*0.7?"👍":"📚"}</div>
    <div style=${{fontFamily:"var(--fh)",fontSize:36,letterSpacing:2,color:"#111",marginBottom:8}}>${score.correct}/${score.total}</div>
    <div style=${{fontSize:14,color:"#888",marginBottom:6}}>${Math.round(score.correct/score.total*100)}% accuracy</div>
    <div style=${{fontSize:13,fontWeight:700,color:"#2e7d32",marginBottom:20}}>⭐ +${sessionXP} XP earned this session</div>
    <button class="btn btn-p" onClick=${generate} style=${{padding:"12px 28px"}}>🔄 New Round</button>
  </div>`;

  const isCorrect = revealed && normalizeAr(input) === normalizeAr(current.ar);
  const isWrong = revealed && !isCorrect;

  return h`<div style=${{maxWidth:480,margin:"0 auto",padding:"8px 0 40px"}}>
    <!-- Progress -->
    <div style=${{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
      <div style=${{flex:1,height:6,background:"#f0f0f0",borderRadius:6,overflow:"hidden"}}>
        <div style=${{height:"100%",width:(idx/items.length*100)+"%",background:accent,borderRadius:6,transition:"width 0.4s"}}></div>
      </div>
      <span style=${{fontSize:12,color:"#aaa",whiteSpace:"nowrap"}}>${idx+1}/${items.length}</span>
      <span style=${{fontSize:12,fontWeight:700,color:"#2e7d32"}}>✅ ${score.correct} correct</span>
    </div>

    <!-- Card -->
    <div style=${{background:"#fff",borderRadius:16,padding:"32px 28px",boxShadow:"0 2px 12px rgba(0,0,0,0.08)",border:"2px solid #eee",textAlign:"center",marginBottom:20}}>
      <div style=${{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#bbb",marginBottom:20}}>Listen & Write what you hear</div>

      <button onClick=${()=>speak(current.ar)} disabled=${speaking}
        style=${{width:72,height:72,borderRadius:"50%",border:"3px solid "+accent,background:speaking?accent+"20":"#fff",cursor:"pointer",fontSize:32,transition:"all 0.2s",marginBottom:20}}>
        ${speaking?"🔊":"🔉"}
      </button>

      <div style=${{fontSize:11,color:"#ccc",marginBottom:16}}>Tap to listen · you can replay as many times as you need</div>

      <!-- Arabic input -->
      <input
        dir="rtl"
        value=${input}
        onInput=${e=>setInput(e.target.value)}
        onKeyDown=${e=>{if(e.key==="Enter"&&!revealed)check();}}
        placeholder="اكتب ما سمعت..."
        disabled=${revealed}
        style=${{
          width:"100%", boxSizing:"border-box",
          fontFamily:"'Amiri',serif", fontSize:26, direction:"rtl", textAlign:"center",
          padding:"14px 16px", border:"2px solid "+(isCorrect?"#4caf50":isWrong?"#f44336":"#ddd"),
          borderRadius:12, outline:"none", background:isCorrect?"#f1fff5":isWrong?"#fff5f5":"#fff",
          color:"#111"
        }}
      />

      ${revealed&&h`<div style=${{marginTop:16,padding:"12px 16px",borderRadius:10,background:isCorrect?"#e8f5e9":"#ffebee",border:"1px solid "+(isCorrect?"#a5d6a7":"#ef9a9a"),textAlign:"right"}}>
        <div style=${{fontFamily:"'Amiri',serif",fontSize:28,direction:"rtl",color:isCorrect?"#2e7d32":"#c62828",marginBottom:4}}>${current.ar}</div>
        <div style=${{fontSize:13,color:"#666",textAlign:"left"}}>${current.en}${current.translit?h`<span style=${{fontStyle:"italic",color:"#aaa",marginLeft:8}}>${current.translit}</span>`:null}</div>
        ${isCorrect
          ? h`<div style=${{marginTop:8,fontSize:12,fontWeight:700,color:"#2e7d32"}}>✅ Correct! +5 XP</div>`
          : h`<div style=${{marginTop:8,fontSize:12,color:"#c62828"}}>The correct spelling is shown above. +1 XP for trying.</div>`}
      </div>`}
    </div>

    <!-- Actions -->
    ${!revealed
      ? h`<button class="btn btn-p" onClick=${check} disabled=${!input.trim()} style=${{width:"100%",padding:"13px",fontSize:15}}>Check ✓</button>`
      : h`<button class="btn btn-p" onClick=${next} style=${{width:"100%",padding:"13px",fontSize:15}}>${idx<items.length-1?"Next →":"See Results"}</button>`
    }
  </div>`;
}

function StudentQuizTab({student: s, data, setData, initialTopic, onGoFlashcards}) {
  const accent = s.studentTheme||"#4a90d9";
  const [view, setView] = useState("home"); // home | taking
  const [activeQuiz, setActiveQuiz] = useState(null);
  const [isRetake, setIsRetake] = useState(false);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  // generation options
  const [selTopic, setSelTopic] = useState(initialTopic&&!QUIZ_TOPICS.includes(initialTopic)?"":initialTopic||"");
  const [customTopic, setCustomTopic] = useState(initialTopic&&!QUIZ_TOPICS.includes(initialTopic)?initialTopic:"");
  const [genLevel, setGenLevel] = useState("beginner");

  const quizHistory = s.quizHistory || [];
  const updStudent = patch => setData({...data, students: data.students.map(x=>x.id===s.id?{...x,...patch}:x)});

  // Overall score — only first attempts count
  const scoredQuizzes = quizHistory.filter(q=>q.attempts&&q.attempts.length>0);
  const totalScore = scoredQuizzes.reduce((sum,q)=>sum+(q.attempts[0].score||0),0);
  const totalPossible = scoredQuizzes.reduce((sum,q)=>sum+(q.questions?.length||5),0);
  const overallPct = totalPossible>0 ? Math.round(totalScore/totalPossible*100) : null;
  const overallOf10 = overallPct!==null ? (overallPct/10).toFixed(1) : null;

  const generate = async () => {
    setLoading(true); setError("");
    const topic = customTopic.trim() || selTopic;
    const prevQs = quizHistory.flatMap(q=>(q.questions||[]).map(qq=>qq.q)).slice(-25);
    const lp = s.learningProfile||{};
    try {
      const d = await apiPost("/api/ai", {type:"student_quiz", context:{
        name:s.name, level:genLevel, type:s.type||"Classical Arabic",
        skillReading:s.skillReading||3, skillWriting:s.skillWriting||3,
        skillListening:s.skillListening||3, skillSpeaking:s.skillSpeaking||3,
        topic: topic||"", goals:s.goals||"",
        learningWhy:lp.why||"", interests:(lp.topics||[]).join(", "),
        challenge:lp.challenge||"", personalGoal:lp.personalGoal||"",
        prevQuestions: prevQs
      }});
      if (!d.result) { setError("Could not generate quiz. Try again."); setLoading(false); return; }
      let raw = d.result.replace(/```json|```/g,"").trim();
      const objStart = raw.indexOf("{"), arrStart = raw.indexOf("[");
      if (objStart!==-1 && (arrStart===-1 || objStart<arrStart)) raw = raw.slice(objStart);
      else if (arrStart!==-1) raw = raw.slice(arrStart);
      const parsed = JSON.parse(raw);
      const questions = Array.isArray(parsed) ? parsed : (parsed.questions||[]);
      const dialect = parsed.dialect||"general";
      const labelMap = {beginner:"Easy",intermediate:"Intermediate",advanced:"Hard"};
      const newQuiz = {
        id:uid(), savedAt:new Date().toISOString(),
        label:labelMap[genLevel]||"Intermediate", dialect,
        topic:topic||"General", level:genLevel,
        questions, attempts:[]
      };
      const newHistory = [...quizHistory, newQuiz].slice(-30); // keep max 30
      updStudent({quizHistory:newHistory});
      setActiveQuiz(newQuiz); setIsRetake(false);
      setAnswers({}); setSubmitted(false); setView("taking");
    } catch(e) { setError("Generation failed: "+e.message); }
    setLoading(false);
  };

  const startRetake = (qz) => {
    setActiveQuiz(qz); setIsRetake(true);
    setAnswers({}); setSubmitted(false); setView("taking");
  };

  const submitQuiz = () => {
    if (!activeQuiz) return;
    const qs = activeQuiz.questions;
    const score = qs.filter((q,i)=>answers[i]===q.answer).length;
    const isFirst = !isRetake && (!activeQuiz.attempts||activeQuiz.attempts.length===0);
    const attempt = {answers:{...answers},score,total:qs.length,completedAt:new Date().toISOString(),isFirst};
    const newHistory = quizHistory.map(q=>q.id===activeQuiz.id
      ? {...q, attempts:[...(q.attempts||[]),attempt]}
      : q
    );
    // XP: 2 per correct answer + 15 bonus for passing (≥60%), only on first attempt
    const xpEarned = isFirst ? (score * 2) + (score/qs.length >= 0.6 ? 15 : 0) : score;
    const xpPatch = earnXP(s, xpEarned);
    updStudent({quizHistory:newHistory, ...xpPatch});
    setActiveQuiz(prev=>({...prev,attempts:[...(prev.attempts||[]),attempt]}));
    setSubmitted(true);
  };

  const isArabic = str => /[\u0600-\u06FF]/.test(str||"");

  // ── Taking view ──────────────────────────────────────────────────────────────
  if (view==="taking"&&activeQuiz) {
    const qs = activeQuiz.questions;
    const answeredCount = Object.keys(answers).length;
    const lastAttempt = activeQuiz.attempts?.slice(-1)[0];
    const score = submitted&&lastAttempt ? lastAttempt.score : qs.filter((q,i)=>answers[i]===q.answer).length;
    const pct = submitted ? Math.round(score/qs.length*100) : 0;
    return h`<div style=${{maxWidth:700,margin:"0 auto"}}>
      <!-- Header -->
      <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <button class="btn btn-sm" onClick=${()=>setView("home")}>← Back</button>
        <${QuizBadge} label=${activeQuiz.label}/>
        <${DialectBadge} dialect=${activeQuiz.dialect}/>
        ${activeQuiz.topic!=="General"&&h`<span style=${{fontSize:12,color:"#888",fontStyle:"italic"}}>${activeQuiz.topic}</span>`}
        ${isRetake&&h`<span style=${{fontSize:11,color:"#888",marginLeft:"auto"}}>Retake — score not counted</span>`}
      </div>

      <!-- Questions -->
      ${qs.map((q,i)=>h`<div key=${i} style=${{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"20px 18px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#bbb",marginBottom:6}}>Question ${i+1} of ${qs.length}</div>
        <div style=${{fontWeight:700,fontSize:15,marginBottom:q.ar&&q.show_ar!==false?"10px":"16px",lineHeight:1.6,color:"#111"}}>${q.q}</div>
        ${q.ar&&q.show_ar!==false&&h`<div style=${{background:"linear-gradient(135deg,#fafafa,#f0f0f0)",border:"1px solid #e8dcc8",borderRadius:10,padding:"14px 20px",marginBottom:16,textAlign:"center"}}>
          <div class="qz-ar">${q.ar}</div>
        </div>`}
        <div style=${{display:"flex",flexDirection:"column",gap:10}}>
          ${q.options.map((opt,j)=>{
            let cls="qz-opt";
            if(submitted){if(j===q.answer)cls+=" qz-correct";else if(answers[i]===j)cls+=" qz-wrong";}
            else if(answers[i]===j)cls+=" qz-correct";
            const arOpt=isArabic(opt);
            return h`<button key=${j} class=${cls+(arOpt?" qz-opt-ar":"")} onClick=${()=>{if(!submitted)setAnswers({...answers,[i]:j})}} disabled=${submitted}>
              <span style=${{display:"inline-flex",alignItems:"center",gap:10,width:"100%",justifyContent:arOpt?"flex-end":"flex-start"}}>
                <span style=${{width:22,height:22,borderRadius:"50%",border:"2px solid currentColor",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,flexShrink:0,fontFamily:"var(--fb)"}}>${["A","B","C","D"][j]}</span>
                <span style=${{flex:1,textAlign:arOpt?"right":"left",fontSize:arOpt?"20px":"14px"}}>${opt}</span>
              </span>
            </button>`;
          })}
        </div>
        ${submitted&&h`<div style=${{marginTop:12,padding:"10px 14px",background:"#f0f7ff",border:"1px solid #bbdefb",borderRadius:8,fontSize:13,color:"#1565c0",lineHeight:1.7}}>💡 ${q.tip}</div>`}
      </div>`)}

      <!-- Submit / Progress -->
      ${!submitted&&answeredCount===qs.length&&h`<button class="btn btn-p" style=${{width:"100%",padding:"14px",marginTop:4}} onClick=${submitQuiz}>Submit Quiz ✓</button>`}
      ${!submitted&&answeredCount<qs.length&&h`<div style=${{textAlign:"center",fontSize:12,color:"#aaa",marginTop:8}}>${answeredCount}/${qs.length} answered</div>`}

      <!-- Result card -->
      ${submitted&&h`<div style=${{background:"#fff",border:"2px solid #111",borderRadius:14,padding:"28px 24px",textAlign:"center",marginTop:8}}>
        <div style=${{fontSize:44,marginBottom:8}}>${pct===100?"🏆":pct>=60?"👍":"📚"}</div>
        <div style=${{fontFamily:"var(--fh)",fontSize:44,letterSpacing:2,color:"#111"}}>${score}/${qs.length}</div>
        <div style=${{fontSize:16,color:"#888",marginTop:4,marginBottom:16}}>${pct}% · ${pct===100?"Perfect!":pct>=80?"Excellent":pct>=60?"Good job":"Keep practising"}</div>
        ${lastAttempt?.isFirst
          ? h`<div style=${{background:"#e8f5e9",border:"1px solid #a5d6a7",borderRadius:10,padding:"10px 16px",fontSize:13,color:"#2e7d32",marginBottom:16}}>
              ✅ First attempt scored! This counts toward your overall average.
              <div style=${{marginTop:6,fontWeight:700,color:"#1b5e20"}}>⭐ +${(score*2)+(pct>=60?15:0)} XP earned${s.streakDays>=1?" · 🔥 Streak: "+s.streakDays+" days":""}</div>
            </div>`
          : h`<div style=${{background:"#f5f5f5",border:"1px solid #ddd",borderRadius:10,padding:"10px 16px",fontSize:13,color:"#888",marginBottom:16}}>Retake — score not counted toward your average.</div>`}
        <div style=${{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button class="btn btn-sm" onClick=${()=>{setView("home");}}>← Back to Quizzes</button>
          <button class="btn btn-sm" onClick=${()=>{startRetake(activeQuiz);}}>↺ Retake</button>
          <button class="btn btn-sm" onClick=${()=>exportQuizPDF(qs,answers,score,s.name)}>📥 PDF</button>
        </div>
        ${pct<80&&activeQuiz.topic&&activeQuiz.topic!=="General"&&onGoFlashcards&&h`<div style=${{marginTop:14,padding:"12px 16px",background:"#e3f2fd",border:"1px solid #90caf9",borderRadius:10,fontSize:13,color:"#1565c0"}}>
          <strong>💡 Strengthen this topic:</strong> Create flashcards for <em>${activeQuiz.topic}</em> to review the vocabulary and concepts you missed.
          <button onClick=${()=>onGoFlashcards(activeQuiz.topic)} style=${{display:"block",marginTop:8,background:"#1565c0",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"var(--fb)"}}>🃏 Study "${activeQuiz.topic}" with Flashcards →</button>
        </div>`}
      </div>`}
    </div>`;
  }

  // ── Home view ─────────────────────────────────────────────────────────────────
  // Weakness map: topics from first attempts scoring < 60%
  const weakTopics = (() => {
    const byTopic = {};
    scoredQuizzes.forEach(qz => {
      const t = qz.topic||"General";
      const score = qz.attempts[0].score;
      const total = qz.questions?.length||5;
      const pct = Math.round(score/total*100);
      if (!byTopic[t]) byTopic[t] = {scores:[], total};
      byTopic[t].scores.push(pct);
    });
    return Object.entries(byTopic)
      .map(([topic, {scores}]) => ({topic, avg: Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)}))
      .filter(({avg}) => avg < 60)
      .sort((a,b) => a.avg - b.avg)
      .slice(0, 5);
  })();

  return h`<div style=${{maxWidth:700,margin:"0 auto"}}>

    ${initialTopic&&h`<div style=${{background:"#f3e5f5",border:"1px solid #ce93d8",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#6a1b9a",display:"flex",alignItems:"center",gap:8}}>
      <span style=${{fontSize:16}}>🧠</span>
      <span>Quizzing on <strong>${initialTopic}</strong> — select the topic below and hit Generate!</span>
    </div>`}

    <!-- Weakness map -->
    ${weakTopics.length>0&&h`<div style=${{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:14,padding:"16px 18px",marginBottom:18}}>
      <div style=${{fontWeight:700,fontSize:13,color:"#e65100",marginBottom:10}}>⚠️ Areas to Strengthen</div>
      <div style=${{display:"flex",flexDirection:"column",gap:8}}>
        ${weakTopics.map(({topic,avg})=>h`<div key=${topic} style=${{display:"flex",alignItems:"center",gap:10}}>
          <div style=${{flex:1,fontSize:13,fontWeight:600,color:"#333"}}>${topic}</div>
          <div style=${{width:80,height:6,background:"#f0f0f0",borderRadius:4,overflow:"hidden"}}>
            <div style=${{height:"100%",width:avg+"%",background:avg<40?"#f44336":"#ff9800",borderRadius:4}}></div>
          </div>
          <div style=${{fontSize:12,fontWeight:700,color:avg<40?"#f44336":"#ff9800",minWidth:34,textAlign:"right"}}>${avg}%</div>
        </div>`)}
      </div>
      <div style=${{fontSize:11,color:"#888",marginTop:10}}>Based on your first attempts. Generate quizzes for these topics to improve! 📈</div>
    </div>`}

    <!-- Overall stats -->
    ${overallPct!==null&&h`<div style=${{background:"#fff",border:"2px solid #111",borderRadius:14,padding:"20px 24px",marginBottom:18,display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
      <div style=${{flex:1,minWidth:150}}>
        <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#aaa",marginBottom:4}}>Overall Quiz Score</div>
        <div style=${{fontFamily:"var(--fh)",fontSize:42,letterSpacing:2,color:accent,lineHeight:1}}>${overallOf10}<span style=${{fontSize:16,color:"#bbb"}}>/10</span></div>
        <div style=${{fontSize:12,color:"#888",marginTop:4}}>${scoredQuizzes.length} quiz${scoredQuizzes.length!==1?"zes":""} completed · first attempts only</div>
      </div>
      <div style=${{minWidth:120}}>
        <div style=${{height:6,background:"#f0f0f0",borderRadius:6,overflow:"hidden",marginBottom:6}}>
          <div style=${{height:"100%",width:overallPct+"%",background:overallPct>=80?"#4caf50":overallPct>=60?accent:"#ff9800",borderRadius:6,transition:"width 0.5s"}}></div>
        </div>
        <div style=${{fontSize:12,fontWeight:700,color:overallPct>=80?"#2e7d32":overallPct>=60?accent:"#e65100"}}>${overallPct}%</div>
      </div>
    </div>`}

    <!-- Generator -->
    <div style=${{background:"#fff",border:"1px solid #eee",borderRadius:14,padding:"20px",marginBottom:18,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div style=${{fontWeight:700,fontSize:15,marginBottom:14,color:"#111"}}>🧠 Generate New Quiz</div>

      <!-- Topic chips -->
      <div style=${{marginBottom:14}}>
        <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#aaa",marginBottom:8}}>Topic</div>
        <div style=${{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
          <button key="none" onClick=${()=>{setSelTopic("");setCustomTopic("");}} style=${{
            padding:"6px 12px",borderRadius:20,border:"1.5px solid "+(selTopic===""&&!customTopic?"#111":"#e0e0e0"),
            background:selTopic===""&&!customTopic?"#111":"transparent",color:selTopic===""&&!customTopic?"#fff":"#666",
            fontSize:12,cursor:"pointer",fontFamily:"var(--fb)"
          }}>No specific topic</button>
          ${QUIZ_TOPICS.map(t=>h`<button key=${t} onClick=${()=>{setSelTopic(t);setCustomTopic("");}} style=${{
            padding:"6px 12px",borderRadius:20,border:"1.5px solid "+(selTopic===t&&!customTopic?"#111":"#e0e0e0"),
            background:selTopic===t&&!customTopic?"#111":"transparent",color:selTopic===t&&!customTopic?"#fff":"#666",
            fontSize:12,cursor:"pointer",fontFamily:"var(--fb)"
          }}>${t}</button>`)}
        </div>
        <input placeholder="Or type a custom topic..." value=${customTopic}
          onInput=${e=>{setCustomTopic(e.target.value);setSelTopic("");}}
          style=${{width:"100%",border:"1.5px solid "+(customTopic?"#111":"#e0e0e0"),borderRadius:9,padding:"8px 12px",fontSize:13,fontFamily:"var(--fb)",outline:"none",boxSizing:"border-box"}}/>
      </div>

      <!-- Level -->
      <div style=${{marginBottom:16}}>
        <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#aaa",marginBottom:8}}>Difficulty Level</div>
        <div style=${{display:"flex",gap:8}}>
          ${[["beginner","Easy 🟢"],["intermediate","Intermediate 🟡"],["advanced","Hard 🔴"]].map(([lv,lbl])=>h`
            <button key=${lv} onClick=${()=>setGenLevel(lv)} style=${{
              flex:1,padding:"9px 4px",borderRadius:10,border:"2px solid "+(genLevel===lv?"#111":"#e0e0e0"),
              background:genLevel===lv?"#111":"transparent",color:genLevel===lv?"#fff":"#666",
              fontSize:12,fontWeight:genLevel===lv?700:500,cursor:"pointer",fontFamily:"var(--fb)"
            }}>${lbl}</button>`)}
        </div>
      </div>

      <button class="btn btn-p" onClick=${generate} disabled=${loading} style=${{width:"100%",padding:"12px"}}>
        ${loading?"⏳ Generating...":"Generate Quiz →"}
      </button>
      ${error&&h`<div style=${{marginTop:10,color:"var(--bd)",fontSize:13,background:"#fff5f5",border:"1px solid #ffd0d0",borderRadius:8,padding:"8px 12px"}}>${error}</div>`}
    </div>

    <!-- Quiz history -->
    ${quizHistory.length>0&&h`<div>
      <div style=${{fontWeight:700,fontSize:13,color:"#aaa",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Saved Quizzes (${quizHistory.length})</div>
      ${[...quizHistory].reverse().map(qz=>{
        const first = qz.attempts?.[0];
        const best = qz.attempts?.length>0 ? Math.max(...qz.attempts.map(a=>a.score)) : null;
        const total = qz.questions?.length||5;
        return h`<div key=${qz.id} style=${{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
          <div style=${{display:"flex",alignItems:"flex-start",gap:8,flexWrap:"wrap",marginBottom:8}}>
            <${QuizBadge} label=${qz.label}/>
            <${DialectBadge} dialect=${qz.dialect}/>
            <span style=${{fontSize:13,fontWeight:600,color:"#333",flex:1}}>${qz.topic==="General"?"General Quiz":qz.topic}</span>
            <span style=${{fontSize:11,color:"#ccc"}}>${new Date(qz.savedAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short"})}</span>
          </div>
          <div style=${{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            ${first
              ? h`<div style=${{fontSize:13,color:"#333"}}>
                  <span style=${{fontWeight:700,color:first.score/total>=0.8?"#2e7d32":first.score/total>=0.6?accent:"#e65100"}}>${first.score}/${total}</span>
                  <span style=${{color:"#bbb",fontSize:11}}> first attempt</span>
                  ${best>first.score?h`<span style=${{fontSize:11,color:"#888"}}> · Best: ${best}/${total}</span>`:null}
                </div>`
              : h`<div style=${{fontSize:12,color:"#bbb",fontStyle:"italic"}}>Not attempted yet</div>`}
            <div style=${{marginLeft:"auto",display:"flex",gap:6}}>
              ${first&&h`<button class="btn btn-sm" onClick=${()=>startRetake(qz)}>↺ Retake</button>`}
              <button class="btn btn-p btn-sm" onClick=${()=>startRetake(qz)}>${first?"Review":"Start →"}</button>
            </div>
          </div>
          ${qz.attempts?.length>1&&h`<div style=${{fontSize:11,color:"#aaa",marginTop:6}}>${qz.attempts.length-1} retake${qz.attempts.length>2?"s":""}</div>`}
        </div>`;
      })}
    </div>`}

    ${quizHistory.length===0&&h`<div style=${{textAlign:"center",padding:"40px 20px",color:"#ccc"}}>
      <div style=${{fontSize:40,marginBottom:12}}>🧠</div>
      <div style=${{fontSize:14,fontWeight:600,color:"#aaa"}}>No quizzes yet</div>
      <div style=${{fontSize:12,marginTop:4}}>Generate your first quiz above!</div>
    </div>`}
  </div>`;
}

// NOTIFICATION NUDGE — shared by student and tutor portals
// ════════════════════════════════════════
function getPushUiStatus() {
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
  const isStandalone = (() => { try { return window.matchMedia?.('(display-mode: standalone)').matches || !!navigator.standalone; } catch { return false; } })();
  if (isIOS && !isStandalone) return 'ios-browser';
  if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) return 'unsupported';
  return Notification.permission || 'default';
}

function pushNeedsSetup() {
  const status = getPushUiStatus();
  return status !== 'granted' && status !== 'unsupported';
}

function NotificationNudge({auth, audience}) {
  const role = audience || "student";
  const copy = role === "tutor"
    ? {
      title:"Turn on tutor alerts",
      body:"Get notified when students request lessons, submit homework, complete tasks, or send you notes.",
      action:"Enable tutor alerts",
      ios:"iPhone: tap Share, Add to Home Screen, then open the portal from the app icon to enable tutor alerts."
    }
    : {
      title:"Stay in the loop",
      body:"Get alerts when Hadi assigns homework, confirms lessons, or adds learning content for you.",
      action:"Enable alerts",
      ios:"iPhone: tap Share, Add to Home Screen, then open the portal from the app icon to enable lesson alerts."
    };

  const [status, setStatus] = useState(() => {
    return getPushUiStatus();
  });
  const [loading, setLoading] = useState(false);
  const [dismissed, setDismissed] = useState(() => {
    try { return sessionStorage.getItem('ae_notif_dismissed_'+role) === '1'; } catch { return false; }
  });

  const enable = async () => {
    if (!auth?.token) return;
    const current = getPushUiStatus();
    if (current === 'ios-browser' || current === 'unsupported') { setStatus(current); return; }
    setLoading(true);
    try {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') { setStatus(perm); setLoading(false); return; }
      const result = await window.registerPushNotifications?.(auth.token);
      setStatus(result === 'ok' ? 'granted' : 'error');
    } catch { setStatus('error'); }
    setLoading(false);
  };

  const dismiss = () => {
    try { sessionStorage.setItem('ae_notif_dismissed_'+role, '1'); } catch {}
    setDismissed(true);
  };

  if (status === 'granted' || status === 'unsupported' || dismissed) return null;

  const xBtn = (onClick) => h`<button style=${{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#bbb",lineHeight:1,padding:"0 2px",flexShrink:0}} onClick=${onClick}>×</button>`;

  if (status === 'ios-browser') return h`<div style=${{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:12,padding:"12px 14px",marginBottom:14,display:"flex",gap:10,alignItems:"flex-start"}}>
    <div style=${{fontSize:20,flexShrink:0}}>📱</div>
    <div style=${{flex:1}}>
      <div style=${{fontWeight:700,fontSize:13,color:"#5f4300",marginBottom:3}}>Add to Home Screen for push notifications</div>
      <div style=${{fontSize:12,color:"#7c5a00",lineHeight:1.6}}>iPhone: tap the <b>Share ↑</b> button at the bottom of Safari → <b>"Add to Home Screen"</b> → open the app from your home screen. Notifications will work after that.</div>
    </div>
    ${xBtn(dismiss)}
  </div>`;

  if (status === 'denied') return h`<div style=${{background:"#fce4ec",border:"1px solid #f48fb1",borderRadius:12,padding:"12px 14px",marginBottom:14,display:"flex",gap:10,alignItems:"flex-start"}}>
    <div style=${{fontSize:20,flexShrink:0}}>🚫</div>
    <div style=${{flex:1}}>
      <div style=${{fontWeight:700,fontSize:13,color:"#880e4f",marginBottom:3}}>Notifications are blocked</div>
      <div style=${{fontSize:12,color:"#880e4f",lineHeight:1.6}}>To unblock: tap the <b>lock icon</b> in your browser's address bar → Notifications → Allow.</div>
    </div>
    ${xBtn(dismiss)}
  </div>`;

  if (status === 'error') return h`<div style=${{background:"#fff3e0",border:"1px solid #ffcc80",borderRadius:12,padding:"12px 14px",marginBottom:14,display:"flex",gap:10,alignItems:"flex-start"}}>
    <div style=${{fontSize:20,flexShrink:0}}>⚠️</div>
    <div style=${{flex:1}}>
      <div style=${{fontWeight:700,fontSize:13,color:"#e65100",marginBottom:3}}>Notification setup failed</div>
      <div style=${{fontSize:12,color:"#bf360c",lineHeight:1.6}}>Refresh the page and try again. Works best on Chrome or Android.</div>
    </div>
    <button style=${{background:"#e65100",color:"#fff",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"var(--fb)",flexShrink:0}} onClick=${()=>setStatus('default')}>Retry</button>
  </div>`;

  // default — not yet asked
  return h`<div style=${{background:"linear-gradient(135deg,#e8f5e9,#c8e6c9)",border:"2px solid #66bb6a",borderRadius:12,padding:"14px 16px",marginBottom:14,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
    <div style=${{fontSize:24,flexShrink:0}}>🔔</div>
    <div style=${{flex:1,minWidth:180}}>
      <div style=${{fontWeight:700,fontSize:13,color:"#1b5e20",marginBottom:2}}>${copy.title}</div>
      <div style=${{fontSize:12,color:"#2e7d32",lineHeight:1.5}}>${copy.body}</div>
    </div>
    <div style=${{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
      <button style=${{background:"#2e7d32",color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontWeight:700,cursor:"pointer",fontFamily:"var(--fb)",fontSize:13,whiteSpace:"nowrap",opacity:loading?0.7:1}} onClick=${enable} disabled=${loading}>${loading?"Setting up...":copy.action}</button>
      <button style=${{background:"none",border:"none",fontSize:12,cursor:"pointer",color:"#888",fontFamily:"var(--fb)",textDecoration:"underline",whiteSpace:"nowrap"}} onClick=${dismiss}>Not now</button>
    </div>
  </div>`;
}

  const [pushStatus, setPushStatus] = useState(() => {
    return getPushUiStatus();
  });
  const [pushLoading, setPushLoading] = useState(false);
  const [phoneDraft, setPhoneDraft] = useState(s.whatsapp||s.phone||"");
  const [phoneSaved, setPhoneSaved] = useState(false);

  const savePhone = () => { upd("whatsapp", phoneDraft.trim()); setPhoneSaved(true); setTimeout(()=>setPhoneSaved(false),2500); };
  const enablePush = async () => {
    if (!auth?.token) return;
    const current = getPushUiStatus();
    if (current === 'ios-browser' || current === 'unsupported') { setPushStatus(current); return; }
    setPushLoading(true);
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { setPushStatus(perm); setPushLoading(false); return; }
    const result = await window.registerPushNotifications?.(auth.token);
    setPushStatus(result === 'ok' ? 'granted' : 'error');
    setPushLoading(false);
  };

  const missingFields = [!s.timezone&&"Timezone",!s.gender&&"Gender",!(s.whatsapp||s.phone)&&"WhatsApp number"].filter(Boolean);

      <div>
        <div style=${{fontWeight:700,fontSize:14,color:"var(--sp-txt)",marginBottom:2}}>${missingFields.length} field${missingFields.length!==1?"s":""} need your attention</div>
        <div style=${{fontSize:12,color:"var(--sp-txt2)"}}>Missing: ${missingFields.join(" · ")}</div>
      </div>
    </div>`:h`<div class="sp2-card" style=${{marginBottom:16,borderLeft:"3px solid var(--sp-green)",display:"flex",alignItems:"center",gap:14}}>

      <div style=${{fontWeight:700,fontSize:14,color:"var(--sp-txt)"}}>Profile is complete — everything's filled in!</div>

    <div class="sp2-card" style=${{marginBottom:14}}>
      <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"var(--sp-txt3)",marginBottom:12}}>👤 Account</div>
      <div style=${fieldStyle()}>
        <span style=${{fontSize:13,color:"var(--sp-txt2)"}}>Name</span>
        <span style=${{fontSize:13,fontWeight:600,color:"var(--sp-txt)"}}>${s.name}</span>
      </div>
      <div style=${fieldStyle()}>
        <span style=${{fontSize:13,color:"var(--sp-txt2)"}}>Email</span>
        <span style=${{fontSize:13,color:"var(--sp-txt)"}}>${s.email||"—"}</span>
      </div>

        <span style=${{fontSize:13,color:"var(--sp-txt2)"}}>Level</span>

// Stable card wrapper — defined OUTSIDE so its reference never changes between renders
function PrefSection({n,title,sub,children}) {
  return h`<div class="sp2-card" style=${{marginBottom:14}}>
    <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:sub?8:12}}>
      <span style=${{fontSize:10,fontWeight:700,letterSpacing:1.5,color:"var(--sp-txt3)",textTransform:"uppercase",background:"var(--sp-surface)",padding:"2px 8px",borderRadius:20}}>${n}</span>

    ${sub?h`<div style=${{fontSize:12,color:"var(--sp-txt2)",marginBottom:14,lineHeight:1.6}}>${sub}</div>`:null}
    ${children}

}

// STUDENT PORTAL — PREFERENCES / LEARNING PROFILE
// ════════════════════════════════════════
function StudentPreferencesTab({student: s, data, setData, auth}) {
  const p = s.learningProfile || {};
  const upd = patch => setData({...data, students: data.students.map(x=>x.id===s.id?{...x,learningProfile:{...(x.learningProfile||{}),...patch}}:x)});
  const toggleTopic = t => {
    const arr = p.topics||[];
    upd({topics: arr.includes(t)?arr.filter(x=>x!==t):[...arr,t]});
  };
  // Local state for the free-text goal so typing doesn't re-render the parent on every keystroke
  const [localGoal, setLocalGoal] = useState(p.personalGoal||"");
  // Study schedule prefs
  const sp = s.studyPrefs || {};
  const [studyDays, setStudyDays] = useState(sp.days || []);
  const [studyWindow, setStudyWindow] = useState(sp.timeWindow || "");
  const [schedSaved, setSchedSaved] = useState(false);
  const [goalSaved, setGoalSaved] = useState(false);
  const saveGoal = () => { upd({personalGoal:localGoal}); setGoalSaved(true); setTimeout(()=>setGoalSaved(false),2500); };

  const saveSchedule = () => {
    const prefs = {days: studyDays, timeWindow: studyWindow};
    setData({...data, students: data.students.map(x=>x.id===s.id?{...x,studyPrefs:prefs}:x)});
    setSchedSaved(true); setTimeout(()=>setSchedSaved(false),3000);
    // Check overlap with teacher availability and notify student
    const avail = data.settings?.availability;
    if (!avail || !studyDays.length || !studyWindow) return;
    const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const WIN_HOURS = {morning:[6,12],afternoon:[12,17],evening:[17,22]};
    const [wS, wE] = WIN_HOURS[studyWindow] || [0,24];
    const matchedDays = [], teacherDays = [];
    for (let d = 0; d <= 6; d++) {
      const da = avail[d];
      if (!da?.enabled || !da?.ranges?.length) continue;
      teacherDays.push(DAY_NAMES[d]);
      if (studyDays.includes(d)) {
        const overlap = da.ranges.some(r => {
          const rS = parseInt((r.from||"0:0").split(":")[0]);
          const rE = parseInt((r.to||"23:0").split(":")[0]);
          return rS < wE && rE > wS;
        });
        if (overlap) matchedDays.push(DAY_NAMES[d]);
      }
    }
    if (!auth?.token || !s.email) return;
    if (matchedDays.length > 0) {
      notifyStudent(auth.token, s.email,
        "🗓️ Great news! We match!",
        "Your preferred study time overlaps with Hadi's availability on " + matchedDays.join(", ") + ". Tap to book your next lesson!",
        "schedule-match"
      );
    } else if (teacherDays.length > 0) {
      notifyStudent(auth.token, s.email,
        "📅 Can you make time?",
        "Hadi checked your preferences. He's available on " + teacherDays.join(", ") + ". Can you make time for Arabic this week?",
        "schedule-mismatch"
      );
    }
  };

  const WHY = [
    {v:"quran",e:"🕌",l:"Quran & Religion",d:"Understand Quranic Arabic and Islamic texts"},
    {v:"travel",e:"✈️",l:"Travel",d:"Use Arabic when travelling to Arab countries"},
    {v:"business",e:"💼",l:"Business / Work",d:"Need Arabic professionally or for clients"},
    {v:"heritage",e:"🏡",l:"Heritage & Roots",d:"Reconnect with family language and culture"},
    {v:"culture",e:"🎭",l:"Culture & Media",d:"Music, films, literature, and art"},
    {v:"academic",e:"🎓",l:"Academic Study",d:"University, research, or formal study"},
    {v:"challenge",e:"🧠",l:"Personal Challenge",d:"Arabic is the ultimate language challenge"},
  ];
  const STYLES = [
    {v:"visual",e:"👁️",l:"Visual",d:"Charts, patterns, colour coding"},
    {v:"auditory",e:"👂",l:"Listen & Repeat",d:"Hearing, mimicking, speaking out loud"},
    {v:"reading",e:"📖",l:"Reading & Writing",d:"Texts, notes, grammar rules"},
    {v:"mixed",e:"🔄",l:"Everything",d:"Mix of all methods"},
  ];
  const TIME = [
    {v:"5",e:"⚡",l:"5 min / day",d:"Quick & consistent"},
    {v:"15",e:"📅",l:"15 min / day",d:"Steady daily progress"},
    {v:"30",e:"📚",l:"30 min / day",d:"Serious learner"},
    {v:"60",e:"🎯",l:"1 hour+ / day",d:"Full commitment"},
  ];
  const CHALLENGES = ["Pronunciation","Vocabulary","Grammar","Reading Arabic script","Speaking confidence","Staying consistent","Understanding natives"];
  const TOPICS = ["Greetings & Daily Life","Numbers & Time","Food & Restaurants","Travel & Directions","Family & Relationships","Religion & Quran","Business & Work","News & Politics","Emotions & Feelings","History & Culture","Technology","Sports"];

  const Section = PrefSection; // alias — stable reference, defined outside this component

  const total = 6;
  const filled = [p.why,p.style,p.time,(p.topics||[]).length>0,p.challenge,p.personalGoal].filter(Boolean).length;
  const pct = Math.round(filled/total*100);

  return h`<div style=${{maxWidth:680,margin:"0 auto"}}>
    <div class="sp2-card" style=${{marginBottom:16,borderLeft:"4px solid var(--sp-amber)"}}>
      <div style=${{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"var(--sp-txt)",marginBottom:6}}>✨ My Learning Profile</div>
      <div style=${{fontSize:13,color:"var(--sp-txt2)",lineHeight:1.7,marginBottom:14}}>Your answers personalise your quizzes, AI tutor, and lesson direction. Hadi uses this to tailor your lessons specifically to you.</div>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style=${{fontSize:12,color:"var(--sp-txt3)"}}>${pct}% complete</div>
        <div style=${{fontSize:12,fontWeight:700,color:pct===100?"var(--sp-green)":pct>=50?"var(--sp-amber)":"var(--sp-rose)"}}>${filled} / ${total} sections</div>
      </div>
      <div class="sp2-prog"><div class="sp2-prog-f" style=${{width:pct+"%"}}></div></div>
    </div>

    <!-- 1. Why -->
    <${Section} n="1 / 6" title="Why are you learning Arabic?" sub="This shapes your vocabulary focus, topics, and the kind of Arabic Hadi teaches you.">
      <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:8}}>
        ${WHY.map(w=>h`<button key=${w.v} style=${{padding:"12px 14px",borderRadius:10,cursor:"pointer",fontFamily:"'Outfit',sans-serif",textAlign:"left",width:"100%",transition:"all 0.18s",border:"1.5px solid "+(p.why===w.v?"var(--sp-amber)":"var(--sp-border)"),background:p.why===w.v?"var(--sp-glow)":"var(--sp-surface)",color:p.why===w.v?"var(--sp-txt)":"var(--sp-txt2)"}} onClick=${()=>upd({why:w.v})}>
          <div style=${{fontSize:18,marginBottom:4}}>${w.e}</div>
          <div style=${{fontWeight:700,fontSize:13}}>${w.l}</div>
          <div style=${{fontSize:11,opacity:0.65,marginTop:2,lineHeight:1.4}}>${w.d}</div>
        </button>`)}
      </div>
    <//>

    <!-- 2. Style -->
    <${Section} n="2 / 6" title="How do you learn best?" sub="Your style changes how the AI tutor explains things and what kinds of exercises you get.">
      <div style=${{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
        ${STYLES.map(s=>h`<button key=${s.v} style=${{padding:"12px 14px",borderRadius:10,cursor:"pointer",fontFamily:"'Outfit',sans-serif",textAlign:"left",width:"100%",transition:"all 0.18s",border:"1.5px solid "+(p.style===s.v?"var(--sp-amber)":"var(--sp-border)"),background:p.style===s.v?"var(--sp-glow)":"var(--sp-surface)",color:p.style===s.v?"var(--sp-txt)":"var(--sp-txt2)"}} onClick=${()=>upd({style:s.v})}>
          <div style=${{fontSize:20,marginBottom:4}}>${s.e}</div>
          <div style=${{fontWeight:700,fontSize:13}}>${s.l}</div>
          <div style=${{fontSize:11,opacity:0.65,marginTop:2}}>${s.d}</div>
        </button>`)}
      </div>
    <//>

    <!-- 3. Time -->
    <${Section} n="3 / 6" title="How much time can you study each day?" sub="Honest answer only — Hadi sets your expectations and pace based on this.">
      <div style=${{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
        ${TIME.map(t=>h`<button key=${t.v} style=${{padding:"12px 14px",borderRadius:10,cursor:"pointer",fontFamily:"'Outfit',sans-serif",textAlign:"left",width:"100%",transition:"all 0.18s",border:"1.5px solid "+(p.time===t.v?"var(--sp-amber)":"var(--sp-border)"),background:p.time===t.v?"var(--sp-glow)":"var(--sp-surface)",color:p.time===t.v?"var(--sp-txt)":"var(--sp-txt2)"}} onClick=${()=>upd({time:t.v})}>
          <div style=${{fontSize:18,marginBottom:4}}>${t.e}</div>
          <div style=${{fontWeight:700,fontSize:13}}>${t.l}</div>
          <div style=${{fontSize:11,opacity:0.65,marginTop:2}}>${t.d}</div>
        </button>`)}
      </div>
    <//>

    <!-- 4. Topics -->
    <${Section} n="4 / 6" title="Which topics interest you most?" sub="Pick as many as you like. Quizzes and flashcards will prioritise these areas.">
      <div style=${{display:"flex",flexWrap:"wrap",gap:8}}>
        ${TOPICS.map(t=>h`<button key=${t} style=${{padding:"7px 16px",borderRadius:20,cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontSize:12,fontWeight:600,transition:"all 0.18s",border:"1.5px solid "+((p.topics||[]).includes(t)?"var(--sp-amber)":"var(--sp-border)"),background:(p.topics||[]).includes(t)?"var(--sp-glow)":"var(--sp-surface)",color:(p.topics||[]).includes(t)?"var(--sp-amber)":"var(--sp-txt2)"}} onClick=${()=>toggleTopic(t)}>${t}</button>`)}
      </div>
    <//>

    <!-- 5. Challenge -->
    <${Section} n="5 / 6" title="What's your biggest challenge in Arabic?" sub="Be honest — this is where Hadi and the AI will focus most of the attention.">
      <div style=${{display:"flex",flexWrap:"wrap",gap:8}}>
        ${CHALLENGES.map(c=>h`<button key=${c} style=${{padding:"7px 16px",borderRadius:20,cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontSize:12,fontWeight:600,transition:"all 0.18s",border:"1.5px solid "+(p.challenge===c?"var(--sp-amber)":"var(--sp-border)"),background:p.challenge===c?"var(--sp-glow)":"var(--sp-surface)",color:p.challenge===c?"var(--sp-amber)":"var(--sp-txt2)"}} onClick=${()=>upd({challenge:c})}>${c}</button>`)}
      </div>
    <//>

    <!-- 6. Personal goal -->
    <${Section} n="6 / 6" title="In your own words — what would make you feel like you've made it?" sub='e.g. "Read the Quran without help", "Order food in Beirut", "Watch Arabic news and understand it"'>
      <textarea value=${localGoal} onInput=${e=>setLocalGoal(e.target.value)} placeholder="Write your goal here..." style=${{width:"100%",minHeight:80,padding:"10px 12px",border:"1px solid var(--sp-border)",fontFamily:"'Outfit',sans-serif",fontSize:13,resize:"vertical",boxSizing:"border-box",borderRadius:10,outline:"none",lineHeight:1.7,background:"var(--sp-surface)",color:"var(--sp-txt)"}}/>
      <div style=${{display:"flex",alignItems:"center",gap:10,marginTop:10}}>
        <button class="sp2-btn sp2-btn-p sp2-btn-sm" onClick=${saveGoal} disabled=${!localGoal.trim()}>${goalSaved?"✓ Saved!":"Save My Goal"}</button>
        ${goalSaved?h`<span style=${{fontSize:12,color:"var(--sp-green)",fontWeight:700}}>Goal saved!</span>`:null}
      </div>
    <//>

    <div class="sp2-card" style=${{marginBottom:14,borderLeft:"3px solid var(--sp-teal)"}}>
      <div style=${{fontWeight:700,fontSize:14,marginBottom:4,color:"var(--sp-txt)"}}>📅 When do you like to study?</div>
      <div style=${{fontSize:12,color:"var(--sp-txt2)",marginBottom:16,lineHeight:1.6}}>Pick your preferred days and time of day. Hadi will be notified and you'll get a message if your schedule overlaps with his availability.</div>

      <div style=${{marginBottom:14}}>
        <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"var(--sp-txt3)",marginBottom:8}}>Preferred Days</div>
        <div style=${{display:"flex",flexWrap:"wrap",gap:6}}>
          ${[1,2,3,4,5,6,0].map(d=>{
            const DAY_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
            const active = studyDays.includes(d);
            return h`<button key=${d} onClick=${()=>setStudyDays(prev=>prev.includes(d)?prev.filter(x=>x!==d):[...prev,d])}
              style=${{padding:"8px 14px",border:"1.5px solid "+(active?"var(--sp-teal)":"var(--sp-border)"),borderRadius:10,
                background:active?"rgba(82,196,184,0.12)":"var(--sp-surface)",
                color:active?"var(--sp-teal)":"var(--sp-txt2)",
                fontWeight:active?700:500,cursor:"pointer",fontSize:13,fontFamily:"'Outfit',sans-serif",transition:"all 0.15s"}}>${DAY_SHORT[d]}</button>`;
          })}
        </div>
      </div>

      <div style=${{marginBottom:16}}>
        <div style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"var(--sp-txt3)",marginBottom:8}}>Preferred Time</div>
        <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
          ${[["morning","🌅 Morning","6am – 12pm"],["afternoon","☀️ Afternoon","12pm – 5pm"],["evening","🌙 Evening","5pm – 10pm"]].map(([id,lbl,sub])=>h`
            <button key=${id} onClick=${()=>setStudyWindow(studyWindow===id?"":id)} style=${{
              flex:1,minWidth:100,padding:"12px 8px",border:"1.5px solid "+(studyWindow===id?"var(--sp-teal)":"var(--sp-border)"),
              borderRadius:10,background:studyWindow===id?"rgba(82,196,184,0.12)":"var(--sp-surface)",
              cursor:"pointer",fontFamily:"'Outfit',sans-serif",transition:"all 0.15s"
            }}>
              <div style=${{fontWeight:700,fontSize:13,color:studyWindow===id?"var(--sp-teal)":"var(--sp-txt2)"}}>${lbl}</div>
              <div style=${{fontSize:10,color:"var(--sp-txt3)",marginTop:2}}>${sub}</div>
            </button>`)}
        </div>
      </div>

      <div style=${{display:"flex",alignItems:"center",gap:10}}>
        <button class="sp2-btn sp2-btn-p sp2-btn-sm" onClick=${saveSchedule} disabled=${!studyDays.length||!studyWindow}>${schedSaved?"✓ Saved & Sent!":"Save Schedule"}</button>
        ${schedSaved?h`<span style=${{fontSize:12,color:"var(--sp-green)",fontWeight:700}}>Hadi has been notified!</span>`:null}
      </div>
    </div>

    ${pct===100?h`<div class="sp2-card" style=${{borderLeft:"4px solid var(--sp-green)",textAlign:"center"}}>
      <div style=${{fontSize:24,marginBottom:8}}>🎉</div>
      <div style=${{fontWeight:700,color:"var(--sp-green)",fontSize:15,marginBottom:4}}>Profile complete!</div>
      <div style=${{fontSize:13,color:"var(--sp-txt2)"}}>Your quizzes and AI tutor are now fully personalised to you.</div>
    </div>`:h`<div class="sp2-card" style=${{borderLeft:"3px solid var(--sp-amber)",display:"flex",alignItems:"center",gap:14}}>
      <div style=${{fontSize:22}}>⚡</div>
      <div style=${{fontSize:13,color:"var(--sp-txt2)"}}>${total-filled} section${total-filled!==1?"s":""} left — the more you fill in, the better your learning experience.</div>
    </div>`}
  </div>`;
}

const SP_NAV = [

function StudentPortal({data, setData, user, auth, onLogout}) {

  const [jumpTopic, setJumpTopic] = useState(null);

  // AI Tutor
  const [aiMsgs, setAiMsgs] = useState([]);
  const [aiInput, setAiInput] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const aiMsgsRef = useRef(null);
  useEffect(() => {
    if (aiMsgsRef.current) aiMsgsRef.current.scrollTop = aiMsgsRef.current.scrollHeight;
  }, [aiMsgs, aiLoading]);

  // Skills
  const [skillTab, setSkillTab] = useState("read");
  const [readIdx, setReadIdx] = useState(null);
  const [readAnswers, setReadAnswers] = useState({});

  const [writeLd, setWriteLd] = useState(false);

  // Foundation
  const [foundTab, setFoundTab] = useState("vocab");
  const [vocabIdx, setVocabIdx] = useState(0);
  const [vocabFlipped, setVocabFlipped] = useState(false);
  const [gramIdx, setGramIdx] = useState(null);

  // Script
  const [scriptLetter, setScriptLetter] = useState(null);

  // Shop

  useEffect(() => {
    if (auth?.token && 'Notification' in window && Notification.permission==='granted' && 'serviceWorker' in navigator && 'PushManager' in window) {
      window.registerPushNotifications?.(auth.token);
    }
  }, []);

  const switchTab = t => {
    try{sessionStorage.setItem('ae_stab',t);}catch{}
    setSpTab(t);
    apiPost("/api/data",{token:auth.token,action:"studentWrite",data}).catch(()=>{});
  };
  const toggleTheme = () => {
    const n = theme==='dark'?'light':'dark';
    setTheme(n);
    try{localStorage.setItem('ae_sp_theme',n);}catch{}
  };
  const goToFlashcards = topic => { setJumpTopic(topic); switchTab("library"); };
  const goToQuiz = topic => { setJumpTopic(topic); switchTab("library"); };
  const doRefresh = async () => {
    setSyncing(true); setSyncMsg("");
    const r = await apiPost("/api/data",{token:auth.token,action:"studentRead"});
    if(r.data){setData(migrateData(r.data));setSyncMsg("Synced!");}else setSyncMsg("No cloud data");
    setSyncing(false); setTimeout(()=>setSyncMsg(""),3000);
  };

  const s = data.students.find(st =>
    (user.email && st.email && st.email.toLowerCase()===user.email.toLowerCase()) ||

  );

  const sendAI = async () => {
    const msg = aiInput.trim();

    const msgs = [...aiMsgs,{role:"user",content:msg}];
    setAiMsgs(msgs); setAiInput(""); setAiLoading(true);
    const prof = s ? {name:s.name,level:s.level,type:s.type,learnType:s.learnType,goals:s.goals} : {};

function StudentProfile({data, setData, profileId, auth}) {
  const s = data.students.find(x=>x.id===profileId);
  const [tab, setTab] = useState("assessment");
  const [assessmentTrack, setAssessmentTrack] = useState("classical");
  const [aiResult, setAiResult] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [showHwForm, setShowHwForm] = useState(false);
  const [hwForm, setHwForm] = useState(null);
  const [savedCard, setSavedCard] = useState("");
  const [showLogModal, setShowLogModal] = useState(false);
  const [logForm, setLogForm] = useState(null);
  const [logLoading, setLogLoading] = useState(false);
  const [logSaved, setLogSaved] = useState(false);
  const S = data.settings;

  if (!s) return h`<div style=${{padding:40,textAlign:"center",color:"var(--g400)"}}>Student not found.</div>`;

  const upd = (k,v) => setData({...data, students:data.students.map(x=>x.id===s.id?{...x,[k]:v}:x)});
  const updMany = (pairs) => setData({...data, students:data.students.map(x=>x.id===s.id?{...x,...pairs}:x)});
  // Draft state for text fields — typing only updates local state, setData is called on blur
  const [draft, setDraft] = useState({
    goals:s.goals||"", nextSteps:s.nextSteps||"",
    nickname:s.nickname||"", nicknameEmoji:s.nicknameEmoji||"",
    teacherStrengths:s.teacherStrengths||"", teacherImprove:s.teacherImprove||"",
    teacherSummary:s.teacherSummary||"", teacherPrivateNotes:s.teacherPrivateNotes||"",
    homeworkNotes:s.homeworkNotes||""
  });
  const dset = (k,v) => setDraft(d=>({...d,[k]:v}));
  const dsave = k => upd(k, draft[k]);
  const activeStudyTypes = cleanStudyTypes(s.studyTypes);
  const activeAssessmentTrack = activeStudyTypes.includes(assessmentTrack) ? assessmentTrack : activeStudyTypes[0];
  const activeTrackMeta = ASSESSMENT_TRACKS.find(t=>t.id===activeAssessmentTrack) || ASSESSMENT_TRACKS[0];
  const toggleStudyType = id => {
    const cur = cleanStudyTypes(s.studyTypes);
    const isActive = cur.includes(id);
    const nextRaw = isActive ? cur.filter(x=>x!==id) : [...cur,id];
    const next = nextRaw.length ? nextRaw : [id];
    if (!isActive) setAssessmentTrack(id);
    else if (activeAssessmentTrack === id) setAssessmentTrack(next[0]);
    upd("studyTypes", next);
  };

  const saveCard = async (cardName) => {
    setSavedCard(cardName);
    // Immediately push to cloud so data is never lost
    if (auth?.token) {

      ${showLogModal&&h`<${Modal} title="LOG LESSON FEEDBACK" onClose=${()=>{setShowLogModal(false);setLogForm(null);}} footer=${h`
        <button class="btn" onClick=${()=>{setShowLogModal(false);setLogForm(null);}}>Cancel</button>
        <button class="btn" onClick=${()=>saveLog(false)} disabled=${logLoading}>Save Only</button>
        <button class="btn btn-p" onClick=${()=>saveLog(true)} disabled=${logLoading}>${logLoading?"🤖 Updating Plan...":"🤖 Save & Update Plan with AI"}</button>
      `}>
        <div style=${{marginBottom:14,padding:"10px 12px",background:"#f0f7ff",border:"1px solid #c3d9f5",borderRadius:8,fontSize:12,lineHeight:1.6,color:"#1976d2"}}>
          Fill in what happened in the lesson. Hit <b>"Save & Update Plan with AI"</b> and Claude will rewrite ${s.name}'s next steps and add new weekly tasks automatically.
        </div>
        <div class="fg"><label>Lesson Date</label><input type="date" value=${logForm?.date||today()} onInput=${e=>setLogForm({...logForm,date:e.target.value})}/></div>
        <div class="fg"><label>Topics Covered *</label><textarea value=${logForm?.coveredTopics||""} onInput=${e=>setLogForm({...logForm,coveredTopics:e.target.value})} placeholder="What did you teach? e.g. Past tense verbs, vocab around family, pronunciation of ع and غ..." style=${{minHeight:90}}/></div>
        <div class="fg"><label>Student Performance</label><textarea value=${logForm?.performance||""} onInput=${e=>setLogForm({...logForm,performance:e.target.value})} placeholder="How did they do? Strengths, struggles, effort, energy..."/></div>
        <div class="fg"><label>Private Notes (not shown to student)</label><textarea value=${logForm?.teacherNotes||""} onInput=${e=>setLogForm({...logForm,teacherNotes:e.target.value})} placeholder="Anything you want to remember — context, personal notes, patterns you noticed..."/></div>
      <//>`}
    </div>`}

    ${tab==="homework" && h`<div>
      <div style=${{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
        <button class="btn btn-p" onClick=${()=>{setHwForm(mkHomework(s.id));setShowHwForm(true);}}>${ic('plus')} Assign Homework</button>
      </div>

      ${sHomework.length===0?h`<div class="empty"><h3>NO HOMEWORK</h3><p>Assign the first task to ${s.name}</p></div>`:
      h`<div>${sHomework.map(hw=>h`<div key=${hw.id} class="assess-card" style=${{borderLeftColor:hw.status==="reviewed"?"var(--ok)":hw.status==="submitted"?"var(--wn)":"var(--g300)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div>
            <h4 style=${{marginBottom:4,fontSize:15}}>${hw.title}</h4>
            <div style=${{fontSize:11,color:"var(--g500)"}}>Assigned: ${fmt(hw.assignedDate)} · Due: ${fmt(hw.dueDate)}</div>
            <span class=${"bg "+(hw.status==="reviewed"?"bg-ok":hw.status==="submitted"?"bg-wn":"bg-n")} style=${{marginTop:6,display:"inline-block"}}>${hw.status}</span>
          </div>
          <div style=${{display:"flex",gap:4,flexShrink:0}}>
            ${s.whatsapp&&h`<button class="btn btn-xs btn-wa" onClick=${()=>sendHwReminder(hw)} title="WhatsApp reminder">${ic('wa')}</button>`}
            <button class="bi" onClick=${()=>{setHwForm({...hw});setShowHwForm(true);}}>${ic('edt')}</button>
            <button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>deleteHw(hw.id)}>${ic('del')}</button>

        ${hw.description&&h`<p style=${{fontSize:13,color:"var(--g600)",marginTop:8,lineHeight:1.6}}>${hw.description}</p>`}
        ${hw.submissionText&&h`<div style=${{marginTop:12,padding:"10px 12px",background:"#f0f7ff",border:"1px solid #c3d9f5"}}>
          <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"#1976d2",marginBottom:4}}>Student Submission</div>
          <p style=${{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>${hw.submissionText}</p>
          ${hw.submissionUrl&&h`<a href=${hw.submissionUrl} target="_blank" style=${{fontSize:12,color:"var(--ok)",display:"block",marginTop:4}}>🔗 Attached file</a>`}
          <div style=${{fontSize:11,color:"var(--g400)",marginTop:4}}>Submitted: ${hw.submittedAt?fmt(hw.submittedAt):"—"}</div>
        </div>`}
        ${hw.status==="submitted"&&h`<div style=${{marginTop:10}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <label style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--g600)"}}>Teacher Comment / Correction</label>
            <button class="btn btn-xs" onClick=${()=>draftAiFeedback(hw)}>🤖 AI Draft</button>
          </div>
          <${HwFeedbackBox} hw=${hw} data=${data} setData=${setData}/>
          <button class="btn btn-p btn-sm" style=${{marginTop:6}} onClick=${()=>markReviewed(hw)}>${ic('chk')} Mark as Reviewed</button>
        </div>`}
        ${hw.status==="reviewed"&&hw.teacherComment&&h`<div style=${{marginTop:10,padding:"10px 12px",background:"#f0fff4",border:"1px solid var(--ok)"}}>
          <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--ok)",marginBottom:4}}>Your Feedback</div>
          <p style=${{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>${hw.teacherComment}</p>
        </div>`}
      </div>`)}</div>`}

      ${showHwForm&&h`<${Modal} title=${hwForm?.id&&(data.homework||[]).find(x=>x.id===hwForm.id)?"EDIT HOMEWORK":"ASSIGN HOMEWORK"} onClose=${()=>setShowHwForm(false)} footer=${h`<button class="btn" onClick=${()=>setShowHwForm(false)}>Cancel</button><button class="btn btn-p" onClick=${saveHw}>Save</button>`}>
        <div class="fg"><label>Title / Task</label><input value=${hwForm?.title||""} onInput=${e=>setHwForm({...hwForm,title:e.target.value})} placeholder="e.g. Write 5 sentences using past tense"/></div>
        <div class="fg"><label>Description / Instructions</label><textarea value=${hwForm?.description||""} onInput=${e=>setHwForm({...hwForm,description:e.target.value})} placeholder="Detailed instructions for the student..."/></div>
        <div class="fr">
          <div class="fg"><label>Due Date</label><input type="date" value=${hwForm?.dueDate||today()} onInput=${e=>setHwForm({...hwForm,dueDate:e.target.value})}/></div>
          <div class="fg"><label>Status</label><select value=${hwForm?.status||"assigned"} onChange=${e=>setHwForm({...hwForm,status:e.target.value})}><option value="assigned">Assigned</option><option value="submitted">Submitted</option><option value="reviewed">Reviewed</option></select></div>
        </div>
      <//>`}
    </div>`}

    ${tab==="ai" && h`<div>
      <div class="assess-card">
        <h4>🤖 AI Student Analysis</h4>
        <p style=${{fontSize:13,color:"var(--g500)",marginBottom:14,lineHeight:1.6}}>Uses Claude AI to analyze ${s.name}'s full profile — skills, attendance, goals, notes — and provide a concise teaching recommendation.</p>
        <button class="btn btn-p" onClick=${runAI} disabled=${aiLoading}>${aiLoading?"Analyzing...":"Run AI Analysis"}</button>
        ${aiResult&&h`<div style=${{marginTop:16,padding:"14px 16px",background:"var(--g50)",border:"2px solid var(--bk)",whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.8,fontFamily:"var(--fb)"}}>${aiResult}</div>`}

}

// ════════════════════════════════════════
// DASHBOARD (fixed #2: only paid revenue)
// ════════════════════════════════════════
function Dashboard({data, setData, auth}) {
  const {students, lessons, payments, settings: S} = data;
  const CUR = S.currency || "$";
  const active = students.filter(s => s.active);
  const now = new Date();
  const mPay = payments.filter(p => { const d = new Date(p.date); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); });
  const mRev = mPay.filter(p=>p.status==="Paid").reduce((a,p) => a+(p.amount||0), 0);
  const wk = lessons.filter(l => new Date(l.date) >= weekStart(S.weekStartDay) && l.status !== "Cancelled");
  const noL = active.filter(s => !hadLesson(s.id, lessons, S.weekStartDay));
  const up = lessons.filter(l => l.status==="Scheduled" && new Date(l.date)>=new Date(today())).sort((a,b) => new Date(a.date)-new Date(b.date)).slice(0,5);

  // 10-day attendance alert
  const inactive10 = active.filter(s => {
    const last = lessons.filter(l=>l.studentId===s.id && l.status==="Completed").sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    if (!last) return s.lessonsTaken > 0;
    return (now - new Date(last.date)) > 10 * 86400000;
  });

  // Pending lesson requests
  const pendingReqs = (data.lessonRequests||[]).filter(r=>r.status==="pending");

  // AI scheduling
  const [scheduleInput, setScheduleInput] = useState("");
  const [scheduleLoading, setScheduleLoading] = useState(false);
  const [scheduleResult, setScheduleResult] = useState(null);
  const [scheduleErr, setScheduleErr] = useState("");

  const runSchedule = async () => {
    if (!scheduleInput.trim()) return;
    setScheduleLoading(true); setScheduleErr(""); setScheduleResult(null);
    const d = await apiPost("/api/ai", {type:"schedule_lesson", context:{message:scheduleInput}});
    setScheduleLoading(false);
    if (d.error) return setScheduleErr(d.error);
    try {
      const parsed = JSON.parse(d.result);
      setScheduleResult(parsed);
    } catch { setScheduleErr("Couldn't parse AI response. Try again."); }
  };

  const confirmSchedule = () => {
    if (!scheduleResult) return;
    const st = students.find(s => s.name.toLowerCase().includes((scheduleResult.studentName||"").toLowerCase()));
    const newLesson = {
      id: uid(),
      studentId: st?.id || "",
      groupId: "",
      date: scheduleResult.date || today(),
      time: scheduleResult.time || "10:00",
      duration: scheduleResult.duration || 60,
      type: st?.type || (S.types||[])[0] || "Levantine",
      status: "Scheduled",
      notes: scheduleResult.notes || ""
    };
    setData({...data, lessons:[...lessons, newLesson]});
    setScheduleInput(""); setScheduleResult(null);
    // Open Google Calendar pre-filled with student as guest
    window.open(gcalUrl(newLesson, st?.name||scheduleResult.studentName, st?.email||""), "_blank");
  };

  // Confirm a lesson request
  const confirmRequest = async (req) => {
    const st = students.find(s=>s.id===req.studentId);
    const newLesson = {id:uid(),studentId:req.studentId,groupId:"",date:req.preferredDate||today(),time:req.preferredTime||"10:00",duration:req.duration||60,type:st?.type||(S.types||[])[0]||"Levantine",status:"Scheduled",notes:"Requested by student"};
    const updated = (data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"confirmed"}:r);
    setData({...data, lessons:[...lessons,newLesson], lessonRequests:updated});
    // Open Google Calendar pre-filled with student as guest
    window.open(gcalUrl(newLesson, st?.name||"Student", st?.email||""), "_blank");
    if (st?.whatsapp) {
      const msg = "Hi " + st.name + "! Your lesson request has been confirmed for " + (req.preferredDate||"TBD") + " at " + (req.preferredTime||"TBD") + ". See you then! 🎓";
      waMsg(st.whatsapp, msg);
    }
    if (st?.email && auth?.token) {
      notifyStudent(auth.token, st.email, '✅ Lesson Confirmed!', `Your lesson on ${req.preferredDate||"TBD"} at ${req.preferredTime||"TBD"} is confirmed. See you then! 🎓`, 'lesson-confirmed');
    }
  };
  const declineRequest = (req) => {
    const updated = (data.lessonRequests||[]).map(r=>r.id===req.id?{...r,status:"declined"}:r);
    setData({...data, lessonRequests:updated});
  };

  const dayOfYearAdmin = (()=>{ const n=new Date(); return Math.floor((n - new Date(n.getFullYear(),0,0)) / 86400000); })();
  const todayQuoteAdmin = ISLAMIC_QUOTES[dayOfYearAdmin % ISLAMIC_QUOTES.length];

  return h`<div>

    <!-- ── Daily Reminder (top priority) ───────────────────────────────────── -->
    <div style=${{
      background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%)",
      borderRadius:16,padding:"20px 22px",marginBottom:20,
      boxShadow:"0 4px 20px rgba(0,0,0,0.25)",
      border:"1px solid rgba(255,255,255,0.08)",
      position:"relative",overflow:"hidden"
    }}>
      <!-- subtle decorative crescent -->
      <div style=${{position:"absolute",top:-18,right:-18,fontSize:80,opacity:0.06,lineHeight:1,userSelect:"none"}}>☪️</div>
      <!-- label -->
      <div style=${{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#ffffff",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
        <span>✦</span><span>Today's Reminder — تذكرة اليوم</span>
      </div>
      <!-- Arabic -->
      <div style=${{
        fontFamily:"'Amiri','Noto Naskh Arabic',serif",
        fontSize:22,lineHeight:2,textAlign:"right",direction:"rtl",
        color:"#f5e6c8",fontWeight:700,marginBottom:14,
        borderBottom:"1px solid rgba(255,255,255,0.1)",paddingBottom:12
      }}>${todayQuoteAdmin.ar}</div>
      <!-- English -->
      <div style=${{fontSize:14,lineHeight:1.75,color:"#e8dcc8",fontStyle:"italic",marginBottom:10,fontWeight:400}}>
        "${todayQuoteAdmin.en}"
      </div>
      <!-- source -->
      <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom: todayQuoteAdmin.note ? 12 : 0}}>
        <span style=${{fontSize:11,fontWeight:700,color:"#1a1a2e",background:"#ffffff",padding:"3px 12px",borderRadius:20}}>
          ${todayQuoteAdmin.source}
        </span>
        <span style=${{fontFamily:"'Amiri','Noto Naskh Arabic',serif",fontSize:12,color:"#a09070",direction:"rtl"}}>
          ${todayQuoteAdmin.sourceAr}
        </span>
      </div>
      ${todayQuoteAdmin.note ? h`<div style=${{fontSize:12,lineHeight:1.7,color:"#9a8c78",borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:10}}>
        📖 ${todayQuoteAdmin.note}
      </div>` : null}
    </div>

    <div class="stats">
      <div class="stat"><div class="lb">Active Students</div><div class="vl">${active.length}</div></div>
      <div class="stat"><div class="lb">This Month (Paid)</div><div class="vl">${fm(mRev, CUR)}</div><div class="su">${mPay.filter(p=>p.status==="Paid").length} payments</div></div>
      <div class="stat"><div class="lb">Lessons This Week</div><div class="vl">${wk.length}</div></div>
      <div class="stat"><div class="lb">No Lesson This Week</div><div class="vl" style=${{color:noL.length?"var(--bd)":"var(--ok)"}}>${noL.length}</div></div>
      <div class="stat"><div class="lb">Avg Attendance</div><div class="vl" style=${{color:(() => { const rates=active.map(s=>attendanceStats(s.id,lessons).rate); const avg=rates.length?Math.round(rates.reduce((a,b)=>a+b,0)/rates.length):0; return avg>=80?"var(--ok)":avg>=60?"var(--wn)":"var(--bd)"; })()}}>${(() => { const rates=active.map(s=>attendanceStats(s.id,lessons).rate); return rates.length?Math.round(rates.reduce((a,b)=>a+b,0)/rates.length):0; })()}%</div><div class="su">across all students</div></div>
    </div>

    ${(()=>{
      if (!active.length) return null;
      const engRows = active.map(s => {
        // Last completed lesson
        const done = lessons.filter(l=>l.studentId===s.id&&l.status==="Completed").sort((a,b)=>new Date(b.date)-new Date(a.date));
        const lastL = done[0];
        const daysSince = lastL ? Math.floor((now - new Date(lastL.date)) / 86400000) : null;
        // Quiz avg
        const scored = (s.quizHistory||[]).filter(q=>q.attempts&&q.attempts[0]);
        const quizAvg = scored.length ? Math.round(scored.reduce((a,q)=>{
          const qs = q.questions?.length||5;
          return a + (q.attempts[0].score/qs*100);
        },0)/scored.length) : null;
        // Homework
        const myHw = (data.homework||[]).filter(hw=>hw.studentId===s.id);
        const hwDone = myHw.filter(hw=>hw.status==="graded"||hw.status==="completed").length;
        // Status
        let status, statusColor;
        if (daysSince===null || daysSince > 14) { status="Inactive"; statusColor="#d32f2f"; }
        else if (daysSince > 7) { status="At Risk"; statusColor="#f57c00"; }
        else { status="Active"; statusColor="#388e3c"; }
        return {s, lastL, daysSince, quizAvg, hwDone, hwTotal:myHw.length, status, statusColor};
      }).sort((a,b) => (a.daysSince===null?9999:a.daysSince)-(b.daysSince===null?9999:b.daysSince));

      return h`<div class="card" style=${{marginBottom:14}}>
        <h3 style=${{marginBottom:10}}>📊 STUDENT ENGAGEMENT</h3>
        <div style=${{overflowX:"auto"}}>
          <table style=${{width:"100%",fontSize:12}}>
            <thead><tr>
              <th style=${{textAlign:"left",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Student</th>
              <th style=${{textAlign:"center",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Last Lesson</th>
              <th style=${{textAlign:"center",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Days Since</th>
              <th style=${{textAlign:"center",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Quiz Avg</th>
              <th style=${{textAlign:"center",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Homework</th>
              <th style=${{textAlign:"center",padding:"6px 8px",background:"var(--g50)",borderBottom:"2px solid var(--g200)"}}>Status</th>
            </tr></thead>
            <tbody>
              ${engRows.map(({s,lastL,daysSince,quizAvg,hwDone,hwTotal,status,statusColor})=>h`
                <tr key=${s.id} style=${{borderBottom:"1px solid var(--g100)"}}>
                  <td style=${{padding:"7px 8px",fontWeight:600}}>${s.name}</td>
                  <td style=${{padding:"7px 8px",textAlign:"center",color:"var(--g600)"}}>${lastL ? fmt(lastL.date) : "—"}</td>
                  <td style=${{padding:"7px 8px",textAlign:"center",fontWeight:daysSince!==null&&daysSince>7?700:400,color:daysSince===null||daysSince>14?"var(--bd)":daysSince>7?"var(--wn)":"var(--g700)"}}>
                    ${daysSince===null ? "Never" : daysSince===0 ? "Today" : daysSince+"d"}
                  </td>
                  <td style=${{padding:"7px 8px",textAlign:"center",color:quizAvg===null?"var(--g400)":quizAvg>=70?"var(--ok)":quizAvg>=50?"var(--wn)":"var(--bd)",fontWeight:quizAvg!==null?600:400}}>
                    ${quizAvg===null ? "—" : quizAvg+"%"}
                  </td>
                  <td style=${{padding:"7px 8px",textAlign:"center",color:"var(--g600)"}}>
                    ${hwTotal===0 ? "—" : hwDone+"/"+hwTotal}
                  </td>
                  <td style=${{padding:"7px 8px",textAlign:"center"}}>
                    <span style=${{background:statusColor+"18",color:statusColor,fontWeight:700,fontSize:11,padding:"3px 9px",borderRadius:20,display:"inline-block"}}>${status}</span>
                  </td>
                </tr>
              `)}
            </tbody>
          </table>
        </div>
      </div>`;
    })()}

    ${pendingReqs.length>0&&h`<div class="card" style=${{borderColor:"#1976d2",marginBottom:14}}>
      <h3 style=${{color:"#1976d2"}}>📅 LESSON REQUESTS (${pendingReqs.length})</h3>
      ${pendingReqs.map(req=>{const st=students.find(s=>s.id===req.studentId);return h`<div key=${req.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--g100)",gap:10}}>
        <div>
          <div style=${{fontWeight:700}}>${st?.name||"Unknown"}</div>
          <div style=${{fontSize:12,color:"var(--g500)"}}>${req.preferredDate||"No date"} at ${req.preferredTime||"No time"}${req.message?" · "+req.message:""}</div>
        </div>
        <div style=${{display:"flex",gap:6,flexShrink:0}}>
          <button class="btn btn-p btn-sm" onClick=${()=>confirmRequest(req)}>✓ Confirm</button>
          <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>declineRequest(req)}>✗ Decline</button>
        </div>
      </div>`;})}
    </div>`}

    ${(()=>{
      const studentNotes = students.filter(s=>s.studentNote&&s.studentNote.trim());
      const submittedHw = (data.homework||[]).filter(hw=>hw.status==="submitted");
      const total = studentNotes.length + submittedHw.length;
      if (total===0) return null;
      return h`<div class="card" style=${{borderColor:"#7b1fa2",marginBottom:14}}>
        <h3 style=${{color:"#7b1fa2"}}>📬 INBOX (${total})</h3>

        </div>
        <div class="card"><h3>UPCOMING LESSONS</h3>
          ${up.length===0 ? h`<p style=${{color:"var(--g400)",fontSize:13}}>None scheduled</p>` : h`<table><thead><tr><th>Date</th><th>Student</th><th>Time</th><th></th></tr></thead><tbody>

// STUDENTS LIST — all bugs fixed
