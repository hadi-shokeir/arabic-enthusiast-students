function Students({data, setData, onProfile, auth}) {
  const [search, setSearch] = useState("");
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkStudent(data.settings));
  const [viewMode, setViewMode] = useState("cards");
  const [loginPw, setLoginPw] = useState("");
  const [loginMsg, setLoginMsg] = useState("");
  const S = data.settings;
  const CUR = S.currency || "$";

  const sorted = [...data.students].sort((a,b) => { if(a.active!==b.active) return a.active?-1:1; return (a.studentNumber||0)-(b.studentNumber||0); });
  const list = sorted.filter(s => s.name.toLowerCase().includes(search.toLowerCase()));

  const [payStatus, setPayStatus] = useState("Pending");
  const doSave = async () => {
    if (!form.name.trim()) return;
    const ex = data.students.find(s=>s.id===form.id);
    if (ex) {
      // If lessons increased, auto-create a payment for the difference
      const lessonDiff = form.lessonsTotal - (ex.lessonsTotal||0);
      let newPayments = data.payments;
      if (lessonDiff > 0 && form.lessonRate > 0) {
        const amount = lessonDiff * form.lessonRate;
        const note = lessonDiff === form.lessonsTotal
          ? "Initial enrollment — "+form.lessonsTotal+" lessons"
          : "Top-up — "+lessonDiff+" lesson"+(lessonDiff>1?"s":"")+" added";
        newPayments = [...data.payments, {id:uid(),studentId:form.id,amount,date:today(),method:"Cash",notes:note,lessonsAdded:lessonDiff,status:payStatus}];
      }
      const saved = {...form, enrollmentStatus: form.enrollmentStatus==="pending" ? "active" : form.enrollmentStatus};
      setData({...data, students: data.students.map(s=>s.id===form.id?saved:s), payments: newPayments});
    } else {
      const amount = form.lessonsTotal * form.lessonRate;
      const newPayment = {id:uid(),studentId:form.id,amount,date:today(),method:"Cash",notes:"Initial enrollment — "+form.lessonsTotal+" lessons",lessonsAdded:form.lessonsTotal,status:payStatus};
      setData({...data, students:[...data.students,{...form, studentNumber: nextStudentNumber(data.students)}], payments: amount>0 ? [...data.payments,newPayment] : data.payments});
      // Optionally create a login account for the new student
      if (loginPw && form.email && auth?.token) {
        const r = await apiPost("/api/users", {token: auth.token, action:"create", name:form.name.trim(), email:form.email.toLowerCase().trim(), password:loginPw, role:"student", phone:form.whatsapp||""});
        if (r.error) { setLoginMsg("Student saved, but login account failed: "+r.error); setLoginPw(""); return; }
        setLoginMsg("");
      }
    }
    setShow(false); setForm(mkStudent(S)); setPayStatus("Pending"); setLoginPw(""); setLoginMsg("");
  };
  const doDelete = id => { if(confirm("Delete student and all their records?")) setData({...data,students:data.students.filter(s=>s.id!==id),lessons:data.lessons.filter(l=>l.studentId!==id),payments:data.payments.filter(p=>p.studentId!==id)}); };

  const adjTaken = (sid, delta) => { setData({...data, students: data.students.map(s => s.id===sid ? {...s, lessonsTaken: Math.max(0, s.lessonsTaken+delta)} : s)}); };
  const adjTotal = (sid, delta) => { setData({...data, students: data.students.map(s => s.id===sid ? {...s, lessonsTotal: Math.max(0, s.lessonsTotal+delta)} : s)}); };
  const adjFreeTaken = (sid, delta) => { setData({...data, students: data.students.map(s => { if(s.id!==sid) return s; const fe=freeExpiry(s); if(fe.expired && delta>0) return s; const nv=Math.max(0, Math.min((s.freeTotal||0), (s.freeTaken||0)+delta)); return {...s, freeTaken:nv}; })}); };

  // FIX #4: Quick complete creates a lesson record if none exists
  const completeLesson = (sid) => {
    const todayL = data.lessons.find(l => l.studentId===sid && l.date===today() && l.status==="Scheduled");
    if (todayL) {
      setData({...data,
        lessons: data.lessons.map(l => l.id===todayL.id ? {...l,status:"Completed"} : l),
        students: data.students.map(s => s.id===sid ? {...s, lessonsTaken: s.lessonsTaken+1} : s)
      });
    } else {
      // Create a new completed lesson record + increment counter
      const st = data.students.find(s=>s.id===sid);
      const newLesson = {id:uid(),studentId:sid,groupId:"",date:today(),time:new Date().toTimeString().slice(0,5),duration:60,type:st?.type||(S.types||[])[0]||"Levantine",status:"Completed",notes:"Quick-completed"};
      setData({...data,
        lessons: [...data.lessons, newLesson],
        students: data.students.map(s => s.id===sid ? {...s, lessonsTaken: s.lessonsTaken+1} : s)
      });
    }
  };

  return h`<div>
    <div style=${{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
      <div class="sb-x">${ic('srch')}<input placeholder="Search..." value=${search} onInput=${e=>setSearch(e.target.value)}/></div>
      <button class="btn btn-p" onClick=${()=>{setForm(mkStudent(S));setLoginPw("");setLoginMsg("");setShow(true);}}>${ic('plus')} Add Student</button>
      <div style=${{marginLeft:"auto",display:"flex",gap:4}}>
        <button class="btn btn-sm" onClick=${()=>exportContactsPDF(data.students, data.settings.brand)} title="Export emails & phone numbers to PDF">${ic('pdf')} Contacts</button>
        <button class=${"btn btn-sm "+(viewMode==="cards"?"btn-p":"")} onClick=${()=>setViewMode("cards")}>Cards</button>
        <button class=${"btn btn-sm "+(viewMode==="table"?"btn-p":"")} onClick=${()=>setViewMode("table")}>Table</button>
      </div>
    </div>
    ${list.length===0 ? h`<div class="empty"><h3>NO STUDENTS</h3><p>Add your first student</p><button class="btn btn-p" onClick=${()=>{setForm(mkStudent(S));setLoginPw("");setLoginMsg("");setShow(true);}}>${ic('plus')} Add</button></div>` :

    viewMode==="cards" ? h`<div class="stu-grid">
      ${list.map((s,i) => {
        const left = s.lessonsTotal - s.lessonsTaken;
        const noL = s.active && !hadLesson(s.id, data.lessons, S.weekStartDay);
        const pct = s.lessonsTotal > 0 ? Math.round(s.lessonsTaken / s.lessonsTotal * 100) : 0;
        const sPay = data.payments.filter(p=>p.studentId===s.id);
        const totalPaid = sPay.reduce((a,p)=>a+(p.amount||0),0);
        const hasToday = data.lessons.some(l => l.studentId===s.id && l.date===today() && l.status==="Scheduled");
        const att = attendanceStats(s.id, data.lessons);
        const needsSetup = s.enrollmentStatus === "pending";
        return h`<div key=${s.id} class=${"stu-card"+(noL?" alert":"")+(s.active?"":" inactive")} style=${{boxShadow:needsSetup?"inset 5px 0 0 #ff9800, 0 1px 4px rgba(0,0,0,0.06)":""}}>
          <div class="sc-top">
            <div onClick=${()=>onProfile(s.id)} style=${{cursor:"pointer",flex:1,display:"flex",alignItems:"center",gap:10}}>
              ${s.avatar ? h`<img src=${s.avatar} style=${{width:40,height:40,borderRadius:8,objectFit:"cover",flexShrink:0,border:"1.5px solid var(--g200)"}}/>` : h`<div style=${{width:40,height:40,borderRadius:8,background:"var(--g100)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:18}}>👤</div>`}
              <div>
              <div style=${{display:"flex",alignItems:"center"}}><span class="sc-num">#${s.studentNumber||i+1}</span><span class="sc-name">${s.name}</span>${noL && h`<span class="rd"></span>`}</div>
              <div class="sc-row"><span class="tg">${s.type}</span><span class="tg" style=${{background:"transparent",color:"var(--bk)",border:"1.5px solid var(--g300)"}}>${s.level}</span><span class=${"bg "+(s.active?"bg-ok":"bg-n")}>${s.active?"Active":"Off"}</span>${s.enrollmentStatus==="pending"&&h`<span class="bg bg-wn" style=${{fontSize:10}}>Pending Setup</span>`}</div>
            </div></div>
            <div style=${{display:"flex",gap:2}}><button class="bi" onClick=${()=>{setForm({...s});setShow(true);}}>${ic('edt')}</button><button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>doDelete(s.id)}>${ic('del')}</button></div>
          </div>
          <div class="sc-stats" style=${{gridTemplateColumns:"1fr 1fr 1fr"}}>
            <div class="sc-stat">
              <div class="sc-sl">Lessons Taken</div>
              <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div class="stepper" onClick=${e=>e.stopPropagation()}>
                  <button class="st-btn minus" onClick=${()=>adjTaken(s.id,-1)}>−</button>
                  <div class="st-val">${s.lessonsTaken}</div>
                  <button class="st-btn" onClick=${()=>adjTaken(s.id,1)}>+</button>
                </div>
              </div>
            </div>
            <div class="sc-stat">
              <div class="sc-sl">Lessons Left</div>
              <span class=${"ll "+(left<=0?"low":left<=2?"ok":"good")} style=${{fontSize:26}}>${left}</span>
              <span style=${{fontSize:10,color:"var(--g400)"}}> / ${s.lessonsTotal}</span>
              <div class="prog"><div class=${"prog-fill "+(pct>=80?"low":pct>=50?"ok":"good")} style=${{width:pct+"%"}}></div></div>
            </div>
            <div class="sc-stat">
              <div class="sc-sl">Attendance</div>
              <span class=${"ll "+(att.rate>=80?"good":att.rate>=60?"ok":"low")} style=${{fontSize:22}}>${att.rate}%</span>
              ${att.streak>=3 && h`<span style=${{fontSize:9,color:"var(--ok)",fontWeight:600,marginLeft:4}}>${att.streak} streak</span>`}
            </div>
          </div>
          <div class="sc-actions" onClick=${e=>e.stopPropagation()}>
            <button class="btn btn-xs btn-done" onClick=${()=>completeLesson(s.id)}>${ic('chk')} ${hasToday?"Done Today":"Complete"}</button>
            ${s.whatsapp && h`<button class="btn btn-xs btn-wa" onClick=${()=>waMsg(s.whatsapp,fillMsg(S.msgGen,s,null))}>${ic('wa')}</button>`}
            <button class="btn btn-xs" onClick=${()=>exportProfilePDF(s,data,false)}>${ic('pdf')} PDF</button>
            <button class="btn btn-xs" onClick=${()=>onProfile(s.id)}>Profile →</button>
          </div>
        </div>`;
      })}
    </div>` :

    h`<div class="card students-table-card" style=${{padding:0,overflow:"hidden"}}><div style=${{overflowX:"auto"}}><table class="students-table"><thead><tr><th>#</th><th>Name</th><th>Type</th><th>Taken</th><th>Left</th><th>Attend.</th><th>Paid</th><th>Status</th><th></th></tr></thead><tbody>
      ${list.map((s,i) => {
        const left = s.lessonsTotal - s.lessonsTaken;
        const att = attendanceStats(s.id, data.lessons);
        const sPay = data.payments.filter(p=>p.studentId===s.id);
        const totalPaid = sPay.reduce((a,p)=>a+(p.amount||0),0);
        const needsSetup = s.enrollmentStatus === "pending";
        return h`<tr key=${s.id} class=${"ck"+(s.active?"":" ri")} onClick=${()=>onProfile(s.id)}>
          <td class="nc" style=${{borderLeft:needsSetup?"4px solid #ff9800":"4px solid transparent",paddingLeft:needsSetup?6:8}}>${i+1}</td>
          <td style=${{fontWeight:600}}>${s.name}${needsSetup?h`<span style=${{marginLeft:6,fontSize:9,fontWeight:700,color:"#ff9800",background:"#fff3e0",padding:"2px 5px",borderRadius:4,verticalAlign:"middle"}}>⚠ SETUP</span>`:null}</td>
          <td><span class="tg">${s.type}</span></td>
          <td>${s.lessonsTaken}</td>
          <td><span class=${"ll "+(left<=0?"low":left<=2?"ok":"good")}>${left}</span></td>
          <td><span class=${"ll "+(att.rate>=80?"good":att.rate>=60?"ok":"low")} style=${{fontSize:16}}>${att.rate}%</span></td>
          <td style=${{fontFamily:"var(--fh)",fontSize:16}}>${fm(totalPaid, CUR)}</td>
          <td><span class=${"bg "+(s.active?"bg-ok":"bg-n")}>${s.active?"Active":"Off"}</span></td>
          <td onClick=${e=>e.stopPropagation()} style=${{whiteSpace:"nowrap"}}>
            <button class="bi" onClick=${()=>{setForm({...s});setShow(true);}}>${ic('edt')}</button>
            <button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>doDelete(s.id)}>${ic('del')}</button>
          </td>
        </tr>`;
      })}
    </tbody></table></div></div>`}

    ${show && h`<${Modal} title=${data.students.find(s=>s.id===form.id)?"EDIT STUDENT":"ADD STUDENT"} onClose=${()=>{setShow(false);setLoginPw("");setLoginMsg("");}} footer=${h`<button class="btn" onClick=${()=>{setShow(false);setLoginPw("");setLoginMsg("");}}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>`}>
      <div style=${{display:"flex",alignItems:"center",gap:16,marginBottom:14}}>
        <div style=${{width:64,height:64,borderRadius:12,overflow:"hidden",border:"2px solid var(--g200)",flexShrink:0,background:"var(--g100)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          ${form.avatar ? h`<img src=${form.avatar} style=${{width:"100%",height:"100%",objectFit:"cover"}}/>` : h`<span style=${{fontSize:24,color:"var(--g400)"}}>👤</span>`}
        </div>
        <div style=${{flex:1}}>
          <div class="fg" style=${{marginBottom:0}}><label>Full Name</label><input value=${form.name} onInput=${e=>setForm({...form,name:e.target.value})} placeholder="Name"/></div>
        </div>
        <label style=${{cursor:"pointer",padding:"6px 12px",border:"2px solid var(--g200)",borderRadius:6,fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
          📷 Photo
          <input type="file" accept="image/*" style=${{display:"none"}} onInput=${e=>{const f=e.target.files[0];if(!f)return;if(f.size>5e6){alert("Max 5MB for photos");return;}const canvas=document.createElement("canvas");const img=new Image();const url=URL.createObjectURL(f);img.onload=()=>{const max=400;const s=Math.min(max/img.width,max/img.height,1);canvas.width=img.width*s;canvas.height=img.height*s;canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);setForm({...form,avatar:canvas.toDataURL("image/jpeg",0.7)});URL.revokeObjectURL(url);};img.src=url;}}/>

      <div class="fg"><label>Student Timezone</label><select value=${form.timezone||""} onChange=${e=>setForm({...form,timezone:e.target.value})}>
        <option value="">— Not set —</option>
        <optgroup label="🌎 USA">
          <option value="America/New_York">🇺🇸 Eastern (ET) — New York</option>
          <option value="America/Chicago">🇺🇸 Central (CT) — Chicago</option>
          <option value="America/Denver">🇺🇸 Mountain (MT) — Denver</option>
          <option value="America/Los_Angeles">🇺🇸 Pacific (PT) — Los Angeles</option>
          <option value="America/Phoenix">🇺🇸 Arizona (MST)</option>
          <option value="America/Anchorage">🇺🇸 Alaska (AKT)</option>
          <option value="Pacific/Honolulu">🇺🇸 Hawaii (HST)</option>
        </optgroup>
        <optgroup label="🌎 Canada">
          <option value="America/Toronto">🇨🇦 Toronto (ET)</option>
          <option value="America/Winnipeg">🇨🇦 Winnipeg (CT)</option>
          <option value="America/Edmonton">🇨🇦 Calgary (MT)</option>
          <option value="America/Vancouver">🇨🇦 Vancouver (PT)</option>
          <option value="America/Halifax">🇨🇦 Halifax (AT)</option>

// ════════════════════════════════════════
// SCHEDULING — Admin slot management
// ════════════════════════════════════════
function Scheduling({data, setData, auth}) {
  const [tab, setTab] = useState("availability");
  const [slots, setSlots] = useState(null);
  const [deductions, setDeductions] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState("");

  // Add slot form
  const [showAdd, setShowAdd] = useState(false);
  const [addForm, setAddForm] = useState({date:"", time:"10:00", duration:60, studentId:""});
  const [addErr, setAddErr] = useState("");

  // Copy day form (slots section)
  const [showCopy, setShowCopy] = useState(false);
  const [copyFrom, setCopyFrom] = useState("");
  const [copyTo, setCopyTo] = useState("");
  // Copy availability day (weekly schedule section)
  const [availCopyFrom, setAvailCopyFrom] = useState(null);

  // Filter
  const [filter, setFilter] = useState("upcoming"); // upcoming | all | open | booked | completed

  // Credit adjust
  const [creditModal, setCreditModal] = useState(null); // {studentId, name, current}
  const [creditDelta, setCreditDelta] = useState(0);
  const [creditNote, setCreditNote] = useState("");

  const flash = (m, isErr) => {
    if (isErr) setErr(m); else setMsg(m);
    setTimeout(() => { setErr(""); setMsg(""); }, 3500);
  };

  const loadSlots = async () => {
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"getSlots"});
      if (r.error) { flash(r.error, true); } else { setSlots(r.slots || []); }
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  const loadDeductions = async () => {
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"getDeductions"});
      if (!r.error) setDeductions(r.deductions || []);
    } catch {}
  };

  useEffect(() => { loadSlots(); }, []);
  useEffect(() => { if (tab === "log" && !deductions) loadDeductions(); }, [tab]);

  // ── Add slot ──────────────────────────────────────────────────────────────
  const doAddSlot = async () => {
    setAddErr("");
    if (!addForm.date || !addForm.time) { setAddErr("Date and time are required."); return; }
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"addSlot", date:addForm.date, time:addForm.time, duration:+addForm.duration, studentId:addForm.studentId||null});
      if (r.error) { setAddErr(r.message || r.error); }
      else { setSlots([...(slots||[]), r.slot]); setShowAdd(false); setAddForm({date:"",time:"10:00",duration:60,studentId:""}); flash(addForm.studentId ? "Slot added & booked!" : "Slot added!"); }
    } catch(e) { setAddErr(e.message); }
    setBusy(false);
  };

  // ── Copy day ──────────────────────────────────────────────────────────────
  const doCopyDay = async () => {
    if (!copyFrom || !copyTo) { flash("Select both dates.", true); return; }
    const src = (slots||[]).filter(s => s.date === copyFrom && s.status !== "cancelled");
    if (src.length === 0) { flash("No active slots on that date.", true); return; }
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"bulkAddSlots", slots: src.map(s => ({date:copyTo, time:s.time, duration:s.duration}))});
      await loadSlots();
      setShowCopy(false);
      flash(`Copied ${r.added} slot(s)${r.skipped?" ("+r.skipped+" skipped — conflicts)":""}!`);
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  // ── Delete slot ───────────────────────────────────────────────────────────
  const doDelete = async (slotId) => {
    if (!confirm("Delete this slot?")) return;
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"deleteSlot", slotId});
      if (r.error) flash(r.error, true);
      else { setSlots((slots||[]).filter(s => s.id !== slotId)); flash("Slot deleted."); }
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  // ── Cancel slot ───────────────────────────────────────────────────────────
  const doCancel = async (slotId) => {
    if (!confirm("Cancel this booking? The slot will reopen.")) return;
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"cancelSlot", slotId});
      if (r.error) flash(r.error, true);
      else { setSlots((slots||[]).map(s => s.id===slotId ? {...s, status:"cancelled"} : s)); flash("Slot cancelled."); }
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  // ── Complete slot ─────────────────────────────────────────────────────────
  const doComplete = async (slotId) => {
    if (!confirm("Mark class as done? This deducts 1 credit from the student.")) return;
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"completeSlot", slotId});
      if (r.error) flash(r.error, true);
      else {
        setSlots((slots||[]).map(s => s.id===slotId ? {...s, status:"completed"} : s));
        // Also update local data so Credits tab reflects change
        await loadCreditsFromCloud();
        flash("Marked complete — 1 class deducted.");
      }
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  const loadCreditsFromCloud = async () => {
    try {
      const r = await apiPost("/api/data", {token: auth.token, action:"restore"});
      if (r.data) setData(r.data);
    } catch {}
  };

  // ── Adjust credits ────────────────────────────────────────────────────────
  const doAdjustCredits = async () => {
    if (!creditModal || creditDelta === 0) { setCreditModal(null); return; }
    setBusy(true);
    try {
      const r = await apiPost("/api/schedule", {token: auth.token, action:"adjustCredits", studentId:creditModal.studentId, delta:+creditDelta, note:creditNote});
      if (r.error) flash(r.error, true);
      else {
        setData({...data, students: data.students.map(s => s.id===creditModal.studentId ? {...s, remainingClasses:r.remaining} : s)});
        flash(`Credits updated — ${creditModal.name} now has ${r.remaining} class${r.remaining===1?"":"es"}.`);
        setCreditModal(null); setCreditDelta(0); setCreditNote("");
      }
    } catch(e) { flash(e.message, true); }
    setBusy(false);
  };

  // ── Slot display helpers ──────────────────────────────────────────────────
  const fmtSlotTime = (date, time, dur) => {
    try {
      const dt = new Date(date+"T"+time+":00");
      const dayName = dt.toLocaleDateString("en-GB",{weekday:"short",timeZone:"Asia/Beirut"});
      const dateStr = dt.toLocaleDateString("en-GB",{day:"numeric",month:"short",timeZone:"Asia/Beirut"});
      const timeStr = dt.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Beirut"});
      return {dayName, dateStr, timeStr};
    } catch { return {dayName:"",dateStr:date,timeStr:time}; }
  };

  const statusBadge = (status) => {
    const cfg = {open:{bg:"#e8f5e9",color:"#2e7d32",label:"Open"},booked:{bg:"#e3f2fd",color:"#1565c0",label:"Booked"},completed:{bg:"#f5f5f5",color:"#555",label:"Done"},cancelled:{bg:"#ffebee",color:"#c62828",label:"Cancelled"}};
    const c = cfg[status] || cfg.open;
    return h`<span style=${{background:c.bg,color:c.color,borderRadius:6,padding:"2px 9px",fontSize:10,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>${c.label}</span>`;
  };

  // ── Filter slots ──────────────────────────────────────────────────────────
  const today2 = new Date().toISOString().split("T")[0];
  const filteredSlots = (slots||[]).filter(s => {
    if (filter === "upcoming") return s.status !== "cancelled" && s.date >= today2;
    if (filter === "open")      return s.status === "open";
    if (filter === "booked")    return s.status === "booked";
    if (filter === "completed") return s.status === "completed";
    return true; // "all"
  }).sort((a,b) => (a.date+a.time) < (b.date+b.time) ? -1 : 1);

  // Group slots by date
  const grouped = {};
  filteredSlots.forEach(s => { if (!grouped[s.date]) grouped[s.date] = []; grouped[s.date].push(s); });
  const groupedDays = Object.keys(grouped).sort();

  // Active students with credits
  const activeStudents = (data.students||[]).filter(s => s.active);

  return h`<div>
    <!-- Flash messages -->
    ${err && h`<div style=${{background:"#ffebee",border:"1px solid var(--bd)",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"var(--bd)",fontSize:13,fontWeight:600}}>${err}</div>`}
    ${msg && h`<div style=${{background:"#e8f5e9",border:"1px solid var(--ok)",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"var(--ok)",fontSize:13,fontWeight:600}}>${msg}</div>`}

    <!-- Tabs -->
    <div class="tabs" style=${{marginBottom:20}}>
      ${[["availability","Availability"],["slots","Bookings"],["credits","Credits"],["log","Deduction Log"]].map(([id,label]) =>
        h`<div key=${id} class=${"tab"+(tab===id?" on":"")} onClick=${()=>setTab(id)}>${label}</div>`
      )}
    </div>

    <!-- ─── AVAILABILITY TAB ──────────────────────────────────────────────── -->
    ${tab==="availability" && (()=>{
      const S = data.settings;
      const avail = S.availability || {};
      const dur = S.lessonDuration || 60;
      const blocked = S.blockedDates || [];
      const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const DAY_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

      const uAvail = (newAvail) => setData({...data, settings:{...S, availability:newAvail}});
      const setDay = (i, patch) => { const cur=avail[i]||{enabled:false,ranges:[]}; uAvail({...avail,[i]:{...cur,...patch}}); };
      const addRange = (i) => { const cur=avail[i]||{enabled:true,ranges:[]}; uAvail({...avail,[i]:{...cur,ranges:[...(cur.ranges||[]),{start:"09:00",end:"17:00"}]}}); };
      const rmRange = (i,ri) => { const cur=avail[i]; uAvail({...avail,[i]:{...cur,ranges:cur.ranges.filter((_,x)=>x!==ri)}}); };
      const updRange = (i,ri,k,v) => { const cur=avail[i]; uAvail({...avail,[i]:{...cur,ranges:cur.ranges.map((r,x)=>x===ri?{...r,[k]:v}:r)}}); };
      const copyAvailTo = (fromDay, toDay) => {
        if (fromDay === toDay) return;
        const src = avail[fromDay]||{enabled:false,ranges:[]};
        const ranges = JSON.parse(JSON.stringify(src.ranges||[])); // deep copy
        uAvail({...avail,[toDay]:{enabled:true,ranges}});
        setAvailCopyFrom(null);
      };
      const toggleBlocked = (dateStr) => {
        const next = blocked.includes(dateStr) ? blocked.filter(d=>d!==dateStr) : [...blocked, dateStr];
        setData({...data, settings:{...S, blockedDates:next}});
      };

      // Build upcoming available dates for next 6 weeks
      const today = new Date(); today.setHours(0,0,0,0);
      const upcoming = [];
      for (let d=0; d<42; d++) {
        const dt = new Date(today); dt.setDate(today.getDate()+d);
        const dow = dt.getDay();
        const dateStr = dt.toISOString().split("T")[0];
        if ((avail[dow]||{}).enabled) upcoming.push({dt, dateStr, dow});
      }

      const fmtTime = t => { try { const [h,m]=t.split(":"); const hr=+h; return (hr%12||12)+":"+(m||"00")+(hr<12?"am":"pm"); } catch { return t; } };

      return h`<div>
        <!-- Lesson duration -->
        <div class="card" style=${{marginBottom:16}}>
          <div style=${{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <span style=${{fontWeight:700,fontSize:13}}>⏱ Lesson duration</span>
            <select value=${dur} onChange=${e=>setData({...data,settings:{...S,lessonDuration:+e.target.value}})} style=${{border:"2px solid var(--g200)",padding:"7px 12px",fontFamily:"var(--fb)",fontSize:13,borderRadius:7,fontWeight:700}}>
              <option value=${30}>30 min</option>
              <option value=${45}>45 min</option>
              <option value=${60}>60 min (1 hour)</option>
              <option value=${90}>90 min</option>
              <option value=${120}>2 hours</option>
            </select>
          </div>
        </div>

        <!-- 7-day weekly schedule -->
        <div class="card" style=${{marginBottom:16}}>
          <h3 style=${{marginBottom:4}}>📅 WEEKLY SCHEDULE</h3>
          <p style=${{fontSize:12,color:"var(--g500)",marginBottom:16}}>Toggle each day and set your available hours. Students book from these recurring windows.</p>

          <!-- Day toggle bar -->
          <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:18}}>
            ${[0,1,2,3,4,5,6].map(i => {
              const day = avail[i]||{enabled:false,ranges:[]};
              return h`<button key=${i} onClick=${()=>setDay(i,{enabled:!day.enabled})} style=${{
                padding:"10px 4px",borderRadius:8,fontWeight:800,fontSize:11,cursor:"pointer",textAlign:"center",lineHeight:1.4,transition:"all .15s",
                border:day.enabled?"2px solid #111":"2px solid var(--g200)",
                background:day.enabled?"#111":"#fff",
                color:day.enabled?"#fff":"var(--g400)"
              }}>${DAY_SHORT[i]}<br/><span style=${{fontSize:8,opacity:.7}}>${day.enabled?"ON":"OFF"}</span></button>`;
            })}
          </div>

          <!-- Per-day time range editors -->
          ${[1,2,3,4,5,6,0].map(i => {
            const day = avail[i]||{enabled:false,ranges:[]};
            if (!day.enabled) return null;
            return h`<div key=${i} style=${{marginBottom:12,padding:"14px 16px",border:"2px solid #111",borderRadius:10,background:"#fff"}}>
              <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
                <div style=${{fontWeight:800,fontSize:14}}>${DAY_NAMES[i]}</div>
                <div style=${{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  <button class="btn btn-sm" onClick=${()=>addRange(i)}>+ Add Time Range</button>
                  <div style=${{position:"relative"}}>
                    <button class="btn btn-sm" style=${{background:availCopyFrom===i?"#e3f2fd":"",borderColor:availCopyFrom===i?"#1976d2":""}} onClick=${()=>setAvailCopyFrom(availCopyFrom===i?null:i)}>
                      📋 Copy to...
                    </button>
                    ${availCopyFrom===i&&h`<div style=${{position:"absolute",right:0,top:"calc(100% + 4px)",background:"#fff",border:"2px solid #1976d2",borderRadius:10,padding:"10px 12px",zIndex:100,minWidth:180,boxShadow:"0 4px 16px rgba(0,0,0,0.15)"}}>
                      <div style=${{fontSize:11,fontWeight:700,color:"#1976d2",marginBottom:8,letterSpacing:1}}>COPY TO WHICH DAYS?</div>
                      ${[0,1,2,3,4,5,6].filter(d=>d!==i).map(d=>h`<button key=${d} onClick=${()=>copyAvailTo(i,d)} style=${{
                        display:"block",width:"100%",textAlign:"left",padding:"7px 10px",marginBottom:4,
                        background:(avail[d]||{}).enabled?"#f0f4ff":"#fafafa",
                        border:"1.5px solid "+((avail[d]||{}).enabled?"#1976d2":"var(--g200)"),
                        borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:600,
                        color:(avail[d]||{}).enabled?"#1565c0":"#333"
                      }}>
                        ${DAY_NAMES[d]} ${(avail[d]||{}).enabled?"(will overwrite)":"(will enable)"}
                      </button>`)}
                      <button onClick=${()=>setAvailCopyFrom(null)} style=${{fontSize:11,color:"var(--g400)",background:"none",border:"none",cursor:"pointer",marginTop:4,width:"100%",textAlign:"center"}}>Cancel</button>
                    </div>`}
                  </div>
                </div>
              </div>
              ${(day.ranges||[]).length===0 && h`<div style=${{fontSize:12,color:"var(--g400)",fontStyle:"italic"}}>No hours set — click "Add Time Range".</div>`}
              ${(day.ranges||[]).map((r,ri)=>h`<div key=${ri} style=${{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"10px 12px",background:"#f9f9f9",borderRadius:8,border:"1.5px solid var(--g200)",flexWrap:"wrap"}}>

// CALENDAR — FIX #11: configurable week start
// ════════════════════════════════════════
function Calendar({data, setData}) {
  const [mo, setMo] = useState(new Date().getMonth());
  const [yr, setYr] = useState(new Date().getFullYear());
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkLesson(data.settings));
  const S = data.settings;
  const wsd = S.weekStartDay || 1;
  const fd = new Date(yr,mo,1).getDay(), dim = new Date(yr,mo+1,0).getDate(), pd = new Date(yr,mo,0).getDate();
  // FIX #11: Adjust first day offset based on week start
  const offset = (fd - wsd + 7) % 7;
  const cells = []; for(let i=offset-1;i>=0;i--) cells.push({d:pd-i,m:false}); for(let i=1;i<=dim;i++) cells.push({d:i,m:true}); while(cells.length<42) cells.push({d:cells.length-offset-dim+1,m:false});
  const ts = today(), MN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAY_NAMES = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const orderedDays = [...DAY_NAMES.slice(wsd), ...DAY_NAMES.slice(0,wsd)];
  const getLessons = day => { const ds=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0"); return data.lessons.filter(l=>l.date===ds); };

  const doSave = () => {
    if (!form.studentId && !form.groupId) return;
    const ex = data.lessons.find(l=>l.id===form.id);
    let nL = ex ? data.lessons.map(l=>l.id===form.id?{...form}:l) : [...data.lessons,{...form}];
    let nS = data.students;
    if (form.status==="Completed" && ex?.status!=="Completed" && form.studentId) nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTaken:s.lessonsTaken+1}:s);
    if (form.status!=="Completed" && ex?.status==="Completed" && form.studentId) nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTaken:Math.max(0,s.lessonsTaken-1)}:s);
    setData({...data, lessons:nL, students:nS}); setShow(false); setForm(mkLesson(S));
  };
  const doDel = id => { if(confirm("Delete this lesson?")) { setData({...data, lessons:data.lessons.filter(l=>l.id!==id)}); setShow(false); } };

  return h`<div>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div style=${{display:"flex",alignItems:"center",gap:10}}>
        <button class="bi" onClick=${()=>{if(mo===0){setMo(11);setYr(yr-1);}else setMo(mo-1);}}>${icb('cL')}</button>
        <h3 style=${{fontFamily:"var(--fh)",fontSize:22,letterSpacing:1.5,minWidth:160,textAlign:"center"}}>${MN[mo]} ${yr}</h3>
        <button class="bi" onClick=${()=>{if(mo===11){setMo(0);setYr(yr+1);}else setMo(mo+1);}}>${icb('cR')}</button>
      </div>
      <button class="btn btn-p" onClick=${()=>{setForm(mkLesson(S));setShow(true);}}>${ic('plus')} Add Lesson</button>
    </div>
    <div style=${{overflowX:"auto",WebkitOverflowScrolling:"touch"}}><div class="cal" style=${{minWidth:320}}>
      ${orderedDays.map(d=>h`<div key=${d} class="cal-h">${d}</div>`)}
      ${cells.map((c,i) => { const ds=c.m?yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(c.d).padStart(2,"0"):""; const dl=c.m?getLessons(c.d):[]; return h`<div key=${i} class=${"cal-c"+(c.m?"":" om")+(ds===ts?" today":"")}>
        <div class="cal-d">${c.d}</div>
        ${dl.map(l=>{const st=data.students.find(s=>s.id===l.studentId);return h`<div key=${l.id} class=${"cal-e "+l.status.toLowerCase()} onClick=${()=>{setForm({...l});setShow(true);}}>${l.time} ${st?.name||"Grp"}</div>`;})}
      </div>`; })}
    </div></div>
    ${show && h`<${Modal} title=${data.lessons.find(l=>l.id===form.id)?"EDIT LESSON":"ADD LESSON"} onClose=${()=>setShow(false)} footer=${h`
      ${data.lessons.find(l=>l.id===form.id) && h`<button class="btn btn-d btn-sm" onClick=${()=>doDel(form.id)}>Delete</button>`}
      <button class="btn" onClick=${()=>setShow(false)}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>
    `}>
      <div class="fr"><div class="fg"><label>Student</label><select value=${form.studentId} onChange=${e=>setForm({...form,studentId:e.target.value})}><option value="">— Select —</option>${data.students.filter(s=>s.active).map(s=>h`<option key=${s.id} value=${s.id}>${s.name}</option>`)}</select></div><div class="fg"><label>Group</label><select value=${form.groupId} onChange=${e=>setForm({...form,groupId:e.target.value})}><option value="">— None —</option>${(data.groups||[]).map(g=>h`<option key=${g.id} value=${g.id}>${g.name}</option>`)}</select></div></div>
      <div class="fr3"><div class="fg"><label>Date</label><input type="date" value=${form.date} onInput=${e=>setForm({...form,date:e.target.value})}/></div><div class="fg"><label>Time (Lebanon)</label><input type="time" step="1800" value=${form.time} onInput=${e=>setForm({...form,time:e.target.value})}/></div><div class="fg"><label>Duration (min)</label><input type="number" value=${form.duration} onInput=${e=>setForm({...form,duration:+e.target.value})}/></div></div>
      ${(()=>{
        if (!form.date || !form.time) return null;
        const student = data.students.find(s=>s.id===form.studentId);
        const studentTz = student?.timezone;
        try {
          const dt = new Date(form.date+"T"+form.time+":00");
          const fmt = tz => new Intl.DateTimeFormat("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:tz}).format(dt);
          const lbTime = fmt("Asia/Beirut");
          return h`<div style=${{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8,padding:"8px 12px",background:"#f0f4ff",borderRadius:8,fontSize:12}}>
            <span style=${{fontWeight:700}}>🇱🇧 Lebanon:</span><span>${lbTime}</span>
            ${studentTz && studentTz !== "Asia/Beirut" && h`<span style=${{margin:"0 6px",color:"#aaa"}}>→</span><span style=${{fontWeight:700}}>🌍 Student:</span><span>${fmt(studentTz)}</span>`}
          </div>`;
        } catch(e) { return null; }
      })()}
      <div class="fr"><div class="fg"><label>Type</label><select value=${form.type} onChange=${e=>setForm({...form,type:e.target.value})}>${S.types.map(t=>h`<option key=${t}>${t}</option>`)}</select></div><div class="fg"><label>Status</label><select value=${form.status} onChange=${e=>setForm({...form,status:e.target.value})}>${S.statuses.map(s=>h`<option key=${s}>${s}</option>`)}</select></div></div>
      <div class="fg"><label>Notes</label><textarea value=${form.notes} onInput=${e=>setForm({...form,notes:e.target.value})}/></div>
    <//>`}
  </div>`;
}

// PAYMENTS — FIX #7 & #8
// ════════════════════════════════════════
function Payments({data, setData}) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkPayment());
  const [search, setSearch] = useState("");
  const S = data.settings;
  const CUR = S.currency || "$";
  const sorted = [...data.payments].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filtered = search ? sorted.filter(p=>{const st=data.students.find(s=>s.id===p.studentId); return st?.name?.toLowerCase().includes(search.toLowerCase());}) : sorted;
  const now = new Date();
  const mPay = data.payments.filter(p=>{const d=new Date(p.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const mRev = mPay.filter(p=>p.status==="Paid").reduce((a,p)=>a+(p.amount||0),0);
  const tRev = data.payments.filter(p=>p.status==="Paid").reduce((a,p)=>a+(p.amount||0),0);
  const pending = data.payments.filter(p=>p.status!=="Paid");
  const pendingTotal = pending.reduce((a,p)=>a+(p.amount||0),0);

  // FIX #8: Track original lessonsAdded to adjust on edit
  const doSave = () => {
    if(!form.studentId||!form.amount) return;
    const ex=data.payments.find(p=>p.id===form.id);
    let nP, nS=data.students;
    if(ex) {
      nP=data.payments.map(p=>p.id===form.id?{...form}:p);
      // Adjust lessons if lessonsAdded changed
      const diff = (form.lessonsAdded||0) - (ex.lessonsAdded||0);
      if(diff !== 0) {
        nS = nS.map(s=>s.id===form.studentId?{...s,lessonsTotal:Math.max(0,s.lessonsTotal+diff),remainingClasses:Math.max(0,(typeof s.remainingClasses==="number"?s.remainingClasses:Math.max(0,(s.lessonsTotal||0)-(s.lessonsTaken||0)))+diff)}:s);
      }
    } else {
      nP=[...data.payments,{...form}];
      if(form.lessonsAdded>0) nS=nS.map(s=>s.id===form.studentId?{...s,lessonsTotal:s.lessonsTotal+form.lessonsAdded,remainingClasses:(typeof s.remainingClasses==="number"?s.remainingClasses:Math.max(0,(s.lessonsTotal||0)-(s.lessonsTaken||0)))+form.lessonsAdded,totalPaid:s.totalPaid+form.amount}:s);
    }
    setData({...data,payments:nP,students:nS}); setShow(false); setForm(mkPayment());
  };

// ─── RESOURCES (links, YouTube videos, PDFs for students) ───
function Resources({data, setData, auth}) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState(mkResource());
  const [rType, setRType] = useState("link"); // "link" | "pdf"
  const [fetching, setFetching] = useState(false);
  const [filter, setFilter] = useState("All");
  const fileRef = useRef(null);
  const resources = data.resources || [];
  const cats = [...new Set(resources.map(r => r.category || "General").filter(Boolean))];
  const list = filter === "All" ? resources : resources.filter(r => (r.category||"General") === filter);

  const openAdd = () => { const f = mkResource(); setForm(f); setRType("link"); setShow(true); };
  const openEdit = r => { setForm({...r}); setRType(r.type==="pdf"?"pdf":"link"); setShow(true); };

  const fetchPreview = async () => {
    let raw = form.url.trim();
    if (!raw) return alert("Paste a URL first.");
    // Auto-add https:// if missing
    if (!/^https?:\/\//i.test(raw)) raw = "https://" + raw;
    // Update the form URL in case we fixed it
    setForm(f => ({...f, url: raw}));
    setFetching(true);
    try {
      const d = await apiPost("/api/og", { url: raw });
      if (d && !d.error) {
        setForm(f => ({
          ...f,
          url: raw,
          title: f.title || d.title || "",
          ogTitle: d.title || "",
          ogImage: d.image || "",
          ogDescription: d.description || "",
          type: d.type || "link",
          videoId: d.videoId || f.videoId || "",
        }));
      } else {
        // Preview failed but URL is still valid — let user save manually
        setForm(f => ({...f, url: raw}));
        alert("Could not load a preview for this URL — you can still save it manually with your own title.");
      }
    } catch(e) {
      alert("Preview failed — check the URL and try again.");
    }
    setFetching(false);
  };

  const handleFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 50e6) { alert("Max 50MB"); return; }
    const r = new FileReader();
    r.onload = () => setForm(frm => ({...frm, fileName:f.name, fileData:r.result, title:frm.title||f.name.replace(/\.[^.]+$/,""), type:"pdf"}));
    r.readAsDataURL(f);
  };

  const doSave = async () => {
    if (rType === "pdf") {
      if (!form.fileData) return alert("Please upload a PDF file.");
    } else {
      if (!form.url.trim()) return alert("Please enter a URL.");
    }
    const displayTitle = form.title || form.ogTitle || form.fileName || form.url;
    const toSave = {...form, title: displayTitle, type: rType==="pdf"?"pdf":(form.type||"link"), id: form.id || uid(), addedAt: form.addedAt || new Date().toISOString()};
    const ex = resources.find(r => r.id === toSave.id);
    setData({...data, resources: ex ? resources.map(r => r.id === toSave.id ? toSave : r) : [...resources, toSave]});
    setShow(false); setForm(mkResource());
    // Notify all active students about the new resource
    if (!ex && auth?.token) {
      const activeStudents = (data.students||[]).filter(s => s.active && s.email);
      for (const st of activeStudents) {
        notifyStudent(auth.token, st.email, '📚 New Resource Added', `Hadi added "${displayTitle}" to your library — check it out!`, 'new-resource');
      }
    }
  };

  const safeDomain = url => { try { return new URL(url).hostname.replace(/^www\./,""); } catch { return url; } };

  return h`<div>
    <div style=${{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
      <div style=${{display:"flex",gap:3,flexWrap:"wrap"}}>
        ${["All",...cats].map(t=>h`<button key=${t} class=${"btn btn-sm "+(filter===t?"btn-p":"")} onClick=${()=>setFilter(t)}>${t}</button>`)}
      </div>
      <button class="btn btn-p" onClick=${openAdd}>+ Add Resource</button>
    </div>
    ${list.length===0 ? h`<div class="empty"><h3>NO RESOURCES YET</h3><p>Add YouTube videos, websites, articles, or PDFs for your students</p></div>` : h`
    <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
      ${list.map(r => {
        const isPdf = r.type==="pdf" || (r.fileData&&r.fileData.length>0) || (r.fileName&&r.fileName.toLowerCase().endsWith(".pdf"));
        const thumb = !isPdf && (r.ogImage || (r.type==="youtube"&&r.videoId ? `https://img.youtube.com/vi/${r.videoId}/hqdefault.jpg` : ""));
        const handleClick = () => isPdf ? downloadFile(r.fileName||"resource.pdf", r.fileData) : window.open(r.url,"_blank");
        return h`<div key=${r.id} class="res-card" onClick=${handleClick}>
          ${isPdf ? h`<div style=${{background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px 0",fontSize:40,borderBottom:"1px solid #eee"}}>📄</div>` : (thumb && h`<div class="res-thumb">
            <img src=${thumb} alt="" onError=${e=>{e.target.parentNode.style.display="none"}}/>
            ${r.type==="youtube" && h`<div class="res-play"><svg viewBox="0 0 24 24" fill="white" style=${{width:22,height:22,marginLeft:3}}><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`}
          </div>`)}
          <div class="res-body">
            <div class="res-title">${r.title||r.ogTitle||r.fileName||r.url}</div>
            ${(r.description||r.ogDescription)&&h`<div class="res-desc">${r.description||r.ogDescription}</div>`}
            <div class="res-meta">
              ${r.category&&h`<span class="tg" style=${{fontSize:9,padding:"1px 6px"}}>${r.category}</span>`}
              <span style=${{fontSize:10,color:"var(--g400)"}}>${isPdf?"📎 PDF":(r.type==="youtube"?"▶ YouTube":"🔗 "+safeDomain(r.url))}</span>
              <div style=${{marginLeft:"auto",display:"flex",gap:2}} onClick=${e=>e.stopPropagation()}>
                <button class="bi" style=${{padding:4}} onClick=${()=>openEdit(r)}>${ic('edt')}</button>
                <button class="bi" style=${{padding:4,color:"var(--bd)"}} onClick=${()=>{if(confirm("Delete this resource?"))setData({...data,resources:resources.filter(x=>x.id!==r.id)});}}>${ic('del')}</button>
              </div>
            </div>
          </div>
        </div>`;
      })}
    </div>`}
    ${show && h`<${Modal} title=${resources.find(r=>r.id===form.id)?"EDIT RESOURCE":"ADD RESOURCE"} onClose=${()=>setShow(false)} footer=${h`<button class="btn" onClick=${()=>setShow(false)}>Cancel</button><button class="btn btn-p" onClick=${doSave}>Save</button>`}>
      <div style=${{display:"flex",gap:6,marginBottom:16}}>
        <button class=${"btn btn-sm "+(rType==="link"?"btn-p":"")} onClick=${()=>setRType("link")}>🔗 Link / Video</button>
        <button class=${"btn btn-sm "+(rType==="pdf"?"btn-p":"")} onClick=${()=>setRType("pdf")}>📄 PDF File</button>
      </div>
      ${rType==="link" ? h`<div>
        <div class="fg">
          <label>URL — paste a website or YouTube link</label>
          <div style=${{display:"flex",gap:8,alignItems:"stretch"}}>
            <input value=${form.url} onInput=${e=>setForm({...form,url:e.target.value})} placeholder="https://..." style=${{flex:1}}/>
            <button class="btn btn-p btn-sm" onClick=${fetchPreview} disabled=${fetching} style=${{flexShrink:0,minWidth:90,opacity:fetching?.6:1}}>${fetching?"Loading...":"🔍 Preview"}</button>
          </div>
        </div>
        ${form.ogImage&&h`<div style=${{marginBottom:14,borderRadius:8,overflow:"hidden",border:"1px solid var(--g200)",maxHeight:180}}>
          <img src=${form.ogImage} style=${{width:"100%",maxHeight:180,objectFit:"cover",display:"block"}} onError=${e=>{e.target.parentNode.style.display="none"}}/>
        </div>`}
      </div>` : h`<div>
        <div class="fg">
          <label>PDF File (max 50MB)</label>
          <div class="fu" onClick=${()=>fileRef.current?.click()} style=${{cursor:"pointer"}}>
            <input ref=${fileRef} type="file" accept=".pdf,application/pdf" onChange=${handleFile} style=${{display:"none"}}/>
            ${form.fileName ? h`<span>${ic('fi')} ${form.fileName}</span>` : h`<p style=${{fontWeight:600}}>Click to upload PDF</p>`}
          </div>
        </div>
      </div>`}
      <div class="fg"><label>Title</label><input value=${form.title||(rType==="link"?form.ogTitle:"")} onInput=${e=>setForm({...form,title:e.target.value})} placeholder=${rType==="link"?"Auto-filled after preview":"Name for this PDF"}/></div>
      <div class="fg"><label>Description (optional)</label><textarea value=${form.description||(rType==="link"?form.ogDescription:"")} onInput=${e=>setForm({...form,description:e.target.value})} placeholder="What is this resource about?"/></div>
      <div class="fg"><label>Category</label><input value=${form.category} onInput=${e=>setForm({...form,category:e.target.value})} placeholder="e.g. Grammar, Vocabulary, Quran, Listening..."/></div>
    <//>`}
  </div>`;
}

// HOMEWORK — teacher overview of all HW
// ════════════════════════════════════════
function HomeworkView({data, onProfile}) {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const all = (data.homework||[]);
  const counts = {all:all.length,assigned:all.filter(x=>x.status==="assigned").length,submitted:all.filter(x=>x.status==="submitted").length,reviewed:all.filter(x=>x.status==="reviewed").length};
  const filtered = all
    .filter(hw=>filter==="all"||hw.status===filter)
    .filter(hw=>{
      if(!search) return true;
      const s=data.students.find(x=>x.id===hw.studentId);
      return s?.name?.toLowerCase().includes(search.toLowerCase())||hw.title.toLowerCase().includes(search.toLowerCase());
    })
    .sort((a,b)=>new Date(b.assignedDate)-new Date(a.assignedDate));
  return h`<div>
    <div style=${{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>

// Practice overview for games, quizzes, and exercises
function PracticeAdmin({data, onProfile}) {
  const students = data.students || [];
  const curriculum = data.curriculum || [];
  const assignedCount = students.reduce((sum,s)=>sum+(s.assignedLessons||[]).length,0);
  const completedCount = students.reduce((sum,s)=>sum+(s.completedLessons||[]).length,0);
  const quizAttempts = students.flatMap(s=>(s.quizHistory||[]).map(q=>({...q,student:s})));
  const avgQuiz = quizAttempts.length ? Math.round(quizAttempts.reduce((a,q)=>a+(q.score||0),0)/quizAttempts.length) : 0;
  const activeTasks = students.reduce((sum,s)=>sum+(s.weeklyTasks||[]).filter(t=>!t.doneAt).length,0);
  const rows = students.filter(s=>s.active).map(s=>{
    const assigned = (s.assignedLessons||[]).length;
    const completed = (s.completedLessons||[]).length;
    const quizzes = s.quizHistory||[];
    const lastQuiz = quizzes.length ? quizzes[quizzes.length-1] : null;
    return {s, assigned, completed, quizzes, lastQuiz};
  });

  return h`<div>
    <div class="stats" style=${{gridTemplateColumns:"repeat(4,1fr)"}}>
      <div class="stat"><div class="lb">Exercise Library</div><div class="vl">${curriculum.length}</div><div class="su">curriculum items</div></div>
      <div class="stat"><div class="lb">Assigned</div><div class="vl">${assignedCount}</div><div class="su">${completedCount} completed</div></div>
      <div class="stat"><div class="lb">Quiz Average</div><div class="vl">${avgQuiz}%</div><div class="su">${quizAttempts.length} attempts</div></div>
      <div class="stat"><div class="lb">Open Tasks</div><div class="vl">${activeTasks}</div><div class="su">weekly student tasks</div></div>
    </div>
    <div class="card" style=${{padding:0}}>
      <div style=${{padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"2px solid var(--bk)",gap:10,flexWrap:"wrap"}}>
        <h3 style=${{fontFamily:"var(--fh)",fontSize:20,letterSpacing:1.5,margin:0}}>GAMES, QUIZZES & EXERCISES</h3>
        <div style=${{fontSize:12,color:"var(--g500)"}}>Assign exercises from each student profile or add items in Library & Resources.</div>
      </div>
      <div style=${{overflowX:"auto"}}><table><thead><tr><th>Student</th><th>Assigned</th><th>Completed</th><th>Quiz Attempts</th><th>Last Score</th><th>Open Tasks</th><th></th></tr></thead><tbody>
        ${rows.map(({s,assigned,completed,quizzes,lastQuiz})=>h`<tr key=${s.id}>
          <td style=${{fontWeight:700}}>${s.name}</td>
          <td>${assigned}</td>
          <td>${completed}</td>
          <td>${quizzes.length}</td>
          <td>${lastQuiz ? ((lastQuiz.score||0)+"%") : "None yet"}</td>
          <td>${(s.weeklyTasks||[]).filter(t=>!t.doneAt).length}</td>
          <td><button class="btn btn-xs" onClick=${()=>onProfile(s.id)}>Open Profile</button></td>
        </tr>`)}
        ${rows.length===0&&h`<tr><td colspan="7" style=${{textAlign:"center",color:"var(--g400)",padding:30}}>No active students yet</td></tr>`}
      </tbody></table></div>
    </div>
  </div>`;
}

// TUTOR PUSH NOTIFICATION SETTINGS
// ════════════════════════════════════════
function TutorPushSettings() {
  const [status, setStatus] = useState(() => {
    return getPushUiStatus();
  });
  const [loading, setLoading] = useState(false);

  const enable = async () => {
    const current = getPushUiStatus();
    if (current === 'ios-browser' || current === 'unsupported') { setStatus(current); return; }
    setLoading(true);
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { setStatus(perm); setLoading(false); return; }
    const auth = getAuth();
    const result = await window.registerPushNotifications?.(auth?.token);
    setStatus(result === 'ok' ? 'granted' : 'error');
    setLoading(false);
  };

  if (status === 'ios-browser') return h`<div>
    <p style=${{fontSize:13,color:"var(--wn)",fontWeight:700,marginBottom:8}}>Add this portal to your iPhone Home Screen first.</p>
    <p style=${{fontSize:12,color:"var(--g500)",lineHeight:1.7}}>In Safari, tap Share, choose Add to Home Screen, then open Arabic Enthusiast from the app icon and enable tutor alerts here.</p>
  </div>`;
  if (status === 'unsupported') return h`<p style=${{fontSize:13,color:"var(--g500)"}}>Push notifications are not supported on this browser.</p>`;
  if (status === 'denied') return h`<div>
    <p style=${{fontSize:13,color:"var(--bd)",marginBottom:8}}>🚫 Notifications are blocked on this device.</p>
    <p style=${{fontSize:12,color:"var(--g500)",lineHeight:1.7}}>To fix on iPhone: <b>Settings → Safari → arabic-enthusiast.vercel.app → Notifications → Allow</b>.<br/>On Android/Chrome: click the lock icon in the address bar → Notifications → Allow.</p>
  </div>`;
  if (status === 'error') return h`<div>
    <p style=${{fontSize:13,color:"var(--bd)",fontWeight:700,marginBottom:8}}>Notification setup failed.</p>
    <p style=${{fontSize:12,color:"var(--g500)",lineHeight:1.7,marginBottom:10}}>Refresh and try again. If it still fails, check the Vercel VAPID push keys.</p>
    <button class="btn btn-sm" onClick=${enable} disabled=${loading}>${loading?"Retrying...":"Retry setup"}</button>
  </div>`;
  if (status === 'granted') return h`<div>
    <p style=${{fontSize:13,color:"var(--ok)",fontWeight:700,marginBottom:6}}>✅ Notifications enabled on this device.</p>
    <p style=${{fontSize:12,color:"var(--g500)",marginBottom:10}}>You'll get notified when students complete tasks, submit homework, request lessons, or leave you notes.</p>
    <button class="btn btn-sm" onClick=${enable} disabled=${loading} style=${{marginBottom:12}}>${loading?"Refreshing...":"🔄 Refresh subscription"}</button>
    <div style=${{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#5f4300",lineHeight:1.7}}>
      <b>📱 Not getting alerts when your phone screen is off?</b><br/>
      Android: Go to <b>Settings → Apps → Chrome → Battery → Unrestricted</b>.<br/>
      iPhone: Make sure you've added this site to your Home Screen (PWA) — tap Share → Add to Home Screen.
    </div>
  </div>`;
  return h`<div>
    <p style=${{fontSize:13,color:"var(--g500)",marginBottom:10}}>Enable notifications so you get pinged when a student completes a task, submits homework, requests a lesson, or leaves you a note — even when the app is closed.</p>
    <button class="btn btn-p" style=${{width:"100%",justifyContent:"center",padding:"12px"}} onClick=${enable} disabled=${loading}>${loading?"Setting up...":"🔔 Enable Notifications"}</button>
    <p style=${{fontSize:11,color:"var(--g400)",marginTop:8,textAlign:"center"}}>Works on Android Chrome and desktop Chrome/Edge/Firefox. iPhone requires Add to Home Screen (iOS 16.4+).</p>
  </div>`;
}

function UserManagement({auth, data, setData}) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("requests"); // requests | all | create
  const [createForm, setCreateForm] = useState({name:"",email:"",password:"",role:"student",phone:"",gender:"female",timezone:"",learnType:"Levantine"});
  const [pwForm, setPwForm] = useState({email:"",password:""});
  const [msg, setMsg] = useState("");
  const [err, setErr] = useState("");

  const call = async body => apiPost("/api/users", {token: auth.token, ...body});

  const load = async () => {
    setLoading(true);
    const d = await call({action:"list"});
    setUsers(d.users || []);
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const pending = users.filter(u=>u.status==="pending");
  const approved = users.filter(u=>u.status==="approved");

  const approve = async (email, name, gender) => {
    await call({action:"approve", email});
    // Auto-create student profile if one doesn't exist yet
    if (data && setData) {
      const exists = (data.students||[]).find(s => s.email === email);
      if (!exists) {
        const S = data.settings;
        const newStudent = {...mkStudent(S), studentNumber: nextStudentNumber(data.students), name: name||email, email, gender: gender||"", enrollmentStatus:"pending"};
        setData({...data, students:[...data.students, newStudent]});
      }
    }
    setMsg("Approved! Student added to your list."); load();
  };
  const reject = async email => {
    if (!confirm("Reject and remove this request?")) return;
    await call({action:"reject", email});
    setMsg("Removed."); load();
  };
  const del = async email => {
    if (!confirm("Delete this user? They will lose access immediately.")) return;
    await call({action:"delete", email});
    setMsg("Deleted."); load();
  };
  const resetPw = async (email, pw) => {
    if (!pw || pw.length < 6) return setErr("Password must be at least 6 characters");
    const d = await call({action:"setPassword", email, password:pw});
    if (d.error) return setErr(d.error);
    setMsg("Password updated for "+email);
    setPwForm({email:"",password:""});
  };
  const create = async () => {
    setErr(""); setMsg("");
    if (!createForm.name||!createForm.email||!createForm.password) return setErr("Name, email and password are required");
    if (createForm.password.length < 6) return setErr("Password must be at least 6 characters");
    const d = await call({action:"create", name:createForm.name, email:createForm.email, password:createForm.password, role:createForm.role, phone:createForm.phone});
    if (d.error) return setErr(d.error);
    // Auto-create student profile with all the info
    if (createForm.role === "student" && data && setData) {
      const exists = (data.students||[]).find(s => s.email === createForm.email.toLowerCase().trim());
      if (!exists) {
        const S = data.settings;
        const newStudent = {
          ...mkStudent(S),
          studentNumber: nextStudentNumber(data.students),
          name: createForm.name.trim(),
          email: createForm.email.toLowerCase().trim(),
          whatsapp: createForm.phone || "",
          gender: createForm.gender || "",
          timezone: createForm.timezone || "",
          learnType: createForm.learnType || "",
          enrollmentStatus: "pending"
        };
        setData({...data, students:[...data.students, newStudent]});
      }
    }
    setMsg("Account created! Share the email + password with the student via WhatsApp.");
    setCreateForm({name:"",email:"",password:"",role:"student",phone:"",gender:"female",timezone:"",learnType:"Levantine"});
    load();
  };

  const fmt2 = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";

  if (loading) return h`<div style=${{textAlign:"center",padding:40,color:"var(--g400)"}}>Loading...</div>`;

  return h`<div>
    ${msg && h`<div style=${{padding:"10px 14px",background:"#f0fff4",border:"1px solid var(--ok)",marginBottom:14,fontSize:13,color:"var(--ok)",fontWeight:600}}>${msg}</div>`}
    ${err && h`<div style=${{padding:"10px 14px",background:"#fff0f0",border:"1px solid var(--bd)",marginBottom:14,fontSize:13,color:"var(--bd)",fontWeight:600}}>${err}</div>`}

    <div class="auth-tabs" style=${{marginBottom:20}}>
      <div class=${"auth-tab "+(tab==="requests"?"on":"")} onClick=${()=>{setTab("requests");setMsg("");setErr("");}}>Requests ${pending.length>0?h`<span style=${{marginLeft:4,background:"var(--bd)",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:700}}>${pending.length}</span>`:""}</div>
      <div class=${"auth-tab "+(tab==="all"?"on":"")} onClick=${()=>{setTab("all");setMsg("");setErr("");}}>All Users (${approved.length})</div>
      <div class=${"auth-tab "+(tab==="create"?"on":"")} onClick=${()=>{setTab("create");setMsg("");setErr("");}}>Create Account</div>
    </div>

    ${tab==="requests" && h`<div>
      ${pending.length===0 ? h`<div class="empty"><h3>NO PENDING REQUESTS</h3><p>When a student requests access, they'll appear here.</p></div>` :
      h`<div>${pending.map(u=>h`<div key=${u.email} class="assess-card" style=${{borderLeftColor:"var(--wn)"}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div style=${{flex:1,minWidth:0}}>
            <div style=${{fontWeight:700,fontSize:15}}>${u.name}</div>
            <div style=${{fontSize:12,color:"var(--g500)",marginTop:2}}>${u.email}</div>
            <div style=${{fontSize:11,color:"var(--g400)",marginTop:2}}>Requested: ${fmt2(u.createdAt)}${u.gender?" · "+(u.gender==="female"?"👩 Female":"👨 Male"):""}</div>
            ${u.phone&&h`<div style=${{fontSize:12,color:"var(--g600)",marginTop:4,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span>📱 ${u.phone}</span>
              ${u.phoneVerified
                ? h`<span style=${{background:"#e8f5e9",color:"#2e7d32",fontWeight:700,fontSize:11,padding:"2px 8px",borderRadius:10}}>✓ WhatsApp verified</span>`
                : h`<span style=${{background:"#fff3e0",color:"#e65100",fontWeight:700,fontSize:11,padding:"2px 8px",borderRadius:10}}>⏳ Awaiting verification</span>`
              }
            </div>`}
            ${u.verifyCode&&!u.phoneVerified&&h`<div style=${{marginTop:8,padding:"10px 12px",background:"#f3e5f5",border:"2px dashed #9c27b0",borderRadius:8,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div>
                <div style=${{fontSize:10,fontWeight:700,color:"#7b1fa2",letterSpacing:1,marginBottom:2}}>VERIFICATION CODE TO SEND</div>
                <div style=${{fontSize:28,fontWeight:900,letterSpacing:8,color:"#4a148c",fontFamily:"monospace"}}>${u.verifyCode}</div>
              </div>
              <div style=${{display:"flex",flexDirection:"column",gap:6}}>
                <button class="btn btn-sm" style=${{background:"#25D366",color:"#fff",border:"none",fontSize:11}} onClick=${()=>{
                  const num = (u.phone||"").replace(/[\s+\-()]/g,"");
                  const msg = encodeURIComponent("Hi "+u.name.split(" ")[0]+"! Your Arabic Enthusiast verification code is: "+u.verifyCode+" — enter it on the website to verify your WhatsApp.");
                  window.open("https://wa.me/"+num+"?text="+msg,"_blank");
                }}>Send via WhatsApp</button>
                <button class="btn btn-sm" style=${{fontSize:11}} onClick=${()=>{navigator.clipboard?.writeText(u.verifyCode);setMsg("Code copied!");}}>📋 Copy code</button>
              </div>
            </div>`}
            ${u.learnType&&h`<div style=${{fontSize:11,color:"#1976d2",marginTop:4}}>Wants to learn: ${u.learnType}</div>`}
            ${u.message&&h`<div style=${{marginTop:8,padding:"8px 10px",background:"var(--g50)",fontSize:12,lineHeight:1.6,borderLeft:"2px solid var(--g300)"}}>"${u.message}"</div>`}
          </div>
          <div style=${{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <button class="btn btn-p btn-sm" onClick=${()=>approve(u.email, u.name, u.gender)}>✓ Approve</button>
            <button class="btn btn-sm" style=${{color:"var(--bd)",borderColor:"var(--bd)"}} onClick=${()=>reject(u.email)}>✗ Reject</button>
          </div>
        </div>
      </div>`)}</div>`}
    </div>`}

    ${tab==="all" && h`<div>
      ${approved.length===0 ? h`<div class="empty"><h3>NO APPROVED USERS</h3></div>` :
      h`<div class="card" style=${{padding:0}}>
        <div style=${{overflowX:"auto"}}><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Since</th><th>Reset Password</th><th></th></tr></thead><tbody>
          ${approved.map(u=>h`<tr key=${u.email}>
            <td style=${{fontWeight:600}}>${u.name}</td>
            <td style=${{fontSize:12}}>${u.email}</td>
            <td><span class="tg">${u.role}</span></td>
            <td style=${{fontSize:12,color:"var(--g500)"}}>${fmt2(u.createdAt)}</td>
            <td>
              <div style=${{display:"flex",gap:4,alignItems:"center"}}>
                <input style=${{padding:"5px 8px",border:"1.5px solid var(--g200)",fontFamily:"var(--fb)",fontSize:12,width:120}} type="password" placeholder="New password" value=${pwForm.email===u.email?pwForm.password:""} onFocus=${()=>setPwForm({email:u.email,password:""})} onInput=${e=>setPwForm({email:u.email,password:e.target.value})}/>
                <button class="btn btn-xs" onClick=${()=>resetPw(u.email, pwForm.email===u.email?pwForm.password:"")}>Set</button>
              </div>
            </td>
            <td><button class="bi" style=${{color:"var(--bd)"}} onClick=${()=>del(u.email)}>${ic('del')}</button></td>
          </tr>`)}
        </tbody></table></div>
      </div>`}
    </div>`}

    ${tab==="create" && h`<div class="card" style=${{maxWidth:520}}>
      <h3 style=${{marginBottom:16}}>CREATE ACCOUNT</h3>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}>
        <div class="fg"><label>Full Name *</label><input value=${createForm.name} onInput=${e=>setCreateForm({...createForm,name:e.target.value})} placeholder="e.g. Sara Ahmed"/></div>
        <div class="fg"><label>Gender</label>
          <div style=${{display:"flex",gap:12,marginTop:6}}>
            ${[["female","👩 Female"],["male","👨 Male"]].map(([v,l])=>h`<label key=${v} style=${{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,fontWeight:createForm.gender===v?700:400}}>
              <input type="radio" name="cf_gender" value=${v} checked=${createForm.gender===v} onChange=${()=>setCreateForm({...createForm,gender:v})} style=${{accentColor:"#111"}}/>
              ${l}
            </label>`)}
          </div>
        </div>
        <div class="fg"><label>Email *</label><input type="email" value=${createForm.email} onInput=${e=>setCreateForm({...createForm,email:e.target.value})} placeholder="student@email.com"/></div>
        <div class="fg"><label>WhatsApp Number</label><input type="tel" value=${createForm.phone} onInput=${e=>setCreateForm({...createForm,phone:e.target.value})} placeholder="+961 70 123 456"/></div>
        <div class="fg"><label>Password *</label><input type="password" value=${createForm.password} onInput=${e=>setCreateForm({...createForm,password:e.target.value})} placeholder="Min 6 characters"/></div>
        <div class="fg"><label>Role</label><select value=${createForm.role} onChange=${e=>setCreateForm({...createForm,role:e.target.value})}><option value="student">Student</option><option value="tutor">Tutor</option></select></div>
      </div>
      <div class="fg"><label>What they want to learn</label>
        <select value=${createForm.learnType} onChange=${e=>setCreateForm({...createForm,learnType:e.target.value})}>
          <option value="Levantine">🗣 Levantine Arabic (Lebanese dialect)</option>
          <option value="Classical">📜 Classical / Modern Standard Arabic (MSA)</option>
          <option value="Quranic">🕌 Quranic Arabic</option>
          <option value="General Dialect">💬 General Arabic Dialect</option>
          <option value="Quranic + Dialect">🕌💬 Quranic + Dialect</option>
        </select>
      </div>
      <div class="fg"><label>Timezone</label>
        <select value=${createForm.timezone} onChange=${e=>setCreateForm({...createForm,timezone:e.target.value})}>
          <option value="">— Not set —</option>
          <optgroup label="🌎 USA"><option value="America/New_York">🇺🇸 Eastern (EST/EDT) — New York / Miami</option><option value="America/Chicago">🇺🇸 Central (CT)</option><option value="America/Denver">🇺🇸 Mountain (MT)</option><option value="America/Los_Angeles">🇺🇸 Pacific (PT)</option></optgroup>
          <optgroup label="🌍 Europe"><option value="Europe/London">🇬🇧 London (GMT/BST)</option><option value="Europe/Paris">🇫🇷 Paris (CET)</option><option value="Europe/Berlin">🇩🇪 Berlin (CET)</option></optgroup>
          <optgroup label="🌍 Middle East"><option value="Asia/Beirut">🇱🇧 Lebanon (Beirut)</option><option value="Asia/Riyadh">🇸🇦 Saudi Arabia</option><option value="Asia/Dubai">🇦🇪 Dubai / UAE</option><option value="Africa/Cairo">🇪🇬 Egypt</option></optgroup>
          <optgroup label="🌏 Asia & Pacific"><option value="Asia/Kolkata">🇮🇳 India (IST)</option><option value="Asia/Singapore">🇸🇬 Singapore</option><option value="Asia/Tokyo">🇯🇵 Tokyo</option><option value="Australia/Sydney">🇦🇺 Sydney</option></optgroup>
        </select>
      </div>
      <button class="btn btn-p" style=${{marginTop:4}} onClick=${create}>Create Account</button>
      <div style=${{marginTop:10,fontSize:11,color:"var(--g500)",lineHeight:1.6}}>The student can log in immediately. Share their email + password via WhatsApp.</div>
    </div>`}
  </div>`;
}
